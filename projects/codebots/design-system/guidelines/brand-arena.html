<!-- @dsCard group="Brand" viewport="700x190" subtitle="Arena furniture — grid, steel, crate, pit, spawn. Geometric divs only" name="Arena kit" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css"><style>body{margin:0;background:var(--surface-arena);background-image:repeating-linear-gradient(0deg,var(--grid-line) 0px,var(--grid-line) 1px,transparent 1px,transparent 30px),repeating-linear-gradient(90deg,var(--grid-line) 0px,var(--grid-line) 1px,transparent 1px,transparent 30px);font-family:var(--font-mono);display:flex;align-items:center;justify-content:center;gap:34px;height:190px;color:var(--text-dim)}.lbl{font-size:8.5px;letter-spacing:1px;text-align:center;margin-top:7px}.itm{display:flex;flex-direction:column;align-items:center}</style></head><body>
<div class="itm"><div style="width:64px;height:30px;background:var(--steel);border:2px solid var(--steel-edge);border-radius:3px;box-sizing:border-box"></div><div class="lbl">STEEL — NO WAY<br>THROUGH</div></div>
<div class="itm"><div style="position:relative;width:44px;height:44px;border:2px solid var(--crate);border-radius:5px;background:rgba(127,168,224,.1);overflow:hidden;box-sizing:border-box"><div style="position:absolute;left:-20%;top:50%;width:140%;height:2px;background:var(--crate);transform:rotate(45deg)"></div><div style="position:absolute;left:-20%;top:50%;width:140%;height:2px;background:var(--crate);transform:rotate(-45deg)"></div></div><div class="lbl">CRATE —<br>SMASHABLE</div></div>
<div class="itm"><div style="width:64px;height:40px;background:rgba(0,0,0,.45);border:2px dashed var(--pink);border-radius:9px;box-sizing:border-box"></div><div class="lbl">PIT — &#8722;40<br>+ TOW</div></div>
<div class="itm"><div style="width:44px;height:44px;border:2px dashed var(--line-strong);border-radius:50%;box-sizing:border-box"></div><div class="lbl">SPAWN<br>PAD</div></div>
<div class="itm"><div style="width:40px;height:40px;border-radius:50%;background:radial-gradient(circle,rgba(139,233,139,.5),rgba(139,233,139,.08) 70%)"></div><div class="lbl">BUSH — RADAR<br>CAN'T SEE YOU</div></div>
<div class="itm"><div style="width:44px;height:24px;border-radius:12px;background:rgba(127,178,255,.25);border:2px solid rgba(127,178,255,.4);box-sizing:border-box"></div><div class="lbl">MUD / WATER —<br>SLOW / SLIDE</div></div>
</body></html>
