<!-- @dsCard group="Brand" viewport="700x150" subtitle="Live motion — pulse, blink, pop, floater, shake. Snappy, physical, never dreamy" name="Motion" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css"><style>body{margin:0;background:var(--bg);font-family:var(--font-mono);display:flex;align-items:center;justify-content:center;gap:44px;height:150px;color:var(--text-dim)}.lbl{font-size:8.5px;letter-spacing:1px;text-align:center;margin-top:8px}.itm{display:flex;flex-direction:column;align-items:center;width:86px}</style></head><body>
<div class="itm"><div style="position:relative;width:40px;height:40px"><div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center"><div style="width:12px;height:12px;background:var(--cyan);border-radius:3px;transform:rotate(45deg)"></div></div><div style="position:absolute;left:50%;top:50%;width:36px;height:36px;margin:-18px 0 0 -18px;border-radius:50%;border:2px solid var(--cyan);animation:cbPulse 1.6s ease-out infinite"></div></div><div class="lbl">cbPulse<br>BEACONS</div></div>
<div class="itm"><div style="width:12px;height:12px;border-radius:50%;background:var(--cyan);animation:cbBlink 1s infinite"></div><div class="lbl">cbBlink<br>RUNNING LAMP</div></div>
<div class="itm"><div style="width:44px;height:26px;background:var(--surface-panel);border:2px solid var(--amber);border-radius:7px;animation:cbPop .25s ease-out infinite alternate"></div><div class="lbl">cbPop<br>WINS &amp; MODALS</div></div>
<div class="itm"><div style="height:26px;display:flex;align-items:flex-end"><span style="font-size:12px;font-weight:700;color:var(--green);animation:cbFloatUp 1.4s ease-out infinite">+25</span></div><div class="lbl">cbFloatUp<br>SCORE FLOATERS</div></div>
<div class="itm"><div style="width:34px;height:22px;background:var(--surface-panel);border:2px solid var(--red);border-radius:6px;animation:cbShake .45s infinite"></div><div class="lbl">cbShake<br>CRASHES</div></div>
</body></html>
