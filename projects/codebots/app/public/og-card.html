<!doctype html>
<html><head><meta charset="utf-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&family=IBM+Plex+Mono:wght@400;700&display=swap');
  *{margin:0;box-sizing:border-box}
  body{width:1200px;height:630px;overflow:hidden}
  .card{width:1200px;height:630px;background-color:#0D1A33;position:relative;
    background-image:repeating-linear-gradient(0deg,rgba(120,170,255,.08) 0 1px,transparent 1px 60px),repeating-linear-gradient(90deg,rgba(120,170,255,.08) 0 1px,transparent 1px 60px);
    padding:72px 80px;display:flex;flex-direction:column;justify-content:center;gap:26px;font-family:'IBM Plex Mono',monospace}
  .word{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:88px;letter-spacing:-2px;color:#EAF2FF}
  .word b{color:#FFB454}
  .tag{font-size:34px;line-height:1.4;color:#B9C9E6;max-width:820px}
  .chips{display:flex;gap:14px;margin-top:8px}
  .chip{font-size:20px;font-weight:700;letter-spacing:1px;color:#5FD4FF;border:2px solid #5FD4FF;border-radius:999px;padding:8px 20px}
  .chip.a{color:#FFB454;border-color:#FFB454}
  .chip.g{color:#6FE3A5;border-color:#6FE3A5}
  /* bot */
  .bot{position:absolute;right:90px;top:50%;transform:translateY(-50%) scale(2.1);transform-origin:center}
  .b{position:relative;width:150px;height:106px}
  .b div{position:absolute}
  .tread{left:18px;right:18px;height:17px;background:#8FA7CD;border-radius:9px}
  .hull{left:13px;right:23px;top:15px;bottom:15px;background:#FF8BB3;border:3px solid rgba(0,0,0,.3);border-radius:11px}
  .barrel{right:-26px;top:50%;width:44px;height:12px;margin-top:-6px;background:#FF8BB3;border:3px solid rgba(0,0,0,.3);border-radius:6px}
  .dome{left:50%;top:50%;width:42px;height:42px;margin:-21px 0 0 -21px;border-radius:50%;background:#5FD4FF;border:3px solid rgba(0,0,0,.35)}
  .eye{left:50%;width:9px;height:9px;border-radius:50%;background:#EAF2FF;border:2px solid rgba(0,0,0,.4)}
  .ant1{left:50%;top:-20px;width:3px;height:22px;margin-left:-20px;background:#8FA7CD;transform:rotate(-14deg)}
  .ant2{left:50%;top:-27px;width:9px;height:9px;margin-left:-26px;border-radius:50%;background:#5FD4FF}
</style></head>
<body>
  <div class="card">
    <div class="word">CODE<b>BOTS</b></div>
    <div class="tag">Learn to <b style="color:#EAF2FF">really</b> code by programming a little robot through a pirate campaign — real JavaScript, one command at a time.</div>
    <div class="chips"><span class="chip a">forward(3)</span><span class="chip">repeat n { }</span><span class="chip g">honk()</span></div>
    <div class="bot"><div class="b">
      <div class="tread" style="top:0"></div><div class="tread" style="bottom:0"></div>
      <div class="hull"></div><div class="barrel"></div><div class="dome"></div>
      <div class="eye" style="top:50%;margin:-11px 0 0 0"></div><div class="eye" style="top:50%;margin:2px 0 0 0"></div>
      <div class="ant1"></div><div class="ant2"></div>
    </div></div>
  </div>
</body></html>
