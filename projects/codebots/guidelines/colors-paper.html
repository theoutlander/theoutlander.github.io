<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css"><style>body{margin:0;background:var(--paper-bg);font-family:var(--font-mono);color:var(--paper-dim);padding:14px;display:flex;gap:8px}.sw{flex:1;display:flex;flex-direction:column;gap:5px;font-size:8.5px}.b{height:56px;border-radius:9px;border:1.5px solid var(--paper-line)}</style></head><body>
<div class="sw"><div class="b" style="background:var(--paper-bg)"></div>--paper-bg</div>
<div class="sw"><div class="b" style="background:var(--paper-sheet)"></div>--paper-sheet</div>
<div class="sw"><div class="b" style="background:var(--paper-tint)"></div>--paper-tint</div>
<div class="sw"><div class="b" style="background:var(--paper-ink)"></div>--paper-ink</div>
<div class="sw"><div class="b" style="background:var(--paper-accent)"></div>--paper-accent</div>
<div class="sw"><div class="b" style="background:var(--paper-blue)"></div>--paper-blue</div>
<div class="sw"><div class="b" style="background:var(--paper-green)"></div>--paper-green</div>
<div class="sw"><div class="b" style="background:var(--paper-red)"></div>--paper-red</div>
</body></html>
