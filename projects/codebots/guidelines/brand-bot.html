<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css"><style>body{margin:0;background:var(--surface-arena);background-image:repeating-linear-gradient(0deg,var(--grid-line) 0px,var(--grid-line) 1px,transparent 1px,transparent 38px),repeating-linear-gradient(90deg,var(--grid-line) 0px,var(--grid-line) 1px,transparent 1px,transparent 38px);font-family:var(--font-mono);display:flex;align-items:center;justify-content:center;gap:56px;height:210px}</style></head><body>
<div style="position:relative;width:150px;height:106px">
  <div style="position:absolute;left:18px;right:18px;top:0;height:17px;background:var(--text-dim);border-radius:9px"></div>
  <div style="position:absolute;left:18px;right:18px;bottom:0;height:17px;background:var(--text-dim);border-radius:9px"></div>
  <div style="position:absolute;left:13px;right:23px;top:15px;bottom:15px;background:var(--paint-bubblegum);border:3px solid rgba(0,0,0,.3);border-radius:11px;box-sizing:border-box"></div>
  <div style="position:absolute;right:-26px;top:50%;width:44px;height:12px;margin-top:-6px;background:var(--paint-bubblegum);border:3px solid rgba(0,0,0,.3);border-radius:6px;box-sizing:border-box"></div>
  <div style="position:absolute;left:50%;top:50%;width:42px;height:42px;margin:-21px 0 0 -21px;border-radius:50%;background:var(--paint-lagoon);border:3px solid rgba(0,0,0,.35);box-sizing:border-box"></div>
  <div style="position:absolute;left:50%;top:50%;width:9px;height:9px;margin:-11px 0 0 0;border-radius:50%;background:var(--paint-cloud);border:2px solid rgba(0,0,0,.4);box-sizing:border-box"></div>
  <div style="position:absolute;left:50%;top:50%;width:9px;height:9px;margin:2px 0 0 0;border-radius:50%;background:var(--paint-cloud);border:2px solid rgba(0,0,0,.4);box-sizing:border-box"></div>
  <div style="position:absolute;left:50%;top:-20px;width:3px;height:22px;margin-left:-20px;background:var(--text-dim);transform:rotate(-14deg)"></div>
  <div style="position:absolute;left:50%;top:-27px;width:9px;height:9px;margin-left:-26px;border-radius:50%;background:var(--cyan)"></div>
</div>
<div style="display:flex;flex-direction:column;gap:10px">
  <div style="display:flex;align-items:center;gap:8px">
    <div style="width:20px;height:20px;border-radius:5px;background:var(--amber);border:2px solid rgba(0,0,0,.35);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--on-amber);box-sizing:border-box">C</div>
    <span style="font-size:10px;color:var(--text-dim);letter-spacing:1px">C-COIN — SQUARE, NEVER ROUND</span>
  </div>
  <div style="display:flex;align-items:center;gap:8px">
    <span style="color:var(--amber);font-size:16px">&#9733;&#9733;&#9733;</span>
    <span style="font-size:10px;color:var(--text-dim);letter-spacing:1px">STARS — GLYPHS, NOT SVGS</span>
  </div>
  <div style="display:flex;align-items:center;gap:8px">
    <div style="width:14px;height:14px;background:var(--cyan);border-radius:3px;transform:rotate(45deg)"></div>
    <span style="font-size:10px;color:var(--text-dim);letter-spacing:1px">BEACON — DIAMOND + cbPulse RING</span>
  </div>
</div>
</body></html>
