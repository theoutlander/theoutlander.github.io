<!-- @dsCard group="Spacing" viewport="700x150" subtitle="2px solid = the signature. Dashed = locked / future / hint" name="Borders" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css"><style>body{margin:0;background:var(--bg);color:var(--text-body);padding:16px 20px;font-family:var(--font-mono);display:flex;gap:12px}.p{flex:1;border-radius:var(--radius-lg);padding:12px 14px;font-size:10px;letter-spacing:1px;display:flex;flex-direction:column;gap:6px}</style></head><body>
<div class="p" style="background:var(--surface-panel);border:var(--border)"><b style="color:var(--ink)">PANEL</b>2px solid --line on --surface-panel</div>
<div class="p" style="background:var(--surface-deep);border:2px dashed var(--line-strong);opacity:.8"><b style="color:var(--ink)">LOCKED</b>dashed + opacity + reason chip</div>
<div class="p" style="background:var(--surface-panel);border:2px solid var(--amber);box-shadow:var(--glow-amber)"><b style="color:var(--amber)">ACTIVE</b>amber border + glow spotlight</div>
<div class="p" style="background:var(--surface-panel);border:2px dashed var(--cyan)"><b style="color:var(--cyan)">HINT</b>cyan dashed = help &amp; next-up</div>
</body></html>
