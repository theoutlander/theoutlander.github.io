<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css"><style>body{margin:0;background:var(--bg);font-family:var(--font-mono);color:var(--text-dim);padding:14px;display:grid;grid-template-columns:repeat(6,1fr);gap:10px 8px}.sw{display:flex;flex-direction:column;align-items:center;gap:4px;font-size:8px;letter-spacing:.5px}.b{width:100%;height:40px;border-radius:11px;border:2px solid rgba(0,0,0,.25)}</style></head><body>
<div class="sw"><div class="b" style="background:var(--paint-bumblebee)"></div>BUMBLEBEE</div>
<div class="sw"><div class="b" style="background:var(--paint-tangerine)"></div>TANGERINE</div>
<div class="sw"><div class="b" style="background:var(--paint-cherry-pop)"></div>CHERRY POP</div>
<div class="sw"><div class="b" style="background:var(--paint-bubblegum)"></div>BUBBLEGUM</div>
<div class="sw"><div class="b" style="background:var(--paint-grape-soda)"></div>GRAPE SODA</div>
<div class="sw"><div class="b" style="background:var(--paint-skyblast)"></div>SKYBLAST</div>
<div class="sw"><div class="b" style="background:var(--paint-lagoon)"></div>LAGOON</div>
<div class="sw"><div class="b" style="background:var(--paint-sea-mint)"></div>SEA MINT</div>
<div class="sw"><div class="b" style="background:var(--paint-slime)"></div>SLIME</div>
<div class="sw"><div class="b" style="background:var(--paint-peach-fuzz)"></div>PEACH FUZZ</div>
<div class="sw"><div class="b" style="background:var(--paint-cloud)"></div>CLOUD</div>
<div class="sw"><div class="b" style="background:var(--paint-midnight)"></div>MIDNIGHT</div>
</body></html>
