<!-- @dsCard group="Spacing" viewport="700x160" subtitle="4px base scale + radii family — chips are pills, cards 12px" name="Spacing & radii" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css"><style>body{margin:0;background:var(--bg);color:var(--text-dim);padding:14px 20px;font-family:var(--font-mono);display:flex;gap:24px;align-items:flex-start}.col{display:flex;flex-direction:column;gap:6px;font-size:8.5px;letter-spacing:.5px}.bar{height:10px;background:var(--amber);border-radius:3px}.bx{background:var(--surface-panel);border:2px solid var(--line);display:flex;align-items:center;justify-content:center;height:34px;font-size:8.5px;color:var(--text-body)}</style></head><body>
<div class="col" style="flex:1">
<div class="bar" style="width:4px"></div><span>--space-1 · 4</span>
<div class="bar" style="width:8px"></div><span>--space-2 · 8</span>
<div class="bar" style="width:12px"></div><span>--space-3 · 12</span>
<div class="bar" style="width:16px"></div><span>--space-4 · 16</span>
<div class="bar" style="width:24px"></div><span>--space-6 · 24</span>
<div class="bar" style="width:32px"></div><span>--space-8 · 32</span>
</div>
<div class="col" style="flex:1.6">
<div class="bx" style="border-radius:var(--radius-sm)">--radius-sm 7</div>
<div class="bx" style="border-radius:var(--radius-md)">--radius-md 9</div>
<div class="bx" style="border-radius:var(--radius-lg)">--radius-lg 12</div>
<div class="bx" style="border-radius:var(--radius-pill)">--radius-pill</div>
</div>
</body></html>
