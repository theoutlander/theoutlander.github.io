<!-- @dsCard group="Colors" viewport="700x160" subtitle="Roles + element FX — amber acts, cyan informs, green succeeds" name="Semantic & elements" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css"><style>body{margin:0;background:var(--bg);font-family:var(--font-mono);padding:14px;display:flex;flex-direction:column;gap:10px}.row{display:flex;gap:8px}.chip{flex:1;display:flex;align-items:center;gap:8px;border:1.5px solid var(--line);border-radius:999px;padding:6px 10px;font-size:9px;letter-spacing:1px;font-weight:700;color:var(--text-body)}.d{width:12px;height:12px;border-radius:50%}</style></head><body>
<div class="row">
<div class="chip"><span class="d" style="background:var(--accent)"></span>ACTION / SCORE</div>
<div class="chip"><span class="d" style="background:var(--accent-2)"></span>INFO / BEACON</div>
<div class="chip"><span class="d" style="background:var(--success)"></span>SUCCESS / READY</div>
<div class="chip"><span class="d" style="background:var(--danger)"></span>CRASH / ERROR</div>
<div class="chip"><span class="d" style="background:var(--pink)"></span>HAZARD / PENALTY</div>
</div>
<div class="row">
<div class="chip"><span class="d" style="background:var(--fx-fire)"></span>FIRE</div>
<div class="chip"><span class="d" style="background:var(--fx-ice)"></span>ICE</div>
<div class="chip"><span class="d" style="background:var(--fx-water)"></span>WATER</div>
<div class="chip"><span class="d" style="background:var(--fx-vine)"></span>VINE</div>
<div class="chip"><span class="d" style="background:var(--fx-gust)"></span>GUST</div>
</div>
</body></html>
