<!-- @dsCard group="Components" viewport="700x240" subtitle="BotAvatar (paintable mascot) · PartCard armory rows" name="Game" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../../styles.css"><style>body{margin:0;background:var(--bg);font-family:var(--font-mono);color:var(--ink);padding:16px 18px;display:flex;gap:20px;align-items:center}</style></head><body>
<div style="position:relative;width:130px;height:92px;flex:none">
  <div style="position:absolute;left:16px;right:16px;top:0;height:15px;background:var(--text-dim);border-radius:8px"></div>
  <div style="position:absolute;left:16px;right:16px;bottom:0;height:15px;background:var(--text-dim);border-radius:8px"></div>
  <div style="position:absolute;left:11px;right:20px;top:13px;bottom:13px;background:var(--paint-bubblegum);border:3px solid rgba(0,0,0,.3);border-radius:10px;box-sizing:border-box"></div>
  <div style="position:absolute;right:-22px;top:50%;width:38px;height:11px;margin-top:-5.5px;background:var(--paint-bubblegum);border:3px solid rgba(0,0,0,.3);border-radius:6px;box-sizing:border-box"></div>
  <div style="position:absolute;left:50%;top:50%;width:37px;height:37px;margin:-18.5px 0 0 -18.5px;border-radius:50%;background:var(--paint-lagoon);border:3px solid rgba(0,0,0,.35);box-sizing:border-box"></div>
  <div style="position:absolute;left:50%;top:50%;width:8px;height:8px;margin:-10px 0 0 0;border-radius:50%;background:var(--paint-cloud);border:2px solid rgba(0,0,0,.4);box-sizing:border-box"></div>
  <div style="position:absolute;left:50%;top:50%;width:8px;height:8px;margin:2px 0 0 0;border-radius:50%;background:var(--paint-cloud);border:2px solid rgba(0,0,0,.4);box-sizing:border-box"></div>
  <div style="position:absolute;left:50%;top:-17px;width:3px;height:19px;margin-left:-17px;background:var(--text-dim);transform:rotate(-14deg)"></div>
  <div style="position:absolute;left:50%;top:-23px;width:8px;height:8px;margin-left:-23px;border-radius:50%;background:var(--cyan)"></div>
</div>
<div style="flex:1;display:flex;flex-direction:column;gap:8px">
  <div style="background:var(--surface-deep);border:1.5px solid var(--cyan);border-radius:10px;padding:9px 12px">
    <div style="display:flex;justify-content:space-between;align-items:baseline"><span style="font-size:11px;font-weight:700">RADAR DISH</span><span style="display:flex;gap:8px;align-items:baseline"><span style="font-size:9px;color:var(--pink);font-weight:700">WT +4</span><span style="font-size:8.5px;letter-spacing:1px;font-weight:700;color:var(--cyan);border:1.5px solid var(--cyan);border-radius:999px;padding:2px 8px">NEXT UNLOCK</span></span></div>
    <div style="font-size:9.5px;color:var(--text-dim);margin:4px 0">gives your bot eyes</div>
    <div style="display:flex;gap:5px"><span style="font-size:8.5px;font-weight:700;color:var(--amber);border:1.5px solid rgba(255,180,84,.5);border-radius:999px;padding:2px 7px">radar()</span><span style="font-size:8.5px;color:var(--cyan);border:1.5px solid rgba(95,212,255,.4);border-radius:999px;padding:2px 7px">IDEA: if / else</span></div>
  </div>
  <div style="background:var(--surface-deep);border:1.5px dashed var(--line);border-radius:10px;padding:9px 12px;opacity:.6">
    <div style="display:flex;justify-content:space-between;align-items:baseline"><span style="font-size:11px;font-weight:700">TWIN ZAPPER</span><span style="display:flex;gap:8px;align-items:baseline"><span style="font-size:9px;color:var(--pink);font-weight:700">WT +5</span><span style="font-size:8.5px;letter-spacing:1px;font-weight:700;color:var(--text-dim);border:1.5px dashed var(--text-dim);border-radius:999px;padding:2px 8px">CLEAR CH 05</span></span></div>
  </div>
</div>
</body></html>
