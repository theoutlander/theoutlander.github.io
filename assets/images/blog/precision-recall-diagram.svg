<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1200" width="1200" height="1200" role="img" aria-label="Two targets contrasting high precision low recall and high recall low precision. Green: correct catch, red: false alarm, yellow: missed">
  <style>
    .ring-outer { fill: none; stroke: #c8cdd3; stroke-width: 1.5; }
    .ring-mid   { fill: none; stroke: #c8cdd3; stroke-width: 1.5; }
    .ring-eye   { fill: #faf3f1; stroke: #94a3b8; stroke-width: 2; }
    .crosshair  { stroke: #c8cdd3; stroke-width: 1.5; }
    .caught     { fill: #22c55e; stroke: #15803d; stroke-width: 1.25; }
    .falsealarm { fill: #ef4444; stroke: #b91c1c; stroke-width: 1.25; }
    .missed     { fill: #facc15; stroke: #a16207; stroke-width: 1.5; }
    .caption    { font: 600 22px -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; fill: #1a1a1a; text-anchor: middle; }
    .legend-text { font: 500 18px -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; fill: #1a1a1a; }
  </style>

  <rect width="1200" height="1200" fill="#ffffff"/>

  <g transform="translate(0 285)">
    <g transform="translate(300 265)">
      <line class="crosshair" x1="-215" y1="0" x2="215" y2="0"/>
      <line class="crosshair" x1="0" y1="-215" x2="0" y2="215"/>
      <circle class="ring-outer" r="200"/>
      <circle class="ring-mid"   r="130"/>
      <circle class="ring-eye"   r="75"/>

      <circle class="caught" cx="-20" cy="-15" r="9"/>
      <circle class="caught" cx="18"  cy="22"  r="9"/>

      <circle class="missed" cx="-42" cy="12"  r="8"/>
      <circle class="missed" cx="30"  cy="-28" r="8"/>
      <circle class="missed" cx="2"   cy="42"  r="8"/>
      <circle class="missed" cx="-10" cy="-48" r="8"/>
      <circle class="missed" cx="48"  cy="6"   r="8"/>
      <circle class="missed" cx="-48" cy="-30" r="8"/>
      <circle class="missed" cx="24"  cy="-2"  r="8"/>
      <circle class="missed" cx="-22" cy="38"  r="8"/>

      <text class="caption" y="255">High precision, low recall</text>
    </g>

    <g transform="translate(900 265)">
      <line class="crosshair" x1="-215" y1="0" x2="215" y2="0"/>
      <line class="crosshair" x1="0" y1="-215" x2="0" y2="215"/>
      <circle class="ring-outer" r="200"/>
      <circle class="ring-mid"   r="130"/>
      <circle class="ring-eye"   r="75"/>

      <circle class="caught" cx="-30" cy="-10" r="9"/>
      <circle class="caught" cx="18"  cy="28"  r="9"/>
      <circle class="caught" cx="-12" cy="-42" r="9"/>
      <circle class="caught" cx="38"  cy="-18" r="9"/>
      <circle class="caught" cx="-46" cy="22"  r="9"/>
      <circle class="caught" cx="2"   cy="48"  r="9"/>
      <circle class="caught" cx="28"  cy="-40" r="9"/>
      <circle class="caught" cx="-2"  cy="2"   r="9"/>

      <circle class="missed" cx="52" cy="14" r="8"/>

      <circle class="falsealarm" cx="105"  cy="-115" r="9"/>
      <circle class="falsealarm" cx="-125" cy="-105" r="9"/>
      <circle class="falsealarm" cx="160"  cy="20"   r="9"/>
      <circle class="falsealarm" cx="-55"  cy="155"  r="9"/>
      <circle class="falsealarm" cx="115"  cy="135" r="9"/>
      <circle class="falsealarm" cx="-170" cy="40"   r="9"/>
      <circle class="falsealarm" cx="175"  cy="-50" r="9"/>

      <text class="caption" y="255">High recall, low precision</text>
    </g>

    <g transform="translate(600 585)">
      <g transform="translate(-260 0)">
        <circle class="caught" cx="0" cy="-6" r="9"/>
        <text class="legend-text" x="18" y="0">Caught</text>
      </g>
      <g transform="translate(-60 0)">
        <circle class="falsealarm" cx="0" cy="-6" r="9"/>
        <text class="legend-text" x="18" y="0">False alarm</text>
      </g>
      <g transform="translate(160 0)">
        <circle class="missed" cx="0" cy="-6" r="8"/>
        <text class="legend-text" x="18" y="0">Missed</text>
      </g>
    </g>
  </g>
</svg>
