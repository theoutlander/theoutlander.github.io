name = "judgment"
main = "worker.js"
compatibility_date = "2024-11-01"

# Serve the static client (index.html, game/*) from the judgment/ root.
# not_found_handling defaults to "none" so unmatched paths run worker.js
# (keeps /ws and /api/* from being swallowed by the asset server).
[assets]
directory = "../"
binding = "ASSETS"

# Room = one Durable Object per invite code (authoritative game state).
[[durable_objects.bindings]]
name = "ROOMS"
class_name = "Room"

# IMPORTANT: free-tier DO requires the SQLite-backed flavor.
[[migrations]]
tag = "v1"
new_sqlite_classes = ["Room"]

# D1 leaderboard. Create with:  npx wrangler d1 create judgment
# then paste the returned database_id below (and keep binding = "DB").
[[d1_databases]]
binding = "DB"
database_name = "judgment"
database_id = "00000000-0000-0000-0000-000000000000"  # local dev placeholder; replace with real id from `wrangler d1 create judgment` before deploy
