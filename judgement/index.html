  <!-- Site-wide analytics. Injected at runtime rather than declared as <script src="/lab/...">
       because that path is resolved by the *site* build, not this one — Vite would try to find
       it inside projects/judgement/ and fail. -->
  <script>
    (function () {
      var s = document.createElement('script');
      s.src = '/lab/shared/ga-analytics.js';
      s.defer = true;
      document.head.appendChild(s);
    })();
  </script>
  <script type="module" crossorigin src="/judgement/assets/index-DI5lzcdP.js"></script>
  <link rel="stylesheet" crossorigin href="/judgement/assets/index-DmZ7d4nA.css">
</head>
<body>
  <div id="app"></div>

  <!-- One bundle. React, the engine, and every screen are compiled ahead of time by Vite.
       This used to be a CDN copy of React plus @babel/standalone (~1MB) transpiling eight
       game/*.jsx files in the browser on every single page load. -->
</body>
</html>
