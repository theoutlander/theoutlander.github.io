<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Maya's Shop 🛍️</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;900&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
  <style>
    :root {
      --pink:   #ff6eb4;
      --yellow: #ffe14d;
      --green:  #5dffb0;
      --blue:   #5bc8ff;
      --purple: #c77dff;
      --orange: #ff9a3c;
      --bg:     #0f0a1e;
      --card:   #1e1440;
      --text:   #f0e6ff;
      --muted:  rgba(240,230,255,0.4);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      min-height: 100vh;
      padding-bottom: 60px;
    }

    /* ── Header ── */
    header {
      text-align: center;
      padding: 48px 20px 32px;
      background: linear-gradient(180deg, rgba(199,125,255,0.15) 0%, transparent 100%);
    }

    header .shop-icon {
      font-size: 64px;
      display: block;
      margin-bottom: 12px;
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-10px); }
    }

    header h1 {
      font-family: 'Fredoka One', cursive;
      font-size: clamp(2.4rem, 8vw, 4rem);
      background: linear-gradient(135deg, var(--pink), var(--purple), var(--blue));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1.1;
    }

    header p {
      color: var(--muted);
      font-size: 1.1rem;
      margin-top: 10px;
    }

    /* ── Section ── */
    section {
      max-width: 960px;
      margin: 0 auto;
      padding: 0 20px;
    }

    .section-title {
      font-family: 'Fredoka One', cursive;
      font-size: 1.8rem;
      margin: 44px 0 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .section-title span {
      display: inline-block;
      width: 6px;
      height: 32px;
      border-radius: 4px;
    }

    /* ── Books row ── */
    .books-row {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .book-card {
      flex: 1 1 240px;
      max-width: 300px;
      background: var(--card);
      border-radius: 20px;
      overflow: hidden;
      border: 2px solid rgba(199,125,255,0.25);
      transition: transform 0.2s, box-shadow 0.2s;
      cursor: pointer;
    }

    .book-card:hover, .book-card:focus-within {
      transform: translateY(-6px);
      box-shadow: 0 16px 40px rgba(199,125,255,0.25);
    }

    .book-cover {
      height: 200px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 72px;
      position: relative;
      overflow: hidden;
    }

    .book-cover::before {
      content: '';
      position: absolute;
      inset: 0;
      opacity: 0.3;
    }

    .book-cover .spine {
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 18px;
      opacity: 0.7;
    }

    .book-meta {
      padding: 16px;
    }

    .book-meta h3 {
      font-family: 'Fredoka One', cursive;
      font-size: 1.15rem;
      line-height: 1.3;
      margin-bottom: 4px;
    }

    .book-meta .subtitle {
      font-size: 0.82rem;
      color: var(--muted);
      margin-bottom: 12px;
    }

    /* ── Merch grid ── */
    .merch-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 14px;
    }

    .merch-card {
      background: var(--card);
      border-radius: 18px;
      border: 2px solid rgba(91,200,255,0.15);
      overflow: hidden;
      transition: transform 0.2s, box-shadow 0.2s;
      cursor: pointer;
    }

    .merch-card:hover, .merch-card:focus-within {
      transform: translateY(-4px);
      box-shadow: 0 12px 32px rgba(91,200,255,0.2);
    }

    .merch-icon {
      height: 110px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 52px;
    }

    .merch-meta {
      padding: 10px 12px 14px;
    }

    .merch-meta h3 {
      font-family: 'Fredoka One', cursive;
      font-size: 0.95rem;
      line-height: 1.3;
      margin-bottom: 2px;
    }

    /* ── Price + button ── */
    .price-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 10px;
    }

    .price {
      font-family: 'Fredoka One', cursive;
      font-size: 1.3rem;
    }

    .btn-order {
      background: linear-gradient(135deg, var(--pink), var(--purple));
      color: #fff;
      border: none;
      border-radius: 50px;
      padding: 8px 16px;
      font-family: 'Fredoka One', cursive;
      font-size: 0.95rem;
      cursor: pointer;
      min-height: 44px;
      min-width: 44px;
      touch-action: manipulation;
      transition: opacity 0.2s, transform 0.1s;
    }

    .btn-order:active {
      opacity: 0.8;
      transform: scale(0.97);
    }

    /* ── Modal ── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(15,10,30,0.85);
      backdrop-filter: blur(6px);
      display: flex;
      align-items: flex-end;
      justify-content: center;
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s;
    }

    .modal-overlay.open {
      opacity: 1;
      pointer-events: all;
    }

    .modal {
      background: var(--card);
      border-radius: 28px 28px 0 0;
      border: 2px solid rgba(199,125,255,0.3);
      border-bottom: none;
      padding: 28px 24px 40px;
      width: 100%;
      max-width: 520px;
      transform: translateY(100%);
      transition: transform 0.3s cubic-bezier(.4,0,.2,1);
    }

    .modal-overlay.open .modal {
      transform: translateY(0);
    }

    .modal-handle {
      width: 48px;
      height: 5px;
      background: var(--muted);
      border-radius: 4px;
      margin: 0 auto 20px;
    }

    .modal h2 {
      font-family: 'Fredoka One', cursive;
      font-size: 1.6rem;
      margin-bottom: 6px;
    }

    .modal .item-name {
      color: var(--purple);
      font-size: 1rem;
      margin-bottom: 20px;
    }

    .modal label {
      display: block;
      font-size: 0.9rem;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .modal input, .modal textarea {
      width: 100%;
      background: rgba(240,230,255,0.08);
      border: 2px solid rgba(199,125,255,0.25);
      border-radius: 12px;
      color: var(--text);
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      font-size: 1rem;
      padding: 12px 14px;
      margin-bottom: 16px;
      outline: none;
      transition: border-color 0.2s;
      min-height: 44px;
    }

    .modal input:focus, .modal textarea:focus {
      border-color: var(--purple);
    }

    .modal textarea {
      resize: none;
      height: 80px;
    }

    .modal-actions {
      display: flex;
      gap: 12px;
      margin-top: 4px;
    }

    .btn-cancel {
      flex: 0;
      background: rgba(240,230,255,0.08);
      color: var(--muted);
      border: 2px solid rgba(240,230,255,0.1);
      border-radius: 50px;
      padding: 12px 20px;
      font-family: 'Fredoka One', cursive;
      font-size: 1rem;
      cursor: pointer;
      min-height: 52px;
      touch-action: manipulation;
    }

    .btn-send {
      flex: 1;
      background: linear-gradient(135deg, var(--pink), var(--purple));
      color: #fff;
      border: none;
      border-radius: 50px;
      padding: 14px 24px;
      font-family: 'Fredoka One', cursive;
      font-size: 1.1rem;
      cursor: pointer;
      min-height: 52px;
      touch-action: manipulation;
      transition: opacity 0.2s;
    }

    .btn-send:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: var(--green);
      color: #0f0a1e;
      font-family: 'Fredoka One', cursive;
      font-size: 1.1rem;
      padding: 14px 28px;
      border-radius: 50px;
      z-index: 200;
      transition: transform 0.35s cubic-bezier(.4,0,.2,1);
      white-space: nowrap;
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
    }

    /* ── Footer ── */
    footer {
      text-align: center;
      color: var(--muted);
      font-size: 0.9rem;
      margin-top: 60px;
      padding: 0 20px;
    }

    footer a {
      color: var(--pink);
      text-decoration: none;
    }

    /* ── Responsive ── */
    @media (max-width: 520px) {
      .books-row { flex-direction: column; align-items: center; }
      .book-card { max-width: 100%; }
    }
  </style>
</head>
<body>

<header>
  <span class="shop-icon">🛍️</span>
  <h1>Maya's Shop</h1>
  <p>Books, merch & more — made with love 💕</p>
</header>

<section>

  <!-- ══ BOOKS ══ -->
  <div class="section-title">
    <span style="background:var(--pink)"></span>
    📚 Maya's Books
  </div>

  <div class="books-row" id="books-row"></div>

  <!-- ══ MERCH ══ -->
  <div class="section-title">
    <span style="background:var(--blue)"></span>
    ✨ Accessories & Merch
  </div>

  <div class="merch-grid" id="merch-grid"></div>

</section>

<!-- ══ MODAL ══ -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <div class="modal-handle"></div>
    <h2>Order This! 🎉</h2>
    <div class="item-name" id="modal-item-name"></div>
    <label>Your name</label>
    <input type="text" id="order-name" placeholder="Your name" autocomplete="name">
    <label>Your email</label>
    <input type="email" id="order-email" placeholder="your@email.com" autocomplete="email">
    <label>Anything to add? (optional)</label>
    <textarea id="order-note" placeholder="e.g. gift wrapping, personalisation..."></textarea>
    <div class="modal-actions">
      <button class="btn-cancel" id="btn-cancel">Cancel</button>
      <button class="btn-send" id="btn-send">Send Order ✉️</button>
    </div>
  </div>
</div>

<!-- ══ TOAST ══ -->
<div class="toast" id="toast"></div>

<footer>
  <p>Made together 💕 · <a href="index.html">← Back to Maya's Game Lab</a></p>
</footer>

<script>
  // ─────────────────────────────────────────────
  //  PRODUCT DATA — update prices/names here
  // ─────────────────────────────────────────────

  const BOOKS = [
    {
      emoji: '📖',
      coverColor: 'linear-gradient(135deg,#ff6eb4,#c77dff)',
      spineColor: '#ff6eb4',
      title: 'The Mystery at Maple Street',
      subtitle: 'A detective story',
      price: '$8',
    },
    {
      emoji: '🔍',
      coverColor: 'linear-gradient(135deg,#5bc8ff,#5dffb0)',
      spineColor: '#5bc8ff',
      title: 'The Case of the Missing Cookie',
      subtitle: 'A detective story',
      price: '$8',
    },
    {
      emoji: '🕵️',
      coverColor: 'linear-gradient(135deg,#ffe14d,#ff9a3c)',
      spineColor: '#ffe14d',
      title: "Maya's Detective Club",
      subtitle: 'A detective story',
      price: '$8',
    },
  ];

  const MERCH = [
    { emoji: '🎴', label: 'Mystery Clue Cards',  subtitle: 'Set of 10',      price: '$5',  accent: '#c77dff' },
    { emoji: '🏷️', label: 'Detective Name Badge', subtitle: 'Personalised',   price: '$4',  accent: '#5bc8ff' },
    { emoji: '☕', label: 'Maya\'s Mug',          subtitle: 'Ceramic, 11 oz', price: '$12', accent: '#ff9a3c' },
    { emoji: '📿', label: 'Rainbow Bracelet',     subtitle: 'Handmade',       price: '$6',  accent: '#ff6eb4' },
    { emoji: '💎', label: 'Mystery Locket',       subtitle: 'Necklace',       price: '$8',  accent: '#5dffb0' },
    { emoji: '👕', label: 'Detective Club Tee',   subtitle: 'Kids & adults',  price: '$15', accent: '#ffe14d' },
  ];

  // ─────────────────────────────────────────────
  //  EmailJS (same keys as portal)
  // ─────────────────────────────────────────────
  const EJS_KEY = 'aobGgwT--7krdk9Qv';
  const EJS_SVC = 'service_08wvsfl';
  const EJS_TPL = 'template_b7g9ipp';

  emailjs.init(EJS_KEY);

  // ─────────────────────────────────────────────
  //  Render books
  // ─────────────────────────────────────────────
  const booksRow = document.getElementById('books-row');

  BOOKS.forEach(b => {
    const card = document.createElement('div');
    card.className = 'book-card';
    card.innerHTML = `
      <div class="book-cover" style="background:${b.coverColor}">
        <div class="spine" style="background:${b.spineColor}"></div>
        <span>${b.emoji}</span>
      </div>
      <div class="book-meta">
        <h3>${b.title}</h3>
        <div class="subtitle">${b.subtitle}</div>
        <div class="price-row">
          <span class="price" style="color:var(--pink)">${b.price}</span>
          <button class="btn-order" data-item="${b.title} — ${b.price}">Order</button>
        </div>
      </div>`;
    booksRow.appendChild(card);
  });

  // ─────────────────────────────────────────────
  //  Render merch
  // ─────────────────────────────────────────────
  const merchGrid = document.getElementById('merch-grid');

  MERCH.forEach(m => {
    const card = document.createElement('div');
    card.className = 'merch-card';
    card.innerHTML = `
      <div class="merch-icon" style="background:linear-gradient(135deg,${m.accent}22,${m.accent}08)">
        <span>${m.emoji}</span>
      </div>
      <div class="merch-meta">
        <h3>${m.label}</h3>
        <div class="subtitle" style="color:var(--muted);font-size:.78rem;margin-bottom:8px">${m.subtitle}</div>
        <div class="price-row">
          <span class="price" style="color:${m.accent}">${m.price}</span>
          <button class="btn-order" data-item="${m.label} — ${m.price}">Order</button>
        </div>
      </div>`;
    merchGrid.appendChild(card);
  });

  // ─────────────────────────────────────────────
  //  Modal logic
  // ─────────────────────────────────────────────
  const overlay   = document.getElementById('modal-overlay');
  const itemLabel = document.getElementById('modal-item-name');
  const btnCancel = document.getElementById('btn-cancel');
  const btnSend   = document.getElementById('btn-send');
  const toast     = document.getElementById('toast');

  let currentItem = '';

  document.body.addEventListener('click', e => {
    const btn = e.target.closest('.btn-order');
    if (!btn) return;
    currentItem = btn.dataset.item;
    itemLabel.textContent = currentItem;
    document.getElementById('order-name').value  = '';
    document.getElementById('order-email').value = '';
    document.getElementById('order-note').value  = '';
    overlay.classList.add('open');
  });

  btnCancel.addEventListener('click', closeModal);
  overlay.addEventListener('click', e => { if (e.target === overlay) closeModal(); });

  function closeModal() { overlay.classList.remove('open'); }

  function showToast(msg, ok = true) {
    toast.textContent = msg;
    toast.style.background = ok ? 'var(--green)' : 'var(--pink)';
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 3500);
  }

  btnSend.addEventListener('click', async () => {
    const name  = document.getElementById('order-name').value.trim();
    const email = document.getElementById('order-email').value.trim();
    const note  = document.getElementById('order-note').value.trim();

    if (!name || !email) {
      showToast('Please fill in your name and email! 😊', false);
      return;
    }

    btnSend.disabled = true;
    btnSend.textContent = 'Sending…';

    const message = `🛍️ NEW ORDER from Maya's Shop!\n\nItem: ${currentItem}\nName: ${name}\nEmail: ${email}${note ? '\nNote: ' + note : ''}`;

    try {
      await emailjs.send(EJS_SVC, EJS_TPL, {
        message,
        wish: message,
        idea: message,
        from_name: name,
        reply_to: email,
      });
      closeModal();
      showToast('Order sent! We'll be in touch 🎉');
    } catch (err) {
      console.error(err);
      showToast('Oops — try again in a moment 😅', false);
    } finally {
      btnSend.disabled = false;
      btnSend.textContent = 'Send Order ✉️';
    }
  });
</script>
</body>
</html>
