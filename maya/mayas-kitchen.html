<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Maya's Kitchen 🍳</title>
  <script src="portal-bridge.js"></script>
  <!-- Google Analytics -->
  <script src="ga-analytics.js" defer></script>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --pink:   #ff6eb4;
      --yellow: #ffe14d;
      --green:  #5dffb0;
      --blue:   #5bc8ff;
      --purple: #c77dff;
      --orange: #ff9a3c;
      --bg:     #0f0a1e;
      --card:   #1e1440;
      --text:   #f0e6ff;
      --muted:  rgba(240,230,255,0.4);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      max-width: 480px;
      margin: 0 auto;
      overflow: hidden;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 14px;
      background: var(--card);
      border-bottom: 2px solid rgba(199,125,255,0.2);
      flex-shrink: 0;
      gap: 8px;
    }
    .header-title {
      font-family: 'Fredoka One', cursive;
      font-size: 1.15rem;
      color: var(--pink);
      flex: 1;
      min-width: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .header-actions { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
    .trophy-btn {
      background: rgba(255,225,77,0.12);
      border: 2px solid var(--yellow);
      border-radius: 50%;
      width: 40px; height: 40px;
      font-size: 1.2rem;
      cursor: pointer;
      touch-action: manipulation;
    }
    .coins {
      display: flex;
      align-items: center;
      gap: 5px;
      background: rgba(255,225,77,0.12);
      border: 2px solid var(--yellow);
      border-radius: 20px;
      padding: 5px 12px;
      font-size: 1rem;
      color: var(--yellow);
      font-family: 'Fredoka One', cursive;
      transition: transform 0.2s;
      position: relative;
    }
    .coins.bump { animation: coinBump 0.3s ease-out; }
    @keyframes coinBump {
      0%,100% { transform: scale(1); }
      50% { transform: scale(1.25); }
    }
    .coin-float {
      position: absolute;
      top: -8px; right: -4px;
      color: var(--green);
      font-size: 0.85rem;
      font-family: 'Fredoka One', cursive;
      animation: floatUp 1s ease-out forwards;
      pointer-events: none;
    }
    @keyframes floatUp {
      0% { opacity: 1; transform: translateY(0); }
      100% { opacity: 0; transform: translateY(-28px); }
    }

    .screen {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 16px;
      padding-bottom: 82px;
      -webkit-overflow-scrolling: touch;
    }
    .screen.no-nav { padding-bottom: 16px; }

    .section-title {
      font-family: 'Fredoka One', cursive;
      font-size: 0.9rem;
      color: var(--purple);
      margin-bottom: 10px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    /* Customer banner */
    .customer-banner {
      background: linear-gradient(135deg, rgba(91,200,255,0.15), rgba(199,125,255,0.15));
      border: 2px solid rgba(91,200,255,0.35);
      border-radius: 16px;
      padding: 12px 14px;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      animation: custBounce 0.5s ease-out;
    }
    @keyframes custBounce {
      0% { transform: scale(0.92); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }
    .customer-banner.happy {
      border-color: var(--green);
      background: linear-gradient(135deg, rgba(93,255,176,0.12), rgba(255,225,77,0.1));
    }
    .cust-emoji { font-size: 2.4rem; flex-shrink: 0; }
    .cust-bubble {
      flex: 1;
      font-size: 0.82rem;
      line-height: 1.35;
    }
    .cust-bubble strong { color: var(--yellow); }

    .recipe-scroll {
      display: flex;
      gap: 10px;
      overflow-x: auto;
      padding: 8px 0 6px;
      scrollbar-width: none;
      margin-bottom: 22px;
    }
    .recipe-scroll::-webkit-scrollbar { display: none; }
    .recipe-scroll.tutorial-hl { outline: 2px dashed var(--yellow); border-radius: 12px; padding: 8px; }

    .recipe-card {
      flex-shrink: 0;
      width: 88px;
      background: var(--card);
      border-radius: 14px;
      padding: 10px 6px 8px;
      text-align: center;
      border: 2px solid rgba(240,230,255,0.07);
      cursor: pointer;
      transition: transform 0.12s;
      position: relative;
      user-select: none;
      touch-action: manipulation;
      min-height: 44px;
    }
    .recipe-card:active { transform: scale(0.92); }
    .recipe-card.can-make {
      border-color: var(--green);
      box-shadow: 0 0 10px rgba(93,255,176,0.18);
    }
    .recipe-card.locked { opacity: 0.55; }
    .recipe-card.order-match {
      border-color: var(--blue);
      box-shadow: 0 0 12px rgba(91,200,255,0.25);
    }
    .recipe-card .food-emoji { font-size: 2.2rem; display: block; margin-bottom: 4px; }
    .recipe-card .food-name { font-size: 0.67rem; color: var(--text); line-height: 1.2; display: block; }
    .recipe-card .sell-tag {
      position: absolute; top: 5px; right: 5px;
      font-size: 0.58rem; color: var(--yellow);
      background: rgba(255,225,77,0.1);
      border-radius: 6px; padding: 1px 4px;
    }
    .recipe-card .lock-hint {
      font-size: 0.52rem;
      color: var(--muted);
      display: block;
      margin-top: 3px;
      line-height: 1.1;
    }
    .ready-badge {
      position: absolute; top: -7px; left: 50%;
      transform: translateX(-50%);
      background: var(--green); color: #0f0a1e;
      font-size: 0.55rem; font-weight: 900;
      border-radius: 8px; padding: 2px 7px;
      white-space: nowrap;
    }
    .order-badge {
      position: absolute; top: -7px; left: 50%;
      transform: translateX(-50%);
      background: var(--blue); color: #0f0a1e;
      font-size: 0.55rem; font-weight: 900;
      border-radius: 8px; padding: 2px 7px;
      white-space: nowrap;
    }

    .pantry-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }
    .pantry-item {
      background: var(--card);
      border-radius: 12px;
      padding: 10px 4px 8px;
      text-align: center;
    }
    .pantry-item.needed {
      border: 2px solid rgba(91,200,255,0.4);
      background: rgba(91,200,255,0.08);
    }
    .pantry-item .pi-emoji { font-size: 1.6rem; }
    .pantry-item .pi-count {
      font-family: 'Fredoka One', cursive;
      font-size: 1rem;
      color: var(--green);
      display: block;
    }
    .pantry-item.empty .pi-count { color: var(--muted); }
    .pantry-item .pi-name { font-size: 0.58rem; color: var(--muted); margin-top: 1px; display: block; }

    .bottom-nav {
      position: fixed; bottom: 0; left: 50%;
      transform: translateX(-50%);
      width: 100%; max-width: 480px;
      display: flex;
      background: var(--card);
      border-top: 2px solid rgba(199,125,255,0.2);
      z-index: 100;
    }
    .nav-btn {
      flex: 1; padding: 11px 6px;
      text-align: center; cursor: pointer;
      font-family: 'Fredoka One', cursive;
      font-size: 0.75rem; color: var(--muted);
      border: none; background: none;
      transition: color 0.15s;
      touch-action: manipulation;
      min-height: 44px;
    }
    .nav-btn.active { color: var(--pink); }
    .nav-btn .nav-icon { font-size: 1.3rem; display: block; }

    .shop-tabs {
      display: flex; gap: 8px; margin-bottom: 14px;
    }
    .shop-tab {
      flex: 1; padding: 10px;
      border-radius: 12px;
      border: 2px solid rgba(240,230,255,0.1);
      background: var(--card);
      font-family: 'Fredoka One', cursive;
      font-size: 0.85rem;
      color: var(--muted);
      cursor: pointer;
      touch-action: manipulation;
    }
    .shop-tab.active {
      border-color: var(--pink);
      color: var(--pink);
    }

    .store-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }
    .store-item {
      background: var(--card);
      border-radius: 14px;
      padding: 10px 6px;
      text-align: center;
      border: 2px solid rgba(240,230,255,0.06);
      user-select: none;
      touch-action: manipulation;
      position: relative;
    }
    .store-item.affordable { border-color: rgba(93,255,176,0.28); }
    .store-item.cant-afford { opacity: 0.42; }
    .store-item.needed-ing { border-color: rgba(91,200,255,0.45); }
    .store-item .si-emoji { font-size: 1.8rem; display: block; margin-bottom: 4px; }
    .store-item .si-name { font-size: 0.65rem; margin-bottom: 4px; }
    .store-item .si-price { color: var(--yellow); font-size: 0.78rem; }
    .store-item .si-owned { font-size: 0.55rem; color: var(--muted); margin-top: 2px; }
    .buy-row {
      display: flex; gap: 4px; margin-top: 6px;
      justify-content: center;
    }
    .buy-mini {
      flex: 1;
      padding: 6px 2px;
      border-radius: 8px;
      border: none;
      font-family: 'Fredoka One', cursive;
      font-size: 0.62rem;
      cursor: pointer;
      touch-action: manipulation;
      min-height: 32px;
    }
    .buy-mini.buy1 { background: rgba(91,200,255,0.2); color: var(--blue); }
    .buy-mini.buy3 { background: rgba(255,225,77,0.15); color: var(--yellow); }

    .upgrade-card {
      background: var(--card);
      border-radius: 14px;
      padding: 14px;
      margin-bottom: 10px;
      border: 2px solid rgba(240,230,255,0.06);
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      touch-action: manipulation;
    }
    .upgrade-card.affordable { border-color: rgba(93,255,176,0.28); }
    .upgrade-card.maxed { opacity: 0.6; cursor: default; }
    .upgrade-card .up-emoji { font-size: 2rem; }
    .upgrade-card .up-info { flex: 1; }
    .upgrade-card .up-name { font-family: 'Fredoka One', cursive; color: var(--pink); font-size: 0.95rem; }
    .upgrade-card .up-desc { font-size: 0.72rem; color: var(--muted); margin-top: 2px; }
    .upgrade-card .up-level { font-size: 0.7rem; color: var(--green); margin-top: 4px; }
    .upgrade-card .up-price { color: var(--yellow); font-size: 0.85rem; white-space: nowrap; }

    /* Stats panel */
    .stats-panel {
      position: fixed; inset: 0;
      background: rgba(15,10,30,0.9);
      z-index: 300;
      display: flex; align-items: flex-end;
    }
    .stats-sheet {
      background: var(--card);
      border-radius: 24px 24px 0 0;
      padding: 22px 18px 36px;
      width: 100%; max-width: 480px;
      margin: 0 auto;
      max-height: 85vh;
      overflow-y: auto;
      animation: slideUp 0.22s ease-out;
    }
    @keyframes slideUp {
      from { transform: translateY(60px); opacity: 0; }
      to   { transform: translateY(0); opacity: 1; }
    }
    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin: 14px 0 18px;
    }
    .stat-box {
      background: rgba(240,230,255,0.04);
      border-radius: 12px;
      padding: 12px;
      text-align: center;
    }
    .stat-box .stat-num {
      font-family: 'Fredoka One', cursive;
      font-size: 1.5rem;
      color: var(--yellow);
    }
    .stat-box .stat-label { font-size: 0.68rem; color: var(--muted); margin-top: 2px; }
    .badge-list { display: flex; flex-direction: column; gap: 8px; }
    .badge {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 12px;
      border-radius: 12px;
      background: rgba(240,230,255,0.04);
      font-size: 0.82rem;
    }
    .badge.earned { border: 1px solid rgba(93,255,176,0.3); }
    .badge.locked { opacity: 0.45; }
    .badge .bdg-emoji { font-size: 1.5rem; }

    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(15,10,30,0.88);
      z-index: 200;
      display: flex; align-items: flex-end;
    }
    .modal {
      background: var(--card);
      border-radius: 24px 24px 0 0;
      padding: 22px 18px 40px;
      width: 100%; max-width: 480px;
      margin: 0 auto;
      animation: slideUp 0.22s ease-out;
      max-height: 88vh;
      overflow-y: auto;
    }
    .modal-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 14px;
    }
    .modal-title {
      font-family: 'Fredoka One', cursive;
      font-size: 1.5rem; color: var(--pink);
    }
    .modal-close {
      background: rgba(240,230,255,0.1); border: none;
      color: var(--text); width: 44px; height: 44px;
      border-radius: 50%; font-size: 1rem; cursor: pointer;
      touch-action: manipulation;
    }
    .recipe-emoji-big { font-size: 3.5rem; text-align: center; display: block; margin-bottom: 14px; }
    .ingredients-list { list-style: none; margin-bottom: 16px; }
    .ingredients-list li {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 10px;
      background: rgba(240,230,255,0.04);
      border-radius: 10px; margin-bottom: 6px;
      font-size: 0.86rem;
    }
    .ing-emoji { font-size: 1.3rem; flex-shrink: 0; }
    .ing-status { margin-left: auto; font-size: 0.78rem; white-space: nowrap; }
    .ing-status.have { color: var(--green); }
    .ing-status.need { color: var(--pink); }
    .sell-info { text-align: center; margin-bottom: 16px; color: var(--yellow); font-size: 0.9rem; }
    .bonus-tag {
      text-align: center;
      color: var(--blue);
      font-size: 0.82rem;
      margin-bottom: 10px;
    }

    .btn {
      display: block; width: 100%;
      padding: 15px; border-radius: 14px; border: none;
      font-family: 'Fredoka One', cursive; font-size: 1.1rem;
      cursor: pointer; transition: transform 0.12s;
      touch-action: manipulation;
      min-height: 48px;
    }
    .btn:active { transform: scale(0.96); }
    .btn + .btn { margin-top: 10px; }
    .btn-cook  { background: linear-gradient(135deg, var(--pink), var(--purple)); color: #fff; }
    .btn-sell  { background: linear-gradient(135deg, var(--yellow), var(--orange)); color: #0f0a1e; }
    .btn-store { background: linear-gradient(135deg, var(--blue), var(--green)); color: #0f0a1e; }
    .btn-ghost { background: rgba(240,230,255,0.08); color: var(--muted); }
    .btn-disabled { background: rgba(240,230,255,0.06); color: rgba(240,230,255,0.28); cursor: default; pointer-events: none; }

    .cooking-area { text-align: center; padding-top: 6px; }
    .cooking-title {
      font-family: 'Fredoka One', cursive;
      font-size: 1.35rem; color: var(--pink); margin-bottom: 5px;
    }
    .cooking-hint { color: var(--muted); font-size: 0.8rem; margin-bottom: 16px; }

    .pan-wrap {
      position: relative;
      width: 130px; height: 130px;
      margin: 0 auto 20px;
    }
    .pan-visual {
      width: 130px; height: 130px;
      background: #1a1258;
      border-radius: 50%;
      border: 4px solid #3020a0;
      display: flex; align-items: center; justify-content: center;
      font-size: 3rem;
    }
    .pan-visual.sizzle { animation: sizzle 0.45s infinite; }
    .pan-visual.golden { border-color: var(--yellow); box-shadow: 0 0 16px rgba(255,225,77,0.35); }
    @keyframes sizzle {
      0%,100% { transform: rotate(-4deg) scale(1); }
      50%      { transform: rotate(4deg) scale(1.06); }
    }
    .steam {
      position: absolute; top: -8px; left: 50%; transform: translateX(-50%);
      display: flex; gap: 6px;
    }
    .steam span {
      font-size: 1rem;
      animation: rise 1.4s ease-in infinite;
      opacity: 0;
    }
    .steam span:nth-child(2) { animation-delay: 0.5s; }
    .steam span:nth-child(3) { animation-delay: 1s; }
    @keyframes rise {
      0%   { transform: translateY(0);   opacity: 0; }
      30%  { opacity: 0.8; }
      100% { transform: translateY(-24px); opacity: 0; }
    }

    .cooking-steps {
      display: flex; flex-wrap: wrap; gap: 10px;
      justify-content: center; margin-bottom: 18px;
    }
    .cooking-step {
      width: 70px; height: 70px;
      background: var(--card);
      border-radius: 14px;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      cursor: pointer;
      border: 2px solid rgba(240,230,255,0.08);
      transition: transform 0.12s;
      position: relative;
      user-select: none;
      touch-action: manipulation;
    }
    .cooking-step:active { transform: scale(0.88); }
    .cooking-step.is-next {
      border-color: var(--yellow);
      animation: stepGlow 1.1s infinite;
    }
    .cooking-step.is-next.fancy {
      border-color: var(--purple);
      animation: stepGlowFancy 1.1s infinite;
    }
    @keyframes stepGlow {
      0%,100% { box-shadow: 0 0 0 0 rgba(255,225,77,0.45); }
      50%      { box-shadow: 0 0 0 7px rgba(255,225,77,0); }
    }
    @keyframes stepGlowFancy {
      0%,100% { box-shadow: 0 0 0 0 rgba(199,125,255,0.5); }
      50%      { box-shadow: 0 0 0 7px rgba(199,125,255,0); }
    }
    .cooking-step.is-done {
      opacity: 0.32;
      border-color: var(--green);
    }
    .cooking-step.is-done::after {
      content: '✓';
      position: absolute; top: -7px; right: -7px;
      background: var(--green); color: #0f0a1e;
      width: 18px; height: 18px; border-radius: 50%;
      font-size: 0.65rem;
      display: flex; align-items: center; justify-content: center;
    }
    .cs-emoji { font-size: 1.8rem; }
    .cs-name { font-size: 0.57rem; color: var(--muted); margin-top: 3px; }

    .result-area { text-align: center; padding: 24px 0 8px; }
    .result-emoji {
      font-size: 5.5rem; display: block; margin-bottom: 12px;
      animation: popIn 0.5s cubic-bezier(0.34,1.56,0.64,1);
    }
    @keyframes popIn {
      from { transform: scale(0) rotate(-15deg); opacity: 0; }
      to   { transform: scale(1) rotate(0deg); opacity: 1; }
    }
    .result-title { font-family: 'Fredoka One', cursive; font-size: 1.8rem; color: var(--green); margin-bottom: 6px; }
    .result-earn  { color: var(--yellow); font-size: 1rem; margin-bottom: 8px; }
    .result-breakdown { color: var(--muted); font-size: 0.82rem; margin-bottom: 18px; }

    .toast {
      position: fixed; bottom: 88px; left: 50%;
      transform: translateX(-50%) translateY(10px);
      background: var(--green); color: #0f0a1e;
      padding: 8px 18px; border-radius: 20px;
      font-family: 'Fredoka One', cursive; font-size: 0.95rem;
      opacity: 0; transition: all 0.25s; z-index: 600;
      white-space: nowrap; pointer-events: none;
      max-width: 90vw;
      text-align: center;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .toast.warn { background: var(--pink); color: #fff; }

    /* Tutorial overlay */
    .tutorial-overlay {
      position: fixed; inset: 0;
      background: rgba(15,10,30,0.75);
      z-index: 500;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .tutorial-box {
      background: var(--card);
      border-radius: 20px;
      padding: 24px 20px;
      max-width: 320px;
      text-align: center;
      border: 2px solid var(--pink);
    }
    .tutorial-box h2 {
      font-family: 'Fredoka One', cursive;
      color: var(--pink);
      font-size: 1.3rem;
      margin-bottom: 10px;
    }
    .tutorial-box p { font-size: 0.9rem; line-height: 1.4; margin-bottom: 16px; color: var(--text); }
    .tutorial-dots {
      display: flex; gap: 6px; justify-content: center;
      margin-bottom: 14px;
    }
    .tutorial-dots span {
      width: 8px; height: 8px; border-radius: 50%;
      background: rgba(240,230,255,0.2);
    }
    .tutorial-dots span.on { background: var(--pink); }

    #confetti-canvas {
      position: fixed; inset: 0;
      pointer-events: none; z-index: 999;
    }
  </style>
</head>
<body>

<canvas id="confetti-canvas"></canvas>
<div id="app"></div>
<div id="toast" class="toast"></div>

<script>
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// DATA
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

const INGREDIENTS = {
  bread:        { name: 'Bread',         emoji: '🍞', price: 2 },
  butter:       { name: 'Butter',        emoji: '🧈', price: 2 },
  eggs:         { name: 'Eggs',          emoji: '🥚', price: 1 },
  milk:         { name: 'Milk',          emoji: '🥛', price: 2 },

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// HELPERS
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

function getRecipe(id) {
  return RECIPES.find(r => r.id === id);
}

function isUnlocked(recipeId) {
  return state.unlockedRecipes.includes(recipeId);
}

function canMake(recipe) {
  if (!isUnlocked(recipe.id)) return false;
  return Object.entries(recipe.needs).every(([id, qty]) => (state.inventory[id] || 0) >= qty);
}

function getUnlockHint(recipe) {
  if (!recipe.unlock) return '';
  const u = recipe.unlock;
  const s = state.stats;
  if (u.type === 'dishesSold') {
    const left = u.count - s.dishesSold;
    return left > 0 ? `Sell ${left} more dish${left === 1 ? '' : 'es'}!` : '';
  }
  if (u.type === 'coinsEarned') {
    const left = u.count - s.coinsEarned;
    return left > 0 ? `Earn ${left} more coins!` : '';
  }
  if (u.type === 'recipeSold') {
    const sold = s.recipesSold[u.recipeId] || 0;
    const left = u.count - sold;
    const r = getRecipe(u.recipeId);
    return left > 0 ? `Sell ${left} more ${r ? r.name : 'recipe'}!` : '';
  }
  if (u.type === 'customersServed') {
    const left = u.count - s.customersServed;
    return left > 0 ? `Serve ${left} more customer${left === 1 ? '' : 's'}!` : '';
  }
  if (u.type === 'upgrade') {
    return state.upgrades.mixingBowl >= 1 ? '' : 'Buy Mixing Bowl upgrade!';
  }
  return 'Keep playing!';
}

function meetsUnlockCondition(recipe) {
  if (!recipe.unlock) return true;
  const u = recipe.unlock;
  const s = state.stats;
  if (u.type === 'dishesSold') return s.dishesSold >= u.count;
  if (u.type === 'coinsEarned') return s.coinsEarned >= u.count;
  if (u.type === 'recipeSold') return (s.recipesSold[u.recipeId] || 0) >= u.count;
  if (u.type === 'customersServed') return s.customersServed >= u.count;
  if (u.type === 'upgrade') return state.upgrades[u.upgradeId] >= 1;
  return false;
}

function checkUnlocks() {
  const newly = [];
  RECIPES.forEach(r => {
    if (state.unlockedRecipes.includes(r.id)) return;
    if (r.starter || meetsUnlockCondition(r)) {
      state.unlockedRecipes.push(r.id);
      newly.push(r);
    }
  });
  if (newly.length) {
    playSound('unlock');
    launchConfetti();
    newly.forEach(r => showToast(`New recipe: ${r.emoji} ${r.name}!`));
    saveGame();
  }
  return newly;
}

function getCookDuration() {
  const base = 1800;
  const reduction = UPGRADES.fastOven.effect(state.upgrades.fastOven);
  return Math.max(900, base - reduction);
}

function getTipBonus() {
  return UPGRADES.tipJar.effect(state.upgrades.tipJar);
}

function calcSellPrice(recipe) {
  let price = recipe.sellPrice + getTipBonus();
  const isOrder = state.customer && state.customer.recipeId === recipe.id;
  if (isOrder) price += Math.ceil(recipe.sellPrice * 0.25);
  return { price, isOrder, tipBonus: isOrder ? Math.ceil(recipe.sellPrice * 0.25) : 0, jarBonus: getTipBonus() };
}

function getNeededForCustomer() {
  if (!state.customer) return new Set();
  const recipe = getRecipe(state.customer.recipeId);
  if (!recipe) return new Set();
  return new Set(Object.keys(recipe.needs));
}

function sortRecipes() {
  const list = [...RECIPES];
  return list.sort((a, b) => {
    const aLock = !isUnlocked(a.id);
    const bLock = !isUnlocked(b.id);
    if (aLock !== bLock) return aLock ? 1 : -1;
    const aMake = canMake(a);
    const bMake = canMake(b);
    if (aMake !== bMake) return aMake ? -1 : 1;
    const aOrder = state.customer && state.customer.recipeId === a.id;
    const bOrder = state.customer && state.customer.recipeId === b.id;
    if (aOrder !== bOrder) return aOrder ? -1 : 1;
    return 0;
  });
}

function sortPantryEntries() {
  const needed = getNeededForCustomer();
  const entries = Object.entries(INGREDIENTS);
  return entries.sort((a, b) => {
    const aNeed = needed.has(a[0]);
    const bNeed = needed.has(b[0]);
    if (aNeed !== bNeed) return aNeed ? -1 : 1;
    return 0;
  });
}

function pickCustomerRecipe() {
  const unlocked = RECIPES.filter(r => isUnlocked(r.id));
  if (!unlocked.length) return STARTER_RECIPES[0];
  return unlocked[Math.floor(Math.random() * unlocked.length)].id;
}

function spawnCustomer() {
  const recipeId = pickCustomerRecipe();
  const recipe = getRecipe(recipeId);
  state.customer = {
    emoji: CUSTOMER_EMOJIS[Math.floor(Math.random() * CUSTOMER_EMOJIS.length)],
    recipeId,
  };
  state.customerIdleAt = Date.now();
  resetCustomerIdleTimer();
}

function resetCustomerIdleTimer() {
  clearTimeout(customerIdleTimer);
  customerIdleTimer = setTimeout(() => {
    if (state.screen === 'kitchen' || state.screen === 'recipe') {
      spawnCustomer();
      render();
    }
  }, 45000);
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// PERSIST
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

function serialize() {
  return {
    coins: state.coins,
    inventory: state.inventory,
    unlockedRecipes: state.unlockedRecipes,
    upgrades: state.upgrades,
    stats: state.stats,
    customer: state.customer,
    tutorialDone: state.tutorialDone,
    pending: state.pending,
  };
}

function saveGame() {
  try {
    localStorage.setItem(SAVE_KEY, JSON.stringify(serialize()));
  } catch (e) {}
}

function loadGame() {
  try {
    let saved = JSON.parse(localStorage.getItem(SAVE_KEY));
    if (!saved) {
      const v1 = JSON.parse(localStorage.getItem(SAVE_KEY_V1));
      if (v1) {
        saved = {
          coins: v1.coins,
          inventory: v1.inventory,
          unlockedRecipes: ['toast','scrambled-eggs','pbj','pancakes','waffles','mac-cheese','banana-bread','choc-biscuits'],
          upgrades: { fastOven: 0, tipJar: 0, mixingBowl: 0 },
          stats: { dishesSold: 0, coinsEarned: 0, customersServed: 0, recipesSold: {} },
          tutorialDone: true,
          pending: v1.pendingDish ? { type: 'result', recipeId: v1.pendingDish } : null,
        };
      }
    }
    if (saved) {
      if (typeof saved.coins === 'number') state.coins = saved.coins;
      if (saved.inventory) state.inventory = saved.inventory;
      if (saved.unlockedRecipes) state.unlockedRecipes = saved.unlockedRecipes;
      if (saved.upgrades) state.upgrades = { ...state.upgrades, ...saved.upgrades };
      if (saved.stats) state.stats = { ...state.stats, ...saved.stats };
      if (saved.customer) state.customer = saved.customer;
      if (saved.tutorialDone) state.tutorialDone = saved.tutorialDone;
      if (saved.pending) {
        state.pending = saved.pending;
        if (saved.pending.type === 'result') {
          state.selectedId = saved.pending.recipeId;
          state.screen = 'result';
        } else if (saved.pending.type === 'cooking') {
          state.selectedId = saved.pending.recipeId;
          state.cookStep = saved.pending.cookStep || 0;
          if (saved.pending.isAnimating) {
            state.screen = 'cooking';
            state.isCooking = true;
            resumeCookAnimation();
          } else {
            state.screen = 'cooking';
            state.isCooking = false;
          }
        }
      }
    }
  } catch (e) {}
  checkUnlocks();
  if (!state.customer) spawnCustomer();
}

function setPending(type, extra) {
  if (type === null) {
    state.pending = null;
  } else {
    state.pending = { type, recipeId: state.selectedId, ...extra };
  }
  saveGame();
}

function resumeCookAnimation() {
  const dur = getCookDuration();
  clearTimeout(cookTimer);
  cookTimer = setTimeout(() => {
    state.isCooking = false;
    state.screen = 'result';
    setPending('result');
    playSound('cook');
    render();
  }, dur);
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// AUDIO
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

let audioCtx;
function getAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function tone(freq, dur, type, vol, slideTo) {
  try {
    const ac = getAudio();
    const o = ac.createOscillator();
    const g = ac.createGain();
    o.connect(g);
    g.connect(ac.destination);
    o.type = type || 'sine';
    o.frequency.setValueAtTime(freq, ac.currentTime);
    if (slideTo) o.frequency.exponentialRampToValueAtTime(slideTo, ac.currentTime + dur);
    g.gain.setValueAtTime(vol || 0.2, ac.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + dur);
    o.start();
    o.stop(ac.currentTime + dur);
  } catch (e) {}
}

function playSound(type) {
  switch (type) {
    case 'tap': tone(520, 0.06, 'sine', 0.12); break;
    case 'buy': tone(880, 0.1, 'sine', 0.18, 1200); break;
    case 'pop': tone(640, 0.08, 'sine', 0.15, 900); break;
    case 'cook': tone(300, 0.25, 'sawtooth', 0.12, 600); break;
    case 'sell':
      tone(660, 0.1, 'sine', 0.2, 990);
      setTimeout(() => tone(990, 0.15, 'sine', 0.18, 1320), 80);
      break;
    case 'unlock':
      tone(523, 0.12, 'sine', 0.2);
      setTimeout(() => tone(659, 0.12, 'sine', 0.2), 100);
      setTimeout(() => tone(784, 0.2, 'sine', 0.22), 200);
      break;
    case 'boop': tone(220, 0.15, 'sine', 0.1, 180); break;
    default: tone(440, 0.08, 'sine', 0.1);
  }
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// ACTIONS
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

function goTo(screen) {
  playSound('tap');
  state.screen = screen;
  state.showStats = false;
  if (screen === 'kitchen' || screen === 'shop') state.selectedId = null;
  render();
}

function toggleStats() {
  playSound('tap');
  state.showStats = !state.showStats;
  render();
}

function setShopTab(tab) {
  playSound('tap');
  state.shopSubTab = tab;
  render();
}

function openRecipe(id) {
  if (!isUnlocked(id)) {
    const r = getRecipe(id);
    showToast(getUnlockHint(r), true);
    playSound('boop');
    return;
  }
  playSound('tap');
  state.selectedId = id;
  state.screen = 'recipe';
  if (!state.tutorialDone && state.tutorialStep === 0) {
    state.tutorialStep = 1;
  }
  render();
}

function closeRecipe() {
  playSound('tap');
  state.screen = 'kitchen';
  state.selectedId = null;
  render();
}

function startCooking() {
  playSound('tap');
  state.screen = 'cooking';
  state.cookStep = 0;
  state.isCooking = false;
  setPending('cooking', { cookStep: 0, isAnimating: false });
  if (!state.tutorialDone && state.tutorialStep === 1) state.tutorialStep = 2;
  render();
}

function tapStep(index) {
  if (index !== state.cookStep) return;
  playSound('pop');
  state.cookStep++;
  setPending('cooking', { cookStep: state.cookStep, isAnimating: false });
  render();
}

function cookIt() {
  const recipe = getRecipe(state.selectedId);
  if (!recipe) return;
  playSound('tap');
  Object.entries(recipe.needs).forEach(([id, qty]) => {
    state.inventory[id] = (state.inventory[id] || 0) - qty;
  });
  state.isCooking = true;
  setPending('cooking', { cookStep: state.cookStep, isAnimating: true });
  render();
  const dur = getCookDuration();
  clearTimeout(cookTimer);
  cookTimer = setTimeout(() => {
    state.isCooking = false;
    state.screen = 'result';
    playSound('cook');
    setPending('result');
    render();
  }, dur);
}

function cookingBack() {
  if (state.cookStep > 0) {
    if (!confirm('Leave kitchen? You haven\'t cooked yet — no ingredients used!')) return;
  }
  playSound('tap');
  state.screen = 'kitchen';
  state.selectedId = null;
  state.cookStep = 0;
  state.isCooking = false;
  setPending(null);
  clearTimeout(cookTimer);
  render();
}

function sellDish() {
  const recipe = getRecipe(state.selectedId);
  if (!recipe) return;
  const { price, isOrder, tipBonus, jarBonus } = calcSellPrice(recipe);
  state.coins += price;
  state.stats.dishesSold++;
  state.stats.coinsEarned += price;
  state.stats.recipesSold[recipe.id] = (state.stats.recipesSold[recipe.id] || 0) + 1;
  state.lastSellWasOrder = isOrder;

  if (isOrder) {
    state.stats.customersServed++;
    const happyEmoji = state.customer.emoji;
    spawnCustomer();
    showToast(`+${price} coins! Customer loved it! ${happyEmoji}`, false);
  } else if (state.customer) {
    playSound('boop');
    showToast('Hmm, that\'s not what they ordered 😊 Try again!', true);
  } else {
    showToast(`+${price} coins! 🎉`);
  }

  playSound('sell');
  saveGame();
  launchConfetti();
  showCoinFloat(price);
  bumpCoins();
  checkUnlocks();

  state.screen = 'kitchen';
  state.selectedId = null;
  state.cookStep = 0;
  setPending(null);

  if (!state.tutorialDone && state.tutorialStep === 2) {
    state.tutorialDone = true;
    state.tutorialStep = 0;
    saveGame();
  }
  render();
}

function cookAgain() {
  const recipe = getRecipe(state.selectedId);
  if (recipe && canMake(recipe)) {
    startCooking();
  } else {
    goTo('shop');
  }
}

function buyIngredient(id, qty) {
  const ing = INGREDIENTS[id];
  const total = ing.price * qty;
  if (state.coins < total) {
    showToast('Not enough coins! 💸', true);
    playSound('boop');
    return;
  }
  const maxAfford = Math.floor(state.coins / ing.price);
  const actual = Math.min(qty, maxAfford);
  const cost = ing.price * actual;
  state.coins -= cost;
  state.inventory[id] = (state.inventory[id] || 0) + actual;
  playSound('buy');
  saveGame();
  showToast(`Got ${actual}× ${ing.emoji} ${ing.name}!`);
  render();
}

function buyUpgrade(id) {
  const up = UPGRADES[id];
  const lvl = state.upgrades[id];
  if (lvl >= up.maxLevel) return;
  const price = up.prices[lvl];
  if (state.coins < price) {
    showToast('Not enough coins! 💸', true);
    playSound('boop');
    return;
  }
  state.coins -= price;
  state.upgrades[id]++;
  playSound('unlock');
  saveGame();
  checkUnlocks();
  showToast(`${up.emoji} ${up.name} upgraded!`);
  render();
}

function advanceTutorial() {
  if (state.tutorialStep < 2) {
    state.tutorialStep++;
    render();
  } else {
    state.tutorialDone = true;
    state.tutorialStep = 0;
    saveGame();
    render();
  }
}

function skipTutorial() {
  state.tutorialDone = true;
  state.tutorialStep = 0;
  saveGame();
  render();
}

  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;');
}

function render() {

}

function buildApp() {
  const noNav = state.screen === 'cooking' || state.screen === 'result';
  let html = buildHeader();
  html += `<div class="screen${noNav ? ' no-nav' : ''}">${buildScreen()}</div>`;
  if (!noNav) html += buildNav();

}

function buildCustomerBanner() {

  return `

function buildKitchen() {
  const hlTutorial = !state.tutorialDone && state.tutorialStep === 0;
  const cards = sortRecipes().map(r => {
    const unlocked = isUnlocked(r.id);
    const ready = canMake(r);
    const isOrder = state.customer && state.customer.recipeId === r.id;
    let cls = 'recipe-card';
    if (ready) cls += ' can-make';
    if (!unlocked) cls += ' locked';
    if (isOrder && unlocked) cls += ' order-match';

    else if (ready) badges.push('<span class="ready-badge">READY!</span>');
    const lockHint = !unlocked ? `<span class="lock-hint">🔒 ${esc(getUnlockHint(r))}</span>` : '';

function buildShop() {

function buildIngredients() {
  const needed = getNeededForCustomer();
  const items = Object.entries(INGREDIENTS).map(([id, ing]) => {
    const affordable = state.coins >= ing.price;
    const owned = state.inventory[id] || 0;
    const isNeeded = needed.has(id);
    let cls = 'store-item';
    if (affordable) cls += ' affordable';
    else cls += ' cant-afford';
    if (isNeeded) cls += ' needed-ing';
    const canBuy3 = state.coins >= ing.price * 3;
    return `
      <div class="${cls}">
        <span class="si-emoji">${ing.emoji}</span>
        <div class="si-name">${esc(ing.name)}</div>

  }).join('');

    let cls = 'upgrade-card';
    if (maxed) cls += ' maxed';
    else if (affordable) cls += ' affordable';
    return `
      <div class="${cls}"${maxed ? '' : ` data-action="buy-upgrade" data-id="${id}"`}>
        <span class="up-emoji">${up.emoji}</span>
        <div class="up-info">

  const recipe = getRecipe(state.selectedId);
  if (!recipe) return '';

  const goldenPan = state.upgrades.fastOven >= UPGRADES.fastOven.maxLevel;
  const fancyGlow = state.upgrades.mixingBowl >= 1;

  if (state.isCooking) {
    return `
      <div class="cooking-area">
        <div class="cooking-title">Cooking... 🔥</div>
        <div class="pan-wrap">
          <div class="steam"><span>💨</span><span>💨</span><span>💨</span></div>
          <div class="pan-visual sizzle${goldenPan ? ' golden' : ''}">${recipe.panEmoji}</div>
        </div>
        <p style="color:var(--muted);font-size:0.85rem">Almost ready!</p>
      </div>

  const allDone = state.cookStep >= recipe.steps.length;
  const panContent = state.cookStep > 0

  const steps = recipe.steps.map((ingId, i) => {
    const ing = INGREDIENTS[ingId];
    const isDone = i < state.cookStep;
    const isNext = i === state.cookStep;
    let cls = 'cooking-step';
    if (isDone) cls += ' is-done';
    if (isNext) cls += ' is-next' + (fancyGlow ? ' fancy' : '');
    return `
      <div class="${cls}" data-action="tap-step" data-index="${i}">
        <span class="cs-emoji">${ing.emoji}</span>
        <span class="cs-name">${esc(ing.name)}</span>

    `;
  }).join('');

  return `
    <div class="cooking-area">
      <div class="cooking-title">Making ${esc(recipe.name)}</div>
      <div class="cooking-hint">${allDone ? '✨ Now cook it!' : 'Tap each ingredient in order!'}</div>
      <div class="pan-wrap">
        <div class="pan-visual${goldenPan ? ' golden' : ''}">${panContent}</div>
      </div>
      <div class="cooking-steps">${steps}</div>
      ${allDone
        ? `<button class="btn btn-cook" data-action="cook-it">🔥 Cook it!</button>`
        : `<button class="btn btn-disabled">Add all ingredients first…</button>`

function buildResult() {

// FX

let toastTimer = null;
function showToast(msg, warn) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show' + (warn ? ' warn' : '');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2400);
}

function bumpCoins() {
  setTimeout(() => {
    const el = document.getElementById('coin-display');
    if (el) { el.classList.add('bump'); setTimeout(() => el.classList.remove('bump'), 350); }
  }, 100);
}

function showCoinFloat(amount) {
  const el = document.getElementById('coin-display');
  if (!el) return;
  const float = document.createElement('span');
  float.className = 'coin-float';
  float.textContent = '+' + amount;
  el.appendChild(float);
  setTimeout(() => float.remove(), 1000);
}

function launchConfetti() {
  const canvas = document.getElementById('confetti-canvas');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  const ctx = canvas.getContext('2d');
  const colors = ['#ff6eb4','#ffe14d','#5dffb0','#5bc8ff','#c77dff','#ff9a3c'];
  const particles = Array.from({ length: 100 }, () => ({
    x: Math.random() * canvas.width,
    y: -10 - Math.random() * 80,
    vx: (Math.random() - 0.5) * 5,
    vy: 2 + Math.random() * 4,
    color: colors[Math.floor(Math.random() * colors.length)],
    size: 5 + Math.random() * 7,
    rot: Math.random() * 360,
    rs: (Math.random() - 0.5) * 9,
    rect: Math.random() > 0.4,
  }));
  let frame = 0;
  function tick() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    particles.forEach(p => {
      p.x += p.vx; p.y += p.vy; p.vy += 0.06; p.rot += p.rs;
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot * Math.PI / 180);
      ctx.fillStyle = p.color;
      if (p.rect) ctx.fillRect(-p.size/2, -p.size/2, p.size, p.size);
      else { ctx.beginPath(); ctx.arc(0, 0, p.size/2, 0, Math.PI*2); ctx.fill(); }
      ctx.restore();
    });
    if (++frame < 160) requestAnimationFrame(tick);
    else ctx.clearRect(0, 0, canvas.width, canvas.height);
  }
  tick();
}

// EVENT DELEGATION
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

function handleAction(e) {
  const el = e.target.closest('[data-action]');
  if (!el) return;
  const action = el.dataset.action;
  if (!action) return;

  try { getAudio(); } catch (err) {}

  switch (action) {
    case 'go':
      goTo(el.dataset.screen);
      break;
    case 'toggle-stats':
      toggleStats();
      break;
    case 'close-stats-overlay':
      if (e.target === el) toggleStats();
      break;
    case 'shop-tab':
      setShopTab(el.dataset.tab);
      break;
    case 'open-recipe':
      openRecipe(el.dataset.id);
      break;
    case 'close-recipe':
      closeRecipe();
      break;
    case 'close-modal-overlay':
      if (e.target === el) closeRecipe();
      break;
    case 'stop-prop':
      break;
    case 'start-cooking':
      startCooking();
      break;
    case 'tap-step':
      tapStep(parseInt(el.dataset.index, 10));
      break;
    case 'cook-it':
      cookIt();
      break;
    case 'cooking-back':
      cookingBack();
      break;
    case 'sell-dish':
      sellDish();
      break;
    case 'cook-again':
      cookAgain();
      break;
    case 'buy':
      buyIngredient(el.dataset.id, parseInt(el.dataset.qty, 10));
      break;
    case 'buy-upgrade':
      buyUpgrade(el.dataset.id);
      break;
    case 'tutorial-next':
      advanceTutorial();
      break;
    case 'tutorial-skip':
      skipTutorial();
      break;
  }
}
