<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Garden Work 🌻</title>
<script src="portal-bridge.js"></script>

<!-- Google Analytics -->
<script src="ga-analytics.js" defer></script>

<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;900&display=swap" rel="stylesheet">
<style>
:root{
  --pink:#ff6eb4;--yellow:#ffe14d;--green:#5dffb0;--blue:#5bc8ff;--purple:#c77dff;--orange:#ff9a3c;
  --text:#f0e6ff;--wood:#a9743f;--wood-d:#7c4f25;--wood-l:#c8975a;
  --soil:#5a3c24;--soil-d:#41291699;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;-webkit-user-select:none;user-select:none}
html,body{height:100%;overflow:hidden;font-family:'Nunito',sans-serif;color:var(--text);background:#3a8a3f;-webkit-text-size-adjust:100%;touch-action:manipulation}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}

/* ===== STAGE / FIELD ===== */
#stage{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:linear-gradient(180deg,#7cc56c,#56a14c);overflow:hidden}
#field{position:absolute;left:50%;top:50%;width:720px;height:840px;transform-origin:center center;
  border-radius:24px;
  background:
    radial-gradient(140px 140px at 14% 28%,rgba(255,255,255,.10),transparent 70%),
    radial-gradient(180px 180px at 84% 70%,rgba(0,0,0,.05),transparent 70%),
    repeating-linear-gradient(50deg,#77c869 0 14px,#6fc061 14px 28px),
    linear-gradient(180deg,#86d275,#5cab50);
  box-shadow:inset 0 0 120px rgba(30,80,30,.24);
}
.deco{position:absolute;transform:translate(-50%,-50%);pointer-events:none;z-index:1;filter:drop-shadow(0 4px 3px rgba(0,0,0,.22))}
.deco.tree{font-size:56px}
.deco.flower{font-size:26px}
.deco.sway{animation:sway 3.4s ease-in-out infinite}
@keyframes sway{0%,100%{transform:translate(-50%,-50%) rotate(-4deg)}50%{transform:translate(-50%,-50%) rotate(4deg)}}

/* House (cozy cottage, top-center) */
#house{position:absolute;left:255px;top:18px;width:210px;height:166px;pointer-events:none}
#house .roof{position:absolute;left:-14px;top:0;width:238px;height:78px;
  background:linear-gradient(180deg,#e06a5a,#b14637);clip-path:polygon(50% 0,100% 100%,0 100%);
  filter:drop-shadow(0 6px 8px rgba(0,0,0,.25))}
#house .chim{position:absolute;right:34px;top:6px;width:22px;height:40px;background:#9a4030;border-radius:3px}
#house .body{position:absolute;left:0;top:70px;width:210px;height:96px;border-radius:6px 6px 8px 8px;
  background:linear-gradient(180deg,#f6e1bd,#e8cb9a);box-shadow:inset 0 -10px 0 rgba(0,0,0,.06),0 8px 14px rgba(0,0,0,.18)}
#house .win{position:absolute;top:92px;width:40px;height:40px;border-radius:7px;background:#bfe6ff;border:5px solid #fff;box-shadow:0 2px 0 rgba(0,0,0,.1)}
#house .win.l{left:24px}#house .win.r{right:24px}
#house .door{position:absolute;left:50%;bottom:0;transform:translateX(-50%);width:54px;height:74px;border-radius:27px 27px 4px 4px;
  background:linear-gradient(180deg,#9a6233,#7c4d26);box-shadow:inset 0 0 0 4px #b07a40}
#house .door::after{content:"";position:absolute;right:9px;top:34px;width:7px;height:7px;border-radius:50%;background:var(--yellow)}

/* Plots & beds */
.bed{position:absolute;transform:translate(-50%,-50%);z-index:3;touch-action:manipulation}
.bed .frame{position:relative;border-radius:14px;
  background:repeating-linear-gradient(90deg,var(--wood) 0 9px,var(--wood-d) 9px 12px);
  box-shadow:0 8px 16px rgba(0,0,0,.28),inset 0 0 0 3px var(--wood-l);padding:11px}
.bed.shape-circle .frame{border-radius:50%}
.bed.shape-tri .frame{border-radius:16px}
.bed .soil{position:relative;border-radius:8px;background:transparent}
.bed.has-soil .soil{background:
   radial-gradient(circle at 30% 25%,rgba(255,255,255,.05),transparent 40%),
   repeating-radial-gradient(circle at 40% 60%,var(--soil) 0 3px,#4d331e 3px 6px);
   box-shadow:inset 0 2px 8px rgba(0,0,0,.5)}
.bed.shape-circle.has-soil .soil{border-radius:50%}
.cell{position:absolute;display:flex;align-items:center;justify-content:center;border-radius:8px;transition:background .15s}
.cell.plantable{cursor:pointer}
.cell.hl{background:rgba(255,225,77,.32);box-shadow:inset 0 0 0 2px var(--yellow)}
.plant{font-size:34px;line-height:1;filter:drop-shadow(0 3px 2px rgba(0,0,0,.3));transition:transform .25s}
.plant.seed{font-size:23px;opacity:.92}
.plant.ripe{animation:ripe 1.6s ease-in-out infinite}
@keyframes ripe{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-4px) scale(1.08)}}
.cell.ripe::after{content:"✨";position:absolute;top:-6px;right:-4px;font-size:15px;animation:tw 1.1s infinite alternate}
@keyframes tw{from{opacity:.3;transform:scale(.7)}to{opacity:1;transform:scale(1.1)}}
.water-shine{position:absolute;inset:0;border-radius:inherit;pointer-events:none;
  background:radial-gradient(circle at 35% 30%,rgba(160,225,255,.5),transparent 55%);opacity:0;transition:opacity .4s}
.bed.watered .water-shine{opacity:.7;animation:shimmer 2.6s ease-in-out infinite}
@keyframes shimmer{0%,100%{opacity:.4}50%{opacity:.8}}

/* Ghost placement preview */
#ghost{position:absolute;transform:translate(-50%,-50%);z-index:4;pointer-events:none;opacity:.85;display:none;
  filter:drop-shadow(0 0 0 var(--yellow))}
#ghost .frame{outline:4px dashed var(--yellow);outline-offset:3px;animation:ghostpulse .9s ease-in-out infinite}
@keyframes ghostpulse{0%,100%{transform:scale(1)}50%{transform:scale(1.04)}}

/* Gardener */
#gardener{position:absolute;left:360px;top:150px;width:64px;height:64px;z-index:6;
  transform:translate(-50%,-50%);transition:left 1.4s ease-in-out,top 1.4s ease-in-out;pointer-events:none}
#gardener .g-em{font-size:50px;line-height:64px;text-align:center;display:block;filter:drop-shadow(0 4px 3px rgba(0,0,0,.3))}
#gardener.walking .g-em{animation:bob .4s ease-in-out infinite}
@keyframes bob{0%,100%{transform:translateY(0) rotate(-3deg)}50%{transform:translateY(-6px) rotate(3deg)}}
#gardener.sleeping .g-em{animation:none}
.zzz{position:absolute;top:-6px;right:-6px;font-size:20px;opacity:0}
#gardener.sleeping .zzz{opacity:1;animation:zzz 2s ease-in-out infinite}
@keyframes zzz{0%{opacity:0;transform:translateY(0) scale(.7)}30%{opacity:1}100%{opacity:0;transform:translateY(-22px) scale(1.2)}}

/* ===== AMBIENT SKY (day/night), unscaled overlay ===== */
#ambient{position:fixed;inset:0;z-index:8;pointer-events:none;transition:background 2.2s ease, backdrop-filter 2.2s;
  background:rgba(255,250,235,0)}
#ambient.night{background:rgba(18,16,54,.6)}
#ambient.dawn{background:linear-gradient(180deg,rgba(255,180,140,.42),rgba(255,210,150,.16))}
#ambient.day{background:rgba(255,250,225,0)}
#ambient.dusk{background:linear-gradient(180deg,rgba(120,70,150,.4),rgba(255,140,80,.34))}
#celestial{position:absolute;font-size:60px;left:50%;top:13%;transform:translate(-50%,-50%);
  transition:left 1.5s ease,top 1.5s ease,opacity 1.4s,font-size .4s;filter:drop-shadow(0 0 26px rgba(255,225,120,.8))}
#skystars{position:absolute;inset:0;opacity:0;transition:opacity 1.6s}
#ambient.night #skystars,#ambient.dusk #skystars{opacity:1}
#skystars i{position:absolute;width:3px;height:3px;border-radius:50%;background:#fff;animation:twk var(--d,2s) infinite alternate}
@keyframes twk{from{opacity:.15}to{opacity:.9}}

/* ===== HUD (top) ===== */
#hud{position:fixed;top:0;left:0;right:0;z-index:20;display:flex;gap:8px;align-items:center;
  padding:max(8px,env(safe-area-inset-top)) 12px 8px 76px;pointer-events:none}
.chip{display:flex;align-items:center;gap:5px;background:rgba(28,18,52,.82);border:2px solid rgba(255,255,255,.14);
  border-radius:99px;padding:5px 11px 5px 9px;font-weight:900;font-size:14px;color:#fff;white-space:nowrap;flex-shrink:0;
  box-shadow:0 4px 12px rgba(0,0,0,.3);pointer-events:auto;min-height:34px}
.chip .em{font-size:16px}
.chip.day{font-family:'Fredoka One',cursive;font-weight:400;background:rgba(255,154,60,.92);color:#3a1d00;border-color:rgba(255,255,255,.4)}
.chip.coins{background:rgba(255,225,77,.92);color:#4a3a00;border-color:rgba(255,255,255,.4)}
.chip.basket{cursor:pointer}
.chip.basket.empty{display:none}
.chip.basket .ct{min-width:14px;text-align:center}
.grow{flex:1}
#menuBtn{pointer-events:auto;width:44px;height:44px;border-radius:50%;background:rgba(28,18,52,.82);
  border:2px solid rgba(255,255,255,.14);font-size:20px;display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 12px rgba(0,0,0,.3)}

/* ===== BANNER (instruction) ===== */
#banner{position:fixed;left:50%;top:64px;transform:translateX(-50%);z-index:19;
  background:rgba(28,18,52,.9);border:2px solid var(--purple);border-radius:16px;padding:11px 20px;
  font-family:'Fredoka One',cursive;font-size:19px;color:#fff;text-align:center;max-width:90vw;
  box-shadow:0 6px 20px rgba(0,0,0,.35);transition:opacity .3s,transform .3s;opacity:0;pointer-events:none;white-space:nowrap}
#banner.show{opacity:1}
#banner .pop{display:inline-block;animation:bpop 1.8s ease-in-out infinite;color:var(--yellow)}
@keyframes bpop{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}

/* ===== TOOLBAR (bottom) ===== */
#toolbar{position:fixed;left:0;right:0;bottom:0;z-index:20;display:flex;flex-direction:column;align-items:center;
  gap:8px;padding:10px 12px max(14px,env(safe-area-inset-bottom));pointer-events:none}
/* shape tray / seed tray */
.tray{display:flex;flex-direction:column;align-items:center;gap:6px;background:rgba(28,18,52,.92);
  border:2px solid rgba(255,255,255,.16);border-radius:20px;padding:10px 12px;max-width:min(94vw,560px);
  box-shadow:0 8px 28px rgba(0,0,0,.45);pointer-events:auto}
.tray-lbl{width:100%;text-align:center;font-family:'Fredoka One',cursive;font-size:15px;color:var(--yellow);margin-bottom:2px}
.tray.hidden{display:none}
.opt{display:flex;flex-direction:column;align-items:center;gap:2px;background:rgba(255,255,255,.07);
  border:2px solid rgba(255,255,255,.12);border-radius:12px;padding:6px 6px 4px;min-width:52px;min-height:54px;flex:0 0 auto;
  transition:transform .1s,background .12s,border-color .12s}
.opt:active{transform:scale(.93)}
.opt.sel{border-color:var(--yellow);background:rgba(255,225,77,.18)}
.opt .oe{font-size:28px;line-height:1}
.opt .on{font-size:10px;font-weight:900;color:#fff;opacity:.85}
.opt.locked{opacity:.4}
.opt.locked .oe{filter:grayscale(1)}

.tool-row{display:flex;align-items:flex-end;gap:14px;pointer-events:auto}
#doneBtn{display:none;pointer-events:auto;align-self:center;background:linear-gradient(135deg,var(--green),#36c98a);color:#06351f;
  font-family:'Fredoka One',cursive;font-size:19px;padding:15px 30px;border-radius:16px;min-height:58px;
  box-shadow:0 4px 0 rgba(0,0,0,.3)}

/* Garden Time palette */
#palette{display:none;gap:8px;align-items:flex-end;justify-content:center;pointer-events:auto;flex-wrap:nowrap}
.pal-btn{display:flex;flex-direction:column;align-items:center;gap:2px;width:62px;min-height:60px;flex:0 0 auto;
  background:rgba(28,18,52,.92);border:3px solid rgba(255,255,255,.16);border-radius:16px;padding:7px 5px 6px;
  box-shadow:0 5px 14px rgba(0,0,0,.35);transition:transform .1s,border-color .12s,background .12s}
.pal-btn:active{transform:scale(.9)}
.pal-btn.active{border-color:var(--yellow);background:rgba(255,225,77,.2)}
.pal-btn .pe{font-size:27px;line-height:1}
.pal-btn .pl{font-size:11px;font-weight:900;color:#fff}
.pal-water{border-color:rgba(91,200,255,.4)}
.pal-sleep{border-color:rgba(199,125,255,.45)}
#doneBtn:active{transform:translateY(2px);box-shadow:0 2px 0 rgba(0,0,0,.3)}
#doneBtn.show{display:block}

/* The big round TOOL button ("the circle") */
#toolWrap{display:flex;flex-direction:column;align-items:center;gap:5px;pointer-events:auto}
#toolBtn{width:96px;height:96px;border-radius:50%;background:radial-gradient(circle at 38% 32%,#fff7e6,#ffe6a8);
  border:5px solid #fff;box-shadow:0 8px 22px rgba(0,0,0,.4),inset 0 -6px 12px rgba(0,0,0,.08);
  display:flex;align-items:center;justify-content:center;position:relative;transition:transform .12s}
#toolBtn .ti{font-size:52px;line-height:1;filter:drop-shadow(0 3px 2px rgba(0,0,0,.18))}
#toolBtn:active{transform:scale(.92)}
#toolBtn.pulse{animation:toolpulse 1.3s ease-in-out infinite}
@keyframes toolpulse{0%,100%{box-shadow:0 8px 22px rgba(0,0,0,.4),0 0 0 0 rgba(255,225,77,.6)}50%{box-shadow:0 8px 22px rgba(0,0,0,.4),0 0 0 16px rgba(255,225,77,0)}}
#toolBtn.hidden{display:none}
#toolLabel{font-family:'Fredoka One',cursive;font-size:15px;color:#fff;background:rgba(28,18,52,.7);
  padding:3px 14px;border-radius:99px;text-shadow:0 1px 2px rgba(0,0,0,.4)}

/* ===== BASKET PANEL ===== */
.sheet{position:fixed;inset:0;z-index:40;background:rgba(10,6,24,.55);display:none;align-items:flex-end;justify-content:center}
.sheet.show{display:flex;animation:fade .2s}
@keyframes fade{from{opacity:0}to{opacity:1}}
.sheet-card{width:100%;max-width:520px;background:linear-gradient(180deg,#241046,#1a0a36);border:2px solid rgba(199,125,255,.4);
  border-radius:24px 24px 0 0;padding:18px 16px max(18px,env(safe-area-inset-bottom));box-shadow:0 -10px 40px rgba(0,0,0,.5);
  transform:translateY(100%);transition:transform .28s cubic-bezier(.34,1.4,.5,1)}
.sheet.show .sheet-card{transform:translateY(0)}
.sheet-h{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.sheet-h h3{font-family:'Fredoka One',cursive;font-size:22px}
.sheet-x{margin-left:auto;width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,.1);font-size:18px}
.basket-grid{display:flex;flex-direction:column;gap:8px;max-height:40vh;overflow:auto;margin-bottom:12px}
.bitem{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,.06);border-radius:13px;padding:7px 10px}
.bitem .be{font-size:30px;position:relative;flex:0 0 auto}
.bitem .bx{font-size:13px;font-weight:900;color:#fff;margin-left:1px}
.bitem .bname{flex:1;font-weight:900;color:#fff;font-size:14px;text-align:left}
.bacts{display:flex;gap:6px;flex:0 0 auto}
.bmini{font-family:'Fredoka One',cursive;font-size:14px;padding:8px 12px;border-radius:11px;min-height:42px;min-width:46px;color:#fff;box-shadow:0 3px 0 rgba(0,0,0,.25)}
.bmini:active{transform:translateY(2px);box-shadow:0 1px 0 rgba(0,0,0,.25)}
.bmini.eat{background:linear-gradient(135deg,var(--pink),#ff4f9a)}
.bmini.sell{background:linear-gradient(135deg,var(--yellow),var(--orange));color:#3a1d00}
.basket-empty{text-align:center;padding:22px;color:rgba(240,230,255,.55);font-weight:900;line-height:1.5}
.basket-btns{display:flex;gap:10px}
.bbtn{flex:1;padding:15px;border-radius:16px;font-family:'Fredoka One',cursive;font-size:18px;min-height:54px;box-shadow:0 4px 0 rgba(0,0,0,.3)}
.bbtn:active{transform:translateY(2px);box-shadow:0 2px 0 rgba(0,0,0,.3)}
.bbtn.eat{background:linear-gradient(135deg,var(--pink),#ff4f9a);color:#fff}
.bbtn.sell{background:linear-gradient(135deg,var(--yellow),var(--orange));color:#3a1d00}

/* ===== DAY CARD ===== */
#daycard{position:fixed;inset:0;z-index:60;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:10px;background:radial-gradient(circle at 50% 40%,#2a1556,#120732);opacity:0;visibility:hidden;transition:opacity .5s}
#daycard.show{opacity:1;visibility:visible}
#daycard .dc-em{font-size:84px;animation:bob .6s ease-in-out infinite}
#daycard .dc-day{font-family:'Fredoka One',cursive;font-size:46px;color:#fff}
#daycard .dc-sub{font-size:18px;color:rgba(240,230,255,.7);font-weight:900}

/* ===== MENU SHEET ===== */
#menuSheet .sheet-card{border-color:rgba(255,255,255,.2)}
.menu-row{display:flex;flex-direction:column;gap:10px}
.menu-btn{display:flex;align-items:center;gap:12px;background:rgba(255,255,255,.07);border:2px solid rgba(255,255,255,.12);
  border-radius:14px;padding:14px 16px;font-weight:900;font-size:17px;min-height:54px}
.menu-btn .me{font-size:24px}
.menu-btn.danger{border-color:rgba(255,110,110,.4);color:#ff9a9a}

/* ===== FX layer ===== */
#fx{position:fixed;inset:0;z-index:50;pointer-events:none;overflow:hidden}
.cf{position:absolute;top:-24px;font-size:22px;animation:cfall linear forwards}
@keyframes cfall{0%{transform:translateY(0) rotate(0);opacity:1}100%{transform:translateY(110vh) rotate(540deg);opacity:0}}
.float-up{position:absolute;font-family:'Fredoka One',cursive;font-weight:900;z-index:51;pointer-events:none;
  animation:floatup 1.1s ease-out forwards;text-shadow:0 2px 4px rgba(0,0,0,.4)}
@keyframes floatup{0%{transform:translateY(0) scale(.6);opacity:0}25%{opacity:1;transform:translateY(-12px) scale(1.1)}100%{transform:translateY(-58px) scale(1);opacity:0}}
.pour{position:absolute;z-index:9;font-size:30px;pointer-events:none;animation:pourfall .5s ease-in forwards}
@keyframes pourfall{0%{transform:translateY(-30px) scale(.6);opacity:0}40%{opacity:1}100%{transform:translateY(6px) scale(1);opacity:0}}

/* Splash */
#splash{position:fixed;inset:0;z-index:90;background:radial-gradient(circle at 50% 38%,#2a1556,#0f0a1e);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;text-align:center;padding:24px}
#splash.gone{opacity:0;visibility:hidden;transition:opacity .5s,visibility .5s}
#splash .s-em{font-size:88px;animation:bob 1.1s ease-in-out infinite}
#splash h1{font-family:'Fredoka One',cursive;font-size:clamp(40px,11vw,72px);
  background:linear-gradient(135deg,var(--yellow),var(--green) 60%,var(--blue));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
#splash p{color:rgba(240,230,255,.65);font-weight:900;font-size:16px;max-width:340px;line-height:1.5}
#startBtn{margin-top:6px;background:linear-gradient(135deg,var(--green),#2fc888);color:#06351f;
  font-family:'Fredoka One',cursive;font-size:24px;padding:16px 40px;border-radius:20px;min-height:60px;
  box-shadow:0 6px 0 rgba(0,0,0,.3);animation:toolpulse 1.6s infinite}
#startBtn:active{transform:translateY(3px);box-shadow:0 3px 0 rgba(0,0,0,.3)}
#continueBtn{background:rgba(255,255,255,.1);border:2px solid rgba(255,255,255,.18);color:#fff;
  font-weight:900;font-size:15px;padding:11px 24px;border-radius:14px;min-height:46px;display:none}

/* ===== FUN: critters, pet, golden, rainbow ===== */
.cell .plant{position:relative;z-index:1}
/* Critters */
.critter{position:absolute;transform:translate(-50%,-50%);font-size:34px;z-index:5;cursor:pointer;
  filter:drop-shadow(0 3px 2px rgba(0,0,0,.3));animation:flutter 2.6s ease-in-out infinite;touch-action:manipulation}
@keyframes flutter{0%,100%{transform:translate(-50%,-50%)}25%{transform:translate(calc(-50% + var(--fx,18px)),calc(-50% - 12px))}50%{transform:translate(-50%,calc(-50% + var(--fy,12px)))}75%{transform:translate(calc(-50% - var(--fx,18px)),calc(-50% - 7px))}}
.critter.leaving{animation:critterleave .72s ease-in forwards}
@keyframes critterleave{to{transform:translate(-50%,-280px) scale(.6);opacity:0}}
.critter.caught{animation:crittercaught .32s ease-out forwards}
@keyframes crittercaught{0%{transform:translate(-50%,-50%) scale(1)}100%{transform:translate(-50%,-50%) scale(2.1);opacity:0}}
/* Golden plants */
.cell.golden::before{content:"";position:absolute;inset:-3px;border-radius:12px;z-index:0;
  background:radial-gradient(circle,rgba(255,228,96,.6),transparent 66%);animation:goldpulse 1.4s ease-in-out infinite;pointer-events:none}
@keyframes goldpulse{0%,100%{opacity:.35;transform:scale(.88)}50%{opacity:.95;transform:scale(1.14)}}
.plant.golden-plant{filter:drop-shadow(0 0 7px gold) saturate(1.35)}
.cell.golden.ripe::after{content:"👑";top:-11px;right:-7px;font-size:15px}
/* Rainbow */
#gw-rainbow{position:absolute;left:50%;top:15%;transform:translate(-50%,-50%) scale(.4);
  font-size:190px;opacity:0;pointer-events:none;filter:drop-shadow(0 6px 16px rgba(0,0,0,.2))}
#gw-rainbow.show{animation:rainbowin 4.3s ease-in-out forwards}
@keyframes rainbowin{0%{opacity:0;transform:translate(-50%,-50%) scale(.4)}18%{opacity:.95;transform:translate(-50%,-50%) scale(1)}82%{opacity:.95;transform:translate(-50%,-50%) scale(1)}100%{opacity:0;transform:translate(-50%,-50%) scale(1.05)}}
/* Pets */
.pet{position:absolute;transform:translate(-50%,-50%);z-index:5;width:48px;height:48px;
  transition:left 1s cubic-bezier(.5,0,.3,1.2),top 1s cubic-bezier(.5,0,.3,1.2);cursor:pointer}
.pet .p-em{font-size:38px;line-height:48px;display:block;text-align:center;
  filter:drop-shadow(0 3px 2px rgba(0,0,0,.3));animation:pethop 1.1s ease-in-out infinite}
@keyframes pethop{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
.pet .p-heart{position:absolute;top:-4px;right:-4px;font-size:16px;opacity:0;z-index:2}
.pet.happy .p-heart{animation:petheart 1s ease-out}
@keyframes petheart{0%{opacity:0;transform:translateY(0) scale(.6)}30%{opacity:1}100%{opacity:0;transform:translateY(-26px) scale(1.2)}}
.pet.happy .p-em{animation:petspin .55s ease}
@keyframes petspin{0%{transform:translateY(0) rotate(0)}50%{transform:translateY(-13px) rotate(13deg)}100%{transform:translateY(0) rotate(0)}}
/* Pet picker */
.pet-note{color:#c8b8f0;font-weight:900;margin-bottom:12px;font-size:15px;line-height:1.5}
.pet-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:9px;margin-bottom:12px}
@media(max-width:430px){.pet-grid{grid-template-columns:repeat(2,1fr)}}
.pet-opt{display:flex;flex-direction:column;align-items:center;gap:4px;background:rgba(255,255,255,.07);
  border:2px solid rgba(255,255,255,.14);border-radius:16px;padding:14px 8px;min-height:92px;transition:transform .1s,border-color .12s}
.pet-opt:active{transform:scale(.93);border-color:var(--yellow)}
.pet-opt .pe{font-size:44px;line-height:1}
.pet-opt .pn{font-size:12px;font-weight:900;color:#fff}
.bbtn.pet-skip{background:rgba(255,255,255,.1);color:#fff}
/* Golden basket item */
.bitem.gold{background:linear-gradient(135deg,rgba(255,225,77,.28),rgba(255,154,60,.2));box-shadow:inset 0 0 0 1px rgba(255,225,77,.45)}
.bitem .be{position:relative}
.bitem .gstar{position:absolute;top:-6px;right:-9px;font-size:13px}

/* ===== Level chip ===== */
.chip.lvl{background:rgba(199,125,255,.92);color:#2a0e4a;border-color:rgba(255,255,255,.4);gap:5px;position:relative}
.chip.lvl b{font-size:18px}
.lvl-bar{width:34px;height:7px;border-radius:99px;background:rgba(42,14,74,.35);overflow:hidden}
.lvl-bar i{display:block;height:100%;width:0;background:linear-gradient(90deg,#ffe14d,#fff);border-radius:99px;transition:width .5s}

/* ===== Placed decorations ===== */
.uitem{position:absolute;transform:translate(-50%,-50%);font-size:40px;z-index:2;pointer-events:none;
  filter:drop-shadow(0 4px 3px rgba(0,0,0,.25));animation:pop-in .4s ease-out}
@keyframes pop-in{0%{transform:translate(-50%,-50%) scale(0)}70%{transform:translate(-50%,-50%) scale(1.15)}100%{transform:translate(-50%,-50%) scale(1)}}

/* ===== Garden name sign ===== */
#gw-sign{position:absolute;left:360px;top:212px;transform:translate(-50%,-50%);z-index:2;text-align:center;pointer-events:none}
#gw-sign .sign-board{display:inline-flex;align-items:center;gap:5px;background:linear-gradient(180deg,#c8975a,#a9743f);
  border:3px solid #7c4f25;border-radius:9px;padding:5px 12px;box-shadow:0 4px 8px rgba(0,0,0,.25)}
#gw-sign .sign-em{font-size:17px}
#gw-sign .sign-name{font-family:'Fredoka One',cursive;font-size:14px;color:#fff;text-shadow:0 1px 1px rgba(0,0,0,.4);white-space:nowrap}
#gw-sign .sign-post{display:block;width:7px;height:12px;background:#7c4f25;margin:-1px auto 0;border-radius:0 0 2px 2px}

/* ===== Mailbox ===== */
#mailbox{position:absolute;left:560px;top:212px;transform:translate(-50%,-50%);z-index:4;cursor:pointer;text-align:center}
#mailbox .mb-box{font-size:40px;display:block;filter:drop-shadow(0 3px 2px rgba(0,0,0,.25))}
#mailbox .mb-post{display:none}
#mailbox .mb-flag{display:none;position:absolute;top:-6px;right:2px;font-size:16px}
#mailbox.has-mail{animation:mailbob 1.1s ease-in-out infinite}
#mailbox.has-mail .mb-flag{display:block;animation:tw 1s infinite alternate}
@keyframes mailbob{0%,100%{transform:translate(-50%,-50%)}50%{transform:translate(-50%,-58%)}}

/* ===== Rare visitors ===== */
.visitor{position:absolute;transform:translate(-50%,-50%);font-size:46px;z-index:6;cursor:pointer;touch-action:manipulation;
  filter:drop-shadow(0 5px 5px rgba(0,0,0,.3));animation:vfloat 2.4s ease-in-out infinite}
.visitor::after{content:"✨";position:absolute;top:-8px;right:-10px;font-size:18px;animation:tw 1s infinite alternate}
@keyframes vfloat{0%,100%{transform:translate(-50%,-50%) scale(1)}50%{transform:translate(-50%,-62%) scale(1.06)}}
.visitor.caught{animation:crittercaught .36s ease-out forwards}
.visitor.leaving{animation:critterleave .8s ease-in forwards}

/* ===== Giant & glowing plants ===== */
.plant.giant-plant{font-size:46px;transform:translateY(-7px);filter:drop-shadow(0 4px 4px rgba(0,0,0,.32))}
.plant.glow-plant{filter:drop-shadow(0 0 8px #fff3a0) drop-shadow(0 0 14px #c7a3ff)}

/* ===== Fireworks ===== */
.fw{position:fixed;z-index:55;font-size:22px;pointer-events:none;animation:fwburst 1.2s ease-out forwards}
@keyframes fwburst{0%{transform:translate(0,0) scale(.4);opacity:1}100%{transform:translate(var(--dx),var(--dy)) scale(1.1);opacity:0}}

/* ===== Seasons & weather ===== */
#season-tint{position:absolute;inset:0;border-radius:24px;pointer-events:none;z-index:1;transition:background 1.5s}
.season-p{position:fixed;top:-20px;z-index:7;pointer-events:none;animation:seasonfall linear forwards}
@keyframes seasonfall{0%{transform:translateY(0) rotate(0);opacity:0}10%{opacity:.9}100%{transform:translateY(105vh) rotate(360deg);opacity:.4}}
#rain-layer{position:absolute;inset:0;overflow:hidden;pointer-events:none}
#rain-layer i{position:absolute;top:-12%;width:2px;height:16px;background:linear-gradient(rgba(180,225,255,0),rgba(180,225,255,.8));animation:raindrop linear infinite}
@keyframes raindrop{to{transform:translateY(120vh)}}

/* ===== Side dock ===== */
#dock{position:fixed;right:max(6px,env(safe-area-inset-right));top:50%;transform:translateY(-50%);z-index:21;
  display:flex;flex-direction:column;gap:8px;pointer-events:auto}
.dock-btn{position:relative;width:48px;height:48px;border-radius:15px;background:rgba(28,18,52,.78);border:2px solid rgba(255,255,255,.16);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0;box-shadow:0 4px 10px rgba(0,0,0,.3);transition:transform .1s}
.dock-btn:active{transform:scale(.9)}
.dock-btn .de{font-size:23px;line-height:1.05}
.dock-btn .dl{font-size:8.5px;font-weight:900;color:#fff;opacity:.8}
.dock-btn.hasnew::after{content:"";position:absolute;top:4px;right:4px;width:11px;height:11px;border-radius:50%;background:var(--pink);box-shadow:0 0 0 2px #fff;animation:tw 1s infinite alternate}

/* ===== Shop ===== */
.shop-card,.j-card{max-width:560px}
.shop-coins{margin-left:auto;display:flex;align-items:center;gap:4px;background:rgba(255,225,77,.92);color:#4a3a00;
  font-weight:900;padding:5px 12px;border-radius:99px;font-size:16px}
.sheet-h .shop-coins+.sheet-x{margin-left:8px}
.shop-tabs{display:flex;gap:8px;margin-bottom:12px}
.shop-tab{flex:1;padding:10px;border-radius:12px;background:rgba(255,255,255,.07);border:2px solid rgba(255,255,255,.12);
  font-weight:900;font-size:14px;color:#fff;min-height:44px}
.shop-tab.on{border-color:var(--yellow);background:rgba(255,225,77,.18)}
.shop-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(102px,1fr));gap:10px;max-height:52vh;overflow:auto;padding:2px}
.shop-item{position:relative;display:flex;flex-direction:column;align-items:center;gap:3px;background:rgba(255,255,255,.1);
  border:2px solid rgba(255,255,255,.2);border-radius:16px;padding:10px 6px 8px;min-height:120px;transition:transform .1s,border-color .12s}
.shop-item:active{transform:scale(.94)}
.shop-item .si-em{font-size:40px;line-height:1;width:62px;height:62px;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.14);border-radius:15px;box-shadow:inset 0 1px 0 rgba(255,255,255,.18)}
.shop-item .si-name{font-size:11px;font-weight:900;color:#fff;text-align:center;line-height:1.1}
.shop-item .si-sub{font-size:9px;font-weight:900;color:#c8b8f0}
.shop-item .si-price{margin-top:auto;font-size:12px;font-weight:900;color:var(--yellow);background:rgba(0,0,0,.22);padding:3px 9px;border-radius:99px}
.shop-item.owned{border-color:var(--green)}
.shop-item.owned .si-price{color:var(--green)}
.shop-item.broke{opacity:.55}

/* ===== Sticker book ===== */
.j-count{margin-left:auto;font-weight:900;color:var(--yellow);font-size:16px}
.j-body{max-height:54vh;overflow:auto}
.j-sec{margin-bottom:14px}
.j-sec-t{font-family:'Fredoka One',cursive;font-size:15px;color:#c8b8f0;margin-bottom:7px}
.j-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(54px,1fr));gap:8px}
.j-sticker{aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:13px;
  background:rgba(255,255,255,.05);border:2px dashed rgba(255,255,255,.12)}
.j-sticker.got{background:rgba(255,225,77,.14);border:2px solid rgba(255,225,77,.4)}
.j-sticker .js-em{font-size:28px}
.j-sticker:not(.got) .js-em{opacity:.4;font-size:22px}
.j-done{text-align:center;font-family:'Fredoka One',cursive;color:var(--yellow);padding:12px;font-size:17px}

/* ===== Letter from Dad ===== */
.letter-card{max-width:440px;background:linear-gradient(180deg,#fff7e8,#ffeccb)}
.letter-top{font-family:'Fredoka One',cursive;font-size:20px;color:#b14637;text-align:center;margin-bottom:10px}
.letter-note{background:#fffdf6;border:2px dashed #e0b07a;border-radius:14px;padding:18px;font-size:18px;line-height:1.55;
  color:#5a3a1a;font-weight:700;text-align:center;margin-bottom:12px}
.letter-gift{display:flex;flex-direction:column;align-items:center;gap:3px;margin-bottom:14px}
.letter-gift .lg-label{font-size:13px;font-weight:900;color:#9a6233}
.letter-gift .lg-item{font-family:'Fredoka One',cursive;font-size:20px;color:#3a8a3f}
.letter-ok{background:linear-gradient(135deg,#ff9a3c,#ff6eb4);color:#fff;width:100%}

/* ===== Show my garden ===== */
#showOv{position:fixed;inset:0;z-index:60;background:rgba(10,6,24,.72);display:none;flex-direction:column;
  align-items:center;justify-content:center;gap:16px;padding:18px}
#showOv.show{display:flex;animation:fade .25s}
.show-card{width:100%;max-width:380px;border-radius:26px;padding:24px 20px;text-align:center;color:#3a1d52;
  background:radial-gradient(circle at 50% 0,#fff,#ffe6f3 60%,#e7d6ff);box-shadow:0 18px 50px rgba(0,0,0,.5);border:5px solid #fff}
.sc-top{font-weight:900;font-size:14px;color:#a05ad0;letter-spacing:.5px}
.sc-title{font-family:'Fredoka One',cursive;font-size:30px;line-height:1.05;margin:2px 0 4px;
  background:linear-gradient(135deg,#ff6eb4,#c77dff,#5bc8ff);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.sc-sub{font-size:13px;font-weight:900;color:#7a5a9a;margin-bottom:12px}
.sc-plants{font-size:34px;line-height:1.2;display:flex;flex-wrap:wrap;justify-content:center;gap:2px}
.sc-plants .sc-pet{margin-left:4px}
.sc-deco{font-size:22px;opacity:.9;margin-top:4px}
.sc-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin:16px 0 6px}
.sc-stat{background:rgba(255,255,255,.6);border-radius:13px;padding:8px 4px}
.sc-stat b{display:block;font-family:'Fredoka One',cursive;font-size:18px;color:#c2410c}
.sc-stat span{font-size:9px;font-weight:900;color:#7a5a9a}
.sc-foot{margin-top:12px;font-family:'Fredoka One',cursive;font-size:14px;color:#3a8a3f}
.show-actions{display:flex;gap:10px;width:100%;max-width:380px}
.show-close{flex:1;background:rgba(255,255,255,.15);color:#fff}
.show-snap{flex:2;background:linear-gradient(135deg,var(--green),#2fc888);color:#06351f}

/* ===== Critter/visitor name tags ===== */
.fly-em{display:block;line-height:1}
.fly-tag{position:absolute;left:50%;top:100%;transform:translateX(-50%);margin-top:3px;
  font-family:'Fredoka One',cursive;font-weight:400;font-size:11px;color:#fff;background:rgba(28,18,52,.82);
  padding:1px 8px;border-radius:99px;white-space:nowrap;pointer-events:none;box-shadow:0 2px 5px rgba(0,0,0,.3)}
.critter.pest .fly-tag{background:rgba(206,68,68,.92)}
.critter.pest{animation:pestwig 1.5s ease-in-out infinite}
@keyframes pestwig{0%,100%{transform:translate(-50%,-50%) rotate(-7deg)}50%{transform:translate(-50%,-50%) rotate(7deg)}}

/* ===== Growing plants show what they'll become (small → big) ===== */
.plant.growing{transition:transform .35s ease,opacity .35s}
.plant.g0{transform:scale(.5);opacity:.55;filter:saturate(.6)}
.plant.g1{transform:scale(.8);opacity:.88}
/* Ready-to-harvest: bright green glow ring so it clearly stands out from just-planted */
.cell.ripe:not(.golden)::before{content:"";position:absolute;inset:-3px;border-radius:11px;z-index:0;pointer-events:none;
  background:radial-gradient(circle,rgba(93,255,176,.45),transparent 68%);animation:readypulse 1.3s ease-in-out infinite}
@keyframes readypulse{0%,100%{opacity:.4;transform:scale(.88)}50%{opacity:.95;transform:scale(1.14)}}

/* compact single-row picker keeps the garden big */
.tray-row{display:flex;gap:8px;overflow-x:auto;overflow-y:hidden;max-width:min(92vw,540px);padding:2px 2px 7px;-webkit-overflow-scrolling:touch}
.opt .oe{font-size:27px}
.opt .on{font-size:9.5px}
.opt.opt-done{background:rgba(93,255,176,.16);border-color:var(--green)}
.opt.opt-done .oe{color:var(--green);font-weight:900}
.opt.opt-done .on{color:var(--green)}
.tray{position:relative}
.tray-x{position:absolute;top:7px;right:9px;width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,.16);color:#fff;font-size:15px;z-index:3;display:flex;align-items:center;justify-content:center}
.tray-x:active{transform:scale(.9)}
.tray-fade{position:absolute;right:6px;bottom:11px;height:64px;width:42px;pointer-events:none;display:flex;align-items:center;justify-content:flex-end;padding-right:7px;color:rgba(255,255,255,.9);font-family:'Fredoka One',cursive;font-size:26px;background:linear-gradient(90deg,transparent,rgba(28,18,52,.95) 62%);border-radius:0 16px 16px 0;animation:nudge 1.1s ease-in-out infinite}
@keyframes nudge{0%,100%{transform:translateX(0)}50%{transform:translateX(-5px)}}
.tray-row::-webkit-scrollbar{height:5px}
.tray-row::-webkit-scrollbar-thumb{background:rgba(255,255,255,.32);border-radius:99px}
.tray-row::-webkit-scrollbar-track{background:transparent}
/* Hedge around the property */
#fence{position:absolute;inset:0;z-index:1;pointer-events:none}
#fence .hedge{position:absolute;width:34px;height:34px;border-radius:50%;transform:translate(-50%,-50%);
  background:radial-gradient(circle at 38% 30%,#84d06f,#4f9e43 72%);
  box-shadow:0 2px 3px rgba(0,0,0,.18),inset 0 -4px 5px rgba(0,0,0,.14),inset 0 3px 4px rgba(255,255,255,.2)}
.show-hint{color:#fff;font-family:'Fredoka One',cursive;font-size:15px;text-align:center;text-shadow:0 1px 4px rgba(0,0,0,.55);max-width:380px}
.coinpick{position:absolute;transform:translate(-50%,-50%);z-index:6;cursor:pointer;animation:coinbob 1.2s ease-in-out infinite;filter:drop-shadow(0 3px 3px rgba(0,0,0,.3))}
.coinpick .fly-em{font-size:34px;display:block}
.bed-del{position:absolute;top:-11px;right:-11px;width:26px;height:26px;border-radius:50%;background:#ff5a6a;color:#fff;font-size:14px;font-weight:900;border:2px solid #fff;box-shadow:0 2px 5px rgba(0,0,0,.35);z-index:6;display:flex;align-items:center;justify-content:center;line-height:1;padding:0}
.bed-del:active{transform:scale(.85)}
.bed.shape-tri .bed-del{top:38%;right:-13px}
#undoToast{position:fixed;left:50%;bottom:132px;transform:translateX(-50%) translateY(20px);z-index:30;
  display:flex;align-items:center;gap:12px;background:rgba(28,18,52,.95);border:2px solid rgba(255,255,255,.18);
  border-radius:14px;padding:10px 12px 10px 16px;color:#fff;font-weight:900;font-size:15px;
  box-shadow:0 8px 24px rgba(0,0,0,.4);opacity:0;visibility:hidden;transition:opacity .25s,transform .25s;pointer-events:none}
#undoToast.show{opacity:1;visibility:visible;transform:translateX(-50%) translateY(0);pointer-events:auto}
#undoBtn{background:linear-gradient(135deg,var(--green),#2fc888);color:#06351f;font-family:'Fredoka One',cursive;
  font-size:14px;padding:8px 14px;border-radius:10px;min-height:38px}
#undoBtn:active{transform:scale(.93)}
@keyframes coinbob{0%,100%{transform:translate(-50%,-50%) scale(1)}50%{transform:translate(-50%,-64%) scale(1.12)}}
#fence .gatepost{position:absolute;width:12px;height:32px;background:linear-gradient(#b9824a,#8a5a2b);transform:translate(-50%,-72%);border-radius:3px;box-shadow:0 2px 3px rgba(0,0,0,.25)}
#fence .gatepost::before{content:"";position:absolute;left:-3px;top:5px;width:18px;height:5px;background:#8a5a2b;border-radius:2px}
.letter-greet{display:block;font-family:'Fredoka One',cursive;color:#b14637;margin-bottom:6px}

/* ===== Phone-friendly tweaks ===== */
@media (max-width:560px){
  #hud{gap:4px;padding-left:68px;padding-right:7px}
  .chip{padding:4px 9px 4px 8px;font-size:13px;min-height:32px;gap:4px}
  .chip .em{font-size:15px}
  .chip.lvl .lvl-bar{display:none}
  .chip.lvl b{font-size:14px}
  #menuBtn{width:36px;height:36px;font-size:16px}
  .dock-btn{width:44px;height:44px;border-radius:14px}
  .dock-btn .de{font-size:21px}
  .dock-btn .dl{font-size:8px}
  .pal-btn{width:56px;min-height:54px;padding:6px 4px 5px}
  .pal-btn .pe{font-size:24px}
  .pal-btn .pl{font-size:10px}
  .pal-btn .pe{font-size:29px}
  #banner{font-size:15px;padding:9px 14px;white-space:normal;max-width:86vw;line-height:1.25}
  .fly-tag{font-size:10px}
  .opt{min-width:56px;min-height:58px}
}
</style>
