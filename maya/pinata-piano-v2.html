<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>🪅 Piñata Piano!</title>
<script src="portal-bridge.js"></script>

<!-- Google Analytics -->
<script src="ga-analytics.js" defer></script>

<link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,700;0,900;1,900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;background:#0d0520;display:flex;align-items:center;justify-content:center;font-family:'Nunito',sans-serif;overflow:hidden}
#app{width:700px;height:620px;position:relative;background:#0d0520;border-radius:24px;overflow:hidden;box-shadow:0 24px 80px rgba(0,0,0,.8)}

/* SCREENS */
.screen{position:absolute;inset:0;display:none;flex-direction:column;align-items:center}
.screen.active{display:flex}

/* ===== SELECT ===== */
#sel{background:linear-gradient(180deg,#0d0520,#1a0a3c);justify-content:flex-start;padding:20px 24px;gap:0;overflow-y:auto}
.sel-header{text-align:center;margin-bottom:14px}
.sel-header h1{font-size:34px;color:#ffe14d;text-shadow:0 0 28px rgba(255,225,77,.5);line-height:1.1}
.sel-header p{color:rgba(255,255,255,.5);font-size:13px;margin-top:4px}
.song-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:100%}
.sc{border-radius:18px;border:none;cursor:pointer;font-family:'Nunito',sans-serif;padding:14px 14px 12px;display:flex;flex-direction:column;gap:6px;transition:transform .12s,box-shadow .12s;box-shadow:0 5px 0 rgba(0,0,0,.4);text-align:left;position:relative;overflow:hidden}
.sc:hover{transform:translateY(-3px);box-shadow:0 8px 0 rgba(0,0,0,.4)}
.sc:active{transform:translateY(2px);box-shadow:0 2px 0 rgba(0,0,0,.4)}
.sc.locked{filter:grayscale(.7);cursor:not-allowed;opacity:.7}
.sc .lock-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:32px;background:rgba(0,0,0,.35);border-radius:18px}
.sc .em{font-size:30px;line-height:1}
.sc .ti{font-size:15px;font-weight:900;color:#fff;line-height:1.1}
.sc .di{font-size:11px;font-weight:700;color:rgba(255,255,255,.7);margin-top:1px}
.sc .stars{font-size:14px;margin-top:2px}
.sc .stars span{opacity:.3}.sc .stars span.lit{opacity:1}
.s1{background:linear-gradient(135deg,#ff6eb4,#c026d3)}
.s2{background:linear-gradient(135deg,#5bc8ff,#2563eb)}
.s3{background:linear-gradient(135deg,#5dde7c,#16a34a)}
.s4{background:linear-gradient(135deg,#ff9a3c,#dc2626)}
.s5{background:linear-gradient(135deg,#c77dff,#7c3aed)}
.s6{background:linear-gradient(135deg,#fb923c,#b45309)}
.mode-row{display:flex;gap:10px;width:100%;margin-bottom:10px}
.mode-btn{flex:1;padding:10px;border-radius:12px;border:none;font-family:'Nunito',sans-serif;font-size:13px;font-weight:900;cursor:pointer;transition:transform .1s,box-shadow .1s;box-shadow:0 3px 0 rgba(0,0,0,.3)}
.mode-btn:hover{transform:translateY(-2px)}.mode-btn:active{transform:translateY(1px)}
#mode-normal{background:linear-gradient(135deg,#ff6eb4,#c77dff);color:#fff}
#mode-practice{background:linear-gradient(135deg,#5dde7c,#16a34a);color:#fff}
.mode-btn.selected{box-shadow:0 3px 0 rgba(0,0,0,.3),0 0 0 3px #ffe14d}
.hs-bar{width:100%;text-align:center;padding:8px;color:rgba(255,255,255,.5);font-size:12px;font-weight:700;margin-top:4px}

/* ===== GAME ===== */
#gc{position:absolute;inset:0;overflow:hidden}
#sky{position:absolute;inset:0;background:linear-gradient(180deg,#0d0520 0%,#2d1260 55%,#1a0a3c 100%)}
.star{position:absolute;background:#fff;border-radius:50%;animation:twink 2s infinite alternate}
@keyframes twink{0%{opacity:.2}100%{opacity:1}}

/* Pinata */
#rw{position:absolute;top:0;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;z-index:10}
#rope{width:5px;height:52px;background:linear-gradient(180deg,#a16207,#78350f);border-radius:3px}
#pi{font-size:90px;line-height:1;transition:transform .2s cubic-bezier(.36,.07,.19,.97);filter:drop-shadow(0 8px 20px rgba(0,0,0,.6));display:block;cursor:default;position:relative}
#pi.sl{transform:rotate(-22deg) scale(1.07) translateX(-10px)}
#pi.sr{transform:rotate(22deg) scale(1.07) translateX(10px)}
#pi.boom{animation:pb .55s forwards}
@keyframes pb{0%{transform:scale(1)}35%{transform:scale(1.6) rotate(10deg)}100%{transform:scale(0) rotate(40deg);opacity:0}}
#pi.shake{animation:pshake .12s ease-in-out}
@keyframes pshake{0%{transform:translateX(0)}25%{transform:translateX(-8px)}50%{transform:translateX(8px)}75%{transform:translateX(-4px)}100%{transform:translateX(0)}}

/* Screen shake */
#gc.screen-shake{animation:sshake .15s ease-in-out}
@keyframes sshake{0%{transform:translate(0,0)}20%{transform:translate(-6px,-3px)}40%{transform:translate(6px,3px)}60%{transform:translate(-4px,2px)}80%{transform:translate(4px,-2px)}100%{transform:translate(0,0)}}

/* HUD */
#hpw{position:absolute;top:12px;left:50%;transform:translateX(-50%);text-align:center;z-index:20;display:flex;flex-direction:column;align-items:center;gap:3px}
#hpl{font-size:10px;font-weight:900;color:rgba(255,255,255,.5);letter-spacing:.1em}
#hpt{width:150px;height:13px;background:rgba(255,255,255,.1);border-radius:99px;overflow:hidden;border:2px solid rgba(255,255,255,.1)}
#hpf{height:100%;background:linear-gradient(90deg,#ff6eb4,#ff9a3c);border-radius:99px;transition:width .3s}
#scw{position:absolute;top:12px;right:14px;text-align:right;z-index:20}
#scn{font-size:22px;font-weight:900;color:#ffe14d;line-height:1}
#con{font-size:13px;font-weight:900;color:#ff9a3c;min-height:16px}

#prw{position:absolute;top:12px;left:14px;z-index:20}
#prl{font-size:10px;font-weight:900;color:rgba(255,255,255,.5);margin-bottom:4px}
#nds{display:flex;gap:4px;flex-wrap:wrap;max-width:155px}
.nd{width:9px;height:9px;border-radius:50%;background:rgba(255,255,255,.15);transition:background .2s}
.nd.done{background:#5dde7c}.nd.cur{background:#ffe14d;box-shadow:0 0 7px #ffe14d}.nd.miss{background:#ff9a3c}

/* Practice mode label */
#practice-lbl{position:absolute;top:50px;left:50%;transform:translateX(-50%);background:#5dde7c;color:#0d0520;font-size:11px;font-weight:900;padding:3px 10px;border-radius:99px;z-index:25;letter-spacing:.05em;display:none}

/* Drop */
.drop{position:absolute;display:flex;flex-direction:column;align-items:center;gap:2px;z-index:15;pointer-events:none;transition:none}
.drop .cd{font-size:38px;filter:drop-shadow(0 4px 8px rgba(0,0,0,.4));animation:wobble 1.2s ease-in-out infinite}
@keyframes wobble{0%{transform:rotate(-6deg) scale(1)}33%{transform:rotate(6deg) scale(1.05)}66%{transform:rotate(-4deg) scale(.97)}100%{transform:rotate(-6deg) scale(1)}}
.drop.golden .cd{animation:wobble 1.2s ease-in-out infinite,golden-glow .5s ease-in-out infinite alternate;filter:drop-shadow(0 4px 16px #ffe14d)}
@keyframes golden-glow{0%{filter:drop-shadow(0 0 8px #ffe14d)}100%{filter:drop-shadow(0 0 20px #ffe14d) brightness(1.3)}}
.drop .nl{font-size:13px;font-weight:900;color:#fff;background:rgba(0,0,0,.5);padding:2px 8px;border-radius:8px}
.drop .timing-arc{position:absolute;bottom:-14px;left:50%;transform:translateX(-50%);width:50px;height:8px;border-radius:99px;background:rgba(255,255,255,.2);overflow:hidden}
.drop .timing-fill{height:100%;border-radius:99px;background:#5dde7c;transition:width .1s linear,background .1s}

/* Effects */
.ring{position:absolute;pointer-events:none;z-index:52;border-radius:50%;border:4px solid;width:10px;height:10px;margin:-5px;animation:rexp .44s ease-out forwards}
@keyframes rexp{0%{width:10px;height:10px;margin:-5px;opacity:1}100%{width:110px;height:110px;margin:-55px;opacity:0}}
.shard{position:absolute;pointer-events:none;z-index:51;animation:sfly var(--d,.6s) ease-out forwards}
@keyframes sfly{0%{transform:translate(0,0) scale(1.1) rotate(0deg);opacity:1}100%{transform:translate(var(--tx),var(--ty)) scale(.1) rotate(var(--ro));opacity:0}}
.spk{position:absolute;pointer-events:none;z-index:52;animation:spkp .55s ease-out forwards}
@keyframes spkp{0%{font-size:8px;opacity:1;transform:scale(0) rotate(0)}55%{font-size:22px;opacity:1;transform:scale(1.4) rotate(180deg)}100%{font-size:14px;opacity:0;transform:scale(.4) rotate(360deg)}}
.bigpop{position:absolute;pointer-events:none;z-index:53;animation:bpop .6s ease-out forwards}
@keyframes bpop{0%{transform:scale(0) rotate(-20deg);opacity:1}50%{transform:scale(1.5) rotate(10deg);opacity:1}100%{transform:scale(.3) rotate(30deg);opacity:0}}
.golden-burst{position:absolute;pointer-events:none;z-index:54;font-size:16px;animation:gburst .8s ease-out forwards}
@keyframes gburst{0%{transform:translate(0,0) scale(1);opacity:1}100%{transform:translate(var(--tx),var(--ty)) scale(.2);opacity:0}}
.melt{position:absolute;pointer-events:none;z-index:51;transform-origin:bottom center;animation:mdrip .95s ease-in forwards}
@keyframes mdrip{0%{transform:scaleY(1) scaleX(1);opacity:1;filter:blur(0)}35%{transform:scaleY(1.4) scaleX(.75);opacity:1;filter:blur(.5px)}70%{transform:scaleY(2.1) scaleX(.5);opacity:.8;filter:blur(2px)}100%{transform:scaleY(3.2) scaleX(.28) translateY(20px);opacity:0;filter:blur(6px)}}
.puddle{position:absolute;pointer-events:none;z-index:50;animation:pf 1.5s ease-out .2s forwards;opacity:0}
@keyframes pf{0%{opacity:.9;transform:scaleX(.8) scaleY(.5)}40%{opacity:.7;transform:scaleX(1.8) scaleY(.3)}100%{opacity:0;transform:scaleX(2.6) scaleY(.15)}}
.fbk{position:absolute;font-size:22px;font-weight:900;pointer-events:none;z-index:58;white-space:nowrap;transform:translateX(-50%);animation:fpop .7s ease-out forwards}
@keyframes fpop{0%{opacity:1;transform:translateX(-50%) scale(1) translateY(0)}100%{opacity:0;transform:translateX(-50%) scale(1.5) translateY(-55px)}}
.wrng-fx{position:absolute;pointer-events:none;z-index:57;font-size:22px;font-weight:900;color:#ef4444;transform:translateX(-50%);animation:wp .5s ease-out forwards}
@keyframes wp{0%{opacity:1;transform:translateX(-50%) scale(1)}100%{opacity:0;transform:translateX(-50%) scale(1.7) translateY(-35px)}}
.perfect-fx{position:absolute;pointer-events:none;z-index:59;font-size:16px;font-weight:900;color:#ffe14d;letter-spacing:.05em;transform:translateX(-50%);animation:perf .6s ease-out forwards;text-shadow:0 0 10px rgba(255,225,77,.8)}
@keyframes perf{0%{opacity:1;transform:translateX(-50%) scale(1.2) translateY(0)}100%{opacity:0;transform:translateX(-50%) scale(1.8) translateY(-40px)}}
.conf{position:absolute;pointer-events:none;z-index:60;opacity:0;animation:cfall var(--cd) ease-in var(--cdl) forwards}
@keyframes cfall{0%{opacity:1;transform:translate(0,0) rotate(0) scale(1)}100%{opacity:0;transform:translate(var(--ctx),var(--cty)) rotate(var(--cro)) scale(.3)}}

/* Piano */
#pa{position:absolute;bottom:0;left:0;right:0;height:130px;z-index:30}
#pb2{position:absolute;inset:0;background:linear-gradient(180deg,#180a38,#0a0315);border-top:3px solid rgba(255,255,255,.08)}
#pk{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);display:flex;gap:3px}
.key{border-radius:0 0 10px 10px;cursor:pointer;transition:transform .07s,filter .07s;display:flex;align-items:flex-end;justify-content:center;padding-bottom:5px;width:47px;height:90px;border:2px solid rgba(0,0,0,.2);position:relative;user-select:none;-webkit-user-select:none}
.key:active,.key.press{transform:translateY(4px) scale(.97);filter:brightness(1.5)}
.key .kl{font-size:12px;font-weight:900;color:rgba(0,0,0,.4);pointer-events:none;transition:opacity .3s}
.key.glow{animation:kpulse .65s infinite alternate;border-color:#ffe14d!important}
@keyframes kpulse{0%{box-shadow:0 0 8px 2px #ffe14d,inset 0 0 8px rgba(255,225,77,.3)}100%{box-shadow:0 0 32px 12px #ffe14d,inset 0 0 18px rgba(255,225,77,.4)}}
.key.cf{animation:kc .4s forwards}
@keyframes kc{0%{filter:brightness(2.8) saturate(2.5)}100%{filter:brightness(1) saturate(1)}}
.key.wf{animation:kwf .25s forwards}
@keyframes kwf{0%{background:#ef4444!important;transform:translateY(2px)}100%{transform:translateY(0)}}
.key .hint-dot{position:absolute;top:6px;width:10px;height:10px;border-radius:50%;background:rgba(0,0,0,.25);display:none}
.key.show-hint .hint-dot{display:block}
.key.show-hint.glow .hint-dot{background:#ffe14d;box-shadow:0 0 8px #ffe14d}

/* Result */
#res{position:absolute;inset:0;background:rgba(8,3,24,.94);z-index:70;display:none;flex-direction:column;align-items:center;justify-content:center;gap:14px}
#res.show{display:flex}
#rt{font-size:36px;font-weight:900;color:#ffe14d;text-shadow:0 0 30px rgba(255,225,77,.6);text-align:center}
#rs{font-size:14px;color:rgba(255,255,255,.6);text-align:center;max-width:400px}
#rsc{font-size:26px;font-weight:900;color:#ff6eb4}
#r-stars{font-size:40px;letter-spacing:4px}
#r-unlock{font-size:13px;color:#5dde7c;font-weight:900;min-height:18px;text-align:center}
.rb{padding:12px 26px;border-radius:16px;border:none;font-family:'Nunito',sans-serif;font-size:15px;font-weight:900;cursor:pointer;transition:transform .1s;display:inline-block}
.rb:hover{transform:scale(1.07)}.rb:active{transform:scale(.96)}
#rb1{background:linear-gradient(135deg,#ff6eb4,#c77dff);color:#fff;box-shadow:0 4px 0 rgba(0,0,0,.35)}
#rb2{background:rgba(255,255,255,.1);color:#fff;border:2px solid rgba(255,255,255,.18)}
.rb-row{display:flex;gap:12px}
</style>
</head>
<body>
<div id="app">

<!-- SELECT -->
<div id="sel" class="screen active">
  <div class="sel-header">
    <h1>🪅 Piñata Piano!</h1>
    <p>Hit the right keys in time to pop candy and smash the piñata!</p>
  </div>
  <div class="mode-row">
    <button class="mode-btn selected" id="mode-normal" onclick="setMode('normal')">🎮 Normal Mode</button>
    <button class="mode-btn" id="mode-practice" onclick="setMode('practice')">🐢 Practice Mode</button>
  </div>
  <div class="song-grid" id="song-grid"></div>
  <div class="hs-bar" id="hs-bar">🏆 High Score: <span id="hs-num">0</span></div>
</div>

<!-- GAME -->
<div id="game" class="screen">
  <div id="gc">
    <div id="sky"></div>
    <div id="rw"><div id="rope"></div><div id="pi">🪅</div></div>
    <div id="hpw"><div id="hpl">PIÑATA HP</div><div id="hpt"><div id="hpf"></div></div></div>
    <div id="scw"><div id="scn">0</div><div id="con"></div></div>
    <div id="prw"><div id="prl"></div><div id="nds"></div></div>
    <div id="practice-lbl">🐢 PRACTICE MODE</div>
    <div id="pa"><div id="pb2"></div><div id="pk"></div></div>
    <div id="res">
      <div id="rt"></div>
      <div id="r-stars"></div>
      <div id="rs"></div>
      <div id="rsc"></div>
      <div id="r-unlock"></div>
      <div class="rb-row">
        <button class="rb" id="rb1" onclick="replay()">Play Again 🎵</button>
        <button class="rb" id="rb2" onclick="back()">Songs 🏠</button>
      </div>
    </div>
  </div>
</div>

</div>
<script>
/* ===== DATA ===== */
const FR={C4:261.6,D4:293.7,E4:329.6,F4:349.2,G4:392,A4:440,B4:493.9,C5:523.3,D5:587.3,E5:659.3,F5:698.5,G5:784,A5:880};
const PN=['C4','D4','E4','F4','G4','A4','B4','C5','D5','E5','F5','G5','A5'];
const KC=['#ff6eb4','#ff9a3c','#ffe14d','#5dde7c','#5bc8ff','#c77dff','#ff6eb4','#ff9a3c','#ffe14d','#5dde7c','#5bc8ff','#c77dff','#ff6eb4'];
const CA=['🍬','🍭','🍫','🍡','🍩','🍪','🧁','🍰'];
const SP=['✨','⭐','💫','🌟','🎀','💎','🌈'];
const CE=['🎊','🎉','⭐','🌈','✨','🎀','💫','🍭','🍬','🌟'];
const PINATAS=['🪅','🎪','🎠','🎡','🦄','🐙'];
const GOLDEN_CHANCE=0.15;

const SONGS=[
  {id:0,em:'⭐',n:'Twinkle Twinkle',notes:['C4','C4','G4','G4','A4','A4','G4','F4','F4','E4','E4','D4','D4','C4'],bpm:66,cls:'s1',locked:false},
  {id:1,em:'🐑',n:'Mary Had a Little Lamb',notes:['E4','D4','C4','D4','E4','E4','E4','D4','D4','D4','E4','G4','G4','E4'],bpm:72,cls:'s2',locked:false},
  {id:2,em:'🎂',n:'Happy Birthday',notes:['C4','C4','D4','C4','F4','E4','C4','C4','D4','C4','G4','F4','C4'],bpm:68,cls:'s3',locked:true,unlockStars:3},
  {id:3,em:'🐘',n:'Baby Elephant Walk',notes:['C4','C4','E4','C4','G4','C4','A4','G4','F4','E4','D4','C4','E4','G4','F4','E4'],bpm:84,cls:'s4',locked:true,unlockStars:6},
  {id:4,em:'🦄',n:'Ode to Joy',notes:['E4','E4','F4','G4','G4','F4','E4','D4','C4','C4','D4','E4','E4','D4','D4'],bpm:80,cls:'s5',locked:true,unlockStars:10},
  {id:5,em:'🎸',n:'Jingle Bells',notes:['E4','E4','E4','E4','E4','E4','E4','G4','C4','D4','E4','F4','F4','F4','F4','F4','E4','E4','E4','D4','D4','E4','D4','G4'],bpm:96,cls:'s6',locked:true,unlockStars:15},
];

/* ===== STATE ===== */
let saves=JSON.parse(localStorage.getItem('ppiano')||'{"hs":0,"stars":{}}');
let mode='normal',song=null,ni,score,combo,streak,hp,over,da,nh,dropEl,dY,curE,isGolden,raf,swT,perfWindow,totalStars=0;
let currentPinata='🪅',lastMissed=false;

/* ===== SAVE ===== */
function save(){localStorage.setItem('ppiano',JSON.stringify(saves));}
function getTotalStars(){return Object.values(saves.stars).reduce((a,b)=>a+b,0);}

/* ===== SELECT SCREEN ===== */
function buildSelect(){
  totalStars=getTotalStars();
  const grid=document.getElementById('song-grid');
  grid.innerHTML='';
  SONGS.forEach(s=>{
    const locked=s.locked&&totalStars<(s.unlockStars||0);
    const myStars=saves.stars[s.id]||0;
    const btn=document.createElement('button');
    btn.className=`sc ${s.cls}${locked?' locked':''}`;
    btn.innerHTML=`
      <div class="em">${s.em}</div>
      <div class="ti">${s.n}</div>
      <div class="di">${s.notes.length} notes${locked?` · 🔒 Need ${s.unlockStars} ⭐`:''}</div>
      <div class="stars">
        <span class="${myStars>=1?'lit':''}">⭐</span>
        <span class="${myStars>=2?'lit':''}">⭐</span>
        <span class="${myStars>=3?'lit':''}">⭐</span>
      </div>
      ${locked?'<div class="lock-overlay">🔒</div>':''}
    `;
    if(!locked)btn.onclick=()=>go(s.id);
    grid.appendChild(btn);
  });
  document.getElementById('hs-num').textContent=saves.hs;
  document.getElementById('hs-bar').textContent=`🏆 High Score: ${saves.hs}  |  ⭐ Total Stars: ${totalStars}`;
}

function setMode(m){
  mode=m;
  document.getElementById('mode-normal').classList.toggle('selected',m==='normal');
  document.getElementById('mode-practice').classList.toggle('selected',m==='practice');
}

/* ===== AUDIO ===== */
let ax;
function au(){if(!ax)ax=new(window.AudioContext||window.webkitAudioContext)();return ax;}
function pn(f,d=0.4,t='triangle',v=0.28){
  try{
    const c=au(),o=c.createOscillator(),g=c.createGain();
    o.connect(g);g.connect(c.destination);
    o.type=t;o.frequency.setValueAtTime(f,c.currentTime);
    g.gain.setValueAtTime(v,c.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+d);
    o.start();o.stop(c.currentTime+d);
  }catch(e){}
}
function fanfare(){
  [[FR.C4,0],[FR.E4,130],[FR.G4,260],[FR.C5,390],[FR.E5,520],[FR.G5,610],[FR.C5,720],[FR.E5,780],[FR.G5,840]].forEach(([f,t])=>setTimeout(()=>pn(f,.6,'sine',.32),t));
}
function sadSound(){pn(FR.G4,.2,'triangle',.15);setTimeout(()=>pn(FR.E4,.3,'triangle',.12),200);}
function goldenSound(){[FR.C5,FR.E5,FR.G5,FR.C5].forEach((f,i)=>setTimeout(()=>pn(f,.3,'sine',.28),i*80));}

/* ===== STARS ===== */
const cv=()=>document.getElementById('gc');
function stars(){
  const s=document.getElementById('sky');s.querySelectorAll('.star').forEach(e=>e.remove());
  for(let i=0;i<44;i++){
    const el=document.createElement('div');el.className='star';
    el.style.cssText=`width:${Math.random()*3+.5}px;height:${Math.random()*3+.5}px;left:${Math.random()*100}%;top:${Math.random()*56}%;animation-delay:${Math.random()*2}s;animation-duration:${1.2+Math.random()*2}s`;
    s.appendChild(el);
  }
}

/* ===== PIANO ===== */
function buildPiano(){
  const w=document.getElementById('pk');w.innerHTML='';
  PN.forEach((note,i)=>{
    const k=document.createElement('div');k.className='key';k.dataset.note=note;
    k.style.background=KC[i];
    k.innerHTML=`<div class="hint-dot"></div><span class="kl">${note.replace(/[45]/g,n=>n==='5'?'₅':'')}</span>`;
    k.addEventListener('mousedown',()=>hk(note,k));
    k.addEventListener('touchstart',e=>{e.preventDefault();hk(note,k);},{passive:false});
    w.appendChild(k);
  });
  // Show hints in practice mode, fade over time in normal
  updateHints();
}

function updateHints(){
  const show=mode==='practice'||(combo<3&&ni<4);
  document.querySelectorAll('.key').forEach(k=>{
    k.classList.toggle('show-hint',show);
    const lbl=k.querySelector('.kl');
    if(lbl)lbl.style.opacity=show?'1':'0.4';
  });
}

/* ===== DOTS ===== */
function buildDots(){
  const w=document.getElementById('nds');w.innerHTML='';
  song.notes.forEach((_,i)=>{const d=document.createElement('div');d.className='nd';d.id='nd'+i;w.appendChild(d);});
  document.getElementById('prl').textContent=song.n;
}
function rDots(){
  song.notes.forEach((_,i)=>{
    const d=document.getElementById('nd'+i);if(!d)return;
    d.className='nd'+(i<ni?' done':i===ni?' cur':lastMissed&&i===ni?'miss':'');
  });
}

/* ===== HUD ===== */
function sHP(){const el=document.getElementById('hpf');if(el)el.style.width=hp+'%';}
function sSC(){
  const scn=document.getElementById('scn');
  const co=document.getElementById('con');
  if(scn)scn.textContent=score;
  if(!co)return;
  if(streak>=5){
    co.innerHTML=`🔥 x${combo} STREAK!`;
    co.style.color='#ffe14d';
  } else if(combo>1){
    co.innerHTML=`x${combo} combo!`;
    co.style.color='#ff9a3c';
  } else {
    co.innerHTML='';
  }
}

/* ===== GLOW ===== */
function glow(note,on){
  document.querySelectorAll('.key').forEach(k=>{
    if(k.dataset.note===note){on?k.classList.add('glow'):k.classList.remove('glow');}
  });
}

/* ===== POP ===== */
function popCandy(x,y,emoji,golden=false){
  const c=cv();
  const ringColor=golden?'#ffe14d':KC[Math.floor(Math.random()*KC.length)];
  const r=document.createElement('div');r.className='ring';
  r.style.cssText=`left:${x}px;top:${y}px;border-color:${ringColor}`;
  c.appendChild(r);setTimeout(()=>r.remove(),500);

  const shardCount=golden?12:8;
  for(let i=0;i<shardCount;i++){
    const a=(i/shardCount)*Math.PI*2+Math.random()*.3;
    const dist=golden?80+Math.random()*60:50+Math.random()*50;
    const el=document.createElement('div');el.className='shard';
    el.textContent=golden?'⭐':CA[Math.floor(Math.random()*CA.length)];
    el.style.cssText=`left:${x}px;top:${y}px;font-size:${golden?18:14}px;--tx:${Math.cos(a)*dist}px;--ty:${Math.sin(a)*dist}px;--ro:${Math.random()*500-250}deg;--d:${(.4+Math.random()*.4)}s`;
    c.appendChild(el);setTimeout(()=>el.remove(),900);
  }
  for(let i=0;i<(golden?9:6);i++){
    const el=document.createElement('div');el.className='spk';
    el.textContent=golden?'🌟':SP[Math.floor(Math.random()*SP.length)];
    el.style.cssText=`left:${x+(Math.random()-.5)*80}px;top:${y+(Math.random()-.5)*80}px;animation-delay:${Math.random()*.2}s`;
    c.appendChild(el);setTimeout(()=>el.remove(),750);
  }
  const b=document.createElement('div');b.className='bigpop';
  b.style.cssText=`left:${x-22}px;top:${y-22}px;font-size:${golden?50:42}px`;
  b.textContent=emoji;c.appendChild(b);setTimeout(()=>b.remove(),700);

  if(golden){
    goldenSound();
    for(let i=0;i<8;i++){
      const el=document.createElement('div');el.className='golden-burst';
      const a=(i/8)*Math.PI*2;
      el.textContent='⭐';
      el.style.cssText=`left:${x}px;top:${y}px;--tx:${Math.cos(a)*120}px;--ty:${Math.sin(a)*120}px;animation-delay:${i*.04}s`;
      c.appendChild(el);setTimeout(()=>el.remove(),900);
    }
    screenShake();
  }
}

/* ===== MELT ===== */
function meltCandy(x,y,emoji){
  const c=cv();
  const el=document.createElement('div');el.className='melt';
  el.style.cssText=`left:${x-19}px;top:${y-19}px;font-size:38px`;
  el.textContent=emoji;c.appendChild(el);
  const p=document.createElement('div');p.className='puddle';
  p.style.cssText=`left:${x-13}px;top:${y+36}px;font-size:24px`;
  p.textContent='💧';c.appendChild(p);
  setTimeout(()=>{el.remove();p.remove();},1600);
}

/* ===== SCREEN SHAKE ===== */
function screenShake(){
  const g=document.getElementById('gc');
  g.classList.add('screen-shake');
  setTimeout(()=>g.classList.remove('screen-shake'),200);
}

/* ===== FEEDBACK ===== */
function fb(txt,col,y=215){
  const el=document.createElement('div');el.className='fbk';
  el.textContent=txt;
  el.style.cssText=`left:350px;top:${y}px;color:${col};text-shadow:0 2px 10px rgba(0,0,0,.6)`;
  cv().appendChild(el);setTimeout(()=>el.remove(),750);
}

/* ===== DROP ===== */
function spawnDrop(){
  if(da||over)return;
  const note=song.notes[ni];
  isGolden=Math.random()<GOLDEN_CHANCE;
  curE=isGolden?'🌟':CA[Math.floor(Math.random()*CA.length)];
  da=true;nh=false;lastMissed=false;

  const el=document.createElement('div');el.className='drop'+(isGolden?' golden':'');
  el.innerHTML=`<div class="cd">${curE}</div><div class="nl">${note}</div><div class="timing-arc"><div class="timing-fill" style="width:100%"></div></div>`;
  el.style.cssText='left:50%;transform:translateX(-50%);top:148px;position:absolute';
  cv().appendChild(el);dropEl=el;dY=148;

  glow(note,true);
  pn(FR[note],.22,'sine',.1);
  updateHints();

  const bpm=mode==='practice'?Math.round(song.bpm*.55):song.bpm;
  const ms=(60000/bpm)*2.0,st=Date.now(),sy=148,ty=470;
  const fill=el.querySelector('.timing-fill');
  const perfectMs=ms*.4; // top 40% of travel = perfect window

  function tick(){
    if(nh||over)return;
    const elapsed=Date.now()-st;
    const prog=Math.min(elapsed/ms,1);
    dY=sy+(ty-sy)*prog;
    if(el.parentNode)el.style.top=dY+'px';
    // timing arc: green while in perfect window, orange after
    if(fill){
      const pct=Math.max(0,1-prog)*100;
      fill.style.width=pct+'%';
      fill.style.background=elapsed<perfectMs?'#5dde7c':'#ff9a3c';
    }
    if(prog<1){raf=requestAnimationFrame(tick);}
    else{onMiss();}
  }
  raf=requestAnimationFrame(tick);
}

/* ===== KEY PRESS ===== */
function hk(note,k){
  if(!da||over)return;
  pn(FR[note],.48,'triangle',.3);
  k.classList.add('press');setTimeout(()=>k.classList.remove('press'),120);
  if(note===song.notes[ni])onHit(k);
  else onWrong(k);
}

/* ===== HIT ===== */
function onHit(k){
  nh=true;da=false;
  cancelAnimationFrame(raf);
  glow(song.notes[ni],false);
  k.classList.add('cf');setTimeout(()=>k.classList.remove('cf'),450);
  if(dropEl&&dropEl.parentNode)dropEl.remove();dropEl=null;

  // Check if perfect timing (was in perfect window)
  const isPerfect=dY<300; // upper portion of screen
  const pts=isGolden?50:isPerfect?15:10;
  combo++;streak++;score+=pts*(combo>1?Math.floor(combo/2)+1:1);

  if(isGolden){popCandy(350,dY+19,curE,true);}
  else{popCandy(350,dY+19,curE,false);}

  hp=Math.max(0,hp-Math.floor(100/song.notes.length));
  sHP();sSC();swing();

  if(streak>=5&&combo%5===0)screenShake();

  if(isGolden){fb('🌟 GOLDEN! +'+pts*Math.max(1,Math.floor(combo/2)+1),'#ffe14d');}
  else if(isPerfect&&combo>3){fb('✨ PERFECT COMBO! +'+pts*Math.max(1,Math.floor(combo/2)+1),'#5bc8ff');}
  else if(isPerfect){
    fb('🎯 PERFECT! +'+pts,'#5dde7c');
    const el=document.createElement('div');el.className='perfect-fx';
    el.textContent='PERFECT TIMING!';
    el.style.cssText=`left:350px;top:190px;`;
    cv().appendChild(el);setTimeout(()=>el.remove(),650);
  } else if(combo>3){fb(`🔥 x${combo} COMBO! +${pts*Math.max(1,Math.floor(combo/2)+1)}`,'#ff9a3c');}
  else if(combo>1){fb(`✨ GREAT! +${pts*Math.max(1,Math.floor(combo/2)+1)}`,'#5dde7c');}
  else{fb('🍬 POP! +'+pts,'#5dde7c');}

  ni++;rDots();updateHints();
  if(ni>=song.notes.length)setTimeout(win,500);
  else setTimeout(spawnDrop,700);
}

/* ===== WRONG ===== */
function onWrong(k){
  combo=0;streak=0;sSC();
  k.classList.add('wf');setTimeout(()=>k.classList.remove('wf'),280);
  const el=document.createElement('div');el.className='wrng-fx';
  el.textContent='❌';el.style.cssText=`left:350px;top:${dY-18}px`;
  cv().appendChild(el);setTimeout(()=>el.remove(),500);
  fb('Wrong note! 🎵','#ffe14d',dY-40);
  sadSound();
}

/* ===== MISS ===== */
function onMiss(){
  nh=true;da=false;
  glow(song.notes[ni],false);
  if(dropEl&&dropEl.parentNode)dropEl.remove();dropEl=null;
  meltCandy(350,dY+19,curE);
  combo=0;streak=0;lastMissed=true;sSC();rDots();
  fb('It melted! 💧','#5bc8ff');
  sadSound();
  setTimeout(spawnDrop,1200);
}

/* ===== SWING ===== */
function swing(){
  const p=document.getElementById('pi');
  const d=Math.random()>.5?'sl':'sr';
  p.classList.add(d);clearTimeout(swT);
  swT=setTimeout(()=>p.classList.remove(d),350);
}

/* ===== WIN ===== */
function calcStars(){
  const pct=score/(song.notes.length*15*3); // rough max
  if(pct>0.7)return 3;
  if(pct>0.45)return 2;
  return 1;
}

function win(){
  over=true;
  document.getElementById('pi').classList.add('boom');

  for(let i=0;i<22;i++)setTimeout(()=>popCandy(120+Math.random()*460,60+Math.random()*200,CA[Math.floor(Math.random()*CA.length)]),i*55);
  for(let i=0;i<36;i++){
    const el=document.createElement('div');el.className='conf';
    el.textContent=CE[Math.floor(Math.random()*CE.length)];
    el.style.cssText=`left:${80+Math.random()*540}px;top:${30+Math.random()*180}px;--ctx:${(Math.random()-.5)*360}px;--cty:${160+Math.random()*240}px;--cro:${Math.random()*800-400}deg;--cd:${.7+Math.random()*.8}s;--cdl:${i*.04}s`;
    cv().appendChild(el);setTimeout(()=>el.remove(),2000);
  }
  fanfare();

  const starCount=calcStars();
  const prevBest=saves.stars[song.id]||0;
  if(starCount>prevBest)saves.stars[song.id]=starCount;
  if(score>saves.hs)saves.hs=score;
  save();

  const newTotal=getTotalStars();
  let unlockMsg='';
  SONGS.forEach(s=>{
    if(s.locked&&(saves.stars[s.id]||0)===0&&newTotal>=(s.unlockStars||99)&&totalStars<(s.unlockStars||99)){
      unlockMsg=`🎉 Unlocked: ${s.em} ${s.n}!`;
    }
  });

  setTimeout(()=>{
    document.getElementById('rt').textContent=starCount===3?'🎉 PERFECT! 🎉':starCount===2?'🎊 Awesome! 🎊':'🍬 You did it!';
    document.getElementById('r-stars').textContent='⭐'.repeat(starCount)+'☆'.repeat(3-starCount);
    document.getElementById('rs').textContent=`You popped every candy in "${song.n}"!`;
    document.getElementById('rsc').textContent=`Score: ${score} | Best: ${saves.hs} 🏆`;
    document.getElementById('r-unlock').textContent=unlockMsg;
    document.getElementById('res').classList.add('show');
  },1600);
}

/* ===== GAME START ===== */
function go(idx){
  song=SONGS[idx];ni=0;score=0;combo=0;streak=0;hp=100;over=false;da=false;nh=false;lastMissed=false;
  currentPinata=PINATAS[Math.floor(Math.random()*PINATAS.length)];
  document.getElementById('sel').classList.remove('active');
  document.getElementById('game').classList.add('active');
  document.getElementById('res').classList.remove('show');
  document.getElementById('practice-lbl').style.display=mode==='practice'?'block':'none';
  const p=document.getElementById('pi');p.className='';p.textContent=currentPinata;
  cv().querySelectorAll('.drop,.shard,.ring,.spk,.bigpop,.melt,.puddle,.fbk,.wrng-fx,.conf,.golden-burst,.perfect-fx').forEach(e=>e.remove());
  stars();buildPiano();buildDots();sHP();sSC();rDots();
  setTimeout(spawnDrop,1000);
}

function replay(){if(song)go(song.id);}
function back(){
  cancelAnimationFrame(raf);
  if(dropEl){dropEl.remove();dropEl=null;}
  da=false;over=false;
  cv().querySelectorAll('.drop,.shard,.ring,.spk,.bigpop,.melt,.puddle,.fbk,.wrng-fx,.conf,.golden-burst,.perfect-fx').forEach(e=>e.remove());
  document.querySelectorAll('.key').forEach(k=>k.classList.remove('glow','cf','wf'));
  document.getElementById('game').classList.remove('active');
  document.getElementById('sel').classList.add('active');
  buildSelect();
}

/* ===== INIT ===== */
buildSelect();
</script>
