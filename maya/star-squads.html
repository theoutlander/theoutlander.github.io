<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Star Squads! 🚀</title>
<script>
(function(){
  function loadGA(){
    if (window.__gaLoaded) return;
    window.__gaLoaded = true;
    var s = document.createElement('script');
    s.async = true;
    s.src = 'https://www.googletagmanager.com/gtag/js?id=G-62FC7BDSGJ';
    document.head.appendChild(s);
    window.dataLayer = window.dataLayer || [];
    window.gtag = function(){ dataLayer.push(arguments); };
    gtag('js', new Date());
    gtag('config', 'G-62FC7BDSGJ', { anonymize_ip: true });
  }
  var consent = null;
  try { consent = localStorage.getItem('ga_consent'); } catch (e) {}
  if (consent === 'granted') {
    (window.requestIdleCallback || function(cb){ setTimeout(cb, 2000); })(loadGA);
  } else {
    window.addEventListener('click', function onFirst(){
      loadGA();
      window.removeEventListener('click', onFirst, { capture: false });
    }, { once: true, passive: true });
  }
})();
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#050818;touch-action:none;font-family:'Nunito',system-ui,sans-serif}
#game-container canvas{display:block}
</style>
</head>
<body>
<div id="game-container"></div>
<script src="https://cdn.jsdelivr.net/npm/phaser@4.1.0/dist/phaser.min.js"></script>
<script>
const GW = Math.max(320, window.innerWidth || 0);
const GH = Math.max(400, window.innerHeight || 0);

const TEAMS = {
  fed: { id: 'fed', name: 'Federation', emoji: '🌟', color: 0x5bc8ff, fill: '#5bc8ff', ship: '🛸' },
  kli: { id: 'kli', name: 'Klingons', emoji: '🔥', color: 0xff9a3c, fill: '#ff9a3c', ship: '🚀' },
};
const NEUTRAL = 0x8888aa;

const G = {
  team: 'fed',
  score: 0,
  lives: 3,
  reset() {
    Object.assign(this, { team: 'fed', score: 0, lives: 3 });
  },
};

let _actx;
function AC() { return _actx || (_actx = new (window.AudioContext || window.webkitAudioContext)()); }
function beep(freq, dur, type, vol) {
  try {
    const c = AC(), o = c.createOscillator(), g = c.createGain();
    o.connect(g); g.connect(c.destination);
    o.type = type || 'sine';
    o.frequency.value = freq;
    g.gain.setValueAtTime(vol == null ? 0.15 : vol, c.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + dur);
    o.start(); o.stop(c.currentTime + dur);
  } catch (e) {}
}

const FF_TITLE = '"Fredoka One", Arial, sans-serif';
const FF_BODY = '"Nunito", system-ui, Arial, sans-serif';

function fontPx(r) { return Math.max(12, Math.floor(Math.min(GW, GH) * r)); }
function fz(r) { return fontPx(r) + 'px'; }

function btnWidth(label, fsPx) {
  let w = 36;
  for (let i = 0; i < label.length; i++) {
    const cp = label.codePointAt(i);
    if (cp > 0xffff) { i++; w += fsPx * 1.15; continue; }
    w += cp > 0x2600 ? fsPx * 1.1 : fsPx * 0.52;
  }
  return Math.max(Math.ceil(w), 148);
}

function parseFs(fontSize) {
  if (typeof fontSize === 'number') return fontSize;
  return parseFloat(String(fontSize)) || fontPx(0.035);
}

function addRoundedBox(scene, x, y, w, h, radius, fill, fillAlpha, strokeCol, strokeAlpha) {
  const gx = x - w / 2;
  const gy = y - h / 2;
  const g = scene.add.graphics();
  g.fillStyle(fill, fillAlpha);
  g.fillRoundedRect(gx, gy, w, h, radius);
  if (strokeCol != null) {
    g.lineStyle(2, strokeCol, strokeAlpha == null ? 1 : strokeAlpha);
    g.strokeRoundedRect(gx, gy, w, h, radius);
  }
  return g;
}

function makeBtn(scene, x, y, label, fill, textCol, fontSize, cb, stroke) {
  const fsPx = parseFs(fontSize);
  const tw = btnWidth(label, fsPx);
  const th = Math.max(52, Math.ceil(fsPx * 1.75));
  const strokeCol = stroke == null ? 0x000000 : stroke;
  const btn = scene.add.rectangle(x, y, tw, th, fill, 1)
    .setStrokeStyle(3, strokeCol, 0.45)
    .setInteractive({ useHandCursor: true });
  const txt = scene.add.text(x, y, label, {
    fontFamily: FF_TITLE,
    fontSize: fsPx,
    fill: textCol,
  }).setOrigin(0.5);
  txt.setDepth(btn.depth + 1);
  const hit = () => { btn.on('pointerdown', cb); btn.on('pointerover', () => btn.setAlpha(0.88)); btn.on('pointerout', () => btn.setAlpha(1)); };
  hit();
  btn._label = txt;
  return btn;
}

function textStyle(sizeRatio, color, title) {
  return {
    fontFamily: title ? FF_TITLE : FF_BODY,
    fontSize: fz(sizeRatio),
    fill: color,
  };
}

function drawStars(scene) {
  for (let i = 0; i < 90; i++) {
    scene.add.circle(
      Phaser.Math.Between(0, GW),
      Phaser.Math.Between(0, GH),
      Phaser.Math.FloatBetween(0.4, 1.8),
      0xffffff,
      Phaser.Math.FloatBetween(0.15, 0.9)
    ).setDepth(0);
  }
}

// ═══════════════════════════════════════════════════════════
// MENU
// ═══════════════════════════════════════════════════════════
class MenuScene extends Phaser.Scene {
  constructor() { super('Menu'); }

  create() {
    G.reset();
    const cx = GW / 2;
    const g = this.add.graphics().setDepth(0);
    g.fillGradientStyle(0x0f0a1e, 0x0f0a1e, 0x050818, 0x1a1040, 1);
    g.fillRect(0, 0, GW, GH);
    drawStars(this);

    this.add.text(cx, GH * 0.09, '🚀', { fontSize: fz(0.11) }).setOrigin(0.5).setDepth(2);
    this.add.text(cx, GH * 0.2, 'Star Squads!', Object.assign(textStyle(0.068, '#ffe14d', true), {
      stroke: '#000', strokeThickness: 5,
    })).setOrigin(0.5).setDepth(2);
    this.add.text(cx, GH * 0.28, 'Team space battle!', textStyle(0.03, '#f0e6ff', false))
      .setOrigin(0.5).setDepth(2);

    const pw = Math.min(GW * 0.92, 420);
    const ph = Math.min(GH * 0.22, 200);
    const py = GH * 0.4;
    addRoundedBox(this, cx, py, pw, ph, 16, 0x1e1440, 0.94, 0xc77dff, 0.35).setDepth(1);
    [
      '🪐 Fly near planets to capture them',
      '💥 Shoot enemies or take all 3 planets',
      '🎮 Point at the sky to steer — hold to fly!',
    ].forEach((s, i) => {
      this.add.text(cx, py - ph * 0.32 + i * fontPx(0.038), s,
        Object.assign(textStyle(0.026, '#f0e6ff', false), {
          align: 'center',
          wordWrap: { width: pw - 40 },
          lineSpacing: 4,
        })).setOrigin(0.5).setDepth(2);
    });

    this.add.text(cx, GH * 0.56, 'Pick your team', textStyle(0.028, 'rgba(240,230,255,0.65)', false))
      .setOrigin(0.5).setDepth(2);

    const fs = fontPx(0.032);
    const fedLabel = '🌟 Federation';
    const kliLabel = '🔥 Klingons';
    const fedW = btnWidth(fedLabel, fs);
    const kliW = btnWidth(kliLabel, fs);
    const stackTeams = GW < 520;

    if (stackTeams) {
      this.fedBtn = makeBtn(this, cx, GH * 0.62, fedLabel, 0x5bc8ff, '#050818', fs, () => this.pickTeam('fed'), 0x3a8ab0);
      this.kliBtn = makeBtn(this, cx, GH * 0.7, kliLabel, 0xff9a3c, '#050818', fs, () => this.pickTeam('kli'), 0xc06020);
    } else {
      const gap = 14;
      const total = fedW + kliW + gap;
      this.fedBtn = makeBtn(this, cx - total / 2 + fedW / 2, GH * 0.65, fedLabel, 0x5bc8ff, '#050818', fs, () => this.pickTeam('fed'), 0x3a8ab0);
      this.kliBtn = makeBtn(this, cx + total / 2 - kliW / 2, GH * 0.65, kliLabel, 0xff9a3c, '#050818', fs, () => this.pickTeam('kli'), 0xc06020);
    }
    this.highlightTeam(G.team);

    makeBtn(this, cx, GH * 0.84, 'Launch! 🚀', 0xffe14d, '#050818', fontPx(0.04), () => {
      beep(520, 0.12, 'square', 0.2);
      this.scene.start('Play');
    }, 0xcc9900);
  }

  pickTeam(id) {
    G.team = id;
    beep(id === 'fed' ? 440 : 330, 0.08, 'sine', 0.15);
    this.highlightTeam(id);
  }

  highlightTeam(id) {
    this.fedBtn.setStrokeStyle(id === 'fed' ? 4 : 2, 0xffffff, id === 'fed' ? 1 : 0.25);
    this.kliBtn.setStrokeStyle(id === 'kli' ? 4 : 2, 0xffffff, id === 'kli' ? 1 : 0.25);
    this.fedBtn.setAlpha(id === 'fed' ? 1 : 0.72);
    this.kliBtn.setAlpha(id === 'kli' ? 1 : 0.72);
  }
}

// ═══════════════════════════════════════════════════════════
// PLAY
// ═══════════════════════════════════════════════════════════
class PlayScene extends Phaser.Scene {
  constructor() { super('Play'); }

  create() {
    this.myTeam = TEAMS[G.team];
    this.enemyTeam = G.team === 'fed' ? TEAMS.kli : TEAMS.fed;
    this.score = 0;
    this.fireCd = 0;
    this.thrusting = false;
    this.rotL = false;
    this.rotR = false;
    this.pointerThrust = false;
    this.invuln = 0;
    this.gameOver = false;
    this.controlBarH = Math.max(108, GH * 0.24);
    this.playZoneBottom = GH - this.controlBarH;

    this.physics.world.setBounds(0, 0, GW, GH);
    drawStars(this);

    // Planets
    this.planetData = [
      { x: GW * 0.2, y: GH * 0.35, owner: null, cap: 0 },
      { x: GW * 0.8, y: GH * 0.35, owner: null, cap: 0 },
      { x: GW * 0.5, y: GH * 0.55, owner: null, cap: 0 },
    ];
    this.planetGfx = [];
    this.planetData.forEach((p, i) => {
      const ring = this.add.circle(p.x, p.y, 42, NEUTRAL, 0.25).setDepth(2);
      const core = this.add.circle(p.x, p.y, 28, NEUTRAL, 0.85).setDepth(3);
      const label = this.add.text(p.x, p.y, '🪐', { fontSize: fz(0.045) }).setOrigin(0.5).setDepth(4);
      this.planetGfx.push({ ring, core, label, data: p });
    });

    // Asteroids
    this.asteroids = this.physics.add.staticGroup();
    const astPos = [
      [GW * 0.35, GH * 0.22], [GW * 0.65, GH * 0.22],
      [GW * 0.15, GH * 0.65], [GW * 0.85, GH * 0.65], [GW * 0.5, GH * 0.78],
    ];
    astPos.forEach(([ax, ay]) => {
      const r = Phaser.Math.Between(18, 32);
      const g = this.add.circle(ax, ay, r, 0x6b5a4a, 1).setDepth(1);
      this.physics.add.existing(g, true);
      g.body.setCircle(r);
      g.setData('r', r);
      this.asteroids.add(g);
    });

    // Player ship
    this.player = this.add.text(GW * 0.5, this.playZoneBottom * 0.55, this.myTeam.ship, { fontSize: fz(0.065) })
      .setOrigin(0.5).setDepth(10);
    this.physics.add.existing(this.player);
    this.player.body.setCircle(22);
    this.player.body.setCollideWorldBounds(true);
    this.player.body.setBounce(0.35);
    this.player.body.setDrag(28);
    this.player.body.setMaxVelocity(340);
    this.player.angle = -90;
    this.playerHp = 100;

    // Enemies
    this.enemies = [];
    const spawns = [
      [GW * 0.12, GH * 0.15], [GW * 0.88, GH * 0.15],
      [GW * 0.12, GH * 0.5], [GW * 0.88, GH * 0.5],
    ];
    spawns.forEach(([ex, ey]) => {
      const e = this.add.text(ex, ey, this.enemyTeam.ship, { fontSize: fz(0.055) })
        .setOrigin(0.5).setDepth(9);
      this.physics.add.existing(e);
      e.body.setCircle(20);
      e.body.setCollideWorldBounds(true);
      e.body.setBounce(0.3);
      e.body.setDrag(30);
      e.body.setMaxVelocity(220);
      e.setData('hp', 60);
      e.setData('fireCd', Phaser.Math.Between(0, 40));
      this.enemies.push(e);
    });

    // Bullets
    this.bullets = this.physics.add.group({
      defaultKey: 'bullet',
      maxSize: 40,
      runChildUpdate: false,
    });

    this.physics.add.collider(this.player, this.asteroids);
    this.enemies.forEach((e) => this.physics.add.collider(e, this.asteroids));
    this.physics.add.collider(this.player, this.enemies, null, () => false);

    // HUD
    this.hudTeam = this.add.text(14, 12, this.myTeam.emoji + ' ' + this.myTeam.name,
      textStyle(0.028, this.myTeam.fill, true)).setDepth(50);
    this.hudPlanets = this.add.text(14, 38, '🪐 0 / 3', textStyle(0.024, '#f0e6ff', false)).setDepth(50);
    this.hudEnemies = this.add.text(14, 62, '💥 Enemies: 4', textStyle(0.024, '#f0e6ff', false)).setDepth(50);
    this.hudLives = this.add.text(GW - 14, 12, '❤️'.repeat(G.lives),
      { fontFamily: 'Nunito', fontSize: fz(0.028) }).setOrigin(1, 0).setDepth(50);
    this.hudHp = this.add.graphics().setDepth(50);
    this.drawHpBar();

    this.buildTouchControls();
    this.setupPointerFlight();
    this.cursors = this.input.keyboard.createCursorKeys();
    this.keyFire = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.SPACE);
    this.keyW = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.W);
    this.keyA = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.A);
    this.keyD = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.D);

    this.cameras.main.setBackgroundColor(0x050818);
  }

  inPlayZone(p) {
    return p && p.y < this.playZoneBottom - 8;
  }

  aimAt(x, y) {
    const target = Phaser.Math.RadToDeg(Math.atan2(y - this.player.y, x - this.player.x)) - 90;
    let diff = target - this.player.angle;
    while (diff > 180) diff -= 360;
    while (diff < -180) diff += 360;
    if (Math.abs(diff) > 120) this.player.angle = target;
    else this.player.angle += diff * 0.35;
  }

  setupPointerFlight() {
    const stopSkyThrust = () => { this.pointerThrust = false; };
    this.input.on('pointermove', (p) => {
      if (this.gameOver || !this.inPlayZone(p)) return;
      this.aimAt(p.x, p.y);
      if (p.isDown) this.pointerThrust = true;
    });
    this.input.on('pointerdown', (p) => {
      if (this.gameOver) return;
      if (this.inPlayZone(p)) {
        this.aimAt(p.x, p.y);
        this.pointerThrust = true;
      }
    });
    this.input.on('pointerup', stopSkyThrust);
    this.input.on('pointerupoutside', stopSkyThrust);
  }

  drawHpBar() {
    const w = Math.min(120, GW * 0.3);
    const x = GW - w - 14;
    const y = 42;
    this.hudHp.clear();
    this.hudHp.fillStyle(0x1a0a3c, 0.9);
    this.hudHp.fillRoundedRect(x, y, w, 10, 4);
    this.hudHp.fillStyle(this.playerHp > 30 ? 0x5dffb0 : 0xff5a5a, 1);
    this.hudHp.fillRoundedRect(x, y, w * (this.playerHp / 100), 10, 4);
  }

  buildTouchControls() {
    const barH = this.controlBarH;
    const y = GH - barH * 0.42;
    const sz = Math.max(56, Math.min(68, barH * 0.38));

    this.add.rectangle(GW / 2, GH - barH / 2, GW, barH, 0x0f0a1e, 0.82).setDepth(58);

    this.add.text(GW / 2, GH - barH + fontPx(0.022),
      '👆 Point & hold the sky to fly  ·  💥 to shoot',
      Object.assign(textStyle(0.02, 'rgba(240,230,255,0.5)', false), { align: 'center' }))
      .setOrigin(0.5).setDepth(62);

    const holdBtn = (x, label, col, onDown, onUp) => {
      const hit = Math.max(sz + 12, 64);
      const b = this.add.circle(x, y, sz, col, 0.4).setStrokeStyle(3, col, 0.95).setDepth(60)
        .setInteractive(new Phaser.Geom.Circle(0, 0, hit), Phaser.Geom.Circle.Contains);
      this.add.text(x, y, label, { fontSize: fz(0.034) }).setOrigin(0.5).setDepth(61);
      const stop = (p) => { if (p.event && p.event.stopPropagation) p.event.stopPropagation(); };
      b.on('pointerdown', (p) => { stop(p); onDown(); });
      b.on('pointerup', (p) => { stop(p); onUp(); });
      b.on('pointerout', (p) => { stop(p); onUp(); });
      return b;
    };

    holdBtn(GW * 0.16, '◀', 0x3a2a5c, () => { this.rotL = true; }, () => { this.rotL = false; });
    holdBtn(GW * 0.34, '▶', 0x3a2a5c, () => { this.rotR = true; }, () => { this.rotR = false; });
    holdBtn(GW * 0.52, '🚀', 0x5dffb0, () => { this.thrusting = true; }, () => { this.thrusting = false; });

    const fireHit = Math.max(sz + 14, 68);
    const fireBtn = this.add.circle(GW * 0.78, y, sz, 0xff6eb4, 0.4)
      .setStrokeStyle(3, 0xff6eb4, 0.95).setDepth(60)
      .setInteractive(new Phaser.Geom.Circle(0, 0, fireHit), Phaser.Geom.Circle.Contains);
    this.add.text(GW * 0.78, y, '💥', { fontSize: fz(0.038) }).setOrigin(0.5).setDepth(61);
    fireBtn.on('pointerdown', (p) => {
      if (p.event && p.event.stopPropagation) p.event.stopPropagation();
      this.tryFire(this.player, this.myTeam, true);
    });
  }

  update(time, delta) {
    if (this.gameOver) return;
    const dt = delta / 1000;

    if (this.invuln > 0) this.invuln -= delta;
    if (this.fireCd > 0) this.fireCd -= delta;

    const rot = 260 * dt;
    if (this.rotL || this.cursors.left.isDown || this.keyA.isDown) this.player.angle -= rot;
    if (this.rotR || this.cursors.right.isDown || this.keyD.isDown) this.player.angle += rot;

    const thrust = this.thrusting || this.pointerThrust
      || this.cursors.up.isDown || this.keyW.isDown;
    if (thrust) {
      const rad = Phaser.Math.DegToRad(this.player.angle + 90);
      this.player.body.velocity.x += Math.cos(rad) * 520 * dt;
      this.player.body.velocity.y += Math.sin(rad) * 520 * dt;
    }

    if (this.keyFire.isDown) this.tryFire(this.player, this.myTeam, true);

    this.updateEnemies(dt);
    this.updateBullets();
    this.updatePlanets(dt);
    this.updateHud();
    this.checkWin();
  }

  tryFire(ship, team, isPlayer) {
    if (this.gameOver) return;
    const cd = isPlayer ? this.fireCd : ship.getData('fireCd');
    if (cd > 0) return;
    const rad = Phaser.Math.DegToRad(ship.angle + 90);
    const bx = ship.x + Math.cos(rad) * 28;
    const by = ship.y + Math.sin(rad) * 28;
    const b = this.add.circle(bx, by, 5, team.color, 1).setDepth(8);
    this.physics.add.existing(b);
    b.body.setCircle(5);
    b.body.setVelocity(Math.cos(rad) * 380, Math.sin(rad) * 380);
    b.setData('team', team.id);
    b.setData('fromPlayer', isPlayer);
    this.bullets.add(b);
    beep(isPlayer ? 680 : 420, 0.05, 'square', 0.1);
    if (isPlayer) this.fireCd = 280;
    else ship.setData('fireCd', 700);
  }

  updateEnemies(dt) {
    const px = this.player.x;
    const py = this.player.y;
    this.enemies.forEach((e) => {
      if (!e.active) return;
      const ang = Phaser.Math.Angle.Between(e.x, e.y, px, py);
      const deg = Phaser.Math.RadToDeg(ang) - 90;
      let diff = deg - e.angle;
      while (diff > 180) diff -= 360;
      while (diff < -180) diff += 360;
      e.angle += Phaser.Math.Clamp(diff, -120 * dt, 120 * dt);

      const dist = Phaser.Math.Distance.Between(e.x, e.y, px, py);
      if (dist > 90) {
        const rad = Phaser.Math.DegToRad(e.angle + 90);
        e.body.velocity.x += Math.cos(rad) * 180 * dt;
        e.body.velocity.y += Math.sin(rad) * 180 * dt;
      }

      let cd = e.getData('fireCd') - dt * 1000;
      if (cd <= 0 && dist < 320 && Math.abs(diff) < 25) {
        this.tryFire(e, this.enemyTeam, false);
        cd = 900 + Math.random() * 400;
      }
      e.setData('fireCd', cd);
    });
  }

  updateBullets() {
    const toRemove = [];
    this.bullets.getChildren().forEach((b) => {
      if (!b.active) return;
      if (b.x < -20 || b.x > GW + 20 || b.y < -20 || b.y > GH + 20) {
        toRemove.push(b);
        return;
      }
      const fromPlayer = b.getData('fromPlayer');
      const team = b.getData('team');

      this.asteroids.getChildren().forEach((a) => {
        if (Phaser.Math.Distance.Between(b.x, b.y, a.x, a.y) < a.getData('r') + 6) {
          toRemove.push(b);
        }
      });

      if (fromPlayer) {
        this.enemies.forEach((e) => {
          if (!e.active) return;
          if (Phaser.Math.Distance.Between(b.x, b.y, e.x, e.y) < 26) {
            this.hitEnemy(e);
            toRemove.push(b);
          }
        });
      } else if (team !== G.team && this.invuln <= 0) {
        if (Phaser.Math.Distance.Between(b.x, b.y, this.player.x, this.player.y) < 24) {
          this.hitPlayer(12);
          toRemove.push(b);
        }
      }
    });
    toRemove.forEach((b) => b.destroy());
  }

  hitEnemy(e) {
    const hp = e.getData('hp') - 30;
    beep(200, 0.08, 'sawtooth', 0.12);
    if (hp <= 0) {
      e.destroy();
      this.score += 100;
      G.score += 100;
      beep(880, 0.15, 'sine', 0.18);
      const idx = this.enemies.indexOf(e);
      if (idx >= 0) this.enemies.splice(idx, 1);
    } else {
      e.setData('hp', hp);
      e.setTint(0xffaaaa);
      this.time.delayedCall(80, () => { if (e.active) e.clearTint(); });
      const ang = Phaser.Math.Angle.Between(this.player.x, this.player.y, e.x, e.y);
      e.body.velocity.x += Math.cos(ang) * 120;
      e.body.velocity.y += Math.sin(ang) * 120;
    }
  }

  hitPlayer(dmg) {
    this.playerHp -= dmg;
    this.invuln = 1200;
    this.player.setAlpha(0.5);
    this.time.delayedCall(200, () => {
      if (this.player.active) this.player.setAlpha(1);
    });
    beep(150, 0.12, 'sawtooth', 0.2);
    this.drawHpBar();
    if (this.playerHp <= 0) {
      G.lives--;
      if (G.lives <= 0) {
        this.endGame(false);
        return;
      }
      this.playerHp = 100;
      this.player.x = GW * 0.5;
      this.player.y = this.playZoneBottom * 0.55;
      this.player.body.velocity.set(0);
      this.invuln = 2000;
      this.hudLives.setText('❤️'.repeat(G.lives));
      beep(330, 0.2, 'sine', 0.15);
    }
  }

  updatePlanets(dt) {
    const capSpeed = 0.45;
    const px = this.player.x;
    const py = this.player.y;

    this.planetGfx.forEach((pg) => {
      const p = pg.data;
      const dist = Phaser.Math.Distance.Between(px, py, p.x, p.y);
      const capturing = dist < 58;

      if (capturing) {
        if (p.owner !== G.team) {
          p.cap += capSpeed * dt;
          if (p.cap >= 1) {
            p.owner = G.team;
            p.cap = 1;
            beep(660, 0.2, 'sine', 0.2);
            this.score += 200;
            G.score += 200;
          }
        }
      } else if (p.owner === G.team) {
        p.cap = Math.max(p.cap, 1);
      } else if (p.owner && p.owner !== G.team) {
        p.cap = 1;
      } else {
        p.cap = Math.max(0, p.cap - capSpeed * 0.3 * dt);
      }

      const col = p.owner === G.team ? this.myTeam.color
        : p.owner === this.enemyTeam.id ? this.enemyTeam.color
          : NEUTRAL;
      const alpha = p.owner ? 0.9 : 0.5 + p.cap * 0.4;
      pg.core.setFillStyle(col, alpha);
      pg.ring.setFillStyle(col, 0.2 + (p.cap || 0) * 0.25);
      pg.ring.setRadius(38 + (p.cap || 0) * 8);
    });
  }

  updateHud() {
    const owned = this.planetData.filter((p) => p.owner === G.team).length;
    this.hudPlanets.setText('🪐 ' + owned + ' / 3');
    const alive = this.enemies.filter((e) => e.active).length;
    this.hudEnemies.setText('💥 Enemies: ' + alive);
    this.drawHpBar();
  }

  checkWin() {
    const owned = this.planetData.filter((p) => p.owner === G.team).length;
    const alive = this.enemies.filter((e) => e.active).length;
    if (owned >= 3 || alive === 0) this.endGame(true);
  }

  endGame(won) {
    if (this.gameOver) return;
    this.gameOver = true;
    if (won) {
      beep(523, 0.1, 'sine', 0.2);
      this.time.delayedCall(120, () => beep(659, 0.1, 'sine', 0.2));
      this.time.delayedCall(240, () => beep(784, 0.2, 'sine', 0.25));
    }
    this.scene.start('End', { won, score: this.score });
  }
}

// ═══════════════════════════════════════════════════════════
// END
// ═══════════════════════════════════════════════════════════
class EndScene extends Phaser.Scene {
  constructor() { super('End'); }

  init(data) {
    this.won = data.won;
    this.score = data.score || 0;
  }

  create() {
    drawStars(this);
    const cx = GW / 2;
    const cy = GH / 2;

    this.add.text(cx, cy - GH * 0.12, this.won ? '🏆' : '💫',
      { fontSize: fz(0.12) }).setOrigin(0.5);
    this.add.text(cx, cy - GH * 0.02, this.won ? 'Your squad wins!' : 'Mission over',
      Object.assign(textStyle(0.065, this.won ? '#ffe14d' : '#ff6eb4', true), { stroke: '#000', strokeThickness: 4 }))
      .setOrigin(0.5);
    this.add.text(cx, cy + GH * 0.08, 'Score: ' + this.score, textStyle(0.04, '#f0e6ff', false)).setOrigin(0.5);

    if (this.won) {
      this.add.text(cx, cy + GH * 0.16, TEAMS[G.team].emoji + ' ' + TEAMS[G.team].name + ' rules the galaxy!',
        textStyle(0.028, TEAMS[G.team].fill, false)).setOrigin(0.5);
    }

    const fs = fontPx(0.033);
    const againW = btnWidth('Play Again 🚀', fs);
    const menuW = btnWidth('Menu 🌌', fs);
    const gap = 12;
    const total = againW + menuW + gap;
    makeBtn(this, cx - total / 2 + againW / 2, cy + GH * 0.28, 'Play Again 🚀', 0xffe14d, '#050818', fs, () => {
      G.lives = 3;
      G.score = 0;
      this.scene.start('Play');
    }, 0xcc9900);
    makeBtn(this, cx + total / 2 - menuW / 2, cy + GH * 0.28, 'Menu 🌌', 0x3a2a5c, '#f0e6ff', fs, () => this.scene.start('Menu'), 0x5a4a7c);
  }
}

function bootPhaser() {
  new Phaser.Game({
    type: Phaser.AUTO,
    width: GW,
    height: GH,
    backgroundColor: '#050818',
    parent: 'game-container',
    physics: {
      default: 'arcade',
      arcade: { debug: false },
    },
    scene: [MenuScene, PlayScene, EndScene],
    scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH },
    input: { touch: true, mouse: true, activePointers: 6 },
  });
}

function waitForFonts(done) {
  let called = false;
  const finish = () => { if (!called) { called = true; done(); } };
  if (document.fonts && document.fonts.load) {
    Promise.all([
      document.fonts.load('16px "Fredoka One"'),
      document.fonts.load('16px "Nunito"'),
    ]).then(finish).catch(finish);
    document.fonts.ready.then(finish).catch(finish);
    setTimeout(finish, 1200);
    return;
  }
  setTimeout(finish, 500);
}

waitForFonts(bootPhaser);
</script>
