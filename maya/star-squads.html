<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Star Squads! 🚀</title>
<script>
(function(){
  function loadGA(){
    if (window.__gaLoaded) return;
    window.__gaLoaded = true;
    var s = document.createElement('script');
    s.async = true;
    s.src = 'https://www.googletagmanager.com/gtag/js?id=G-62FC7BDSGJ';
    document.head.appendChild(s);
    window.dataLayer = window.dataLayer || [];
    window.gtag = function(){ dataLayer.push(arguments); };
    gtag('js', new Date());
    gtag('config', 'G-62FC7BDSGJ', { anonymize_ip: true });
  }
  var consent = null;
  try { consent = localStorage.getItem('ga_consent'); } catch (e) {}
  if (consent === 'granted') {
    (window.requestIdleCallback || function(cb){ setTimeout(cb, 2000); })(loadGA);
  } else {
    window.addEventListener('click', function onFirst(){
      loadGA();
      window.removeEventListener('click', onFirst, { capture: false });
    }, { once: true, passive: true });
  }
})();
</script>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#050818;touch-action:none}
#game-container canvas{display:block}
</style>
</head>
<body>
<div id="game-container"></div>
<script src="https://cdn.jsdelivr.net/npm/phaser@4.1.0/dist/phaser.min.js"></script>
<script>
const GW = Math.max(320, window.innerWidth || 0);
const GH = Math.max(400, window.innerHeight || 0);

const TEAMS = {
  fed: { id: 'fed', name: 'Federation', emoji: '🌟', color: 0x5bc8ff, fill: '#5bc8ff', ship: '🛸' },
  kli: { id: 'kli', name: 'Klingons', emoji: '🔥', color: 0xff9a3c, fill: '#ff9a3c', ship: '🚀' },
};
const NEUTRAL = 0x8888aa;

const G = {
  team: 'fed',
  score: 0,
  lives: 3,
  reset() {
    Object.assign(this, { team: 'fed', score: 0, lives: 3 });
  },
};

let _actx;
function AC() { return _actx || (_actx = new (window.AudioContext || window.webkitAudioContext)()); }
function beep(freq, dur, type, vol) {
  try {
    const c = AC(), o = c.createOscillator(), g = c.createGain();
    o.connect(g); g.connect(c.destination);
    o.type = type || 'sine';
    o.frequency.value = freq;
    g.gain.setValueAtTime(vol == null ? 0.15 : vol, c.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + dur);
    o.start(); o.stop(c.currentTime + dur);
  } catch (e) {}
}

function fz(r) { return Math.floor(Math.min(GW, GH) * r) + 'px'; }

function makeBtn(scene, x, y, label, fill, textCol, fontSize, cb, stroke) {
  const fsNum = typeof fontSize === 'number' ? fontSize : parseFloat(String(fontSize)) || 24;
  const tw = Math.max(label.length * fsNum * 0.5 + 24, 120);
  const th = 52;
  const btn = scene.add.rectangle(x, y, tw, th, fill)
    .setStrokeStyle(3, stroke || 0x000000, 0.4)
    .setInteractive({ useHandCursor: true });
  scene.add.text(x, y, label, { fontFamily: 'Fredoka One', fontSize, fill: textCol }).setOrigin(0.5);
  btn.on('pointerdown', cb);
  btn.on('pointerover', () => btn.setAlpha(0.85));
  btn.on('pointerout', () => btn.setAlpha(1));
  return btn;
}

function drawStars(scene) {
  for (let i = 0; i < 90; i++) {
    scene.add.circle(
      Phaser.Math.Between(0, GW),
      Phaser.Math.Between(0, GH),
      Phaser.Math.FloatBetween(0.4, 1.8),
      0xffffff,
      Phaser.Math.FloatBetween(0.15, 0.9)
    ).setDepth(0);
  }
}

// ═══════════════════════════════════════════════════════════
// MENU
// ═══════════════════════════════════════════════════════════
class MenuScene extends Phaser.Scene {
  constructor() { super('Menu'); }

  create() {
    G.reset();
    drawStars(this);
    const cx = GW / 2;

    this.add.text(cx, GH * 0.1, '🌌', { fontSize: fz(0.1) }).setOrigin(0.5);
    this.add.text(cx, GH * 0.22, 'Star Squads!',
      { fontFamily: 'Fredoka One', fontSize: fz(0.07), fill: '#ffe14d', stroke: '#000', strokeThickness: 4 })
      .setOrigin(0.5);
    this.add.text(cx, GH * 0.3, 'Team space battle!',
      { fontFamily: 'Nunito', fontSize: fz(0.028), fill: '#f0e6ff' }).setOrigin(0.5);

    const pw = Math.min(GW * 0.9, 400);
    const panel = this.add.rectangle(cx, GH * 0.44, pw, GH * 0.2, 0x1a0a3c, 0.92).setStrokeStyle(2, 0x3a2a5c);
    [
      '🪐 Fly near planets to capture them for your team',
      '💥 Shoot enemy ships — capture all planets OR wipe them out!',
      '🎮 Rotate, thrust, and blast like classic space games',
    ].forEach((s, i) => {
      this.add.text(cx, GH * 0.36 + i * GH * 0.055, s,
        { fontFamily: 'Nunito', fontSize: fz(0.024), fill: '#f0e6ff', align: 'center', wordWrap: { width: pw - 28 } })
        .setOrigin(0.5);
    });

    this.add.text(cx, GH * 0.58, 'Pick your team:', { fontFamily: 'Nunito', fontSize: fz(0.026), fill: 'rgba(255,255,255,.6)' }).setOrigin(0.5);

    const bw = Math.min(GW * 0.38, 160);
    this.fedBtn = makeBtn(this, cx - bw * 0.55, GH * 0.66, '🌟 Federation', 0x5bc8ff, '#050818', fz(0.028), () => this.pickTeam('fed'));
    this.kliBtn = makeBtn(this, cx + bw * 0.55, GH * 0.66, '🔥 Klingons', 0xff9a3c, '#050818', fz(0.028), () => this.pickTeam('kli'));
    this.highlightTeam(G.team);

    makeBtn(this, cx, GH * 0.82, 'Launch! 🚀', 0xffe14d, '#050818', fz(0.04), () => {
      beep(520, 0.12, 'square', 0.2);
      this.scene.start('Play');
    });
  }

  pickTeam(id) {
    G.team = id;
    beep(id === 'fed' ? 440 : 330, 0.08, 'sine', 0.15);
    this.highlightTeam(id);
  }

  highlightTeam(id) {
    this.fedBtn.setStrokeStyle(id === 'fed' ? 4 : 2, 0xffffff, id === 'fed' ? 1 : 0.3);
    this.kliBtn.setStrokeStyle(id === 'kli' ? 4 : 2, 0xffffff, id === 'kli' ? 1 : 0.3);
  }
}

// ═══════════════════════════════════════════════════════════
// PLAY
// ═══════════════════════════════════════════════════════════
class PlayScene extends Phaser.Scene {
  constructor() { super('Play'); }

  create() {
    this.myTeam = TEAMS[G.team];
    this.enemyTeam = G.team === 'fed' ? TEAMS.kli : TEAMS.fed;
    this.score = 0;
    this.fireCd = 0;
    this.thrusting = false;
    this.invuln = 0;
    this.gameOver = false;

    this.physics.world.setBounds(0, 0, GW, GH);
    drawStars(this);

    // Planets
    this.planetData = [
      { x: GW * 0.2, y: GH * 0.35, owner: null, cap: 0 },
      { x: GW * 0.8, y: GH * 0.35, owner: null, cap: 0 },
      { x: GW * 0.5, y: GH * 0.55, owner: null, cap: 0 },
    ];
    this.planetGfx = [];
    this.planetData.forEach((p, i) => {
      const ring = this.add.circle(p.x, p.y, 42, NEUTRAL, 0.25).setDepth(2);
      const core = this.add.circle(p.x, p.y, 28, NEUTRAL, 0.85).setDepth(3);
      const label = this.add.text(p.x, p.y, '🪐', { fontSize: fz(0.045) }).setOrigin(0.5).setDepth(4);
      this.planetGfx.push({ ring, core, label, data: p });
    });

    // Asteroids
    this.asteroids = this.physics.add.staticGroup();
    const astPos = [
      [GW * 0.35, GH * 0.22], [GW * 0.65, GH * 0.22],
      [GW * 0.15, GH * 0.65], [GW * 0.85, GH * 0.65], [GW * 0.5, GH * 0.78],
    ];
    astPos.forEach(([ax, ay]) => {
      const r = Phaser.Math.Between(18, 32);
      const g = this.add.circle(ax, ay, r, 0x6b5a4a, 1).setDepth(1);
      this.physics.add.existing(g, true);
      g.body.setCircle(r);
      g.setData('r', r);
      this.asteroids.add(g);
    });

    // Player ship
    this.player = this.add.text(GW * 0.5, GH * 0.75, this.myTeam.ship, { fontSize: fz(0.065) })
      .setOrigin(0.5).setDepth(10);
    this.physics.add.existing(this.player);
    this.player.body.setCircle(22);
    this.player.body.setCollideWorldBounds(true);
    this.player.body.setBounce(0.35);
    this.player.body.setDrag(40);
    this.player.body.setMaxVelocity(280);
    this.player.angle = -90;
    this.playerHp = 100;

    // Enemies
    this.enemies = [];
    const spawns = [
      [GW * 0.12, GH * 0.15], [GW * 0.88, GH * 0.15],
      [GW * 0.12, GH * 0.5], [GW * 0.88, GH * 0.5],
    ];
    spawns.forEach(([ex, ey]) => {
      const e = this.add.text(ex, ey, this.enemyTeam.ship, { fontSize: fz(0.055) })
        .setOrigin(0.5).setDepth(9);
      this.physics.add.existing(e);
      e.body.setCircle(20);
      e.body.setCollideWorldBounds(true);
      e.body.setBounce(0.3);
      e.body.setDrag(30);
      e.body.setMaxVelocity(220);
      e.setData('hp', 60);
      e.setData('fireCd', Phaser.Math.Between(0, 40));
      this.enemies.push(e);
    });

    // Bullets
    this.bullets = this.physics.add.group({
      defaultKey: 'bullet',
      maxSize: 40,
      runChildUpdate: false,
    });

    this.physics.add.collider(this.player, this.asteroids);
    this.enemies.forEach((e) => this.physics.add.collider(e, this.asteroids));
    this.physics.add.collider(this.player, this.enemies, null, () => false);

    // HUD
    this.hudTeam = this.add.text(14, 12, this.myTeam.emoji + ' ' + this.myTeam.name,
      { fontFamily: 'Fredoka One', fontSize: fz(0.028), fill: this.myTeam.fill }).setDepth(50);
    this.hudPlanets = this.add.text(14, 38, '🪐 0 / 3',
      { fontFamily: 'Nunito', fontSize: fz(0.024), fill: '#f0e6ff' }).setDepth(50);
    this.hudEnemies = this.add.text(14, 62, '💥 Enemies: 4',
      { fontFamily: 'Nunito', fontSize: fz(0.024), fill: '#f0e6ff' }).setDepth(50);
    this.hudLives = this.add.text(GW - 14, 12, '❤️'.repeat(G.lives),
      { fontFamily: 'Nunito', fontSize: fz(0.028) }).setOrigin(1, 0).setDepth(50);
    this.hudHp = this.add.graphics().setDepth(50);
    this.drawHpBar();

    this.buildTouchControls();
    this.cursors = this.input.keyboard.createCursorKeys();
    this.keyFire = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.SPACE);

    this.cameras.main.setBackgroundColor(0x050818);
  }

  drawHpBar() {
    const w = Math.min(120, GW * 0.3);
    const x = GW - w - 14;
    const y = 42;
    this.hudHp.clear();
    this.hudHp.fillStyle(0x1a0a3c, 0.9);
    this.hudHp.fillRoundedRect(x, y, w, 10, 4);
    this.hudHp.fillStyle(this.playerHp > 30 ? 0x5dffb0 : 0xff5a5a, 1);
    this.hudHp.fillRoundedRect(x, y, w * (this.playerHp / 100), 10, 4);
  }

  buildTouchControls() {
    const y = GH - 56;
    const sz = 52;
    const holdBtn = (x, label, col, onDown, onUp) => {
      const b = this.add.circle(x, y, sz, col, 0.35).setStrokeStyle(3, col, 0.9).setDepth(60).setInteractive();
      this.add.text(x, y, label, { fontSize: fz(0.032) }).setOrigin(0.5).setDepth(61);
      b.on('pointerdown', onDown);
      b.on('pointerup', onUp);
      b.on('pointerout', onUp);
      return b;
    };
    this.rotL = false;
    this.rotR = false;
    holdBtn(GW * 0.18, '◀', 0x3a2a5c, () => { this.rotL = true; }, () => { this.rotL = false; });
    holdBtn(GW * 0.38, '▶', 0x3a2a5c, () => { this.rotR = true; }, () => { this.rotR = false; });
    holdBtn(GW * 0.82, '🚀', 0x5dffb0, () => { this.thrusting = true; }, () => { this.thrusting = false; });
    const fireBtn = this.add.circle(GW * 0.62, y, sz, 0xff6eb4, 0.35).setStrokeStyle(3, 0xff6eb4, 0.9).setDepth(60).setInteractive();
    this.add.text(GW * 0.62, y, '💥', { fontSize: fz(0.034) }).setOrigin(0.5).setDepth(61);
    fireBtn.on('pointerdown', () => this.tryFire(this.player, this.myTeam, true));
  }

  update(time, delta) {
    if (this.gameOver) return;
    const dt = delta / 1000;

    if (this.invuln > 0) this.invuln -= delta;
    if (this.fireCd > 0) this.fireCd -= delta;

    const rot = 200 * dt;
    if (this.rotL || this.cursors.left.isDown) this.player.angle -= rot;
    if (this.rotR || this.cursors.right.isDown) this.player.angle += rot;

    const thrust = this.thrusting || this.cursors.up.isDown;
    if (thrust) {
      const rad = Phaser.Math.DegToRad(this.player.angle + 90);
      this.player.body.velocity.x += Math.cos(rad) * 420 * dt;
      this.player.body.velocity.y += Math.sin(rad) * 420 * dt;
    }

    if (this.keyFire.isDown) this.tryFire(this.player, this.myTeam, true);

    this.updateEnemies(dt);
    this.updateBullets();
    this.updatePlanets(dt);
    this.updateHud();
    this.checkWin();
  }

  tryFire(ship, team, isPlayer) {
    if (this.gameOver) return;
    const cd = isPlayer ? this.fireCd : ship.getData('fireCd');
    if (cd > 0) return;
    const rad = Phaser.Math.DegToRad(ship.angle + 90);
    const bx = ship.x + Math.cos(rad) * 28;
    const by = ship.y + Math.sin(rad) * 28;
    const b = this.add.circle(bx, by, 5, team.color, 1).setDepth(8);
    this.physics.add.existing(b);
    b.body.setCircle(5);
    b.body.setVelocity(Math.cos(rad) * 380, Math.sin(rad) * 380);
    b.setData('team', team.id);
    b.setData('fromPlayer', isPlayer);
    this.bullets.add(b);
    beep(isPlayer ? 680 : 420, 0.05, 'square', 0.1);
    if (isPlayer) this.fireCd = 280;
    else ship.setData('fireCd', 700);
  }

  updateEnemies(dt) {
    const px = this.player.x;
    const py = this.player.y;
    this.enemies.forEach((e) => {
      if (!e.active) return;
      const ang = Phaser.Math.Angle.Between(e.x, e.y, px, py);
      const deg = Phaser.Math.RadToDeg(ang) - 90;
      let diff = deg - e.angle;
      while (diff > 180) diff -= 360;
      while (diff < -180) diff += 360;
      e.angle += Phaser.Math.Clamp(diff, -120 * dt, 120 * dt);

      const dist = Phaser.Math.Distance.Between(e.x, e.y, px, py);
      if (dist > 90) {
        const rad = Phaser.Math.DegToRad(e.angle + 90);
        e.body.velocity.x += Math.cos(rad) * 180 * dt;
        e.body.velocity.y += Math.sin(rad) * 180 * dt;
      }

      let cd = e.getData('fireCd') - dt * 1000;
      if (cd <= 0 && dist < 320 && Math.abs(diff) < 25) {
        this.tryFire(e, this.enemyTeam, false);
        cd = 900 + Math.random() * 400;
      }
      e.setData('fireCd', cd);
    });
  }

  updateBullets() {
    const toRemove = [];
    this.bullets.getChildren().forEach((b) => {
      if (!b.active) return;
      if (b.x < -20 || b.x > GW + 20 || b.y < -20 || b.y > GH + 20) {
        toRemove.push(b);
        return;
      }
      const fromPlayer = b.getData('fromPlayer');
      const team = b.getData('team');

      this.asteroids.getChildren().forEach((a) => {
        if (Phaser.Math.Distance.Between(b.x, b.y, a.x, a.y) < a.getData('r') + 6) {
          toRemove.push(b);
        }
      });

      if (fromPlayer) {
        this.enemies.forEach((e) => {
          if (!e.active) return;
          if (Phaser.Math.Distance.Between(b.x, b.y, e.x, e.y) < 26) {
            this.hitEnemy(e);
            toRemove.push(b);
          }
        });
      } else if (team !== G.team && this.invuln <= 0) {
        if (Phaser.Math.Distance.Between(b.x, b.y, this.player.x, this.player.y) < 24) {
          this.hitPlayer(12);
          toRemove.push(b);
        }
      }
    });
    toRemove.forEach((b) => b.destroy());
  }

  hitEnemy(e) {
    const hp = e.getData('hp') - 30;
    beep(200, 0.08, 'sawtooth', 0.12);
    if (hp <= 0) {
      e.destroy();
      this.score += 100;
      G.score += 100;
      beep(880, 0.15, 'sine', 0.18);
      const idx = this.enemies.indexOf(e);
      if (idx >= 0) this.enemies.splice(idx, 1);
    } else {
      e.setData('hp', hp);
      e.setTint(0xffaaaa);
      this.time.delayedCall(80, () => { if (e.active) e.clearTint(); });
      const ang = Phaser.Math.Angle.Between(this.player.x, this.player.y, e.x, e.y);
      e.body.velocity.x += Math.cos(ang) * 120;
      e.body.velocity.y += Math.sin(ang) * 120;
    }
  }

  hitPlayer(dmg) {
    this.playerHp -= dmg;
    this.invuln = 1200;
    this.player.setAlpha(0.5);
    this.time.delayedCall(200, () => {
      if (this.player.active) this.player.setAlpha(1);
    });
    beep(150, 0.12, 'sawtooth', 0.2);
    this.drawHpBar();
    if (this.playerHp <= 0) {
      G.lives--;
      if (G.lives <= 0) {
        this.endGame(false);
        return;
      }
      this.playerHp = 100;
      this.player.x = GW * 0.5;
      this.player.y = GH * 0.75;
      this.player.body.velocity.set(0);
      this.invuln = 2000;
      this.hudLives.setText('❤️'.repeat(G.lives));
      beep(330, 0.2, 'sine', 0.15);
    }
  }

  updatePlanets(dt) {
    const capSpeed = 0.45;
    const px = this.player.x;
    const py = this.player.y;

    this.planetGfx.forEach((pg) => {
      const p = pg.data;
      const dist = Phaser.Math.Distance.Between(px, py, p.x, p.y);
      const capturing = dist < 58;

      if (capturing) {
        if (p.owner !== G.team) {
          p.cap += capSpeed * dt;
          if (p.cap >= 1) {
            p.owner = G.team;
            p.cap = 1;
            beep(660, 0.2, 'sine', 0.2);
            this.score += 200;
            G.score += 200;
          }
        }
      } else if (p.owner === G.team) {
        p.cap = Math.max(p.cap, 1);
      } else if (p.owner && p.owner !== G.team) {
        p.cap = 1;
      } else {
        p.cap = Math.max(0, p.cap - capSpeed * 0.3 * dt);
      }

      const col = p.owner === G.team ? this.myTeam.color
        : p.owner === this.enemyTeam.id ? this.enemyTeam.color
          : NEUTRAL;
      const alpha = p.owner ? 0.9 : 0.5 + p.cap * 0.4;
      pg.core.setFillStyle(col, alpha);
      pg.ring.setFillStyle(col, 0.2 + (p.cap || 0) * 0.25);
      pg.ring.setRadius(38 + (p.cap || 0) * 8);
    });
  }

  updateHud() {
    const owned = this.planetData.filter((p) => p.owner === G.team).length;
    this.hudPlanets.setText('🪐 ' + owned + ' / 3');
    const alive = this.enemies.filter((e) => e.active).length;
    this.hudEnemies.setText('💥 Enemies: ' + alive);
    this.drawHpBar();
  }

  checkWin() {
    const owned = this.planetData.filter((p) => p.owner === G.team).length;
    const alive = this.enemies.filter((e) => e.active).length;
    if (owned >= 3 || alive === 0) this.endGame(true);
  }

  endGame(won) {
    if (this.gameOver) return;
    this.gameOver = true;
    if (won) {
      beep(523, 0.1, 'sine', 0.2);
      this.time.delayedCall(120, () => beep(659, 0.1, 'sine', 0.2));
      this.time.delayedCall(240, () => beep(784, 0.2, 'sine', 0.25));
    }
    this.scene.start('End', { won, score: this.score });
  }
}

// ═══════════════════════════════════════════════════════════
// END
// ═══════════════════════════════════════════════════════════
class EndScene extends Phaser.Scene {
  constructor() { super('End'); }

  init(data) {
    this.won = data.won;
    this.score = data.score || 0;
  }

  create() {
    drawStars(this);
    const cx = GW / 2;
    const cy = GH / 2;

    this.add.text(cx, cy - GH * 0.12, this.won ? '🏆' : '💫',
      { fontSize: fz(0.12) }).setOrigin(0.5);
    this.add.text(cx, cy - GH * 0.02, this.won ? 'Your squad wins!' : 'Mission over',
      { fontFamily: 'Fredoka One', fontSize: fz(0.065), fill: this.won ? '#ffe14d' : '#ff6eb4', stroke: '#000', strokeThickness: 4 })
      .setOrigin(0.5);
    this.add.text(cx, cy + GH * 0.08, 'Score: ' + this.score,
      { fontFamily: 'Nunito', fontSize: fz(0.04), fill: '#f0e6ff' }).setOrigin(0.5);

    if (this.won) {
      this.add.text(cx, cy + GH * 0.16, TEAMS[G.team].emoji + ' ' + TEAMS[G.team].name + ' rules the galaxy!',
        { fontFamily: 'Nunito', fontSize: fz(0.028), fill: TEAMS[G.team].fill }).setOrigin(0.5);
    }

    const bw = Math.min(GW * 0.4, 170);
    makeBtn(this, cx - bw * 0.55, cy + GH * 0.28, 'Play Again 🚀', 0xffe14d, '#050818', fz(0.033), () => {
      G.lives = 3;
      G.score = 0;
      this.scene.start('Play');
    });
    makeBtn(this, cx + bw * 0.55, cy + GH * 0.28, 'Menu 🌌', 0x3a2a5c, '#f0e6ff', fz(0.033), () => this.scene.start('Menu'), 0x5a4a7c);
  }
}

new Phaser.Game({
  type: Phaser.AUTO,
  width: GW,
  height: GH,
  backgroundColor: '#050818',
  parent: 'game-container',
  physics: {
    default: 'arcade',
    arcade: { debug: false },
  },
  scene: [MenuScene, PlayScene, EndScene],
  scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH },
  input: { touch: true, activePointers: 4 },
});
</script>
