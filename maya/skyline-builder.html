<html lang="en">

<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;900&display=swap" rel="stylesheet">
<style>
:root {
  --pink:#ff6eb4; --yellow:#ffe14d; --green:#5dffb0; --blue:#5bc8ff;
  --purple:#c77dff; --orange:#ff9a3c; --bg:#0f0a1e; --card:#1e1440; --text:#f0e6ff;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body {
  width: 100%; height: 100%; overflow: hidden;
  background: var(--bg); touch-action: none;
  font-family: 'Nunito', sans-serif; color: var(--text);
  -webkit-text-size-adjust: 100%;
}
#layout {
  display: flex; flex-direction: column; height: 100vh; height: 100dvh;
}
#toolbar {
  height: 68px; display: flex; align-items: center; gap: 6px;
  padding: 0 10px; overflow-x: auto; overflow-y: hidden;
  background: var(--card); border-bottom: 2px solid rgba(255,255,255,0.07);
  flex-shrink: 0; -webkit-overflow-scrolling: touch; scrollbar-width: none;
}
#toolbar::-webkit-scrollbar { display: none; }
#canvas-wrap {
  flex: 1; position: relative; overflow: hidden;
}
#sky, #game {
  position: absolute; top: 0; left: 0;
}
#game {
  touch-action: none; cursor: crosshair;
}

/* Toolbar button */
.tb-btn {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  min-width: 52px; width: 52px; height: 54px; border-radius: 14px;
  background: rgba(255,255,255,0.05); border: 2px solid rgba(255,255,255,0.1);
  cursor: pointer; flex-shrink: 0; gap: 2px; transition: border-color 0.12s, background 0.12s;
  user-select: none; -webkit-user-select: none;
}
.tb-btn .em { font-size: 22px; line-height: 1.1; }
.tb-btn .lbl { font-size: 9px; font-family: 'Nunito', sans-serif; font-weight: 700;
  color: rgba(240,230,255,0.6); white-space: nowrap; letter-spacing: 0.02em; }
.tb-btn.active {
  border-color: var(--yellow);
  background: rgba(255,225,77,0.12);
  box-shadow: 0 0 12px rgba(255,225,77,0.25);
}
.tb-btn.active .lbl { color: var(--yellow); }

/* Color swatch */
.swatch {
  width: 32px; height: 32px; border-radius: 4px; flex-shrink: 0;
  cursor: pointer; border: 3px solid transparent; transition: transform 0.1s, border-color 0.1s;
}
.swatch.active {
  border-color: #fff;
  transform: scale(1.2);
  box-shadow: 0 0 10px rgba(255,255,255,0.4);
}

/* Toolbar divider */
.tb-div {
  width: 1px; height: 40px; background: rgba(255,255,255,0.1); flex-shrink: 0; margin: 0 2px;
}

/* Undo / Clear action buttons */
.tb-action {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  min-width: 52px; width: 52px; height: 54px; border-radius: 14px;
  background: rgba(255,255,255,0.05); border: 2px solid rgba(255,255,255,0.08);
  cursor: pointer; flex-shrink: 0; gap: 2px;
  user-select: none; -webkit-user-select: none; transition: background 0.1s;
}
.tb-action:active { background: rgba(255,255,255,0.15); }
.tb-action .em { font-size: 20px; line-height: 1.1; }
.tb-action .lbl { font-size: 9px; font-family: 'Nunito', sans-serif; font-weight: 700;
  color: rgba(240,230,255,0.5); white-space: nowrap; }
.tb-action.warn .lbl { color: #ff7070; }
.tb-action.warn { border-color: rgba(255,112,112,0.25); }

/* Clear confirm tooltip */
#clear-tip {
  position: fixed; bottom: 90px; left: 50%;
  transform: translateX(-50%);
  background: #ff5252; color: #fff;
  font-family: 'Fredoka One', cursive; font-size: 15px;
  padding: 10px 22px; border-radius: 99px;
  pointer-events: none; z-index: 500;
  opacity: 0; transition: opacity 0.2s;
  white-space: nowrap;
  box-shadow: 0 4px 20px rgba(0,0,0,0.5);
}
#clear-tip.show { opacity: 1; }
</style>
</head>
<body>
<div id="layout">
  <div id="toolbar"></div>
  <div id="canvas-wrap">
    <canvas id="sky"></canvas>
    <canvas id="game"></canvas>
  </div>
</div>
<div id="clear-tip">Really? Tap again to clear! 🗑️</div>
<script>
// ═══════════════════════════════════════════════════════════════
//  CITY BUILDER  —  Maya's Game Lab
// ═══════════════════════════════════════════════════════════════

// ── Audio ────────────────────────────────────────────────────
let audioCtx = null;
function getAudio() {
  if (!audioCtx) {
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {}
  }
  return audioCtx;
}
function playTone(freq, type, duration, vol) {
  const ctx = getAudio(); if (!ctx) return;
  try {
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type = type || 'triangle';
    osc.frequency.setValueAtTime(freq, ctx.currentTime);
    gain.gain.setValueAtTime(vol || 0.08, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
    osc.start(ctx.currentTime); osc.stop(ctx.currentTime + duration + 0.01);
  } catch(e) {}
}
function playRising(f1, f2, duration, vol) {
  const ctx = getAudio(); if (!ctx) return;
  try {
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type = 'sine';
    osc.frequency.setValueAtTime(f1, ctx.currentTime);
    osc.frequency.linearRampToValueAtTime(f2, ctx.currentTime + duration);
    gain.gain.setValueAtTime(vol || 0.07, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
    osc.start(ctx.currentTime); osc.stop(ctx.currentTime + duration + 0.01);
  } catch(e) {}
}
function soundForTool(type) {
  switch(type) {
    case 'brick':    playTone(250, 'triangle', 0.08, 0.08); break;
    case 'stone':    playTone(200, 'triangle', 0.09, 0.07); break;
    case 'concrete': playTone(230, 'triangle', 0.07, 0.07); break;
    case 'window':   playTone(880, 'sine',     0.05, 0.04); break;
    case 'door':     playTone(220, 'triangle', 0.12, 0.08); break;
    case 'roofF':    playTone(350, 'square',   0.08, 0.05); break;
    case 'roofP':    playTone(350, 'square',   0.08, 0.05); break;
    case 'roofL':    playTone(350, 'square',   0.08, 0.05); break;
    case 'roofR':    playTone(350, 'square',   0.08, 0.05); break;
    case 'chimney':  playTone(350, 'square',   0.08, 0.05); break;
    case 'balcony':  playTone(400, 'sine',     0.07, 0.05); break;
    case 'paint':    playRising(300, 600, 0.15, 0.07); break;
    case 'eraser':   playTone(200, 'sine',     0.06, 0.05); break;
    default:         playTone(300, 'triangle', 0.07, 0.07);
  }
}

// ── Constants ─────────────────────────────────────────────────
const CELL = 40;
let COLS = 0, ROWS = 0;

// Multi-cell block grid footprint (w cols × h rows)
const BLOCK_SIZE = {
  door:    {w: 1, h: 2},
  window:  {w: 1, h: 2},
  balcony: {w: 3, h: 1},
};
function blockDims(type) { return BLOCK_SIZE[type] || {w: 1, h: 1}; }

// ── Paint colours (18 swatches) ───────────────────────────────
const PALETTE = [
  '#ff6eb4','#ff9a3c','#ffe14d','#5dffb0','#5bc8ff','#c77dff',
  '#ff5252','#c0392b','#e67e22','#27ae60','#2980b9','#8e44ad',
  '#ecf0f1','#95a5a6','#607d8b','#37474f','#1a252f','#ffffff'
];

// ── Block type definitions ────────────────────────────────────
const TOOLS = [
  { id:'brick',    em:'🧱', lbl:'Brick'    },
  { id:'stone',    em:'🪨', lbl:'Stone'    },
  { id:'concrete', em:'▪️',  lbl:'Conc.'   },
  { id:'window',   em:'🪟', lbl:'Window'   },
  { id:'door',     em:'🚪', lbl:'Door'     },
  { id:'roofF',    em:'▬',  lbl:'Flat Rf'  },
  { id:'roofP',    em:'▲',  lbl:'Peak Rf'  },
  { id:'roofL',    em:'◤',  lbl:'Slope L'  },
  { id:'roofR',    em:'◥',  lbl:'Slope R'  },
  { id:'chimney',  em:'🏭', lbl:'Chimney'  },
  { id:'balcony',  em:'🔲', lbl:'Balcony'  },
  null, // divider before special tools
  { id:'paint',    em:'🪣', lbl:'Fill'     },
  { id:'eraser',   em:'🧹', lbl:'Erase'    },
];

// ── State ─────────────────────────────────────────────────────
let grid = [];
let activeTool   = 'brick';
let activeColor  = '#c0392b';
let history      = [];
let isDrawing    = false;
let lastRC       = null;
let clearConfirm = false;
let clearConfirmTimer = null;

// ── Canvas refs ───────────────────────────────────────────────
const skyCanvas  = document.getElementById('sky');
const gameCanvas = document.getElementById('game');
const skyCtx     = skyCanvas.getContext('2d');
const gameCtx    = gameCanvas.getContext('2d');
const wrap       = document.getElementById('canvas-wrap');

// ── Stars + moon seed ─────────────────────────────────────────
const STARS = Array.from({length: 90}, () => ({
  x: Math.random(), y: Math.random() * 0.75,
  r: 0.4 + Math.random() * 1.6,
  a: 0.3 + Math.random() * 0.7
}));

// ── Sky drawing ───────────────────────────────────────────────
function drawSky() {
  const cw = skyCanvas.width, ch = skyCanvas.height;
  // background gradient
  const grad = skyCtx.createLinearGradient(0, 0, 0, ch);
  grad.addColorStop(0,   '#060314');
  grad.addColorStop(0.4, '#0f0a1e');
  grad.addColorStop(0.75,'#1a0f2e');
  grad.addColorStop(1,   '#2d1a10');
  skyCtx.fillStyle = grad;
  skyCtx.fillRect(0, 0, cw, ch);

  // stars
  STARS.forEach(s => {
    skyCtx.beginPath();
    skyCtx.arc(s.x * cw, s.y * ch, s.r, 0, Math.PI*2);
    skyCtx.fillStyle = `rgba(255,255,255,${s.a})`;
    skyCtx.fill();
  });

  // crescent moon (upper right)
  const mx = cw * 0.84, my = ch * 0.1, mr = 26;
  skyCtx.beginPath();
  skyCtx.arc(mx, my, mr, 0, Math.PI*2);
  skyCtx.fillStyle = '#ffe14d';
  skyCtx.fill();
  skyCtx.beginPath();
  skyCtx.arc(mx + mr * 0.45, my - mr * 0.15, mr * 0.82, 0, Math.PI*2);
  skyCtx.fillStyle = '#070320';
  skyCtx.fill();

  // subtle grid lines
  skyCtx.strokeStyle = 'rgba(255,255,255,0.04)';
  skyCtx.lineWidth = 0.5;
  for (let r = 0; r < ROWS; r++) {
    skyCtx.beginPath();
    skyCtx.moveTo(0, r * CELL);
    skyCtx.lineTo(cw, r * CELL);
    skyCtx.stroke();
  }
  for (let c = 0; c < COLS; c++) {
    skyCtx.beginPath();
    skyCtx.moveTo(c * CELL, 0);
    skyCtx.lineTo(c * CELL, ch);
    skyCtx.stroke();
  }

  // ground row
  const gy = (ROWS - 1) * CELL;
  const ggrad = skyCtx.createLinearGradient(0, gy, 0, ch);
  ggrad.addColorStop(0, 'rgba(20,10,5,0.9)');
  ggrad.addColorStop(1, 'rgba(10,5,0,0.95)');
  skyCtx.fillStyle = ggrad;
  skyCtx.fillRect(0, gy, cw, CELL);
}

// ── Block drawing ──────────────────────────────────────────────
// bw/bh = pixel width/height of the block (may span multiple cells)
function drawBlock(ctx, type, color, x, y, bw, bh) {
  const C = bw;   // width  (= CELL for single-cell blocks)
  const H = bh;   // height (= CELL for single-cell blocks)
  ctx.save();
  ctx.translate(x, y);

  switch(type) {
    case 'brick': {
      ctx.fillStyle = color;
      ctx.fillRect(0, 0, C, C);
      ctx.strokeStyle = 'rgba(0,0,0,0.35)';
      ctx.lineWidth = 0.8;
      // horizontal mortar lines
      for (let yy = 5; yy < C; yy += 5) {
        ctx.beginPath(); ctx.moveTo(0, yy); ctx.lineTo(C, yy); ctx.stroke();
      }
      // vertical mortar lines alternating
      const row = Math.round(y / C);
      const offset = (row % 2 === 0) ? 0 : C / 2;
      for (let xx = offset; xx < C + C/2; xx += C/2) {
        // only draw in the band between horizontal lines
        for (let band = 0; band < C; band += 5) {
          ctx.beginPath(); ctx.moveTo(xx, band); ctx.lineTo(xx, band + 5); ctx.stroke();
        }
      }
      // subtle highlight top
      ctx.fillStyle = 'rgba(255,255,255,0.08)';
      ctx.fillRect(0, 0, C, 2);
      break;
    }
    case 'stone': {
      ctx.fillStyle = color;
      ctx.fillRect(0, 0, C, C);
      ctx.strokeStyle = 'rgba(0,0,0,0.3)';
      ctx.lineWidth = 1;
      ctx.strokeRect(1, 1, C-2, C-2);
      ctx.strokeStyle = 'rgba(255,255,255,0.12)';
      ctx.lineWidth = 0.6;
      ctx.strokeRect(2.5, 2.5, C-5, C-5);
      ctx.fillStyle = 'rgba(255,255,255,0.06)';
      ctx.fillRect(0, 0, C, 2);
      break;
    }
    case 'concrete': {
      ctx.fillStyle = color;
      ctx.fillRect(0, 0, C, C);
      ctx.strokeStyle = 'rgba(0,0,0,0.2)';
      ctx.lineWidth = 0.8;
      ctx.strokeRect(0.5, 0.5, C-1, C-1);
      ctx.fillStyle = 'rgba(255,255,255,0.07)';
      ctx.fillRect(0, 0, C, 1.5);
      break;
    }
    case 'window': {
      // dark frame
      ctx.fillStyle = '#1a0f2e';
      ctx.fillRect(0, 0, C, H);
      // arch at top of the glass pane
      const wp = 4, wr = (C - wp*2) / 2;
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.moveTo(wp, H - wp);
      ctx.lineTo(wp, wp + wr);
      ctx.arc(wp + wr, wp + wr, wr, Math.PI, 0);
      ctx.lineTo(C - wp, H - wp);
      ctx.closePath();
      ctx.fill();
      // horizontal divider between upper arch and lower pane
      const midY = H * 0.45;
      ctx.fillStyle = '#1a0f2e';
      ctx.fillRect(wp, midY - 2, C - wp*2, 4);
      // lower rectangular pane
      ctx.fillStyle = color;
      ctx.fillRect(wp, midY + 2, C - wp*2, H - midY - wp - 2);
      // vertical divider
      ctx.fillStyle = '#1a0f2e';
      ctx.fillRect(C/2 - 2, midY + 2, 4, H - midY - wp - 2);
      // shine
      ctx.fillStyle = 'rgba(255,255,255,0.35)';
      ctx.fillRect(wp + 3, wp + 3, 5, 3);
      ctx.fillRect(wp + 3, wp + 3, 2, 8);
      break;
    }
    case 'door': {
      const dp = 4;
      const archR = (C - dp*2) / 2;
      // door outline with rounded arch at top
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.moveTo(0, H);
      ctx.lineTo(0, dp + archR);
      ctx.arc(dp + archR, dp + archR, archR, Math.PI, 0);
      ctx.lineTo(C, H);
      ctx.closePath();
      ctx.fill();
      // arch window panel
      ctx.fillStyle = 'rgba(0,0,0,0.2)';
      ctx.beginPath();
      const aip = dp + 5;
      const airInner = archR - 5;
      ctx.moveTo(aip, H * 0.48);
      ctx.lineTo(aip, aip + airInner);
      ctx.arc(aip + airInner, aip + airInner, airInner, Math.PI, 0);
      ctx.lineTo(C - aip, H * 0.48);
      ctx.closePath();
      ctx.fill();
      // lower rectangular panel
      const lpTop = H * 0.5;
      ctx.fillStyle = 'rgba(0,0,0,0.18)';
      ctx.fillRect(dp + 3, lpTop, C - (dp+3)*2, H - lpTop - dp);
      ctx.strokeStyle = 'rgba(255,255,255,0.1)';
      ctx.lineWidth = 0.75;
      ctx.strokeRect(dp + 3, lpTop, C - (dp+3)*2, H - lpTop - dp);
      // gold knob
      ctx.beginPath();
      ctx.arc(C - dp - 5, H * 0.72, 3, 0, Math.PI*2);
      ctx.fillStyle = '#ffe14d';
      ctx.fill();
      // step / threshold
      ctx.fillStyle = 'rgba(0,0,0,0.3)';
      ctx.fillRect(0, H - 3, C, 3);
      // top highlight
      ctx.fillStyle = 'rgba(255,255,255,0.09)';
      ctx.fillRect(0, 0, C, 2);
      break;
    }
    case 'roofF': {
      ctx.fillStyle = color;
      ctx.fillRect(0, 0, C, C);
      ctx.strokeStyle = 'rgba(0,0,0,0.3)';
      ctx.lineWidth = 0.7;
      for (let yy = 3; yy < C; yy += 3) {
        ctx.beginPath(); ctx.moveTo(0, yy); ctx.lineTo(C, yy); ctx.stroke();
      }
      ctx.fillStyle = 'rgba(255,255,255,0.06)';
      ctx.fillRect(0, 0, C, 1.5);
      break;
    }
    case 'roofP': {
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.moveTo(C/2, 0);
      ctx.lineTo(C, C);
      ctx.lineTo(0, C);
      ctx.closePath();
      ctx.fill();
      ctx.strokeStyle = 'rgba(0,0,0,0.2)';
      ctx.lineWidth = 0.8;
      ctx.stroke();
      // highlight left slope
      ctx.beginPath();
      ctx.moveTo(C/2, 0); ctx.lineTo(0, C);
      ctx.strokeStyle = 'rgba(255,255,255,0.12)';
      ctx.lineWidth = 1;
      ctx.stroke();
      break;
    }
    case 'roofL': {
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.moveTo(0, 0);
      ctx.lineTo(C, C);
      ctx.lineTo(0, C);
      ctx.closePath();
      ctx.fill();
      ctx.strokeStyle = 'rgba(0,0,0,0.2)';
      ctx.lineWidth = 0.8;
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(0, 0); ctx.lineTo(0, C);
      ctx.strokeStyle = 'rgba(255,255,255,0.12)'; ctx.lineWidth = 1; ctx.stroke();
      break;
    }
    case 'roofR': {
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.moveTo(C, 0);
      ctx.lineTo(C, C);
      ctx.lineTo(0, C);
      ctx.closePath();
      ctx.fill();
      ctx.strokeStyle = 'rgba(0,0,0,0.2)';
      ctx.lineWidth = 0.8;
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(C, 0); ctx.lineTo(C, C);
      ctx.strokeStyle = 'rgba(255,255,255,0.12)'; ctx.lineWidth = 1; ctx.stroke();
      break;
    }
    case 'chimney': {
      ctx.fillStyle = color;
      ctx.fillRect(0, 0, C, C);
      // faint horizontal lines
      ctx.strokeStyle = 'rgba(255,255,255,0.08)';
      ctx.lineWidth = 0.6;
      for (let yy = 4; yy < C-4; yy += 4) {
        ctx.beginPath(); ctx.moveTo(0, yy); ctx.lineTo(C, yy); ctx.stroke();
      }
      // smoke hole at top
      ctx.fillStyle = 'rgba(0,0,0,0.55)';
      ctx.fillRect(C*0.25, 0, C*0.5, C*0.3);
      ctx.fillStyle = 'rgba(180,180,200,0.15)';
      ctx.fillRect(C*0.3, 0, C*0.4, C*0.25);
      break;
    }
    case 'balcony': {
      // floor slab
      ctx.fillStyle = 'rgba(255,255,255,0.06)';
      ctx.fillRect(0, H * 0.7, C, H * 0.3);
      // top and bottom rails spanning full width
      ctx.strokeStyle = color;
      ctx.lineWidth = 3;
      ctx.beginPath(); ctx.moveTo(0, 3); ctx.lineTo(C, 3); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(0, H * 0.68); ctx.lineTo(C, H * 0.68); ctx.stroke();
      // vertical balusters every 8px
      ctx.lineWidth = 2;
      for (let xx = 4; xx <= C - 4; xx += 8) {
        ctx.beginPath(); ctx.moveTo(xx, 3); ctx.lineTo(xx, H * 0.68); ctx.stroke();
      }
      // floor edge highlight
      ctx.fillStyle = 'rgba(255,255,255,0.12)';
      ctx.fillRect(0, H * 0.7, C, 2);
      break;
    }
  }
  ctx.restore();
}

// ── Draw entire game layer ─────────────────────────────────────
function drawAll() {
  const cw = gameCanvas.width, ch = gameCanvas.height;
  gameCtx.clearRect(0, 0, cw, ch);
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const cell = grid[r] && grid[r][c];
      if (!cell || cell._ref) continue; // refs are drawn by their master
      const {w, h} = blockDims(cell.type);
      drawBlock(gameCtx, cell.type, cell.color, c * CELL, r * CELL, w * CELL, h * CELL);
    }
  }
}

// ── Resize ────────────────────────────────────────────────────
function resize() {
  const w = wrap.clientWidth, h = wrap.clientHeight;
  const newCols = Math.floor(w / CELL);
  const newRows = Math.floor(h / CELL);
  if (newCols === COLS && newRows === ROWS && skyCanvas.width > 0) return;
  COLS = newCols; ROWS = newRows;
  const cw = COLS * CELL, ch = ROWS * CELL;
  [skyCanvas, gameCanvas].forEach(c => { c.width = cw; c.height = ch; });
  // preserve existing cells
  const oldGrid = grid;
  grid = Array.from({length: ROWS}, (_, r) =>
    Array.from({length: COLS}, (_, c) => (oldGrid[r] && oldGrid[r][c]) || null)
  );
  drawSky();
  drawAll();
}

// ── History ───────────────────────────────────────────────────
function snapshot() {
  const snap = grid.map(row => row.map(cell => cell ? {...cell} : null));
  history.push(snap);
  if (history.length > 50) history.shift();
}
function undo() {
  if (history.length === 0) return;
  grid = history.pop();
  drawAll();
  playTone(400, 'sine', 0.07, 0.05);
}

// ── Flood fill ────────────────────────────────────────────────
function floodFill(startR, startC, newColor) {
  const target = grid[startR] && grid[startR][startC];
  if (!target) return;
  const targetType = target.type, targetColor = target.color;
  if (targetColor === newColor) return;
  snapshot();
  const stack = [[startR, startC]];
  const visited = new Set();
  while (stack.length) {
    const [r, c] = stack.pop();
    const key = r + ',' + c;
    if (visited.has(key)) continue;
    visited.add(key);
    const cell = grid[r] && grid[r][c];
    if (!cell) continue;
    // resolve ref to master so we match on the real type
    const ctype = cell._ref ? (grid[cell._masterR][cell._masterC] || cell).type : cell.type;
    const ccolor = cell.color;
    if (ctype !== targetType || ccolor !== targetColor) continue;
    grid[r][c] = {...cell, color: newColor};
    if (r > 0)        stack.push([r-1, c]);
    if (r < ROWS-1)   stack.push([r+1, c]);
    if (c > 0)        stack.push([r, c-1]);
    if (c < COLS-1)   stack.push([r, c+1]);
  }
  drawAll();
  soundForTool('paint');
}

// ── Erase helpers ──────────────────────────────────────────────
function eraseMasterAt(mr, mc) {
  const master = grid[mr] && grid[mr][mc];
  if (!master) return;
  const {w, h} = blockDims(master.type);
  for (let dr = 0; dr < h; dr++)
    for (let dc = 0; dc < w; dc++)
      if (grid[mr+dr]) grid[mr+dr][mc+dc] = null;
}
function eraseCell(r, c) {
  const cell = grid[r] && grid[r][c];
  if (!cell) return;
  if (cell._ref) eraseMasterAt(cell._masterR, cell._masterC);
  else eraseMasterAt(r, c);
}

// ── Place / erase ──────────────────────────────────────────────
function placeAt(r, c, noSnapshot, silent) {
  if (r < 0 || r >= ROWS || c < 0 || c >= COLS) return;
  if (!noSnapshot) snapshot();

  if (activeTool === 'eraser') {
    if (!grid[r][c]) return;
    eraseCell(r, c);
    if (!silent) soundForTool('eraser');
  } else if (activeTool === 'paint') {
    // resolve ref → master before flood fill
    const cell = grid[r][c];
    if (cell) {
      const [mr, mc] = cell._ref ? [cell._masterR, cell._masterC] : [r, c];
      floodFill(mr, mc, activeColor);
    }
  } else {
    const {w, h} = blockDims(activeTool);
    // bounds check for multi-cell blocks
    if (r + h - 1 >= ROWS || c + w - 1 >= COLS) return;
    // erase anything already occupying the footprint
    for (let dr = 0; dr < h; dr++)
      for (let dc = 0; dc < w; dc++)
        eraseCell(r + dr, c + dc);
    // write master cell
    grid[r][c] = {type: activeTool, color: activeColor};
    // write ref cells for multi-cell blocks
    for (let dr = 0; dr < h; dr++) {
      for (let dc = 0; dc < w; dc++) {
        if (dr === 0 && dc === 0) continue;
        grid[r+dr][c+dc] = {type: activeTool, color: activeColor, _ref: true, _masterR: r, _masterC: c};
      }
    }
    if (!silent) soundForTool(activeTool);
  }
  drawAll();
}

// ── Event helpers ──────────────────────────────────────────────
function getRC(e) {
  const rect = gameCanvas.getBoundingClientRect();
  const src = e.touches ? e.touches[0] : e;
  const cx = (src.clientX - rect.left) * (gameCanvas.width / rect.width);
  const cy = (src.clientY - rect.top)  * (gameCanvas.height / rect.height);
  return [Math.floor(cy / CELL), Math.floor(cx / CELL)];
}

function onPointerDown(e) {
  e.preventDefault();
  // unlock AudioContext on first gesture
  const ctx = getAudio();
  if (ctx && ctx.state === 'suspended') ctx.resume();
  isDrawing = true;
  lastRC = null;
  const [r, c] = getRC(e);
  lastRC = [r, c];
  if (activeTool === 'paint') {
    const cell = grid[r] && grid[r][c];
    if (cell) {
      const [mr, mc] = cell._ref ? [cell._masterR, cell._masterC] : [r, c];
      floodFill(mr, mc, activeColor);
    }
    return;
  }
  placeAt(r, c);
}

function onPointerMove(e) {
  e.preventDefault();
  if (!isDrawing) return;
  if (activeTool === 'paint') return;
  const [r, c] = getRC(e);
  if (lastRC && lastRC[0] === r && lastRC[1] === c) return;
  lastRC = [r, c];
  placeAt(r, c, true, true); // no extra snapshot or sound on drag
}

function onPointerUp(e) {
  e.preventDefault();
  isDrawing = false;
  lastRC = null;
}

gameCanvas.addEventListener('mousedown',  onPointerDown);
gameCanvas.addEventListener('mousemove',  onPointerMove);
gameCanvas.addEventListener('mouseup',    onPointerUp);
gameCanvas.addEventListener('mouseleave', onPointerUp);
gameCanvas.addEventListener('touchstart', onPointerDown, {passive: false});
gameCanvas.addEventListener('touchmove',  onPointerMove, {passive: false});
gameCanvas.addEventListener('touchend',   onPointerUp,   {passive: false});
gameCanvas.addEventListener('touchcancel',onPointerUp,   {passive: false});

// ── Keyboard ──────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'z') { e.preventDefault(); undo(); }
});

// ── Toolbar ────────────────────────────────────────────────────
function buildToolbar() {
  const bar = document.getElementById('toolbar');
  bar.innerHTML = '';

  // Block tool buttons (null entries = dividers)
  TOOLS.forEach(t => {
    if (t === null) {
      const dv = document.createElement('div'); dv.className = 'tb-div'; bar.appendChild(dv); return;
    }
    const btn = document.createElement('button');
    btn.className = 'tb-btn' + (t.id === activeTool ? ' active' : '');
    btn.dataset.tool = t.id;
    btn.innerHTML = `<span class="em">${t.em}</span><span class="lbl">${t.lbl}</span>`;
    btn.addEventListener('pointerdown', ev => {
      ev.stopPropagation();
      activeTool = t.id;
      document.querySelectorAll('.tb-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const ctx = getAudio();
      if (ctx && ctx.state === 'suspended') ctx.resume();
    });
    bar.appendChild(btn);
  });

  // Divider
  const div1 = document.createElement('div'); div1.className = 'tb-div'; bar.appendChild(div1);

  // Color swatches
  PALETTE.forEach(col => {
    const sw = document.createElement('div');
    sw.className = 'swatch' + (col === activeColor ? ' active' : '');
    sw.style.background = col;
    sw.addEventListener('pointerdown', ev => {
      ev.stopPropagation();
      activeColor = col;
      document.querySelectorAll('.swatch').forEach(s => s.classList.remove('active'));
      sw.classList.add('active');
    });
    bar.appendChild(sw);
  });

  // Divider
  const div2 = document.createElement('div'); div2.className = 'tb-div'; bar.appendChild(div2);

  // Undo button
  const undoBtn = document.createElement('button');
  undoBtn.className = 'tb-action';
  undoBtn.innerHTML = '<span class="em">↩️</span><span class="lbl">Undo</span>';
  undoBtn.addEventListener('pointerdown', ev => { ev.stopPropagation(); undo(); });
  bar.appendChild(undoBtn);

  // Clear button
  const clearBtn = document.createElement('button');
  clearBtn.className = 'tb-action warn';
  clearBtn.id = 'clear-btn';
  clearBtn.innerHTML = '<span class="em">🗑️</span><span class="lbl">Clear</span>';
  const clearTip = document.getElementById('clear-tip');
  clearBtn.addEventListener('pointerdown', ev => {
    ev.stopPropagation();
    if (clearConfirm) {
      clearTimeout(clearConfirmTimer);
      clearConfirm = false;
      clearTip.classList.remove('show');
      snapshot();
      grid = Array.from({length: ROWS}, () => Array(COLS).fill(null));
      drawAll();
      playTone(300, 'sine', 0.2, 0.06);
    } else {
      clearConfirm = true;
      clearTip.classList.add('show');
      clearConfirmTimer = setTimeout(() => {
        clearConfirm = false;
        clearTip.classList.remove('show');
      }, 2000);
      playTone(440, 'sine', 0.05, 0.04);
    }
  });
  bar.appendChild(clearBtn);
}

// ── Init ───────────────────────────────────────────────────────
buildToolbar();
resize();
window.addEventListener('resize', () => resize(), {passive: true});
</script>
</body>
</html>
