function computeFlow(){
  const nextFilled=new Set();
  const nextDist=new Map();
  const nextColors=new Map();
  const parent=new Map();
  const sources=[];
  const goals=[];
  for(let r=0;r<rows;r++){
    for(let c=0;c<cols;c++){
      const cell=grid[r]&&grid[r][c];
      if(isSource(cell))sources.push({r:r,c:c,color:cell.color||'b'});
      if(isGoal(cell))goals.push({r:r,c:c,color:cell.color});
    }
  }
  if(!sources.length)return {filled:nextFilled,dist:nextDist,colors:nextColors,path:[],goalReached:false,goalsLeft:goals.length};
  const q=[];
  sources.forEach(function(src){
    const sk=src.r+','+src.c;
    nextFilled.add(sk);
    nextDist.set(sk,0);
    const cs=new Set([src.color||'b']);
    nextColors.set(sk,cs);
    parent.set(sk,null);
    q.push([src.r,src.c]);
  });
  while(q.length){
    const cur=q.shift();
    const ck=cur[0]+','+cur[1];
    const cell=grid[cur[0]][cur[1]];
    const m=maskFor(cell);
    const curColors=nextColors.get(ck);
    for(let i=0;i<4;i++){
      const d=DIRS[i];
      if(!(m&d))continue;
      const dk=dirKey(d);
      const nr=cur[0]+DR[dk][0],nc=cur[1]+DR[dk][1];
      if(nr<0||nc<0||nr>=rows||nc>=cols)continue;
      const nb=grid[nr]&&grid[nr][nc];
      if(!nb||blocksWaterPass(nb.type))continue;
      if(!(maskFor(nb)&OPP[d]))continue;
      const nk=nr+','+nc;
      if(!nextFilled.has(nk)){
        nextFilled.add(nk);
        nextDist.set(nk,nextDist.get(ck)+1);
        nextColors.set(nk,new Set(curColors));
        parent.set(nk,ck);
        q.push([nr,nc]);
      }else{
        const existing=nextColors.get(nk);
        curColors.forEach(function(cl){existing.add(cl);});
      }
    }
  }
  let watered=0;
  goals.forEach(function(g){
    const cell=grid[g.r][g.c];
    if(goalHasFlow(g.r,g.c,cell,nextFilled,nextColors))watered++;
  });
  const goalReached=goals.length>0&&watered===goals.length;
  let path=[];
  if(goalReached&&goals.length===1){
    const gk=goals[0].r+','+goals[0].c;
    let cur=gk;
    while(cur){
      const parts=cur.split(',');
      path.unshift([+parts[0],+parts[1]]);
      cur=parent.get(cur);
    }
  }else if(goalReached&&sources.length===1){
    const gk=goals[0].r+','+goals[0].c;
    let cur=gk;
    while(cur){
      const parts=cur.split(',');
      path.unshift([+parts[0],+parts[1]]);
      cur=parent.get(cur);
    }
  }else if(goalReached){
    const gk=goals[0].r+','+goals[0].c;
    let cur=gk;
    while(cur){
      const parts=cur.split(',');
      path.unshift([+parts[0],+parts[1]]);
      cur=parent.get(cur);
    }
  }
  return {filled:nextFilled,dist:nextDist,colors:nextColors,path:path,goalReached:goalReached,goalsLeft:goals.length-watered};
}

function updateFlow(triggerWin){
  const result=computeFlow();
  filled=result.filled;
  flowDist=result.dist;
  flowColors=result.colors;
  flowPath=result.path;
  goalsLeft=result.goalsLeft;
  leaks=computeLeaks(filled);
  const openEnds=leaks.length;
  const circuitOk=circuitComplete(filled);
  updateLeakBuckets(leaks);
  updateGardenBuckets();
  updateBucketHud();
  rebuildFlowParticles();
  const gTotal=countGoals();
  const bucketsReady=gardensReadyForWin();
  const routeLen=countRoutePipes(filled);
  updateRouteHud(routeLen);
  const routeOk=routeConstraintOk(routeLen);
  const wateredNow=gTotal-goalsLeft;
  if(wateredNow>prevWatered&&!won){
    const delta=wateredNow-prevWatered;
    if(delta>=2)showComboReaction('multi',delta);
    else if(wateredNow===1&&gTotal>1)showComboReaction('bloom',1);
  }
  prevWatered=wateredNow;

  if(wasteBucket>=92&&!won&&openEnds>0){
    setStatus('🪣 Bucket full! Fix the pipes or tap Use Again!','flow');
  }

  if(result.goalReached&&routeOk){
    flowPhase=Math.max(flowPhase,0.05);
    if(triggerWin&&!won&&!winPending){
      won=true;
      winPending=true;
      stopTimer();
      document.getElementById('hint-btn').classList.remove('hint-urgent');
      if(moves<=levelPar)showComboReaction('perfect');
      playWin();
      setStatus('All gardens watered! 🌻','win');
      spawnCelebration();
      if(winTimer)clearTimeout(winTimer);
      winTimer=setTimeout(function(){
        winTimer=null;
        winPending=false;
        showWin();
      },700);
    }else if(!won&&!winPending){
      setStatus('Water reached every garden! 🌻','flow');
    }
  }else if(!circuitOk&&filled.size>1){
    flowPhase=Math.max(flowPhase,0.03);
    if(openEnds>0)setStatus('🔗 '+openEnds+' open end'+(openEnds>1?'s':'')+' — seal the circuit!','flow');
    else setStatus('🔗 Connect every port on the hose path!','flow');
  }else if(result.goalReached&&openEnds>0){
    flowPhase=Math.max(flowPhase,0.04);
    setStatus('🔗 Fix '+openEnds+' joint'+(openEnds>1?'s':'')+' — pipes must connect!','flow');
  }else if(result.goalReached&&openEnds===0&&!bucketsReady){
    flowPhase=Math.max(flowPhase,0.04);
    setStatus('🌻 Garden buckets filling…','flow');
  }else if(result.goalReached&&circuitOk&&bucketsReady&&!routeOk){
    flowPhase=Math.max(flowPhase,0.04);
    if(routeMin!=null)setStatus('🛤 '+routeLen+'/'+routeMin+' pipes — make a longer path!','flow');
    else if(routeMax!=null)setStatus('🛤 '+routeLen+' pipes — too long! Use fewer (≤'+routeMax+').','flow');
  }else if(!won){
    flowPhase=filled.size>1?Math.max(flowPhase,0.02):Math.max(0,flowPhase-0.04);
    let msg='Tap a pipe above, then tap a + square';
    const dryPipes=countDryPipes();
    if(dryPipes>0&&filled.size>0)msg='Water stops here — add more pipes in the gaps';
    else if(gTotal>1&&wateredNow>0&&wateredNow<gTotal)msg=wateredNow+' of '+gTotal+' gardens watered — keep going!';
    else if(goalsLeft>0&&filled.size>1)msg='Almost there — connect to every flower';
    else if(kitTotal()>0&&countGridGaps()>0)msg='Pick a pipe above · tap a + on the grid';
    setStatus(msg,filled.size>1||openEnds>0?'flow':'idle');
  }
}

function countGoals(){
  let n=0;
  for(let r=0;r<rows;r++)for(let c=0;c<cols;c++)if(isGoal(grid[r]&&grid[r][c]))n++;
  return n;
}

function interactCell(r,c){
  ensureGridRow(r);
  const cell=grid[r]&&grid[r][c];
  if(selectedBuildPipe==='erase')return tryEraseAt(r,c);
  if(cell&&cell.placed&&kitActive()&&selectedBuildPipe!=='erase'){
    if(cell.type!==selectedBuildPipe)return swapPlacedPipeType(r,c,selectedBuildPipe);
    return interactBuildCell(r,c);
  }
  if(!cell&&kitActive()&&selectedBuildPipe!=='erase')return placeKitAt(r,c);
  if(!cell||cell.fixed||isSolidBlock(cell))return false;
  if(won||winPending)return false;
  if(cell.type==='V'){
    const now=Date.now();
    if(lastValveCell&&lastValveCell.r===r&&lastValveCell.c===c&&now-lastValveTap<450){
      cell.open=!cell.open;
      lastValveTap=0;
      lastValveCell=null;
      playValve();
      moves++;
      document.getElementById('moves').textContent=String(moves);
      updateFlow(true);
      return true;
    }
    lastValveCell={r:r,c:c};
    lastValveTap=now;
  }
  const max=cell.type==='X'?1:4;
  cell.rot=(cell.rot+1)%max;
  if(cell.type==='B')cell.touched=true;
  spinAnim={r:r,c:c,t:0};
  moves++;
  document.getElementById('moves').textContent=String(moves);
  playRotate();
  updateFlow(true);
  return true;
}

function resetLevel(){
  document.getElementById('lose-ov').classList.add('hidden');
  mode='play';
  loadLevel(levelIdx);
}

function showHint(){
  if(won)return;
  if(kitActive()&&!buildMode){
    for(let r=0;r<rows;r++){
      for(let c=0;c<cols;c++){
        if(grid[r]&&grid[r][c])continue;
        const tryTypes=['I','L','T'];
        for(let ti=0;ti<tryTypes.length;ti++){
          const t=tryTypes[ti];
          if(!buildInventory[t])continue;
          if(placeBuildPipe(r,c,t)){
            moves++;
            document.getElementById('moves').textContent=String(moves);
            playHint();
            updateFlow(true);
            setStatus('Placed a '+t+' pipe — keep connecting!','flow');
            return;
          }
        }
      }
    }
  }
  if(buildMode){
    for(let r=0;r<rows;r++){
      for(let c=0;c<cols;c++){
        if(grid[r]&&grid[r][c])continue;
        if(selectedBuildPipe!=='erase'&&placeBuildPipe(r,c,selectedBuildPipe)){
          moves++;
          document.getElementById('moves').textContent=String(moves);
          playHint();
          updateFlow(true);
          setStatus('Placed a pipe — keep building!','flow');
          return;
        }
      }
    }
    setStatus('Pick straights or corners from the kit!','idle');
    playHint();
    return;
  }
  const base=cloneGrid(grid);
  for(let r=0;r<rows;r++){
    for(let c=0;c<cols;c++){
      const start=base[r]&&base[r][c];
      if(!start||start.fixed||isSolidBlock(start))continue;
      const max=start.type==='X'?1:4;
      for(let rot=0;rot<max;rot++){
        if(rot===start.rot)continue;
        grid=cloneGrid(base);
        grid[r][c].rot=rot;
        if(grid[r][c].type==='B')grid[r][c].touched=true;
        if(grid[r][c].type==='V'){grid[r][c].open=true;grid[r][c].touched=true;}
        const test=computeFlow();
        const tLen=countRoutePipes(test.filled);
        if(test.goalReached&&routeConstraintOk(tLen)){
          moves++;
          document.getElementById('moves').textContent=String(moves);
          spinAnim={r:r,c:c,t:0};
          playHint();
          updateFlow(true);
          setStatus('Hint applied! ✨','flow');
          return;
        }
      }
    }
  }
  playHint();
  setStatus('Try the corner pipes!','idle');
}

function resize(){
  if(!canvas)return;
  const wrap=document.getElementById('canvas-wrap')||document.getElementById('board-wrap');
  const w=wrap.clientWidth,h=wrap.clientHeight;
  const dpr=Math.min(window.devicePixelRatio||1,2);
  canvas.width=Math.floor(w*dpr);
  canvas.height=Math.floor(h*dpr);
  canvas.style.width=w+'px';
  canvas.style.height=h+'px';
  ctx.setTransform(dpr,0,0,dpr,0,0);
  const dim=Math.max(rows,cols);
  const pad=dim>=8?10:dim>=6?12:16;
  const kit=document.getElementById('kit-bar');
  const hasKit=kit&&kit.classList.contains('show');
  let minCell=44;
  if(dim>=9)minCell=28;
  else if(dim>=8)minCell=32;
  else if(dim>=7)minCell=36;
  else if(dim>=6)minCell=40;
  let playH=h;
  if(hasKit){
    const estGw=Math.floor(Math.min((w-pad*2)/cols,(h-pad*2)/rows))*cols;
    playH=Math.max(rows*minCell,h-kitHeaderHeight(estGw));
  }
  cellSize=Math.floor(Math.min((w-pad*2)/cols,(playH-pad*2)/rows));
  cellSize=Math.max(minCell,Math.min(cellSize,96));
  const gw=cellSize*cols,gh=cellSize*rows;
  const kh=hasKit?kitHeaderHeight(gw):0;
  gridOffX=(w-gw)/2;
  if(hasKit){
    gridOffY=kh+Math.max(0,(h-kh-gh)/2);
    if(gridOffY+gh>h-pad)gridOffY=Math.max(kh,(h-gh)/2);
  }else{
    gridOffY=(h-gh)/2;
  }
  layoutKitHeader(gw,kh,gridOffX,gridOffY);
  renderFrame();
}

function cellCenter(r,c){
  return[gridOffX+c*cellSize+cellSize/2,gridOffY+r*cellSize+cellSize/2];
}

function ensureAnimLoop(){
  if(animRunning)return;
  animRunning=true;
  requestAnimationFrame(tick);
}

function tickWinCheck(){
  if(won||winPending||mode!=='play')return;
  if(goalsLeft>0)return;
  if(!routeConstraintOk(countRoutePipes(filled)))return;
  updateFlow(true);
}

function tick(){
  if(mode!=='play'){animRunning=false;return;}
  animT+=0.016;
  if(spinAnim){
    spinAnim.t+=0.12;
    if(spinAnim.t>=1)spinAnim=null;
  }
  if(flowPath.length>1){
    const target=flowPath.length-1+0.5;
    if(flowPhase<target)flowPhase=Math.min(target,flowPhase+0.08);
  }
  if(!won&&filled.size>0){
    leaks=computeLeaks(filled);
    updateLeakBuckets(leaks);
    updateGardenBuckets();
    updateBucketHud();
    tickWinCheck();
  }
  spawnFlowBubbles();
  spawnLeakParticles();
  updateWaterPhysics();
  updateSiphonStreams();
  updateAndDrawDrops();
  renderFrame();
  requestAnimationFrame(tick);
}

function drawSolidObstacle(x,y,cell,r,c){
  const cx=x+cellSize/2,cy=y+cellSize/2;
  if(isAnimal(cell)){
    ctx.fillStyle=(r+c)%2===0?boardTheme.grass[0]:boardTheme.grass[1];
    ctx.fillRect(x,y,cellSize,cellSize);
    const bob=Math.sin(animT*3+r*0.7+c)*1.5;
    ctx.font=(cellSize*.42)+'px serif';
    ctx.textAlign='center';
    ctx.textBaseline='middle';
    ctx.fillText(obstacleEmoji(cell),cx,cy+bob);
    return;
  }
  if(isWall(cell)){
    ctx.fillStyle=cell.variant===1?'#4a3020':'#3d2818';
    ctx.fillRect(x,y,cellSize,cellSize);
    ctx.fillStyle='rgba(0,0,0,.18)';
    ctx.fillRect(x+3,y+3,cellSize-6,cellSize-6);
    ctx.font=(cellSize*.36)+'px serif';
    ctx.textAlign='center';
    ctx.textBaseline='middle';
    ctx.fillText(obstacleEmoji(cell),cx,cy);
    return;
  }
  ctx.fillStyle=levelIdx===FINALE_IDX?'#3a1818':'#2a2218';
  ctx.fillRect(x,y,cellSize,cellSize);
  ctx.font=(cellSize*.38)+'px serif';
  ctx.textAlign='center';
  ctx.textBaseline='middle';
  ctx.fillText('🪨',cx,cy);
}

function renderFrame(){
  if(!ctx)return;
  const w=canvas.width/(window.devicePixelRatio||1);
  const h=canvas.height/(window.devicePixelRatio||1);
  ctx.clearRect(0,0,w,h);

  const gw=cellSize*cols,gh=cellSize*rows;
  ctx.fillStyle=boardTheme.frame||'#0d1a12';
  ctx.fillRect(gridOffX-8,gridOffY-8,gw+16,gh+16);

  for(let r=0;r<rows;r++){
    for(let c=0;c<cols;c++){
      const x=gridOffX+c*cellSize,y=gridOffY+r*cellSize;
      const cell=grid[r]&&grid[r][c];
      if(cell&&isSolidBlock(cell)){
        drawSolidObstacle(x,y,cell,r,c);
        ctx.strokeStyle='rgba(255,255,255,.04)';
        ctx.strokeRect(x+.5,y+.5,cellSize-1,cellSize-1);
        continue;
      }
      ctx.fillStyle=(r+c)%2===0?boardTheme.grass[0]:boardTheme.grass[1];
      ctx.fillRect(x,y,cellSize,cellSize);
      if(kitActive()&&!cell){
        ctx.strokeStyle='rgba(255,225,77,.25)';
        ctx.lineWidth=1;
        ctx.strokeRect(x+cellSize*.2,y+cellSize*.2,cellSize*.6,cellSize*.6);
        ctx.font=(cellSize*.24)+'px serif';
        ctx.textAlign='center';
        ctx.textBaseline='middle';
        ctx.fillStyle='rgba(255,225,77,.4)';
        ctx.fillText('+',x+cellSize/2,y+cellSize/2);
      }
      ctx.strokeStyle='rgba(255,255,255,.04)';
      ctx.strokeRect(x+.5,y+.5,cellSize-1,cellSize-1);
    }
  }

  drawPuddles();
  drawNetworkFlow();
  drawFlowUnderlay();
  drawPipelineBreaks();
  if((drag&&drag.moved)||(paletteDrag&&paletteDrag.moved))drawDropHighlights();
  for(let r=0;r<rows;r++){
    for(let c=0;c<cols;c++){
      if(drag&&drag.moved&&drag.r===r&&drag.c===c)continue;
      const cell=grid[r]&&grid[r][c];
      if(cell)drawPipe(r,c,cell);
    }
  }
  if((drag&&drag.moved)||(paletteDrag&&paletteDrag.moved))drawDragGhost();
  drawFlowParticles();
  drawLeakBuckets();
  drawSiphonStreams();
  drawDecorations();
  drawLeakParticles();
  drawBubbles();
}

function drawPipelineBreaks(){
  if(!filled.size)return;
  filled.forEach(function(key){
    const parts=key.split(',');
    const r=+parts[0],c=+parts[1];
    const cell=grid[r]&&grid[r][c];
    if(!cell)return;
    const m=maskFor(cell);
    for(let i=0;i<4;i++){
      const d=DIRS[i];
      if(!(m&d))continue;
      const dk=dirKey(d);
      const nr=r+DR[dk][0],nc=c+DR[dk][1];
      const nk=nr+','+nc;
      let broken=false;
      if(nr<0||nc<0||nr>=rows||nc>=cols)broken=true;
      else{
        const nb=grid[nr]&&grid[nr][nc];
        if(!nb)broken=true;
        else if(!filled.has(nk)||!(maskFor(nb)&OPP[d]))broken=true;
      }
      if(!broken)continue;
      const xy=portXY(r,c,d);
      const pulse=.55+.45*Math.sin(animT*6+r+c);
      ctx.save();
      ctx.globalAlpha=pulse;
      ctx.fillStyle='#ff9a3c';
      ctx.beginPath();
      ctx.arc(xy[0],xy[1],cellSize*.1,0,Math.PI*2);
      ctx.fill();
      ctx.strokeStyle='rgba(255,225,77,.9)';
      ctx.lineWidth=2;
      ctx.beginPath();
      ctx.arc(xy[0],xy[1],cellSize*.14,0,Math.PI*2);
      ctx.stroke();
      ctx.restore();
    }
  });
}

function rebuildFlowParticles(){
  flowParticles.length=0;
  const edgeSeen=new Set();
  filled.forEach(function(k){
    const parts=k.split(',');
    const r=+parts[0],c=+parts[1];
    const cell=grid[r]&&grid[r][c];
    if(!cell)return;
    const m=maskFor(cell);
    for(let i=0;i<4;i++){
      const d=DIRS[i];
      if(!(m&d))continue;
      const nr=r+DR[dirKey(d)][0],nc=c+DR[dirKey(d)][1];
      const nk=nr+','+nc;
      if(!filled.has(nk))continue;
      const ek=k+'|'+nk;
      if(edgeSeen.has(ek))continue;
      edgeSeen.add(ek);
      const a=portXY(r,c,d);
      const b=portXY(nr,nc,OPP[d]);
      const dist=flowDist.get(k)||0;
      flowParticles.push({
        ax:a[0],ay:a[1],bx:b[0],by:b[1],
        t:Math.random(),speed:.35+Math.random()*.25,
        dist:dist,color:cellColorsAt(r,c),
      });
    }
  });
}

function drawNetworkFlow(){
  if(filled.size<2)return;
  const edgeSeen=new Set();
  filled.forEach(function(k){
    const parts=k.split(',');
    const r=+parts[0],c=+parts[1];
    const m=maskFor(grid[r][c]);
    for(let i=0;i<4;i++){
      const d=DIRS[i];
      if(!(m&d))continue;
      const nr=r+DR[dirKey(d)][0],nc=c+DR[dirKey(d)][1];
      const nk=nr+','+nc;
      if(!filled.has(nk))continue;
      const ek=k+'|'+nk;
      if(edgeSeen.has(ek))continue;
      edgeSeen.add(ek);
      const a=portXY(r,c,d);
      const b=portXY(nr,nc,OPP[d]);
      const dist=flowDist.get(k)||0;
      if(flowPhase<dist+0.2)continue;
      const cols=flowColors.get(k);
      const hex=(cols&&cols.size===1)?(WATER_COLORS[[...cols][0]]||'#5bc8ff'):'#5bc8ff';
      const rr=parseInt(hex.slice(1,3),16),gg=parseInt(hex.slice(3,5),16),bb=parseInt(hex.slice(5,7),16);
      const pulse=.55+.45*Math.sin(animT*5-dist);
      const wave=Math.sin(animT*8-dist)*cellSize*.04;
      const mx=(a[0]+b[0])/2+wave;
      const my=(a[1]+b[1])/2+wave;
      const grad=ctx.createLinearGradient(a[0],a[1],b[0],b[1]);
      grad.addColorStop(0,'rgba('+rr+','+gg+','+bb+','+(0.25*pulse)+')');
      grad.addColorStop(.5,'rgba('+rr+','+gg+','+bb+','+(0.7*pulse)+')');
      grad.addColorStop(1,'rgba('+rr+','+gg+','+bb+','+(0.25*pulse)+')');
      ctx.strokeStyle=grad;
      ctx.lineWidth=cellSize*.1;
      ctx.lineCap='round';
      ctx.beginPath();
      ctx.moveTo(a[0],a[1]);
      ctx.quadraticCurveTo(mx,my,b[0],b[1]);
      ctx.stroke();
    }
  });
}

function drawFlowParticles(){
  for(let i=0;i<flowParticles.length;i++){
    const p=flowParticles[i];
    if(flowPhase<p.dist+0.15)continue;
    p.t+=p.speed*0.016;
    if(p.t>1)p.t-=1;
    const px=p.ax+(p.bx-p.ax)*p.t;
    const py=p.ay+(p.by-p.ay)*p.t;
    const wc=WATER_COLORS[p.color]||'#5bc8ff';
    ctx.globalAlpha=.85;
    ctx.fillStyle=wc;
    ctx.beginPath();
    ctx.arc(px,py,cellSize*.05,0,Math.PI*2);
    ctx.fill();
    ctx.globalAlpha=1;
  }
}

function spawnLeakParticles(){
  if(mode!=='play')return;
  for(let i=0;i<leaks.length;i++){
    const L=leaks[i];
    if(Math.random()>0.5)continue;
    const xy=portXY(L.r,L.c,L.dir);
    const dk=dirKey(L.dir);
    const push=cellSize*.02;
    leakDrips.push({
      x:xy[0],y:xy[1],
      vx:DR[dk][1]*push+(Math.random()-.5)*1.2,
      vy:DR[dk][0]*push+(Math.random()-.3)*.8,
      life:1,
      color:L.color||'b',
      kind:L.type==='crack'?'crack':'drip',
    });
    if(L.type==='crack'&&Math.random()<0.15)playLeak();
  }
  for(let r=0;r<rows;r++){
    for(let c=0;c<cols;c++){
      const cell=grid[r]&&grid[r][c];
      if(!cell||cell.type!=='G'||!goalWateredAt(r,c,cell,filled,flowColors))continue;
      if(Math.random()>0.92)continue;
      const cx=gridOffX+c*cellSize+cellSize/2;
      const cy=gridOffY+r*cellSize+cellSize/2;
      leakDrips.push({
        x:cx+(Math.random()-.5)*cellSize*.3,
        y:cy-cellSize*.1,
        vx:(Math.random()-.5)*1.5,
        vy:-1.5-Math.random()*2,
        life:1,
        color:cell.color||'b',
        kind:'overflow',
      });
    }
  }
  while(leakDrips.length>120)leakDrips.shift();
}

function updateWaterPhysics(){
  for(let i=leakDrips.length-1;i>=0;i--){
    const d=leakDrips[i];
    d.x+=d.vx;
    d.y+=d.vy;
    d.vy+=d.kind==='overflow'?0.06:0.14;
    d.vx*=.98;
    d.life-=d.kind==='overflow'?0.018:0.028;
    if(d.life<=0)leakDrips.splice(i,1);
  }
  for(let i=0;i<leaks.length;i++){
    const L=leaks[i];
    if(L.type==='overflow')continue;
    const key=L.r+','+L.c+','+L.dir;
    const xy=portXY(L.r,L.c,L.dir);
    const p=puddles.get(key)||{x:xy[0],y:xy[1],r:2,alpha:0};
    p.r=Math.min(cellSize*.22,p.r+0.35);
    p.alpha=Math.min(0.55,p.alpha+0.02);
    puddles.set(key,p);
  }
  puddles.forEach(function(p,key){
    const still=leaks.some(function(L){
      return L.r+','+L.c+','+L.dir===key;
    });
    if(!still){
      p.alpha-=0.03;
      p.r*=0.97;
      if(p.alpha<=0)puddles.delete(key);
    }
  });
}

function drawPuddles(){
  puddles.forEach(function(p){
    ctx.globalAlpha=p.alpha;
    ctx.fillStyle='#3a7ab8';
    ctx.beginPath();
    ctx.ellipse(p.x,p.y,p.r,p.r*.65,0,0,Math.PI*2);
    ctx.fill();
    ctx.globalAlpha=1;
  });
}

function drawLeakParticles(){
  for(let i=0;i<leakDrips.length;i++){
    const d=leakDrips[i];
    const wc=WATER_COLORS[d.color]||'#5bc8ff';
    ctx.globalAlpha=d.life*(d.kind==='overflow'?0.75:0.9);
    if(d.kind==='overflow'){
      ctx.fillStyle=wc;
      ctx.beginPath();
      ctx.arc(d.x,d.y,3+d.life*2,0,Math.PI*2);
      ctx.fill();
    }else{
      ctx.strokeStyle=wc;
      ctx.lineWidth=2;
      ctx.beginPath();
      ctx.moveTo(d.x,d.y);
      ctx.lineTo(d.x-d.vx*3,d.y-d.vy*3);
      ctx.stroke();
      ctx.fillStyle='#e8f8ff';
      ctx.beginPath();
      ctx.arc(d.x,d.y,2.5,0,Math.PI*2);
      ctx.fill();
    }
    ctx.globalAlpha=1;
  }
  for(let i=0;i<leaks.length;i++){
    const L=leaks[i];
    const xy=portXY(L.r,L.c,L.dir);
    const pulse=.5+.5*Math.sin(animT*12+i);
    ctx.globalAlpha=.25+.2*pulse;
    if(L.type==='gap'){
      ctx.strokeStyle='#ff9a3c';
      ctx.lineWidth=2;
      ctx.beginPath();
      ctx.arc(xy[0],xy[1],cellSize*.11,0,Math.PI*2);
      ctx.stroke();
    }else{
      ctx.fillStyle='#8ed4ff';
      ctx.beginPath();
      ctx.arc(xy[0],xy[1],cellSize*.12,0,Math.PI*2);
      ctx.fill();
    }
    ctx.globalAlpha=1;
  }
}

function drawBucketIcon(x,y,fill,scale,accent){
  const w=cellSize*scale,h=cellSize*scale*1.2;
  const top=w*.7,bot=w*.88;
  const baseY=y+h*0.2;
  ctx.fillStyle='#5c4e40';
  ctx.strokeStyle='#8a7868';
  ctx.lineWidth=1.5;
  ctx.beginPath();
  ctx.moveTo(x-top/2,baseY-h*0.45);
  ctx.lineTo(x+top/2,baseY-h*0.45);
  ctx.lineTo(x+bot/2,baseY+h*0.42);
  ctx.lineTo(x-bot/2,baseY+h*0.42);
  ctx.closePath();
  ctx.fill();
  ctx.stroke();
  const maxInner=h*0.72*fill;
  if(maxInner>2){
    ctx.fillStyle=accent||'rgba(91,200,255,.88)';
    ctx.fillRect(x-w*0.28,baseY+h*0.4-maxInner,w*0.56,maxInner);
    ctx.globalAlpha=.35+fill*0.35;
    ctx.fillStyle='#fff';
    ctx.fillRect(x-w*0.2,baseY+h*0.38-maxInner,w*0.12,maxInner*0.4);
    ctx.globalAlpha=1;
  }
}

function drawLeakBuckets(){
  leakBuckets.forEach(function(fill,key){
    if(fill<0.06)return;
    const p=key.split(',');
    const d=+p[2];
    const xy=portXY(+p[0],+p[1],d);
    const dk=dirKey(d);
    const ox=DR[dk][1]*cellSize*0.28;
    const oy=DR[dk][0]*cellSize*0.28;
    drawBucketIcon(xy[0]+ox,xy[1]+oy,fill,0.2,'rgba(100,210,255,.9)');
  });
}

function drawSiphonStreams(){
  const dest=findSourceCenter();
  for(let i=0;i<siphonStreams.length;i++){
    const s=siphonStreams[i];
    ctx.globalAlpha=.85*(1-s.t*0.5);
    ctx.fillStyle='#b8ecff';
    ctx.beginPath();
    ctx.arc(s.x,s.y,2.5+2*(1-s.t),0,Math.PI*2);
    ctx.fill();
  }
  if(siphonAnim>0.1){
    ctx.globalAlpha=siphonAnim*0.5;
    ctx.strokeStyle='#8ed4ff';
    ctx.lineWidth=3;
    ctx.setLineDash([6,6]);
    ctx.lineDashOffset=-animT*40;
    ctx.beginPath();
    ctx.arc(dest[0],dest[1],cellSize*0.45,0,Math.PI*2);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.globalAlpha=1;
  }
}

function drawFlowUnderlay(){
  if(flowPath.length<2)return;
  for(let i=1;i<flowPath.length;i++){
    if(flowPhase<i-0.15)continue;
    const a=flowPath[i-1],b=flowPath[i];
    const ax=gridOffX+a[1]*cellSize+cellSize/2;
    const ay=gridOffY+a[0]*cellSize+cellSize/2;
    const bx=gridOffX+b[1]*cellSize+cellSize/2;
    const by=gridOffY+b[0]*cellSize+cellSize/2;
    const segProg=Math.min(1,Math.max(0,flowPhase-(i-1)));
    const px=ax+(bx-ax)*segProg;
    const py=ay+(by-ay)*segProg;
    const cols=flowColors.get(a[0]+','+a[1]);
    const hex=(cols&&cols.size===1)?(WATER_COLORS[[...cols][0]]||'#5bc8ff'):'#5bc8ff';
    const rr=parseInt(hex.slice(1,3),16),gg=parseInt(hex.slice(3,5),16),bb=parseInt(hex.slice(5,7),16);
    const grad=ctx.createLinearGradient(ax,ay,px,py);
    grad.addColorStop(0,'rgba('+rr+','+gg+','+bb+',0.55)');
    grad.addColorStop(1,'rgba('+rr+','+gg+','+bb+',0.95)');
    ctx.strokeStyle=grad;
    ctx.lineWidth=cellSize*.14;
    ctx.lineCap='round';
    ctx.beginPath();
    ctx.moveTo(ax,ay);
    ctx.lineTo(px,py);
    ctx.stroke();
  }
}

function spawnFlowBubbles(){
  if(flowPath.length<2||flowPhase<0.5)return;
  if(Math.random()>0.35)return;
  const seg=Math.min(flowPath.length-2,Math.floor(flowPhase));
  const a=flowPath[seg],b=flowPath[seg+1];
  const t=flowPhase-seg;
  const ax=gridOffX+a[1]*cellSize+cellSize/2;
  const ay=gridOffY+a[0]*cellSize+cellSize/2;
  const bx=gridOffX+b[1]*cellSize+cellSize/2;
  const by=gridOffY+b[0]*cellSize+cellSize/2;
  bubbles.push({
    x:ax+(bx-ax)*t+(Math.random()-.5)*8,
    y:ay+(by-ay)*t+(Math.random()-.5)*8,
    r:2+Math.random()*3,
    life:1,
  });
}

function drawBubbles(){
  for(let i=bubbles.length-1;i>=0;i--){
    const b=bubbles[i];
    b.y-=0.6;
    b.life-=0.025;
    if(b.life<=0){bubbles.splice(i,1);continue;}
    ctx.globalAlpha=b.life*.7;
    ctx.fillStyle='#b8ecff';
    ctx.beginPath();
    ctx.arc(b.x,b.y,b.r,0,Math.PI*2);
    ctx.fill();
    ctx.globalAlpha=1;
  }
}

function drawDecorations(){
  for(let r=0;r<rows;r++){
    for(let c=0;c<cols;c++){
      const cell=grid[r]&&grid[r][c];
      if(!cell)continue;
      const cx=gridOffX+c*cellSize+cellSize/2;
      const cy=gridOffY+r*cellSize+cellSize/2;
      const k=r+','+c;
      const goalWet=cell.type==='G'&&goalWateredAt(r,c,cell,filled,flowColors);
      if(cell.type==='S'){
        ctx.font=(cellSize*.42)+'px serif';
        ctx.textAlign='center';
        ctx.textBaseline='middle';
        const em=cell.color==='r'?'🔴':cell.color==='y'?'🟡':'🚿';
        ctx.fillText(em,cx,cy-cellSize*.08);
      }
      if(cell.type==='G'){
        const gFill=gardenBuckets.get(k)||0;
        drawBucketIcon(cx,cy+cellSize*0.28,gFill,0.26,cell.color==='r'?'rgba(255,140,200,.9)':cell.color==='y'?'rgba(255,230,120,.9)':'rgba(91,200,255,.9)');
        const emSet=GOAL_EMOJI[cell.color]||GOAL_EMOJI.b;
        if(goalWet){
          ctx.save();
          ctx.globalAlpha=.35+.2*Math.sin(animT*5);
          ctx.fillStyle=cell.color==='r'?'rgba(255,110,180,.25)':'rgba(93,255,176,.25)';
          ctx.beginPath();
          ctx.arc(cx,cy,cellSize*.42,0,Math.PI*2);
          ctx.fill();
          ctx.restore();
        }
        ctx.font=(cellSize*.42)+'px serif';
        ctx.textAlign='center';
        ctx.textBaseline='middle';
        const dryEm=cell.sprinkler?'🪴':emSet[0];
        ctx.fillText(goalWet?emSet[1]:dryEm,cx,cy+cellSize*.05);
      }
    }
  }
}

function drawPipe(r,c,cell){
  const cx=gridOffX+c*cellSize+cellSize/2;
  const cy=gridOffY+r*cellSize+cellSize/2;
  const half=cellSize*.34;
  const w=cellSize*.18;
  const k=r+','+c;
  const dist=flowDist.get(k);
  const hasWater=dist!==undefined&&flowPhase>=dist;
  const isPipe=cell.type==='I'||cell.type==='L'||cell.type==='T'||cell.type==='B'||cell.type==='V'||cell.type==='X';
  const m=maskFor(cell);
  let spin=0;
  if(spinAnim&&spinAnim.r===r&&spinAnim.c===c)spin=spinAnim.t*Math.PI/2;

  ctx.save();
  if(isPipe&&!hasWater&&filled.size>0)ctx.globalAlpha=.42;
  ctx.translate(cx,cy);
  ctx.rotate(spin);
  ctx.translate(-cx,-cy);

  if(cell.type==='S'||cell.type==='G'||cell.type==='K'){
    if(hasWater){
      ctx.save();
      ctx.globalAlpha=.35+.15*Math.sin(animT*4+k.length);
      drawConnections(cx,cy,half,w,m,true,dist||0,cellColorsAt(r,c));
      ctx.restore();
    }
    if(cell.type==='K'){
      ctx.font=(cellSize*.28)+'px serif';
      ctx.textAlign='center';
      ctx.textBaseline='middle';
      ctx.fillText('🪨',cx,cy);
    }
    ctx.restore();
    return;
  }

  if(cell.type==='B'&&!cell.touched){
    ctx.fillStyle='rgba(80,60,50,.25)';
    ctx.fillRect(cx-cellSize*.36,cy-cellSize*.36,cellSize*.72,cellSize*.72);
    const spray=.4+.3*Math.sin(animT*10);
    ctx.globalAlpha=spray;
    ctx.fillStyle='rgba(120,200,255,.35)';
    ctx.beginPath();
    ctx.arc(cx,cy,cellSize*.2,0,Math.PI*2);
    ctx.fill();
    ctx.globalAlpha=1;
    ctx.font=(cellSize*.22)+'px serif';
    ctx.textAlign='center';
    ctx.textBaseline='middle';
    ctx.fillText('💦',cx,cy);
  }else if(cell.type==='B'&&cell.touched&&hasWater){
    ctx.font=(cellSize*.16)+'px serif';
    ctx.textAlign='center';
    ctx.textBaseline='middle';
    ctx.fillText('🔧',cx,cy-cellSize*.32);
  }else{
    ctx.fillStyle='rgba(255,255,255,.06)';
    ctx.beginPath();
    ctx.arc(cx,cy,cellSize*.38,0,Math.PI*2);
    ctx.fill();
  }

  drawConnections(cx,cy,half,w,m,hasWater,dist||0,cellColorsAt(r,c));

  if(cell.type==='V'){
    ctx.font=(cellSize*.2)+'px serif';
    ctx.textAlign='center';
    ctx.textBaseline='middle';
    ctx.fillText(cell.open?'🟢':'🔴',cx,cy+cellSize*.28);
  }

  if(cell.placed){
    ctx.strokeStyle='rgba(255,225,77,.55)';
    ctx.lineWidth=2;
    ctx.strokeRect(cx-cellSize*.36,cy-cellSize*.36,cellSize*.72,cellSize*.72);
  }

  ctx.restore();
}

function cellColorsAt(r,c){
  const k=r+','+c;
  const cols=flowColors.get(k);
  if(!cols||!cols.size)return 'b';
  return [...cols][0];
}

function drawConnections(cx,cy,half,w,m,water,dist,flowCol){
  const wc=WATER_COLORS[flowCol]||'#5bc8ff';
  const pipeCol=water?'#3a8fd4':'#6a7a72';
  const innerCol=water?wc:'#8a9a92';
  ctx.lineCap='round';
  ctx.lineJoin='round';
  if(m&N)drawSeg(cx,cy,cx,cy-half,w,pipeCol,innerCol,water,dist);
  if(m&E)drawSeg(cx,cy,cx+half,cy,w,pipeCol,innerCol,water,dist);
  if(m&S)drawSeg(cx,cy,cx,cy+half,w,pipeCol,innerCol,water,dist);
  if(m&W)drawSeg(cx,cy,cx-half,cy,w,pipeCol,innerCol,water,dist);
  ctx.fillStyle=innerCol;
  ctx.beginPath();
  ctx.arc(cx,cy,w*.55,0,Math.PI*2);
  ctx.fill();
}

function drawSeg(x1,y1,x2,y2,w,outer,inner,water,dist){
  ctx.strokeStyle=outer;
  ctx.lineWidth=w*1.35;
  ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();
  ctx.strokeStyle=inner;
  ctx.lineWidth=w*.75;
  ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();
  if(water){
    const pulse=.5+.5*Math.sin(animT*6-dist);
    ctx.strokeStyle='rgba(120,220,255,'+(0.35+pulse*.45)+')';
    ctx.lineWidth=w*.4;
    ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();
    ctx.strokeStyle='rgba(255,255,255,'+(0.15+pulse*.25)+')';
    ctx.lineWidth=w*.15;
    ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();
  }
}

function spawnCelebration(){
  let gx=gridOffX+cellSize,gy=gridOffY+cellSize;
  for(let r=0;r<rows;r++){
    for(let c=0;c<cols;c++){
      const cell=grid[r]&&grid[r][c];
      if(cell&&cell.type==='G'){
        gx=gridOffX+c*cellSize+cellSize/2;
        gy=gridOffY+r*cellSize+cellSize/2;
      }
    }
  }
  for(let i=0;i<28;i++){
    waterDrops.push({
      x:gx+(Math.random()-.5)*cellSize*.8,
      y:gy+(Math.random()-.5)*cellSize*.4,
      vx:(Math.random()-.5)*4,
      vy:-2-Math.random()*4,
      life:1,
      em:['💧','✨','🌱','💦','🌻'][Math.floor(Math.random()*5)],
    });
  }
}

function updateAndDrawDrops(){
  for(let i=waterDrops.length-1;i>=0;i--){
    const d=waterDrops[i];
    d.x+=d.vx;d.y+=d.vy;d.vy+=.08;d.life-=.015;
    if(d.life<=0){waterDrops.splice(i,1);continue;}
    ctx.globalAlpha=d.life;
    ctx.font='18px serif';
    ctx.textAlign='center';
    ctx.fillText(d.em,d.x,d.y);
    ctx.globalAlpha=1;
  }
}

function clientToCanvas(clientX,clientY){
  const rect=canvas.getBoundingClientRect();
  return{x:clientX-rect.left,y:clientY-rect.top};
}

function pointerToCell(clientX,clientY){
  const p=clientToCanvas(clientX,clientY);
  const c=Math.floor((p.x-gridOffX)/cellSize);
  const r=Math.floor((p.y-gridOffY)/cellSize);
  if(r<0||c<0||r>=rows||c>=cols)return null;
  return{r,c};
}

function onSiphonTap(){
  if(mode!=='play'||won||winPending)return;
  if(wasteBucket<3){
    setStatus('Nothing spilled yet — fix the pipes first!','idle');
    playHint();
    return;
  }
  doSiphon(null,null,38);
  setStatus('♻️ Used the spilled water again!','flow');
}

function clearDrag(){
  drag=null;
  paletteDrag=null;
  activePointerId=null;
  document.querySelectorAll('.pipe-pick.dragging').forEach(function(b){b.classList.remove('dragging');});
  if(canvas)canvas.style.cursor=mode==='play'?'grab':'';
}

function canPlaceKitAt(r,c,type){
  if(!type||BUILD_TYPES.indexOf(type)<0||kitStock(type)<=0)return false;
  if(r<0||c<0||r>=rows||c>=cols)return false;
  ensureGridRow(r);
  const cell=grid[r]&&grid[r][c];
  if(cell&&cell.fixed)return false;
  if(cell&&blocksPipePlacement(cell))return false;
  if(!cell)return true;
  return !!cell.placed;
}

function dropKitAt(r,c,type){
  selectedBuildPipe=type;
  const cell=grid[r]&&grid[r][c];
  if(!cell)return placeKitAt(r,c);
  if(cell.placed)return swapPlacedPipeType(r,c,type);
  return false;
}

function endKitDragListeners(){
  document.removeEventListener('pointermove',onKitPointerMove,true);
  document.removeEventListener('pointerup',onKitPointerUp,true);
  document.removeEventListener('pointercancel',onKitPointerUp,true);
  if(canvas&&mode==='play')canvas.style.cursor='grab';
}

function startKitDragListeners(){
  document.addEventListener('pointermove',onKitPointerMove,{capture:true,passive:false});
  document.addEventListener('pointerup',onKitPointerUp,{capture:true});
  document.addEventListener('pointercancel',onKitPointerUp,{capture:true});
}

function onKitPointerDown(e){
  if(mode!=='play'||won||winPending)return;
  if(e.button!==0)return;
  const btn=e.target.closest('.pipe-pick');
  if(!btn||btn.disabled||btn.classList.contains('hidden'))return;
  const type=btn.getAttribute('data-pipe');
  if(type==='erase'){
    setBuildPipe('erase');
    return;
  }
  if(kitStock(type)<=0)return;
  e.preventDefault();
  e.stopPropagation();
  clearDrag();
  endKitDragListeners();
  paletteDrag={type:type,x:e.clientX,y:e.clientY,x0:e.clientX,y0:e.clientY,moved:false,pointerId:e.pointerId,btn:btn};
  btn.classList.add('dragging');
  setBuildPipe(type);
  startKitDragListeners();
  try{canvas.setPointerCapture(e.pointerId);}catch(err){}
  ensureAnimLoop();
}

function onKitPointerMove(e){
  if(!paletteDrag||paletteDrag.pointerId!==e.pointerId)return;
  e.preventDefault();
  paletteDrag.x=e.clientX;
  paletteDrag.y=e.clientY;
  const dx=paletteDrag.x-paletteDrag.x0,dy=paletteDrag.y-paletteDrag.y0;
  if(!paletteDrag.moved&&dx*dx+dy*dy>DRAG_THRESHOLD*DRAG_THRESHOLD){
    paletteDrag.moved=true;
    if(canvas)canvas.style.cursor='crosshair';
    setStatus('Release on a + cell to place','flow');
  }
  ensureAnimLoop();
}

function onKitPointerUp(e){
  if(!paletteDrag||paletteDrag.pointerId!==e.pointerId)return;
  const pd=paletteDrag;
  paletteDrag=null;
  endKitDragListeners();
  try{canvas.releasePointerCapture(e.pointerId);}catch(err){}
  if(pd.btn)pd.btn.classList.remove('dragging');
  if(pd.moved){
    suppressPipePickClick=true;
    setTimeout(function(){suppressPipePickClick=false;},400);
  }
  const pt=pointerToCell(pd.x,pd.y);
  if(pd.moved&&pt&&canPlaceKitAt(pt.r,pt.c,pd.type)){
    dropKitAt(pt.r,pt.c,pd.type);
    return;
  }
  if(pd.moved)setStatus('Drop on an empty + cell (or a pipe to swap)','idle');
  else setBuildPipe(pd.type);
}

function drawDropHighlights(){
  if(paletteDrag&&paletteDrag.moved){
    const type=paletteDrag.type;
    for(let r=0;r<rows;r++){
      for(let c=0;c<cols;c++){
        if(!canPlaceKitAt(r,c,type))continue;
        const x=gridOffX+c*cellSize,y=gridOffY+r*cellSize;
        ctx.fillStyle='rgba(255,225,77,.12)';
        ctx.fillRect(x+4,y+4,cellSize-8,cellSize-8);
      }
    }
    const hover=pointerToCell(paletteDrag.x,paletteDrag.y);
    if(hover&&canPlaceKitAt(hover.r,hover.c,type)){
      const x=gridOffX+hover.c*cellSize,y=gridOffY+hover.r*cellSize;
      ctx.fillStyle='rgba(255,225,77,.28)';
      ctx.fillRect(x+4,y+4,cellSize-8,cellSize-8);
      ctx.strokeStyle='rgba(255,225,77,.95)';
      ctx.lineWidth=3;
      ctx.strokeRect(x+3,y+3,cellSize-6,cellSize-6);
    }
    return;
  }
  if(!drag||!drag.moved)return;
  const hover=pointerToCell(drag.x,drag.y);
  if(!hover||!canDropAt(hover.r,hover.c,drag.r,drag.c))return;
  const x=gridOffX+hover.c*cellSize,y=gridOffY+hover.r*cellSize;
  ctx.fillStyle='rgba(255,225,77,.18)';
  ctx.fillRect(x+5,y+5,cellSize-10,cellSize-10);
  ctx.strokeStyle='rgba(255,225,77,.85)';
  ctx.lineWidth=3;
  ctx.strokeRect(x+4,y+4,cellSize-8,cellSize-8);
}

function drawDragGhostAt(cx,cy,cell,alpha){
  const half=cellSize*.34;
  const w=cellSize*.18;
  const m=maskFor(cell);
  ctx.save();
  ctx.globalAlpha=alpha||.92;
  ctx.fillStyle='rgba(255,225,77,.3)';
  ctx.beginPath();
  ctx.arc(cx,cy,cellSize*.4,0,Math.PI*2);
  ctx.fill();
  drawConnections(cx,cy,half,w,m,true,0,cell.color||'b');
  ctx.restore();
}

function drawDragGhost(){
  if(paletteDrag&&paletteDrag.moved){
    const ghost={type:paletteDrag.type,rot:0,color:null};
    const hover=pointerToCell(paletteDrag.x,paletteDrag.y);
    let cx,cy;
    if(hover&&canPlaceKitAt(hover.r,hover.c,paletteDrag.type)){
      const cc=cellCenter(hover.r,hover.c);
      cx=cc[0];
      cy=cc[1];
    }else{
      const p=clientToCanvas(paletteDrag.x,paletteDrag.y);
      cx=p.x;
      cy=p.y;
    }
    drawDragGhostAt(cx,cy,ghost,.92);
    return;
  }
  if(!drag||!drag.moved||!drag.cell)return;
  const hover=pointerToCell(drag.x,drag.y);
  let cx,cy;
  if(hover){
    const cc=cellCenter(hover.r,hover.c);
    cx=cc[0];
    cy=cc[1];
  }else{
    const p=clientToCanvas(drag.x,drag.y);
    cx=p.x;
    cy=p.y;
  }
  drawDragGhostAt(cx,cy,drag.cell,.9);
}

function onCanvasPointerDown(e){
  if(mode!=='play'||won||winPending)return;
  if(e.button!==0)return;
  const pt=pointerToCell(e.clientX,e.clientY);
  drag=null;
  if(pt){
    const cell=grid[pt.r]&&grid[pt.r][pt.c];
    if(selectedBuildPipe==='erase'){
      drag={r:pt.r,c:pt.c,cell:null,x0:e.clientX,y0:e.clientY,x:e.clientX,y:e.clientY,moved:false,pointerId:e.pointerId,eraseTap:true};
      activePointerId=e.pointerId;
      canvas.style.cursor='pointer';
      try{canvas.setPointerCapture(e.pointerId);}catch(err){}
      return;
    }
    if(cell&&cell.placed&&selectedBuildPipe!=='erase'&&cell.type!==selectedBuildPipe){
      drag={r:pt.r,c:pt.c,cell:null,x0:e.clientX,y0:e.clientY,x:e.clientX,y:e.clientY,moved:false,pointerId:e.pointerId,kitSwapTap:true};
      activePointerId=e.pointerId;
      canvas.style.cursor='pointer';
      try{canvas.setPointerCapture(e.pointerId);}catch(err){}
      return;
    }
    if(!cell&&kitActive()&&selectedBuildPipe!=='erase'){
      drag={r:pt.r,c:pt.c,cell:null,x0:e.clientX,y0:e.clientY,x:e.clientX,y:e.clientY,moved:false,pointerId:e.pointerId,placeOnUp:true};
      activePointerId=e.pointerId;
      canvas.style.cursor='crosshair';
      try{canvas.setPointerCapture(e.pointerId);}catch(err){}
      return;
    }
    const canDrag=cell&&isMovable(cell)&&(!buildMode||cell.placed);
    if(canDrag){
      drag={r:pt.r,c:pt.c,cell:cloneCell(cell),x0:e.clientX,y0:e.clientY,x:e.clientX,y:e.clientY,moved:false,pointerId:e.pointerId,placeOnUp:false};
      activePointerId=e.pointerId;
    }
  }
  if(!drag)drag={r:-1,c:-1,cell:null,x0:e.clientX,y0:e.clientY,x:e.clientX,y:e.clientY,moved:false,pointerId:e.pointerId,placeOnUp:false};
  canvas.style.cursor='grabbing';
  try{canvas.setPointerCapture(e.pointerId);}catch(err){}
}

function onCanvasPointerMove(e){
  if(!drag||drag.pointerId!==e.pointerId)return;
  drag.x=e.clientX;
  drag.y=e.clientY;
  const dx=drag.x-drag.x0,dy=drag.y-drag.y0;
  if(!drag.moved&&drag.cell&&dx*dx+dy*dy>DRAG_THRESHOLD*DRAG_THRESHOLD){
    drag.moved=true;
    grid[drag.r][drag.c]=null;
    ensureAnimLoop();
  }
}

function onCanvasPointerUp(e){
  if(!drag||drag.pointerId!==e.pointerId)return;
  const wasDrag=drag.moved;
  const fr=drag.r,fc=drag.c;
  const lifted=drag.cell;
  const eraseTap=!!drag.eraseTap;
  const kitSwapTap=!!drag.kitSwapTap;
  const dropPt=pointerToCell(e.clientX,e.clientY);
  const tapPt=pointerToCell(drag.x0,drag.y0);
  clearDrag();
  try{canvas.releasePointerCapture(e.pointerId);}catch(err){}
  if(mode!=='play'||won||winPending)return;
  canvas.style.cursor='grab';

  if(eraseTap){
    const pt=tapPt||dropPt;
    if(pt)tryEraseAt(pt.r,pt.c);
    return;
  }

  if(kitSwapTap){
    const pt=tapPt||dropPt;
    if(pt&&selectedBuildPipe!=='erase')swapPlacedPipeType(pt.r,pt.c,selectedBuildPipe);
    return;
  }

  if(wasDrag&&lifted){
    if(selectedBuildPipe==='erase'&&lifted.placed){
      removeBuildPipe(fr,fc);
      return;
    }
    if(dropPt&&transferPipe(fr,fc,dropPt.r,dropPt.c,lifted)){
      spinAnim={r:dropPt.r,c:dropPt.c,t:0};
      setStatus(dropPt.r===fr&&dropPt.c===fc?'Pipe turned!':'Pipe moved!','flow');
    }else{
      grid[fr][fc]=lifted;
      setStatus('Drop on grass or another pipe','idle');
      updateFlow(true);
    }
    return;
  }

  const pt=tapPt||dropPt;
  if(pt){
    const cell=grid[pt.r]&&grid[pt.r][pt.c];
    if(selectedBuildPipe==='erase'){
      tryEraseAt(pt.r,pt.c);
      return;
    }
    if(!cell&&kitActive()&&selectedBuildPipe!=='erase'){
      if(placeKitAt(pt.r,pt.c))return;
    }
    if(buildMode&&!cell){
      if(interactBuildCell(pt.r,pt.c))return;
    }
  }

  const hit=hitLeakBucket(e.clientX,e.clientY);
  if(hit&&hit.fill>0.08){
    leakBuckets.set(hit.key,Math.max(0,hit.fill-0.5));
    doSiphon(hit.x,hit.y,22);
    setStatus('🪣 Emptied the spill bucket!','flow');
    return;
  }

  if(!pt)return;
  const cell=grid[pt.r]&&grid[pt.r][pt.c];
  if(cell&&cell.fixed)return;
  if(cell&&isSolidBlock(cell))return;
  interactCell(pt.r,pt.c);
}

function bindTap(el,fn){
  el.addEventListener('touchend',function(e){
    e.preventDefault();
    touchHandled=true;
    fn(e);
    setTimeout(function(){touchHandled=false;},400);
  },{passive:false});
  el.addEventListener('click',function(e){
    if(touchHandled)return;
    fn(e);
  });
}

function startGame(){
  document.getElementById('menu-ov').classList.add('hidden');
  mode='play';
  if(canvas)canvas.style.cursor='grab';
  loadLevel(levelIdx);
}

function showWin(){
  recordWin();
  const lv=LEVELS[levelIdx];
  const isSecret=levelIdx===SECRET_IDX;
  const isFinale=levelIdx===FINALE_IDX;
  const isLongest=levelIdx===LONGEST_IDX;
  const isShortest=levelIdx===SHORTEST_IDX;
  const isLastMain=levelIdx===MAIN_LAST_IDX;
  if(isSecret){
    document.getElementById('win-emoji').textContent='✨';
    document.getElementById('win-title').textContent='Secret garden saved!';
  }else if(isFinale){
    document.getElementById('win-emoji').textContent='🌍';
    document.getElementById('win-title').textContent='The world is watered!';
    unlockSecret();
  }else if(isLongest){
    document.getElementById('win-emoji').textContent='🛤';
    document.getElementById('win-title').textContent='Longest hose wins!';
  }else if(isShortest){
    document.getElementById('win-emoji').textContent='⚡';
    document.getElementById('win-title').textContent='Shortest hose wins!';
  }else if(isLastMain){
    document.getElementById('win-emoji').textContent='⏱️';
    document.getElementById('win-title').textContent='Rush complete!';
  }else{
    document.getElementById('win-emoji').textContent='🌻';
    document.getElementById('win-title').textContent='The field is watered!';
  }
  let grade='';
  if(moves<=levelPar)grade=' ⭐ Perfect!';
  else if(moves<=levelPar+1)grade=' ⭐⭐ Nice!';
  else grade=' ⭐ Good job!';
  const routeLen=countRoutePipes(filled);
  let msg=(lv?lv.name:'')+' — '+moves+' moves (par '+levelPar+')'+grade;
  if(isSecret)msg='Nobody else knows this garden exists. You are a legend! 💧';
  else if(isFinale)msg='You saved the last gardens on Earth! Next: build the longest hose…';
  else if(isLongest)msg='Longest route built! Next: try the shortest-path challenge…';
  else if(isShortest)msg='Shortest route mastered! 🤫 Tap menu title 5× for the secret garden…';
  else if(isLastMain)msg='One more challenge awaits… End of the World! 🌍';
  else if(buildMode)msg=routeLen+' pipes in your route · par '+levelPar+grade;
  document.getElementById('win-msg').textContent=msg;
  if(isSecret||isShortest){
    document.getElementById('next-btn').textContent='Menu 🏠';
  }else if(isFinale){
    document.getElementById('next-btn').textContent='Longest Hose 🛤';
  }else if(isLongest){
    document.getElementById('next-btn').textContent='Shortest Hose ⚡';
  }else if(isLastMain){
    document.getElementById('next-btn').textContent='End of the World 🌍';
  }else{
    document.getElementById('next-btn').textContent='Next Level ➡️';
  }
  document.getElementById('win-ov').classList.remove('hidden');
}

function nextLevel(){
  document.getElementById('win-ov').classList.add('hidden');
  won=false;
  winPending=false;
  if(winTimer){clearTimeout(winTimer);winTimer=null;}
  if(levelIdx===SECRET_IDX||levelIdx===SHORTEST_IDX){
    showMenu();
    return;
  }
  if(levelIdx===MAIN_LAST_IDX)levelIdx=FINALE_IDX;
  else if(levelIdx===FINALE_IDX)levelIdx=LONGEST_IDX;
  else if(levelIdx===LONGEST_IDX)levelIdx=SHORTEST_IDX;
  else if(levelIdx<LEVELS.length-1)levelIdx++;
  else levelIdx=0;
  saveData.nextLevel=levelIdx;
  persistSave();
  loadLevel(levelIdx);
}

function goToAllGames(){
  stopTimer();
  won=false;
  winPending=false;
  if(winTimer){clearTimeout(winTimer);winTimer=null;}
  document.getElementById('win-ov').classList.add('hidden');
  document.getElementById('lose-ov').classList.add('hidden');
  document.getElementById('menu-ov').classList.add('hidden');
  mode='menu';
  animRunning=false;
  try{
    if(window.parent!==window){
      window.parent.postMessage('maya:leave-game','*');
      window.parent.history.back();
      return;
    }
  }catch(e){}
  window.location.href='index.html';
}

function showMenu(){
  document.getElementById('win-ov').classList.add('hidden');
  document.getElementById('lose-ov').classList.add('hidden');
  document.getElementById('menu-ov').classList.remove('hidden');
  updateMenuProgress(true);
  stopTimer();
  mode='menu';
  animRunning=false;
  clearDrag();
}

window.mayaGameCanGoBack=function(){
  if(mode==='play')return true;
  if(!document.getElementById('win-ov').classList.contains('hidden'))return true;
  if(!document.getElementById('lose-ov').classList.contains('hidden'))return true;
  return false;
};

function onMenuTitleTap(){
  menuTapCount++;
  if(menuTapCount<5)return;
  menuTapCount=0;
  if(!secretUnlocked){
    const hint=document.getElementById('menu-secret-hint');
    hint.textContent='🌍 Beat End of the World first!';
    setTimeout(function(){updateMenuSecretHint();},2000);
    return;
  }
  document.getElementById('menu-ov').classList.add('hidden');
  mode='play';
  levelIdx=SECRET_IDX;
  loadLevel(SECRET_IDX);
}

function au(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx;}
function tone(f,d,type,v){try{const c=au(),o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type=type||'sine';o.frequency.setValueAtTime(f,c.currentTime);g.gain.setValueAtTime(v||.15,c.currentTime);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+d);o.start();o.stop(c.currentTime+d);}catch(e){}}
function playRotate(){tone(420,.06,'triangle',.12);}
function playHint(){tone(660,.1,'sine',.14);setTimeout(function(){tone(880,.1,'sine',.12);},90);}
function playWin(){[523,659,784,988].forEach(function(f,i){setTimeout(function(){tone(f,.18,'sine',.2);},i*90);});}
function playValve(){tone(520,.08,'square',.1);}
function playWilting(){tone(220,.25,'sawtooth',.12);}
function playLeak(){tone(280+Math.random()*80,.05,'triangle',.08);}
function playSiphon(){tone(180,.12,'sine',.14);setTimeout(function(){tone(240,.08,'sine',.1);},80);setTimeout(function(){tone(320,.06,'sine',.08);},160);}
function playCombo(n){const base=520+n*80;[0,1,2].forEach(function(i){setTimeout(function(){tone(base+i*90,.09,'sine',.13);},i*70);});}

window.render_game_to_text=function(){
  const cells=[];
  for(let r=0;r<rows;r++){
    for(let c=0;c<cols;c++){
      const cell=grid[r]&&grid[r][c];
      if(!cell)continue;
      cells.push({r,c,type:cell.type,rot:cell.rot,fixed:cell.fixed,water:filled.has(r+','+c)});
    }
  }
  return JSON.stringify({
    mode:mode,
    level:levelIdx+1,
    levelName:LEVELS[levelIdx]?LEVELS[levelIdx].name:'',
    moves:moves,
    won:won,
    grid:{rows,cols,origin:'top-left',xRight:true,yDown:true},
    cells:cells,
  });
};

window.advanceTime=function(ms){
  const steps=Math.max(1,Math.round(ms/(1000/60)));
  for(let i=0;i<steps;i++){
    animT+=1/60;
    if(flowPath.length>1&&flowPhase<flowPath.length)flowPhase=Math.min(flowPath.length,flowPhase+0.12);
  }
  renderFrame();
};

canvas=document.getElementById('game');
ctx=canvas.getContext('2d');
loadSave();
updateMenuProgress(true);
document.querySelectorAll('.pipe-pick').forEach(function(btn){
  btn.addEventListener('pointerdown',onKitPointerDown);
  btn.addEventListener('click',function(){
    if(suppressPipePickClick||touchHandled)return;
    setBuildPipe(btn.getAttribute('data-pipe'));
    playHint();
  });
});
bindTap(document.getElementById('games-btn'),goToAllGames);
bindTap(document.getElementById('menu-games-btn'),goToAllGames);
bindTap(document.getElementById('win-games-btn'),goToAllGames);
bindTap(document.getElementById('lose-games-btn'),goToAllGames);
bindTap(document.getElementById('start-btn'),startGame);
bindTap(document.getElementById('new-game-btn'),function(){
  resetCampaignSave();
  startGame();
});
bindTap(document.getElementById('menu-title'),onMenuTitleTap);
bindTap(document.getElementById('reset-btn'),resetLevel);
bindTap(document.getElementById('use-again-btn'),onSiphonTap);
bindTap(document.getElementById('hint-btn'),showHint);
bindTap(document.getElementById('next-btn'),nextLevel);
bindTap(document.getElementById('menu-btn'),showMenu);
bindTap(document.getElementById('retry-btn'),resetLevel);
bindTap(document.getElementById('lose-menu-btn'),showMenu);
canvas.style.touchAction='none';
canvas.style.cursor='grab';
canvas.addEventListener('pointerdown',onCanvasPointerDown);
canvas.addEventListener('pointermove',onCanvasPointerMove);
canvas.addEventListener('pointerup',onCanvasPointerUp);
canvas.addEventListener('pointercancel',onCanvasPointerUp);
window.addEventListener('message',function(ev){
  if(ev.data==='maya:nav-back'){
    if(mode==='play'){
      document.getElementById('win-ov').classList.add('hidden');
      document.getElementById('lose-ov').classList.add('hidden');
      showMenu();
    }else if(!document.getElementById('win-ov').classList.contains('hidden')){
      showMenu();
    }else if(!document.getElementById('lose-ov').classList.contains('hidden')){
      showMenu();
    }
  }
});
window.addEventListener('resize',function(){if(mode==='play')resize();});
</script>
