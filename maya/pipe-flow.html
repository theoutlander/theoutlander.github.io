<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0618;--card:#16092e;--border:rgba(255,255,255,0.08);
  --pink:#ff6eb4;--yellow:#ffe14d;--green:#5dffb0;--blue:#5bc8ff;
  --purple:#c77dff;--orange:#ff9a3c;--text:#f0e6ff;--muted:rgba(240,230,255,0.38);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none}
html,body{width:100%;height:100%;background:var(--bg);color:var(--text);font-family:'Nunito',sans-serif;overflow:hidden;touch-action:none}

#root{display:flex;flex-direction:column;height:100%;padding:8px;gap:6px}

#hud{flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:var(--card);border:1px solid var(--border);border-radius:12px;gap:8px}
.hpill{display:flex;align-items:center;gap:5px;font-size:12px;font-weight:900;color:var(--muted)}
.hval{font-family:'Fredoka One',cursive;font-size:18px;line-height:1;color:var(--text)}
#level-badge{font-family:'Fredoka One',cursive;font-size:13px;padding:5px 14px;border-radius:99px;color:#08041a;background:var(--blue);white-space:nowrap}
#status-pill{font-size:11px;font-weight:900;padding:4px 10px;border-radius:99px;background:rgba(91,200,255,.12);color:var(--blue);border:1px solid rgba(91,200,255,.25)}
.hpill.hidden{display:none}
#timer-pill{color:var(--yellow)}
#timer-pill.urgent{color:#ff7070;animation:tpulse .6s ease-in-out infinite alternate}
@keyframes tpulse{0%{opacity:1}100%{opacity:.55}}
#mechanic-tip{font-size:10px;font-weight:900;color:var(--muted);letter-spacing:.04em;text-align:center;padding:0 4px 2px;line-height:1.35}
#garden-pill{color:var(--green)}
#waste-pill{gap:4px;min-width:52px}
.waste-track{width:14px;height:28px;border-radius:4px;background:rgba(0,0,0,.25);border:1px solid rgba(91,200,255,.25);overflow:hidden;display:flex;flex-direction:column;justify-content:flex-end}
#waste-fill{width:100%;height:0%;background:linear-gradient(180deg,#5bc8ff,#3a8fd4);border-radius:2px;transition:height .15s}
#waste-pill.full #waste-fill{background:linear-gradient(180deg,#ff9a3c,#ff6eb4)}
#pour-back-btn{background:rgba(91,200,255,.15);color:var(--blue);border:1px solid rgba(91,200,255,.35)}
#pour-back-btn.ready{animation:hintpulse .7s ease-in-out infinite alternate}
#route-pill{color:var(--purple)}
#build-palette{display:none;flex-shrink:0;gap:6px;padding:0 2px 4px}
#build-palette.show{display:flex}
.pipe-pick{flex:1;font-family:'Fredoka One',cursive;font-size:13px;padding:10px 6px;border-radius:10px;border:2px solid var(--border);background:rgba(255,255,255,.06);color:var(--muted);cursor:pointer;min-height:44px}
.pipe-pick.sel{border-color:var(--yellow);color:var(--yellow);background:rgba(255,225,77,.12)}
.pipe-pick .cnt{font-size:11px;opacity:.85}

#board-wrap{flex:1;position:relative;min-height:0;display:flex;align-items:center;justify-content:center}
#game{width:100%;height:100%;display:block;touch-action:none}

#toolbar{flex-shrink:0;display:flex;gap:8px;padding:0 2px}
.tool-btn{flex:1;font-family:'Fredoka One',cursive;font-size:15px;padding:12px;border-radius:10px;border:none;cursor:pointer;min-height:48px;transition:transform .1s}
.tool-btn:active{transform:scale(.96)}
#reset-btn{background:rgba(255,255,255,.08);color:var(--muted);border:1px solid var(--border)}
#hint-btn{background:rgba(255,225,77,.12);color:var(--yellow);border:1px solid rgba(255,225,77,.25)}
#hint-btn.hint-urgent{animation:hintpulse .7s ease-in-out infinite alternate;border-color:rgba(255,110,180,.6);color:#ffb8d8}
@keyframes hintpulse{0%{box-shadow:0 0 0 rgba(255,110,180,0)}100%{box-shadow:0 0 14px rgba(255,110,180,.45)}}
#combo-wrap{position:absolute;top:42%;left:50%;transform:translate(-50%,-50%);text-align:center;pointer-events:none;z-index:10;opacity:0;transition:opacity .25s}
#combo-wrap.show{opacity:1}
#combo-text{font-family:'Fredoka One',cursive;font-size:clamp(22px,6vw,40px);color:var(--yellow);text-shadow:0 0 18px rgba(255,225,77,.55);animation:combopop .35s ease-out}
#combo-sub{font-size:11px;font-weight:900;color:var(--muted);letter-spacing:.06em;margin-top:4px}
@keyframes combopop{0%{transform:scale(1.25)}100%{transform:scale(1)}}
#menu-title{cursor:pointer;-webkit-tap-highlight-color:transparent}
#menu-progress-hint,#menu-secret-hint{font-size:11px;font-weight:900;min-height:16px}
#menu-progress-hint{color:var(--yellow)}
#menu-secret-hint{color:var(--purple)}

.ov{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:50;padding:20px;gap:10px;text-align:center}
.ov.hidden{display:none}
#menu-ov{background:linear-gradient(180deg,#07031a,#0d2840)}
#win-ov{background:rgba(7,3,26,.94)}
.big-title{font-family:'Fredoka One',cursive;font-size:clamp(44px,11vw,76px);line-height:1.05;background:linear-gradient(135deg,var(--blue),var(--green),var(--yellow));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.sub{font-size:13px;color:var(--muted);line-height:1.75;max-width:320px}
.big-btn{font-family:'Fredoka One',cursive;font-size:20px;color:#07031a;background:var(--yellow);border:none;padding:12px 38px;border-radius:10px;cursor:pointer;box-shadow:0 5px 0 rgba(140,110,0,1);transition:transform .1s;min-height:48px}
.big-btn:active{transform:translateY(2px)}
.sec-btn{font-family:'Fredoka One',cursive;font-size:15px;padding:9px 22px;border-radius:10px;border:none;cursor:pointer;background:rgba(255,255,255,.08);color:var(--muted);min-height:44px}
.btn-row{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
.win-emoji{font-size:56px;line-height:1}
.win-title{font-family:'Fredoka One',cursive;font-size:clamp(28px,7vw,44px);color:var(--green)}
</style>
</head>
<body>
<div id="root">
  <div id="hud">
    <div class="hpill">🔧 <span class="hval" id="moves">0</span></div>
    <div class="hpill" id="garden-pill">🌻 <span class="hval" id="garden-fill">0/1</span></div>
    <div class="hpill hidden" id="route-pill">🛤 <span class="hval" id="route-val">0</span></div>
    <div class="hpill" id="waste-pill" title="Spilled water — tap Pour Back to send it to the hose!">🪣<div class="waste-track"><div id="waste-fill"></div></div></div>
    <div class="hpill hidden" id="timer-pill">⏱ <span class="hval" id="timer-val">60</span></div>
    <div id="level-badge">Level 1</div>
    <div id="status-pill">Tap pipes to spin!</div>
  </div>
  <div id="mechanic-tip"></div>
  <div id="build-palette">
    <button type="button" class="pipe-pick sel" data-pipe="I">━ <span class="cnt" id="cnt-I">0</span></button>
    <button type="button" class="pipe-pick" data-pipe="L">└ <span class="cnt" id="cnt-L">0</span></button>
    <button type="button" class="pipe-pick" data-pipe="T">┳ <span class="cnt" id="cnt-T">0</span></button>
    <button type="button" class="pipe-pick" data-pipe="erase">🗑</button>
  </div>
  <div id="board-wrap">
    <canvas id="game"></canvas>
    <div id="combo-wrap"><div id="combo-text"></div><div id="combo-sub"></div></div>
  </div>
  <div id="toolbar">
    <button class="tool-btn" id="reset-btn">↺ Reset</button>
    <button class="tool-btn" id="pour-back-btn" title="Pour spilled water back toward the hose">🪣 Pour Back</button>
    <button class="tool-btn" id="hint-btn">💡 Hint</button>
  </div>
</div>

<div class="ov" id="menu-ov">
  <div class="big-title" id="menu-title">Pipe Flow!</div>
  <div id="menu-progress-hint"></div>
  <div id="menu-secret-hint"></div>
  <div class="sub">💧 Connect every <strong style="color:var(--yellow)">pipe joint</strong> — no gaps or cracks!<br>Extra T-arms can point at the grass (that is OK).<br>Fill each <strong style="color:var(--green)">garden bucket</strong> 🌻 to win.<br>Spills? Tap <strong style="color:var(--blue)">Pour Back</strong> 🪣</div>
  <button class="big-btn" id="start-btn">Let's Go! 🌱</button>
  <button class="sec-btn hidden" id="new-game-btn">Start from Level 1</button>
</div>

<div class="ov hidden" id="win-ov">
  <div class="win-emoji" id="win-emoji">🌻</div>
  <div class="win-title" id="win-title">The field is watered!</div>
  <div class="sub" id="win-msg"></div>
  <div class="btn-row">
    <button class="big-btn" id="next-btn">Next Level ➡️</button>
    <button class="sec-btn" id="menu-btn">Menu 🏠</button>
  </div>
</div>

<div class="ov hidden" id="lose-ov">
  <div style="font-size:56px">🥀</div>
  <div class="win-title" style="color:var(--pink)">The plants wilted!</div>
  <div class="sub" id="lose-msg">Spin faster next time!</div>
  <div class="btn-row">
    <button class="big-btn" id="retry-btn">Try Again 🔄</button>
    <button class="sec-btn" id="lose-menu-btn">Menu 🏠</button>
  </div>
</div>

<script>
const N=1,E=2,S=4,W=8;
const DR={N:[-1,0],E:[0,1],S:[1,0],W:[0,-1]};
const OPP={[N]:S,[E]:W,[S]:N,[W]:E};
const DIRS=[N,E,S,W];

const MASKS={
  I:[E|W,N|S,E|W,N|S],
  L:[E|S,S|W,W|N,N|E],
  T:[E|S|W,S|W|N,W|N|E,N|E|S],
  X:[N|E|S|W],
  B:[E|W,N|S,E|W,N|S],
  V:[E|W,N|S,E|W,N|S],
  S:[E,S,W,N],
  G:[W,N,E,S],
};
const WATER_COLORS={b:'#5bc8ff',r:'#ff6eb4',y:'#ffe14d'};
const GOAL_EMOJI={b:['🌾','🌻'],r:['🌹','🌺'],y:['🌼','🌻'],null:['🌾','🌻']};
const HOSE_EMOJI={b:'🚿',r:'🚿',y:'🚿',null:'🚿'};

const MAIN_LAST_IDX=21;
const FINALE_IDX=22;
const LONGEST_IDX=23;
const SHORTEST_IDX=24;
const SECRET_IDX=25;
const BUILD_TYPES=['I','L','T'];
const BUILD_GRID=[
  'S0 .  .  .  .  .  .  .',
  '.  .  .  .  .  .  .  .',
  '.  .  .  .  .  .  .  .',
  '.  .  .  .  .  .  .  .',
  '.  .  .  .  .  .  .  .',
  '.  .  .  .  .  .  .  .',
  '.  .  .  .  .  .  .  .',
  '.  .  .  .  .  .  .  G0',
];

const THEMES={
  dawn:{page:'#0a0618',grass:['#142018','#101a14'],frame:'#0d1a12',badge:'#5bc8ff',badgeText:'#08041a'},
  meadow:{page:'#08120a',grass:['#1a2e14','#142410'],frame:'#0f1a0c',badge:'#5dffb0',badgeText:'#08041a'},
  garden:{page:'#0a1018',grass:['#1a2430','#141c28'],frame:'#101820',badge:'#c77dff',badgeText:'#08041a'},
  greenhouse:{page:'#061018',grass:['#102820','#0c2018'],frame:'#0a1814',badge:'#ffe14d',badgeText:'#08041a'},
  workshop:{page:'#120a18',grass:['#201428','#181020'],frame:'#160c1c',badge:'#ff9a3c',badgeText:'#08041a'},
  sunset:{page:'#180c08',grass:['#2a1810','#221410'],frame:'#1c100c',badge:'#ff6eb4',badgeText:'#08041a'},
  apocalypse:{page:'#1a0808',grass:['#2a1410','#1e0c08'],frame:'#220808',badge:'#ff4444',badgeText:'#fff'},
  secret:{page:'#0a0820',grass:['#1a1040','#140c30'],frame:'#120830',badge:'#c77dff',badgeText:'#08041a'},
};

function defaultTheme(idx){
  if(idx<=2)return 'dawn';
  if(idx<=5)return 'meadow';
  if(idx<=9)return 'garden';
  if(idx<=14)return 'greenhouse';
  if(idx<=19)return 'workshop';
  return 'sunset';
}

const LEVELS=[
  {name:'First Drop',par:1,rows:['S0 I2 I1 G0']},
  {name:'Quick Turn',par:1,rows:['S0 I0 L2 .','.  .  L3 G0']},
  {name:'Down the Garden',par:2,rows:['S0 I1 L0 .','.  I2 L3 G0']},
  {name:'Long Hose',par:2,rows:['S0 I1 I0 L0','.  .  .  G1']},
  {name:'T Junction',par:2,rows:['S0 I1 T1 I0 G0']},
  {name:'Garden Gate',par:2,rows:['.  S0 I0 L0 .','.  .  .  L1 G0']},
  {name:'Double Bend',par:3,rows:['S0 L2 I1 .','.  L1 I1 G0']},
  {name:'Fork in the Path',par:3,rows:['.  .  S0 I1 T3 I1 .','.  .  .  .  L2 G0','.  .  .  .  .  .','.  .  .  .  .  .']},
  {name:'Plumber Puzzle',par:3,rows:['.  .  S0 I3 T2 .','.  .  .  I0 L0 G0','.  .  .  .  .  .','.  .  .  .  .  .']},
  {name:'Snake Path',par:3,rows:['.  S0 I3 L2 I0 L3 .','.  .  .  L1 G0 .','.  .  .  .  .  .','.  .  .  .  .  .']},
  {name:'Twisty Turn',par:3,rows:['.  S0 I2 L0 I1 L0 .','.  .  I0 L2 I1 G0 .','.  .  .  .  .  .  .','.  .  .  .  .  .  .']},
  {name:'Greenhouse',par:4,rows:['.  .  S0 I1 T3 I1 .','.  .  .  I0 L2 I1 G0','.  .  .  .  .  .  .','.  .  .  .  .  .  .','.  .  .  .  .  .  .']},
  {name:'Long Detour',par:4,rows:['.  .  S0 I3 L0 I2 L0 .','.  .  .  I0 L2 I3 G0 .','.  .  .  .  .  .  .  .','.  .  .  .  .  .  .  .','.  .  .  .  .  .  .  .']},
  {name:'Pipe Maze',par:4,rows:['.  .  S0 I1 T3 I1 .  .','.  .  .  I0 L2 I1 G0 .','.  .  .  .  .  .  .  .','.  .  .  .  .  .  .  .','.  .  .  .  .  .  .  .','.  .  .  .  .  .  .  .']},
  {name:'Master Plumber',par:4,rows:['.  .  .  S0 I3 L0 I2 L0 .','.  .  .  .  I0 L2 I3 G0 .','.  .  .  .  .  .  .  .  .','.  .  .  .  .  .  .  .  .','.  .  .  .  .  .  .  .  .','.  .  .  .  .  .  .  .  .']},
  {name:'Two Gardens',par:2,tip:'🌾🌾 Hose + side garden both need water!',rows:['S0 I1 I0 G0','.  .  g0 .']},
  {name:'Rocky Path',par:2,tip:'🪨 Pipes cannot go through rocks!',rows:['S0 I1 L0','#  .  G1']},
  {name:'Fix the Leaks',par:2,tip:'🔗 Close the loop — seal cracked pipes & every open end!',rows:['S0 B1 I0 B1 G0']},
  {name:'Valve Control',par:3,tip:'🚰 Tap valve twice: spin, then open!',rows:['S0 I1 V0 I1 G0']},
  {name:'Rainbow Hose',par:2,tip:'💙❤️ Match hose color to each flower!',rows:['Sb0 I1 Gb0','Sr0 I1 Gr0']},
  {name:'Rush Hour',par:3,tip:'⏱ Beat the clock on a bigger field!',timer:90,rows:['.  .  S0 I1 L0 I0 .','.  .  .  I1 L3 G0 .','.  .  .  .  .  .  .','.  .  .  .  .  .  .','.  .  .  .  .  .  .']},
  {name:'Big Backyard',par:4,tip:'📐 7×6 wide field — more room to think!',rows:['.  .  .  S0 I1 I0 I0 L0 .','.  .  .  .  .  I0 L2 I1 G0','.  .  .  .  .  .  .  .  .  .','.  .  .  .  .  .  .  .  .  .','.  .  .  .  .  .  .  .  .  .','.  .  .  .  .  .  .  .  .  .']},
  {name:'End of the World',par:5,theme:'apocalypse',tip:'🌍 Huge last stand — every trick you know!',timer:100,rows:['.  .  .  S0 I1 T1 I1 I0 .  .','.  .  #  .  I0 B1 g0  .  .  .','.  .  .  .  V0 L1 I0 L2 G0 .','.  .  .  .  .  .  .  .  .  .','.  .  .  .  .  .  .  .  .  .','.  .  .  .  .  .  .  .  .  .']},
  {name:'Longest Hose',par:14,build:true,theme:'greenhouse',routeMin:16,budget:{I:8,L:8,T:4},tip:'🛤 8×8 field — build the LONGEST working route!',rows:BUILD_GRID},
  {name:'Shortest Hose',par:6,build:true,theme:'meadow',routeMax:7,budget:{I:6,L:6,T:3},tip:'⚡ Same big field — FEWEST pipes possible!',rows:BUILD_GRID},
  {name:'Secret Garden',par:2,theme:'secret',secret:true,tip:'🤫 You found the hidden level!',rows:['S0 I1 I0 G0','.  .  g0  .']},
];

let canvas,ctx,levelIdx=0,grid=[],initialGrid=[],moves=0,levelPar=1;
let cellSize=0,gridOffX=0,gridOffY=0,rows=0,cols=0;
let filled=new Set(),flowColors=new Map(),flowPath=[],flowDist=new Map(),goalsLeft=0;
let won=false,animT=0,flowPhase=0;
let waterDrops=[],bubbles=[],leakDrips=[],flowParticles=[],leaks=[],puddles=new Map(),mode='menu',audioCtx=null;
let lastTap=0,touchHandled=false,animRunning=false,spinAnim=null;
let lastValveTap=0,lastValveCell=null;
let timeLeft=0,timerId=null,levelTip='';
let boardTheme=THEMES.dawn,prevWatered=0,comboHideTimer=null,menuTapCount=0,secretUnlocked=false;
let wasteBucket=0,gardenBuckets=new Map(),leakBuckets=new Map(),siphonAnim=0,siphonStreams=[];
let buildMode=false,routeMin=null,routeMax=null,buildInventory={I:0,L:0,T:0},selectedBuildPipe='I';
const SAVE_KEY='pipeflow_save';
let saveData={nextLevel:0,stars:{},maxBeaten:-1};
try{secretUnlocked=localStorage.getItem('pipeflow_secret')==='1';}catch(e){}

function loadSave(){
  saveData={nextLevel:0,stars:{},maxBeaten:-1};
  try{
    const raw=localStorage.getItem(SAVE_KEY);
    if(!raw)return;
    const p=JSON.parse(raw);
    if(typeof p.nextLevel==='number')saveData.nextLevel=Math.max(0,Math.min(p.nextLevel,SHORTEST_IDX));
    if(p.stars&&typeof p.stars==='object')saveData.stars=p.stars;
    if(typeof p.maxBeaten==='number')saveData.maxBeaten=p.maxBeaten;
  }catch(e){}
}

function persistSave(){
  try{localStorage.setItem(SAVE_KEY,JSON.stringify(saveData));}catch(e){}
}

function starGrade(moves,par){
  if(moves<=par)return 3;
  if(moves<=par+1)return 2;
  return 1;
}

function campaignNextIdx(idx){
  if(idx===SECRET_IDX||idx===SHORTEST_IDX)return null;
  if(idx===MAIN_LAST_IDX)return FINALE_IDX;
  if(idx===FINALE_IDX)return LONGEST_IDX;
  if(idx===LONGEST_IDX)return SHORTEST_IDX;
  if(idx<SHORTEST_IDX)return idx+1;
  return null;
}

function totalStars(){
  let s=0;
  for(const k in saveData.stars)if(saveData.stars.hasOwnProperty(k))s+=saveData.stars[k];
  return s;
}

function recordWin(){
  const k=String(levelIdx);
  const g=starGrade(moves,levelPar);
  if(!saveData.stars[k]||g>saveData.stars[k])saveData.stars[k]=g;
  saveData.maxBeaten=Math.max(saveData.maxBeaten,levelIdx);
  const nxt=campaignNextIdx(levelIdx);
  if(nxt!=null)saveData.nextLevel=Math.max(saveData.nextLevel,nxt);
  persistSave();
  updateMenuProgress();
}

function updateMenuProgress(){
  const prog=document.getElementById('menu-progress-hint');
  const newBtn=document.getElementById('new-game-btn');
  const startBtn=document.getElementById('start-btn');
  if(saveData.maxBeaten>=0){
    const playIdx=Math.min(saveData.nextLevel,SHORTEST_IDX);
    startBtn.textContent='Continue · Level '+(playIdx+1)+' 🌱';
    levelIdx=playIdx;
    const ts=totalStars();
    prog.textContent=ts?'⭐ '+ts+' stars earned':'';
    if(newBtn)newBtn.classList.remove('hidden');
  }else{
    startBtn.textContent="Let's Go! 🌱";
    levelIdx=0;
    prog.textContent='';
    if(newBtn)newBtn.classList.add('hidden');
  }
  updateMenuSecretHint();
}

function updateMenuSecretHint(){
  const el=document.getElementById('menu-secret-hint');
  if(secretUnlocked)el.textContent='🤫 Tap the title 5× for the secret level!';
  else el.textContent='';
}

function resetCampaignSave(){
  saveData={nextLevel:0,stars:{},maxBeaten:-1};
  persistSave();
  levelIdx=0;
  updateMenuProgress();
}

function applyTheme(idx,lv){
  const th=THEMES[lv.theme||defaultTheme(idx)]||THEMES.meadow;
  boardTheme=th;
  document.body.style.background=th.page;
  const badge=document.getElementById('level-badge');
  badge.style.background=th.badge;
  badge.style.color=th.badgeText;
}

function showSiphonToast(){
  document.getElementById('combo-text').textContent='POURED BACK!';
  document.getElementById('combo-sub').textContent='♻️ Water went back to the hose!';
  document.getElementById('combo-wrap').classList.add('show');
  if(comboHideTimer)clearTimeout(comboHideTimer);
  comboHideTimer=setTimeout(function(){document.getElementById('combo-wrap').classList.remove('show');},900);
}

function showComboReaction(kind,n){
  const wrap=document.getElementById('combo-wrap');
  const txt=document.getElementById('combo-text');
  const sub=document.getElementById('combo-sub');
  const multi={2:['DOUBLE SOAK!','💧 Two gardens at once!'],3:['TRIPLE RAIN!','🌧️ Unbelievable!']};
  if(kind==='perfect'){
    txt.textContent='PERFECT FLOW!';
    sub.textContent='⭐ At or under par!';
    playCombo(4);
  }else if(kind==='bloom'){
    txt.textContent='FIRST BLOOM!';
    sub.textContent='🌱 Keep the water going!';
    playCombo(1);
  }else{
    const m=multi[n]||['MEGA SOAK!','💧 Combo x'+n+'!'];
    txt.textContent=m[0];
    sub.textContent=m[1];
    playCombo(n);
  }
  wrap.classList.add('show');
  if(comboHideTimer)clearTimeout(comboHideTimer);
  comboHideTimer=setTimeout(function(){wrap.classList.remove('show');},1100);
}

function unlockSecret(){
  secretUnlocked=true;
  try{localStorage.setItem('pipeflow_secret','1');}catch(e){}
  updateMenuSecretHint();
}

function countRoutePipes(filledSet){
  let n=0;
  filledSet.forEach(function(k){
    const p=k.split(',');
    const cell=grid[+p[0]]&&grid[+p[0]][+p[1]];
    if(cell&&cell.type!=='S'&&cell.type!=='G')n++;
  });
  return n;
}

function routeConstraintOk(len){
  if(!buildMode)return true;
  if(routeMin!=null&&len<routeMin)return false;
  if(routeMax!=null&&len>routeMax)return false;
  return true;
}

function updateRouteHud(len){
  const pill=document.getElementById('route-pill');
  const val=document.getElementById('route-val');
  if(!buildMode){pill.classList.add('hidden');return;}
  pill.classList.remove('hidden');
  if(routeMin!=null)val.textContent=len+' / '+routeMin+'+';
  else if(routeMax!=null)val.textContent=len+' / ≤'+routeMax;
  else val.textContent=String(len);
}

function updateBuildPaletteHud(){
  document.getElementById('cnt-I').textContent=String(buildInventory.I||0);
  document.getElementById('cnt-L').textContent=String(buildInventory.L||0);
  document.getElementById('cnt-T').textContent=String(buildInventory.T||0);
  document.querySelectorAll('.pipe-pick').forEach(function(btn){
    btn.classList.toggle('sel',btn.getAttribute('data-pipe')===selectedBuildPipe);
  });
}

function setBuildPipe(type){
  selectedBuildPipe=type;
  updateBuildPaletteHud();
}

function placeBuildPipe(r,c,type){
  if(!buildInventory[type]||buildInventory[type]<=0)return false;
  grid[r][c]={type:type,rot:0,fixed:false,placed:true,color:null,sprinkler:false};
  buildInventory[type]--;
  updateBuildPaletteHud();
  return true;
}

function removeBuildPipe(r,c){
  const cell=grid[r]&&grid[r][c];
  if(!cell||!cell.placed||BUILD_TYPES.indexOf(cell.type)<0)return false;
  buildInventory[cell.type]=(buildInventory[cell.type]||0)+1;
  grid[r][c]=null;
  updateBuildPaletteHud();
  return true;
}

function interactBuildCell(r,c){
  const cell=grid[r]&&grid[r][c];
  if(selectedBuildPipe==='erase'){
    if(cell&&cell.placed)return removeBuildPipe(r,c);
    return false;
  }
  if(!cell){
    if(!placeBuildPipe(r,c,selectedBuildPipe)){
      setStatus('No '+selectedBuildPipe+' pipes left!','idle');
      return false;
    }
    playRotate();
    moves++;
    document.getElementById('moves').textContent=String(moves);
    spinAnim={r:r,c:c,t:0};
    updateFlow(true);
    return true;
  }
  if(cell.placed){
    const max=4;
    cell.rot=(cell.rot+1)%max;
    spinAnim={r:r,c:c,t:0};
    moves++;
    document.getElementById('moves').textContent=String(moves);
    playRotate();
    updateFlow(true);
    return true;
  }
  return false;
}

function initGardenBuckets(){
  gardenBuckets=new Map();
  for(let r=0;r<rows;r++){
    for(let c=0;c<cols;c++){
      const cell=grid[r]&&grid[r][c];
      if(isGoal(cell))gardenBuckets.set(r+','+c,0);
    }
  }
}

function updateGardenBuckets(){
  let watered=0;
  gardenBuckets.forEach(function(fill,key){
    const parts=key.split(',');
    const r=+parts[0],c=+parts[1];
    const cell=grid[r]&&grid[r][c];
    if(cell&&goalWateredAt(r,c,cell,filled,flowColors)){
      watered++;
      const next=Math.min(1,fill+0.06);
      gardenBuckets.set(key,next);
    }else if(fill>0){
      gardenBuckets.set(key,Math.max(0,fill-0.008));
    }
  });
  return watered;
}

function updateLeakBuckets(badLeakList){
  const active=new Set();
  for(let i=0;i<badLeakList.length;i++){
    const L=badLeakList[i];
    const key=L.r+','+L.c+','+L.dir;
    active.add(key);
    const prev=leakBuckets.get(key)||0;
    leakBuckets.set(key,Math.min(1,prev+0.04));
    wasteBucket=Math.min(100,wasteBucket+0.35);
  }
  leakBuckets.forEach(function(fill,key){
    if(!active.has(key))leakBuckets.set(key,Math.max(0,fill-0.02));
  });
}

function updateBucketHud(){
  const total=gardenBuckets.size;
  let full=0;
  gardenBuckets.forEach(function(f){if(f>=0.92)full++;});
  document.getElementById('garden-fill').textContent=full+'/'+total;
  document.getElementById('waste-fill').style.height=Math.round(wasteBucket)+'%';
  const wp=document.getElementById('waste-pill');
  const sb=document.getElementById('pour-back-btn');
  if(wasteBucket>=55){
    wp.classList.add('full');
    sb.classList.add('ready');
  }else{
    wp.classList.remove('full');
    if(wasteBucket<8)sb.classList.remove('ready');
  }
}

function allGardenBucketsFull(){
  if(!gardenBuckets.size)return false;
  let ok=true;
  gardenBuckets.forEach(function(f){if(f<0.85)ok=false;});
  return ok;
}

function findSourceCenter(){
  for(let r=0;r<rows;r++){
    for(let c=0;c<cols;c++){
      if(isSource(grid[r]&&grid[r][c]))return cellCenter(r,c);
    }
  }
  return[gridOffX+cellSize,gridOffY+cellSize];
}

function doSiphon(fromX,fromY,amount){
  if(wasteBucket<2&&leakBuckets.size===0)return false;
  let drained=0;
  leakBuckets.forEach(function(fill,key){
    if(fill>0.05){
      const parts=key.split(',');
      const L={r:+parts[0],c:+parts[1],dir:+parts[2]};
      const xy=portXY(L.r,L.c,L.dir);
      leakBuckets.set(key,Math.max(0,fill-0.5));
      spawnSiphonStream(xy[0],xy[1],amount*0.3);
      drained+=12;
    }
  });
  const pull=Math.max(drained,amount);
  wasteBucket=Math.max(0,wasteBucket-pull);
  const sx=fromX!=null?fromX:gridOffX+cellSize*cols*0.5;
  const sy=fromY!=null?fromY:gridOffY+cellSize*rows;
  spawnSiphonStream(sx,sy,pull);
  siphonAnim=1;
  playSiphon();
  if(pull>12)showSiphonToast();
  updateBucketHud();
  return true;
}

function spawnSiphonStream(x,y,amt){
  const dest=findSourceCenter();
  const n=Math.min(14,4+Math.floor(amt/8));
  for(let i=0;i<n;i++){
    siphonStreams.push({
      x:x+(Math.random()-.5)*10,
      y:y+(Math.random()-.5)*6,
      tx:dest[0],ty:dest[1],
      t:0,
      speed:.02+Math.random()*.02,
    });
  }
}

function hitLeakBucket(clientX,clientY){
  const rad=cellSize*0.38;
  let best=null,bestD=rad*rad;
  leakBuckets.forEach(function(fill,key){
    if(fill<0.08)return;
    const parts=key.split(',');
    const xy=portXY(+parts[0],+parts[1],+parts[2]);
    const dx=clientX-xy[0],dy=clientY-xy[1];
    const d=dx*dx+dy*dy;
    if(d<bestD){bestD=d;best={key:key,x:xy[0],y:xy[1],fill:fill};}
  });
  return best;
}

function updateSiphonStreams(){
  for(let i=siphonStreams.length-1;i>=0;i--){
    const s=siphonStreams[i];
    s.t+=s.speed;
    if(s.t>=1)siphonStreams.splice(i,1);
    else{
      s.x+=(s.tx-s.x)*s.speed;
      s.y+=(s.ty-s.y)*s.speed;
    }
  }
  if(siphonAnim>0)siphonAnim=Math.max(0,siphonAnim-0.04);
}

function parseCell(code){
  if(!code||code==='.')return null;
  if(code==='#')return{type:'#',fixed:true};
  const sprinkler=code[0]==='g';
  const type=sprinkler?'G':code[0];
  let color=null,rotIdx=1;
  if(code.length>=3&&/[bry]/.test(code[1])){color=code[1];rotIdx=2;}
  const rot=+code[rotIdx];
  const cell={type:type,rot:isNaN(rot)?0:rot,color:color,fixed:type==='S'||(type==='G'&&!sprinkler),sprinkler:sprinkler,placed:false};
  if(type==='V')cell.open=false;
  if(type==='B')cell.touched=false;
  return cell;
}

function cloneGrid(g){
  return g.map(function(row){
    return row.map(function(c){
      if(!c)return null;
      const n={type:c.type,rot:c.rot,color:c.color,fixed:c.fixed,sprinkler:c.sprinkler,placed:!!c.placed};
      if(c.open!==undefined)n.open=c.open;
      if(c.touched!==undefined)n.touched=c.touched;
      return n;
    });
  });
}

function goalWateredAt(r,c,cell,filledSet,colorMap){
  const need=cell.color||'b';
  const k=r+','+c;
  if(filledSet.has(k)){
    const cols=colorMap.get(k);
    if(cols&&(cols.has(need)||(!cell.color&&cols.size>0)))return true;
  }
  if(!cell.sprinkler)return false;
  for(let i=0;i<4;i++){
    const d=DIRS[i];
    const dk=dirKey(d);
    const nr=r+DR[dk][0],nc=c+DR[dk][1];
    const nb=grid[nr]&&grid[nr][nc];
    if(!nb||nb.type==='#'||(nb.type==='G'&&!nb.sprinkler))continue;
    const nk=nr+','+nc;
    if(!filledSet.has(nk))continue;
    const cols=colorMap.get(nk);
    if(cols&&(cols.has(need)||(!cell.color&&cols.size>0)))return true;
  }
  return false;
}

function stopTimer(){
  if(timerId){clearInterval(timerId);timerId=null;}
  document.getElementById('timer-pill').classList.add('hidden');
  document.getElementById('timer-pill').classList.remove('urgent');
}

function startTimer(sec){
  stopTimer();
  if(!sec)return;
  timeLeft=sec;
  const pill=document.getElementById('timer-pill');
  pill.classList.remove('hidden');
  document.getElementById('timer-val').textContent=String(timeLeft);
  timerId=setInterval(function(){
    if(mode!=='play'||won)return;
    timeLeft--;
    document.getElementById('timer-val').textContent=String(timeLeft);
    if(timeLeft<=10)pill.classList.add('urgent');
    if(timeLeft<=15&&!won){
      document.getElementById('hint-btn').classList.add('hint-urgent');
      setStatus('🥀 Wilting! Tap 💡 Hint if stuck!','idle');
    }
    if(timeLeft<=0){
      stopTimer();
      mode='lose';
      document.getElementById('hint-btn').classList.remove('hint-urgent');
      document.getElementById('lose-msg').textContent='The plants wilted! Try 💡 Hint on your next run — spin faster!';
      document.getElementById('lose-ov').classList.remove('hidden');
      playWilting();
    }
  },1000);
}

function loadLevel(idx){
  const lv=LEVELS[idx];
  if(!lv)return;
  document.getElementById('lose-ov').classList.add('hidden');
  document.getElementById('hint-btn').classList.remove('hint-urgent');
  prevWatered=0;
  grid=lv.rows.map(function(row){return row.trim().split(/\s+/).map(parseCell);});
  initialGrid=cloneGrid(grid);
  rows=grid.length;
  cols=Math.max.apply(null,grid.map(function(r){return r.length;}));
  moves=0;
  won=false;
  flowPhase=0;
  waterDrops=[];
  bubbles=[];
  leakDrips=[];
  flowParticles=[];
  leaks=[];
  puddles=new Map();
  wasteBucket=0;
  gardenBuckets=new Map();
  leakBuckets=new Map();
  siphonStreams=[];
  initGardenBuckets();
  updateBucketHud();
  spinAnim=null;
  lastValveCell=null;
  lastValveTap=0;
  levelPar=lv.par||1;
  levelTip=lv.tip||'';
  if(!levelTip&&idx<3)levelTip='🔗 Close the loop — no open pipe ends! · 🌻 fill garden buckets';
  buildMode=!!lv.build;
  routeMin=lv.routeMin!=null?lv.routeMin:null;
  routeMax=lv.routeMax!=null?lv.routeMax:null;
  if(lv.budget){
    buildInventory={I:lv.budget.I||0,L:lv.budget.L||0,T:lv.budget.T||0};
  }else{
    buildInventory={I:0,L:0,T:0};
  }
  selectedBuildPipe='I';
  document.getElementById('build-palette').classList.toggle('show',buildMode);
  updateBuildPaletteHud();
  const label=lv.secret?'🤫 Secret':(buildMode?'🔧 Build':('Level '+(idx+1)));
  const sizeTag=(rows>=6||cols>=6)?' · '+rows+'×'+cols:'';
  const badgeExtra=buildMode?(routeMin!=null?' · '+routeMin+'+ pipes':routeMax!=null?' · ≤'+routeMax+' pipes':' · Par '+levelPar):(' · Par '+levelPar);
  document.getElementById('level-badge').textContent=label+sizeTag+badgeExtra;
  document.getElementById('mechanic-tip').textContent=levelTip;
  applyTheme(idx,lv);
  document.getElementById('moves').textContent='0';
  setStatus(levelTip||(buildMode?'Pick a pipe, tap + grass — close the loop!':'Tap pipes to spin — close the loop!'),'idle');
  updateFlow(false);
  resize();
  ensureAnimLoop();
  stopTimer();
  startTimer(lv.timer||0);
}

function maskFor(cell){
  if(!cell||cell.type==='#')return 0;
  if(cell.type==='B'&&!cell.touched)return 0;
  if(cell.type==='V'&&!cell.open)return 0;
  const m=MASKS[cell.type];
  if(!m)return 0;
  if(cell.type==='X')return m[0];
  return m[cell.rot%4];
}

function isGoal(cell){return cell&&cell.type==='G';}
function isSource(cell){return cell&&cell.type==='S';}

function dirKey(d){return d===N?'N':d===E?'E':d===S?'S':'W';}

function portXY(r,c,d){
  const cx=gridOffX+c*cellSize+cellSize/2;
  const cy=gridOffY+r*cellSize+cellSize/2;
  const half=cellSize*.4;
  if(d===N)return[cx,cy-half];
  if(d===E)return[cx+half,cy];
  if(d===S)return[cx,cy+half];
  return[cx-half,cy];
}

function portSealed(r,c,d,filledSet){
  const m=maskFor(grid[r][c]);
  if(!(m&d))return true;
  const nr=r+DR[dirKey(d)][0],nc=c+DR[dirKey(d)][1];
  if(nr<0||nc<0||nr>=rows||nc>=cols)return false;
  const nb=grid[nr]&&grid[nr][nc];
  if(!nb)return false;
  if(nb.type==='#')return false;
  if(nb.type==='B'&&!nb.touched)return false;
  if(!(maskFor(nb)&OPP[d]))return false;
  if(!filledSet.has(nr+','+nc))return false;
  return true;
}

function computeLeaks(filledSet){
  const out=[];
  for(let r=0;r<rows;r++){
    for(let c=0;c<cols;c++){
      const cell=grid[r]&&grid[r][c];
      if(!cell)continue;
      const col=cellColorsAt(r,c);

      if(cell.type==='B'&&!cell.touched){
        for(let i=0;i<4;i++){
          const d=DIRS[i];
          const nr=r+DR[dirKey(d)][0],nc=c+DR[dirKey(d)][1];
          const nk=nr+','+nc;
          if(nr<0||nc<0||nr>=rows||nc>=cols)continue;
          const nb=grid[nr]&&grid[nr][nc];
          if(!nb||!filledSet.has(nk))continue;
          if(maskFor(nb)&OPP[d])out.push({r:r,c:c,dir:d,type:'crack',color:col});
        }
        if(out.length===0){
          for(let i=0;i<4;i++){
            const d=DIRS[i];
            const nr=r+DR[dirKey(d)][0],nc=c+DR[dirKey(d)][1];
            if(nr>=0&&nc>=0&&nr<rows&&nc<cols&&filledSet.has(nr+','+nc))out.push({r:r,c:c,dir:d,type:'crack',color:col});
          }
        }
        continue;
      }

      const k=r+','+c;
      if(!filledSet.has(k))continue;
      const m=maskFor(cell);
      for(let i=0;i<4;i++){
        const d=DIRS[i];
        if(!(m&d))continue;
        if(portSealed(r,c,d,filledSet))continue;
        const nr=r+DR[dirKey(d)][0],nc=c+DR[dirKey(d)][1];
        const nb=grid[nr]&&grid[nr][nc];
        let type='soak';
        if(nr<0||nc<0||nr>=rows||nc>=cols)type='edge';
        else if(!nb)type='soak';
        else if(nb.type==='B'&&!nb.touched)type='crack';
        else if(!(maskFor(nb)&OPP[d]))type='gap';
        out.push({r:r,c:c,dir:d,type:type,color:col});
      }

    }
  }
  return out;
}

function leakBlocksWin(leak){
  return leak.type==='gap'||leak.type==='crack'||leak.type==='edge'||leak.type==='jet';
}

function leakCountBad(leakList){
  let n=0;
  for(let i=0;i<leakList.length;i++)if(leakBlocksWin(leakList[i]))n++;
  return n;
}

function isLoopClosed(filledSet){
  return leakCountBad(computeLeaks(filledSet))===0;
}

function computeFlow(){
  const nextFilled=new Set();
  const nextDist=new Map();
  const nextColors=new Map();
  const parent=new Map();
  const sources=[];
  const goals=[];
  for(let r=0;r<rows;r++){
    for(let c=0;c<cols;c++){
      const cell=grid[r]&&grid[r][c];
      if(isSource(cell))sources.push({r:r,c:c,color:cell.color||'b'});
      if(isGoal(cell))goals.push({r:r,c:c,color:cell.color});
    }
  }
  if(!sources.length)return {filled:nextFilled,dist:nextDist,colors:nextColors,path:[],goalReached:false,goalsLeft:goals.length};
  const q=[];
  sources.forEach(function(src){
    const sk=src.r+','+src.c;
    nextFilled.add(sk);
    nextDist.set(sk,0);
    const cs=new Set([src.color||'b']);
    nextColors.set(sk,cs);
    parent.set(sk,null);
    q.push([src.r,src.c]);
  });
  while(q.length){
    const cur=q.shift();
    const ck=cur[0]+','+cur[1];
    const cell=grid[cur[0]][cur[1]];
    const m=maskFor(cell);
    const curColors=nextColors.get(ck);
    for(let i=0;i<4;i++){
      const d=DIRS[i];
      if(!(m&d))continue;
      const dk=dirKey(d);
      const nr=cur[0]+DR[dk][0],nc=cur[1]+DR[dk][1];
      if(nr<0||nc<0||nr>=rows||nc>=cols)continue;
      const nb=grid[nr]&&grid[nr][nc];
      if(!nb||nb.type==='#')continue;
      if(!(maskFor(nb)&OPP[d]))continue;
      const nk=nr+','+nc;
      if(!nextFilled.has(nk)){
        nextFilled.add(nk);
        nextDist.set(nk,nextDist.get(ck)+1);
        nextColors.set(nk,new Set(curColors));
        parent.set(nk,ck);
        q.push([nr,nc]);
      }else{
        const existing=nextColors.get(nk);
        curColors.forEach(function(cl){existing.add(cl);});
      }
    }
  }
  let watered=0;
  goals.forEach(function(g){
    const cell=grid[g.r][g.c];
    if(goalWateredAt(g.r,g.c,cell,nextFilled,nextColors))watered++;
  });
  const goalReached=goals.length>0&&watered===goals.length;
  let path=[];
  if(goalReached&&goals.length===1){
    const gk=goals[0].r+','+goals[0].c;
    let cur=gk;
    while(cur){
      const parts=cur.split(',');
      path.unshift([+parts[0],+parts[1]]);
      cur=parent.get(cur);
    }
  }else if(goalReached&&sources.length===1){
    const gk=goals[0].r+','+goals[0].c;
    let cur=gk;
    while(cur){
      const parts=cur.split(',');
      path.unshift([+parts[0],+parts[1]]);
      cur=parent.get(cur);
    }
  }else if(goalReached){
    const gk=goals[0].r+','+goals[0].c;
    let cur=gk;
    while(cur){
      const parts=cur.split(',');
      path.unshift([+parts[0],+parts[1]]);
      cur=parent.get(cur);
    }
  }
  return {filled:nextFilled,dist:nextDist,colors:nextColors,path:path,goalReached:goalReached,goalsLeft:goals.length-watered};
}

function updateFlow(triggerWin){
  const result=computeFlow();
  filled=result.filled;
  flowDist=result.dist;
  flowColors=result.colors;
  flowPath=result.path;
  goalsLeft=result.goalsLeft;
  leaks=computeLeaks(filled);
  const openEnds=leakCountBad(leaks);
  const soakEnds=leaks.length-openEnds;
  updateLeakBuckets(leaks.filter(leakBlocksWin));
  updateGardenBuckets();
  updateBucketHud();
  rebuildFlowParticles();
  const gTotal=countGoals();
  const bucketsReady=allGardenBucketsFull();
  const routeLen=countRoutePipes(filled);
  updateRouteHud(routeLen);
  const routeOk=routeConstraintOk(routeLen);
  const wateredNow=gTotal-goalsLeft;
  if(wateredNow>prevWatered&&!won){
    const delta=wateredNow-prevWatered;
    if(delta>=2)showComboReaction('multi',delta);
    else if(wateredNow===1&&gTotal>1)showComboReaction('bloom',1);
  }
  prevWatered=wateredNow;

  if(wasteBucket>=92&&!won&&openEnds>0){
    setStatus('🪣 Bucket full! Fix the pipes or tap Pour Back!','flow');
  }

  if(won&&openEnds>0){
    won=false;
    document.getElementById('win-ov').classList.add('hidden');
  }

  if(result.goalReached&&openEnds===0&&bucketsReady&&routeOk){
    flowPhase=Math.max(flowPhase,0.05);
    if(triggerWin&&!won){
      won=true;
      stopTimer();
      document.getElementById('hint-btn').classList.remove('hint-urgent');
      if(moves<=levelPar)showComboReaction('perfect');
      playWin();
      setStatus('Loop closed — all gardens watered!','win');
      spawnCelebration();
      setTimeout(showWin,900);
    }else if(!won){
      setStatus('All gardens watered!','flow');
    }
  }else if(result.goalReached&&openEnds>0){
    flowPhase=Math.max(flowPhase,0.04);
    setStatus('🔗 Fix '+openEnds+' joint'+(openEnds>1?'s':'')+' — pipes must connect!','flow');
  }else if(result.goalReached&&soakEnds>0&&openEnds===0){
    flowPhase=Math.max(flowPhase,0.04);
    setStatus('🌻 Almost! Spin extra pipe arms toward the grass (capped).','flow');
  }else if(result.goalReached&&openEnds===0&&!bucketsReady){
    flowPhase=Math.max(flowPhase,0.04);
    setStatus('🌻 Garden buckets filling…','flow');
  }else if(result.goalReached&&openEnds===0&&bucketsReady&&!routeOk){
    flowPhase=Math.max(flowPhase,0.04);
    if(routeMin!=null)setStatus('🛤 '+routeLen+'/'+routeMin+' pipes — make a longer path!','flow');
    else if(routeMax!=null)setStatus('🛤 '+routeLen+' pipes — too long! Use fewer (≤'+routeMax+').','flow');
  }else if(!won){
    flowPhase=filled.size>1?Math.max(flowPhase,0.02):Math.max(0,flowPhase-0.04);
    let msg='Tap pipes to spin!';
    let gCount=0;
    for(let r=0;r<rows;r++)for(let c=0;c<cols;c++)if(isGoal(grid[r]&&grid[r][c]))gCount++;
    if(openEnds>0&&filled.size>1)msg='🔗 '+openEnds+' loose joint'+(openEnds>1?'s':'')+' — spin until pipes connect!';
    else if(soakEnds>0&&filled.size>1)msg='↪️ Spin T-pipes so extra arms point into the grass';
    else if(gCount>1&&result.filled.size>1)msg='Watered '+(gCount-goalsLeft)+' / '+gCount+' gardens';
    else if(filled.size>1)msg='Water is flowing…';
    setStatus(msg,filled.size>1||openEnds>0?'flow':'idle');
  }
}

function countGoals(){
  let n=0;
  for(let r=0;r<rows;r++)for(let c=0;c<cols;c++)if(isGoal(grid[r]&&grid[r][c]))n++;
  return n;
}

function interactCell(r,c){
  if(buildMode)return interactBuildCell(r,c);
  const cell=grid[r]&&grid[r][c];
  if(!cell||cell.fixed||cell.type==='#')return false;
  if(won){
    won=false;
    document.getElementById('win-ov').classList.add('hidden');
    mode='play';
  }
  if(cell.type==='V'){
    const now=Date.now();
    if(lastValveCell&&lastValveCell.r===r&&lastValveCell.c===c&&now-lastValveTap<450){
      cell.open=!cell.open;
      lastValveTap=0;
      lastValveCell=null;
      playValve();
      moves++;
      document.getElementById('moves').textContent=String(moves);
      updateFlow(true);
      return true;
    }
    lastValveCell={r:r,c:c};
    lastValveTap=now;
  }
  const max=cell.type==='X'?1:4;
  cell.rot=(cell.rot+1)%max;
  if(cell.type==='B')cell.touched=true;
  spinAnim={r:r,c:c,t:0};
  moves++;
  document.getElementById('moves').textContent=String(moves);
  playRotate();
  updateFlow(true);
  return true;
}

function resetLevel(){
  document.getElementById('lose-ov').classList.add('hidden');
  mode='play';
  loadLevel(levelIdx);
}

function showHint(){
  if(won)return;
  if(buildMode){
    for(let r=0;r<rows;r++){
      for(let c=0;c<cols;c++){
        if(grid[r]&&grid[r][c])continue;
        if(selectedBuildPipe!=='erase'&&placeBuildPipe(r,c,selectedBuildPipe)){
          moves++;
          document.getElementById('moves').textContent=String(moves);
          playHint();
          updateFlow(true);
          setStatus('Placed a pipe — keep building!','flow');
          return;
        }
      }
    }
    setStatus('Pick straights or corners from the kit!','idle');
    playHint();
    return;
  }
  const base=cloneGrid(grid);
  for(let r=0;r<rows;r++){
    for(let c=0;c<cols;c++){
      const start=base[r]&&base[r][c];
      if(!start||start.fixed||start.type==='#')continue;
      const max=start.type==='X'?1:4;
      for(let rot=0;rot<max;rot++){
        if(rot===start.rot)continue;
        grid=cloneGrid(base);
        grid[r][c].rot=rot;
        if(grid[r][c].type==='B')grid[r][c].touched=true;
        if(grid[r][c].type==='V'){grid[r][c].open=true;grid[r][c].touched=true;}
        const test=computeFlow();
        const tLen=countRoutePipes(test.filled);
        if(test.goalReached&&leakCountBad(computeLeaks(test.filled))===0&&routeConstraintOk(tLen)){
          moves++;
          document.getElementById('moves').textContent=String(moves);
          spinAnim={r:r,c:c,t:0};
          playHint();
          updateFlow(true);
          setStatus('Hint applied! ✨','flow');
          return;
        }
      }
    }
  }
  playHint();
  setStatus('Try the corner pipes!','idle');
}

function resize(){
  if(!canvas)return;
  const wrap=document.getElementById('board-wrap');
  const w=wrap.clientWidth,h=wrap.clientHeight;
  const dpr=Math.min(window.devicePixelRatio||1,2);
  canvas.width=Math.floor(w*dpr);
  canvas.height=Math.floor(h*dpr);
  canvas.style.width=w+'px';
  canvas.style.height=h+'px';
  ctx.setTransform(dpr,0,0,dpr,0,0);
  const dim=Math.max(rows,cols);
  const pad=dim>=8?10:dim>=6?12:16;
  cellSize=Math.floor(Math.min((w-pad*2)/cols,(h-pad*2)/rows));
  let minCell=44;
  if(dim>=9)minCell=28;
  else if(dim>=8)minCell=32;
  else if(dim>=7)minCell=36;
  else if(dim>=6)minCell=40;
  cellSize=Math.max(minCell,Math.min(cellSize,96));
  const gw=cellSize*cols,gh=cellSize*rows;
  gridOffX=(w-gw)/2;
  gridOffY=(h-gh)/2;
  renderFrame();
}

function cellCenter(r,c){
  return[gridOffX+c*cellSize+cellSize/2,gridOffY+r*cellSize+cellSize/2];
}

function ensureAnimLoop(){
  if(animRunning)return;
  animRunning=true;
  requestAnimationFrame(tick);
}

function tickWinCheck(){
  if(won||mode!=='play')return;
  if(goalsLeft>0||leakCountBad(leaks)>0)return;
  if(!allGardenBucketsFull())return;
  if(!routeConstraintOk(countRoutePipes(filled)))return;
  updateFlow(true);
}

function tick(){
  if(mode!=='play'){animRunning=false;return;}
  animT+=0.016;
  if(spinAnim){
    spinAnim.t+=0.12;
    if(spinAnim.t>=1)spinAnim=null;
  }
  if(flowPath.length>1){
    const target=flowPath.length-1+0.5;
    if(flowPhase<target)flowPhase=Math.min(target,flowPhase+0.08);
  }
  if(!won&&filled.size>0){
    leaks=computeLeaks(filled);
    updateLeakBuckets(leaks.filter(leakBlocksWin));
    updateGardenBuckets();
    updateBucketHud();
    tickWinCheck();
  }
  spawnFlowBubbles();
  spawnLeakParticles();
  updateWaterPhysics();
  updateSiphonStreams();
  updateAndDrawDrops();
  renderFrame();
  requestAnimationFrame(tick);
}

function renderFrame(){
  if(!ctx)return;
  const w=canvas.width/(window.devicePixelRatio||1);
  const h=canvas.height/(window.devicePixelRatio||1);
  ctx.clearRect(0,0,w,h);

  const gw=cellSize*cols,gh=cellSize*rows;
  ctx.fillStyle=boardTheme.frame||'#0d1a12';
  ctx.fillRect(gridOffX-8,gridOffY-8,gw+16,gh+16);

  for(let r=0;r<rows;r++){
    for(let c=0;c<cols;c++){
      const x=gridOffX+c*cellSize,y=gridOffY+r*cellSize;
      const cell=grid[r]&&grid[r][c];
      if(cell&&cell.type==='#'){
        ctx.fillStyle=levelIdx===FINALE_IDX?'#3a1818':'#2a2218';
        ctx.fillRect(x,y,cellSize,cellSize);
        ctx.font=(cellSize*.38)+'px serif';
        ctx.textAlign='center';
        ctx.textBaseline='middle';
        ctx.fillText('🪨',x+cellSize/2,y+cellSize/2);
        continue;
      }
      ctx.fillStyle=(r+c)%2===0?boardTheme.grass[0]:boardTheme.grass[1];
      ctx.fillRect(x,y,cellSize,cellSize);
      if(buildMode&&!cell){
        ctx.strokeStyle='rgba(255,225,77,.2)';
        ctx.lineWidth=1;
        ctx.strokeRect(x+cellSize*.22,y+cellSize*.22,cellSize*.56,cellSize*.56);
        ctx.font=(cellSize*.22)+'px serif';
        ctx.textAlign='center';
        ctx.textBaseline='middle';
        ctx.fillStyle='rgba(255,225,77,.35)';
        ctx.fillText('+',x+cellSize/2,y+cellSize/2);
      }
      ctx.strokeStyle='rgba(255,255,255,.04)';
      ctx.strokeRect(x+.5,y+.5,cellSize-1,cellSize-1);
    }
  }

  drawPuddles();
  drawNetworkFlow();
  drawFlowUnderlay();
  for(let r=0;r<rows;r++){
    for(let c=0;c<cols;c++){
      const cell=grid[r]&&grid[r][c];
      if(cell)drawPipe(r,c,cell);
    }
  }
  drawFlowParticles();
  drawLeakBuckets();
  drawSiphonStreams();
  drawDecorations();
  drawLeakParticles();
  drawBubbles();
}

function rebuildFlowParticles(){
  flowParticles.length=0;
  const edgeSeen=new Set();
  filled.forEach(function(k){
    const parts=k.split(',');
    const r=+parts[0],c=+parts[1];
    const cell=grid[r]&&grid[r][c];
    if(!cell)return;
    const m=maskFor(cell);
    for(let i=0;i<4;i++){
      const d=DIRS[i];
      if(!(m&d))continue;
      const nr=r+DR[dirKey(d)][0],nc=c+DR[dirKey(d)][1];
      const nk=nr+','+nc;
      if(!filled.has(nk))continue;
      const ek=k+'|'+nk;
      if(edgeSeen.has(ek))continue;
      edgeSeen.add(ek);
      const a=portXY(r,c,d);
      const b=portXY(nr,nc,OPP[d]);
      const dist=flowDist.get(k)||0;
      flowParticles.push({
        ax:a[0],ay:a[1],bx:b[0],by:b[1],
        t:Math.random(),speed:.35+Math.random()*.25,
        dist:dist,color:cellColorsAt(r,c),
      });
    }
  });
}

function drawNetworkFlow(){
  if(filled.size<2)return;
  const edgeSeen=new Set();
  filled.forEach(function(k){
    const parts=k.split(',');
    const r=+parts[0],c=+parts[1];
    const m=maskFor(grid[r][c]);
    for(let i=0;i<4;i++){
      const d=DIRS[i];
      if(!(m&d))continue;
      const nr=r+DR[dirKey(d)][0],nc=c+DR[dirKey(d)][1];
      const nk=nr+','+nc;
      if(!filled.has(nk))continue;
      const ek=k+'|'+nk;
      if(edgeSeen.has(ek))continue;
      edgeSeen.add(ek);
      const a=portXY(r,c,d);
      const b=portXY(nr,nc,OPP[d]);
      const dist=flowDist.get(k)||0;
      if(flowPhase<dist+0.2)continue;
      const cols=flowColors.get(k);
      const hex=(cols&&cols.size===1)?(WATER_COLORS[[...cols][0]]||'#5bc8ff'):'#5bc8ff';
      const rr=parseInt(hex.slice(1,3),16),gg=parseInt(hex.slice(3,5),16),bb=parseInt(hex.slice(5,7),16);
      const pulse=.55+.45*Math.sin(animT*5-dist);
      const wave=Math.sin(animT*8-dist)*cellSize*.04;
      const mx=(a[0]+b[0])/2+wave;
      const my=(a[1]+b[1])/2+wave;
      const grad=ctx.createLinearGradient(a[0],a[1],b[0],b[1]);
      grad.addColorStop(0,'rgba('+rr+','+gg+','+bb+','+(0.25*pulse)+')');
      grad.addColorStop(.5,'rgba('+rr+','+gg+','+bb+','+(0.7*pulse)+')');
      grad.addColorStop(1,'rgba('+rr+','+gg+','+bb+','+(0.25*pulse)+')');
      ctx.strokeStyle=grad;
      ctx.lineWidth=cellSize*.1;
      ctx.lineCap='round';
      ctx.beginPath();
      ctx.moveTo(a[0],a[1]);
      ctx.quadraticCurveTo(mx,my,b[0],b[1]);
      ctx.stroke();
    }
  });
}

function drawFlowParticles(){
  for(let i=0;i<flowParticles.length;i++){
    const p=flowParticles[i];
    if(flowPhase<p.dist+0.15)continue;
    p.t+=p.speed*0.016;
    if(p.t>1)p.t-=1;
    const px=p.ax+(p.bx-p.ax)*p.t;
    const py=p.ay+(p.by-p.ay)*p.t;
    const wc=WATER_COLORS[p.color]||'#5bc8ff';
    ctx.globalAlpha=.85;
    ctx.fillStyle=wc;
    ctx.beginPath();
    ctx.arc(px,py,cellSize*.05,0,Math.PI*2);
    ctx.fill();
    ctx.globalAlpha=1;
  }
}

function spawnLeakParticles(){
  if(mode!=='play')return;
  for(let i=0;i<leaks.length;i++){
    const L=leaks[i];
    if(Math.random()>0.5)continue;
    const xy=portXY(L.r,L.c,L.dir);
    const dk=dirKey(L.dir);
    const push=cellSize*.02;
    leakDrips.push({
      x:xy[0],y:xy[1],
      vx:DR[dk][1]*push+(Math.random()-.5)*1.2,
      vy:DR[dk][0]*push+(Math.random()-.3)*.8,
      life:1,
      color:L.color||'b',
      kind:L.type==='crack'?'crack':'drip',
    });
    if(L.type==='crack'&&Math.random()<0.15)playLeak();
  }
  for(let r=0;r<rows;r++){
    for(let c=0;c<cols;c++){
      const cell=grid[r]&&grid[r][c];
      if(!cell||cell.type!=='G'||!goalWateredAt(r,c,cell,filled,flowColors))continue;
      if(Math.random()>0.92)continue;
      const cx=gridOffX+c*cellSize+cellSize/2;
      const cy=gridOffY+r*cellSize+cellSize/2;
      leakDrips.push({
        x:cx+(Math.random()-.5)*cellSize*.3,
        y:cy-cellSize*.1,
        vx:(Math.random()-.5)*1.5,
        vy:-1.5-Math.random()*2,
        life:1,
        color:cell.color||'b',
        kind:'overflow',
      });
    }
  }
  while(leakDrips.length>120)leakDrips.shift();
}

function updateWaterPhysics(){
  for(let i=leakDrips.length-1;i>=0;i--){
    const d=leakDrips[i];
    d.x+=d.vx;
    d.y+=d.vy;
    d.vy+=d.kind==='overflow'?0.06:0.14;
    d.vx*=.98;
    d.life-=d.kind==='overflow'?0.018:0.028;
    if(d.life<=0)leakDrips.splice(i,1);
  }
  for(let i=0;i<leaks.length;i++){
    const L=leaks[i];
    if(L.type==='overflow')continue;
    const key=L.r+','+L.c+','+L.dir;
    const xy=portXY(L.r,L.c,L.dir);
    const p=puddles.get(key)||{x:xy[0],y:xy[1],r:2,alpha:0};
    p.r=Math.min(cellSize*.22,p.r+0.35);
    p.alpha=Math.min(0.55,p.alpha+0.02);
    puddles.set(key,p);
  }
  puddles.forEach(function(p,key){
    const still=leaks.some(function(L){
      return L.r+','+L.c+','+L.dir===key;
    });
    if(!still){
      p.alpha-=0.03;
      p.r*=0.97;
      if(p.alpha<=0)puddles.delete(key);
    }
  });
}

function drawPuddles(){
  puddles.forEach(function(p){
    ctx.globalAlpha=p.alpha;
    ctx.fillStyle='#3a7ab8';
    ctx.beginPath();
    ctx.ellipse(p.x,p.y,p.r,p.r*.65,0,0,Math.PI*2);
    ctx.fill();
    ctx.globalAlpha=1;
  });
}

function drawLeakParticles(){
  for(let i=0;i<leakDrips.length;i++){
    const d=leakDrips[i];
    const wc=WATER_COLORS[d.color]||'#5bc8ff';
    ctx.globalAlpha=d.life*(d.kind==='overflow'?0.75:0.9);
    if(d.kind==='overflow'){
      ctx.fillStyle=wc;
      ctx.beginPath();
      ctx.arc(d.x,d.y,3+d.life*2,0,Math.PI*2);
      ctx.fill();
    }else{
      ctx.strokeStyle=wc;
      ctx.lineWidth=2;
      ctx.beginPath();
      ctx.moveTo(d.x,d.y);
      ctx.lineTo(d.x-d.vx*3,d.y-d.vy*3);
      ctx.stroke();
      ctx.fillStyle='#e8f8ff';
      ctx.beginPath();
      ctx.arc(d.x,d.y,2.5,0,Math.PI*2);
      ctx.fill();
    }
    ctx.globalAlpha=1;
  }
  for(let i=0;i<leaks.length;i++){
    const L=leaks[i];
    const xy=portXY(L.r,L.c,L.dir);
    const pulse=.5+.5*Math.sin(animT*12+i);
    ctx.globalAlpha=.25+.2*pulse;
    if(L.type==='gap'){
      ctx.strokeStyle='#ff9a3c';
      ctx.lineWidth=2;
      ctx.beginPath();
      ctx.arc(xy[0],xy[1],cellSize*.11,0,Math.PI*2);
      ctx.stroke();
    }else{
      ctx.fillStyle='#8ed4ff';
      ctx.beginPath();
      ctx.arc(xy[0],xy[1],cellSize*.12,0,Math.PI*2);
      ctx.fill();
    }
    ctx.globalAlpha=1;
  }
}

function drawBucketIcon(x,y,fill,scale,accent){
  const w=cellSize*scale,h=cellSize*scale*1.2;
  const top=w*.7,bot=w*.88;
  const baseY=y+h*0.2;
  ctx.fillStyle='#5c4e40';
  ctx.strokeStyle='#8a7868';
  ctx.lineWidth=1.5;
  ctx.beginPath();
  ctx.moveTo(x-top/2,baseY-h*0.45);
  ctx.lineTo(x+top/2,baseY-h*0.45);
  ctx.lineTo(x+bot/2,baseY+h*0.42);
  ctx.lineTo(x-bot/2,baseY+h*0.42);
  ctx.closePath();
  ctx.fill();
  ctx.stroke();
  const maxInner=h*0.72*fill;
  if(maxInner>2){
    ctx.fillStyle=accent||'rgba(91,200,255,.88)';
    ctx.fillRect(x-w*0.28,baseY+h*0.4-maxInner,w*0.56,maxInner);
    ctx.globalAlpha=.35+fill*0.35;
    ctx.fillStyle='#fff';
    ctx.fillRect(x-w*0.2,baseY+h*0.38-maxInner,w*0.12,maxInner*0.4);
    ctx.globalAlpha=1;
  }
}

function drawLeakBuckets(){
  leakBuckets.forEach(function(fill,key){
    if(fill<0.06)return;
    const p=key.split(',');
    const d=+p[2];
    const xy=portXY(+p[0],+p[1],d);
    const dk=dirKey(d);
    const ox=DR[dk][1]*cellSize*0.28;
    const oy=DR[dk][0]*cellSize*0.28;
    drawBucketIcon(xy[0]+ox,xy[1]+oy,fill,0.2,'rgba(100,210,255,.9)');
  });
}

function drawSiphonStreams(){
  const dest=findSourceCenter();
  for(let i=0;i<siphonStreams.length;i++){
    const s=siphonStreams[i];
    ctx.globalAlpha=.85*(1-s.t*0.5);
    ctx.fillStyle='#b8ecff';
    ctx.beginPath();
    ctx.arc(s.x,s.y,2.5+2*(1-s.t),0,Math.PI*2);
    ctx.fill();
  }
  if(siphonAnim>0.1){
    ctx.globalAlpha=siphonAnim*0.5;
    ctx.strokeStyle='#8ed4ff';
    ctx.lineWidth=3;
    ctx.setLineDash([6,6]);
    ctx.lineDashOffset=-animT*40;
    ctx.beginPath();
    ctx.arc(dest[0],dest[1],cellSize*0.45,0,Math.PI*2);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.globalAlpha=1;
  }
}

function drawFlowUnderlay(){
  if(flowPath.length<2)return;
  for(let i=1;i<flowPath.length;i++){
    if(flowPhase<i-0.15)continue;
    const a=flowPath[i-1],b=flowPath[i];
    const ax=gridOffX+a[1]*cellSize+cellSize/2;
    const ay=gridOffY+a[0]*cellSize+cellSize/2;
    const bx=gridOffX+b[1]*cellSize+cellSize/2;
    const by=gridOffY+b[0]*cellSize+cellSize/2;
    const segProg=Math.min(1,Math.max(0,flowPhase-(i-1)));
    const px=ax+(bx-ax)*segProg;
    const py=ay+(by-ay)*segProg;
    const cols=flowColors.get(a[0]+','+a[1]);
    const hex=(cols&&cols.size===1)?(WATER_COLORS[[...cols][0]]||'#5bc8ff'):'#5bc8ff';
    const rr=parseInt(hex.slice(1,3),16),gg=parseInt(hex.slice(3,5),16),bb=parseInt(hex.slice(5,7),16);
    const grad=ctx.createLinearGradient(ax,ay,px,py);
    grad.addColorStop(0,'rgba('+rr+','+gg+','+bb+',0.55)');
    grad.addColorStop(1,'rgba('+rr+','+gg+','+bb+',0.95)');
    ctx.strokeStyle=grad;
    ctx.lineWidth=cellSize*.14;
    ctx.lineCap='round';
    ctx.beginPath();
    ctx.moveTo(ax,ay);
    ctx.lineTo(px,py);
    ctx.stroke();
  }
}

function spawnFlowBubbles(){
  if(flowPath.length<2||flowPhase<0.5)return;
  if(Math.random()>0.35)return;
  const seg=Math.min(flowPath.length-2,Math.floor(flowPhase));
  const a=flowPath[seg],b=flowPath[seg+1];
  const t=flowPhase-seg;
  const ax=gridOffX+a[1]*cellSize+cellSize/2;
  const ay=gridOffY+a[0]*cellSize+cellSize/2;
  const bx=gridOffX+b[1]*cellSize+cellSize/2;
  const by=gridOffY+b[0]*cellSize+cellSize/2;
  bubbles.push({
    x:ax+(bx-ax)*t+(Math.random()-.5)*8,
    y:ay+(by-ay)*t+(Math.random()-.5)*8,
    r:2+Math.random()*3,
    life:1,
  });
}

function drawBubbles(){
  for(let i=bubbles.length-1;i>=0;i--){
    const b=bubbles[i];
    b.y-=0.6;
    b.life-=0.025;
    if(b.life<=0){bubbles.splice(i,1);continue;}
    ctx.globalAlpha=b.life*.7;
    ctx.fillStyle='#b8ecff';
    ctx.beginPath();
    ctx.arc(b.x,b.y,b.r,0,Math.PI*2);
    ctx.fill();
    ctx.globalAlpha=1;
  }
}

function drawDecorations(){
  for(let r=0;r<rows;r++){
    for(let c=0;c<cols;c++){
      const cell=grid[r]&&grid[r][c];
      if(!cell)continue;
      const cx=gridOffX+c*cellSize+cellSize/2;
      const cy=gridOffY+r*cellSize+cellSize/2;
      const k=r+','+c;
      const goalWet=cell.type==='G'&&goalWateredAt(r,c,cell,filled,flowColors);
      if(cell.type==='S'){
        ctx.font=(cellSize*.42)+'px serif';
        ctx.textAlign='center';
        ctx.textBaseline='middle';
        const em=cell.color==='r'?'🔴':cell.color==='y'?'🟡':'🚿';
        ctx.fillText(em,cx,cy-cellSize*.08);
      }
      if(cell.type==='G'){
        const gFill=gardenBuckets.get(k)||0;
        drawBucketIcon(cx,cy+cellSize*0.28,gFill,0.26,cell.color==='r'?'rgba(255,140,200,.9)':cell.color==='y'?'rgba(255,230,120,.9)':'rgba(91,200,255,.9)');
        const emSet=GOAL_EMOJI[cell.color]||GOAL_EMOJI.b;
        if(goalWet){
          ctx.save();
          ctx.globalAlpha=.35+.2*Math.sin(animT*5);
          ctx.fillStyle=cell.color==='r'?'rgba(255,110,180,.25)':'rgba(93,255,176,.25)';
          ctx.beginPath();
          ctx.arc(cx,cy,cellSize*.42,0,Math.PI*2);
          ctx.fill();
          ctx.restore();
        }
        ctx.font=(cellSize*.42)+'px serif';
        ctx.textAlign='center';
        ctx.textBaseline='middle';
        const dryEm=cell.sprinkler?'🪴':emSet[0];
        ctx.fillText(goalWet?emSet[1]:dryEm,cx,cy+cellSize*.05);
      }
    }
  }
}

function drawPipe(r,c,cell){
  const cx=gridOffX+c*cellSize+cellSize/2;
  const cy=gridOffY+r*cellSize+cellSize/2;
  const half=cellSize*.34;
  const w=cellSize*.18;
  const k=r+','+c;
  const dist=flowDist.get(k);
  const hasWater=dist!==undefined&&flowPhase>=dist;
  const m=maskFor(cell);
  let spin=0;
  if(spinAnim&&spinAnim.r===r&&spinAnim.c===c)spin=spinAnim.t*Math.PI/2;

  ctx.save();
  ctx.translate(cx,cy);
  ctx.rotate(spin);
  ctx.translate(-cx,-cy);

  if(cell.type==='S'||cell.type==='G'){
    if(hasWater){
      ctx.save();
      ctx.globalAlpha=.35+.15*Math.sin(animT*4+k.length);
      drawConnections(cx,cy,half,w,m,true,dist||0,cellColorsAt(r,c));
      ctx.restore();
    }
    ctx.restore();
    return;
  }

  if(cell.type==='B'&&!cell.touched){
    ctx.fillStyle='rgba(80,60,50,.25)';
    ctx.fillRect(cx-cellSize*.36,cy-cellSize*.36,cellSize*.72,cellSize*.72);
    const spray=.4+.3*Math.sin(animT*10);
    ctx.globalAlpha=spray;
    ctx.fillStyle='rgba(120,200,255,.35)';
    ctx.beginPath();
    ctx.arc(cx,cy,cellSize*.2,0,Math.PI*2);
    ctx.fill();
    ctx.globalAlpha=1;
    ctx.font=(cellSize*.22)+'px serif';
    ctx.textAlign='center';
    ctx.textBaseline='middle';
    ctx.fillText('💦',cx,cy);
  }else if(cell.type==='B'&&cell.touched&&hasWater){
    ctx.font=(cellSize*.16)+'px serif';
    ctx.textAlign='center';
    ctx.textBaseline='middle';
    ctx.fillText('🔧',cx,cy-cellSize*.32);
  }else{
    ctx.fillStyle='rgba(255,255,255,.06)';
    ctx.beginPath();
    ctx.arc(cx,cy,cellSize*.38,0,Math.PI*2);
    ctx.fill();
  }

  drawConnections(cx,cy,half,w,m,hasWater,dist||0,cellColorsAt(r,c));

  if(cell.type==='V'){
    ctx.font=(cellSize*.2)+'px serif';
    ctx.textAlign='center';
    ctx.textBaseline='middle';
    ctx.fillText(cell.open?'🟢':'🔴',cx,cy+cellSize*.28);
  }

  if(!cell.fixed){
    ctx.fillStyle='rgba(255,255,255,.25)';
    ctx.beginPath();
    ctx.arc(cx,cy,cellSize*.08,0,Math.PI*2);
    ctx.fill();
  }
  ctx.restore();
}

function cellColorsAt(r,c){
  const k=r+','+c;
  const cols=flowColors.get(k);
  if(!cols||!cols.size)return 'b';
  return [...cols][0];
}

function drawConnections(cx,cy,half,w,m,water,dist,flowCol){
  const wc=WATER_COLORS[flowCol]||'#5bc8ff';
  const pipeCol=water?'#3a8fd4':'#6a7a72';
  const innerCol=water?wc:'#8a9a92';
  ctx.lineCap='round';
  ctx.lineJoin='round';
  if(m&N)drawSeg(cx,cy,cx,cy-half,w,pipeCol,innerCol,water,dist);
  if(m&E)drawSeg(cx,cy,cx+half,cy,w,pipeCol,innerCol,water,dist);
  if(m&S)drawSeg(cx,cy,cx,cy+half,w,pipeCol,innerCol,water,dist);
  if(m&W)drawSeg(cx,cy,cx-half,cy,w,pipeCol,innerCol,water,dist);
  ctx.fillStyle=innerCol;
  ctx.beginPath();
  ctx.arc(cx,cy,w*.55,0,Math.PI*2);
  ctx.fill();
}

function drawSeg(x1,y1,x2,y2,w,outer,inner,water,dist){
  ctx.strokeStyle=outer;
  ctx.lineWidth=w*1.35;
  ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();
  ctx.strokeStyle=inner;
  ctx.lineWidth=w*.75;
  ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();
  if(water){
    const pulse=.5+.5*Math.sin(animT*6-dist);
    ctx.strokeStyle='rgba(120,220,255,'+(0.35+pulse*.45)+')';
    ctx.lineWidth=w*.4;
    ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();
    ctx.strokeStyle='rgba(255,255,255,'+(0.15+pulse*.25)+')';
    ctx.lineWidth=w*.15;
    ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();
  }
}

function spawnCelebration(){
  let gx=gridOffX+cellSize,gy=gridOffY+cellSize;
  for(let r=0;r<rows;r++){
    for(let c=0;c<cols;c++){
      const cell=grid[r]&&grid[r][c];
      if(cell&&cell.type==='G'){
        gx=gridOffX+c*cellSize+cellSize/2;
        gy=gridOffY+r*cellSize+cellSize/2;
      }
    }
  }
  for(let i=0;i<28;i++){
    waterDrops.push({
      x:gx+(Math.random()-.5)*cellSize*.8,
      y:gy+(Math.random()-.5)*cellSize*.4,
      vx:(Math.random()-.5)*4,
      vy:-2-Math.random()*4,
      life:1,
      em:['💧','✨','🌱','💦','🌻'][Math.floor(Math.random()*5)],
    });
  }
}

function updateAndDrawDrops(){
  for(let i=waterDrops.length-1;i>=0;i--){
    const d=waterDrops[i];
    d.x+=d.vx;d.y+=d.vy;d.vy+=.08;d.life-=.015;
    if(d.life<=0){waterDrops.splice(i,1);continue;}
    ctx.globalAlpha=d.life;
    ctx.font='18px serif';
    ctx.textAlign='center';
    ctx.fillText(d.em,d.x,d.y);
    ctx.globalAlpha=1;
  }
}

function pointerToCell(clientX,clientY){
  const rect=canvas.getBoundingClientRect();
  const x=clientX-rect.left,y=clientY-rect.top;
  const c=Math.floor((x-gridOffX)/cellSize);
  const r=Math.floor((y-gridOffY)/cellSize);
  if(r<0||c<0||r>=rows||c>=cols)return null;
  return{r,c};
}

function onSiphonTap(){
  if(mode!=='play'||won)return;
  if(wasteBucket<3){
    setStatus('Nothing spilled yet — fix the pipes first!','idle');
    playHint();
    return;
  }
  doSiphon(null,null,38);
  setStatus('♻️ Poured water back to the hose!','flow');
}

function onPointer(e){
  if(mode!=='play')return;
  const now=Date.now();
  if(now-lastTap<180)return;
  lastTap=now;
  const hit=hitLeakBucket(e.clientX,e.clientY);
  if(hit&&hit.fill>0.08){
    leakBuckets.set(hit.key,Math.max(0,hit.fill-0.5));
    doSiphon(hit.x,hit.y,22);
    setStatus('🪣 Poured out the catch bucket!','flow');
    return;
  }
  const pt=pointerToCell(e.clientX,e.clientY);
  if(!pt)return;
  const cell=grid[pt.r]&&grid[pt.r][pt.c];
  if(buildMode){
    if(cell&&cell.fixed)return;
    if(cell&&cell.type==='#')return;
    interactBuildCell(pt.r,pt.c);
    return;
  }
  if(!cell||cell.fixed||cell.type==='#')return;
  interactCell(pt.r,pt.c);
}

function bindTap(el,fn){
  el.addEventListener('touchend',function(e){
    e.preventDefault();
    touchHandled=true;
    fn(e);
    setTimeout(function(){touchHandled=false;},400);
  },{passive:false});
  el.addEventListener('click',function(e){
    if(touchHandled)return;
    fn(e);
  });
}

function startGame(){
  document.getElementById('menu-ov').classList.add('hidden');
  mode='play';
  loadLevel(levelIdx);
}

function showWin(){
  recordWin();
  const lv=LEVELS[levelIdx];
  const isSecret=levelIdx===SECRET_IDX;
  const isFinale=levelIdx===FINALE_IDX;
  const isLongest=levelIdx===LONGEST_IDX;
  const isShortest=levelIdx===SHORTEST_IDX;
  const isLastMain=levelIdx===MAIN_LAST_IDX;
  if(isSecret){
    document.getElementById('win-emoji').textContent='✨';
    document.getElementById('win-title').textContent='Secret garden saved!';
  }else if(isFinale){
    document.getElementById('win-emoji').textContent='🌍';
    document.getElementById('win-title').textContent='The world is watered!';
    unlockSecret();
  }else if(isLongest){
    document.getElementById('win-emoji').textContent='🛤';
    document.getElementById('win-title').textContent='Longest hose wins!';
  }else if(isShortest){
    document.getElementById('win-emoji').textContent='⚡';
    document.getElementById('win-title').textContent='Shortest hose wins!';
  }else if(isLastMain){
    document.getElementById('win-emoji').textContent='⏱️';
    document.getElementById('win-title').textContent='Rush complete!';
  }else{
    document.getElementById('win-emoji').textContent='🌻';
    document.getElementById('win-title').textContent='The field is watered!';
  }
  let grade='';
  if(moves<=levelPar)grade=' ⭐ Perfect!';
  else if(moves<=levelPar+1)grade=' ⭐⭐ Nice!';
  else grade=' ⭐ Good job!';
  const routeLen=countRoutePipes(filled);
  let msg=(lv?lv.name:'')+' — '+moves+' moves (par '+levelPar+')'+grade;
  if(isSecret)msg='Nobody else knows this garden exists. You are a legend! 💧';
  else if(isFinale)msg='You saved the last gardens on Earth! Next: design your own hose path…';
  else if(isLongest)msg='You used '+routeLen+' pipes (needed '+routeMin+'+). Next: can you do it with fewer?';
  else if(isShortest)msg='Only '+routeLen+' pipes (max '+routeMax+')! You mastered both routes. 🤫 Tap menu title 5× for secret…';
  else if(isLastMain)msg='One more challenge awaits… End of the World! 🌍';
  else if(buildMode)msg=routeLen+' pipes in your route · par '+levelPar+grade;
  document.getElementById('win-msg').textContent=msg;
  if(isSecret||isShortest){
    document.getElementById('next-btn').textContent='Menu 🏠';
  }else if(isFinale){
    document.getElementById('next-btn').textContent='Longest Hose 🛤';
  }else if(isLongest){
    document.getElementById('next-btn').textContent='Shortest Hose ⚡';
  }else if(isLastMain){
    document.getElementById('next-btn').textContent='End of the World 🌍';
  }else{
    document.getElementById('next-btn').textContent='Next Level ➡️';
  }
  document.getElementById('win-ov').classList.remove('hidden');
}

function nextLevel(){
  document.getElementById('win-ov').classList.add('hidden');
  if(levelIdx===SECRET_IDX||levelIdx===SHORTEST_IDX){
    showMenu();
    return;
  }
  if(levelIdx===MAIN_LAST_IDX)levelIdx=FINALE_IDX;
  else if(levelIdx===FINALE_IDX)levelIdx=LONGEST_IDX;
  else if(levelIdx===LONGEST_IDX)levelIdx=SHORTEST_IDX;
  else if(levelIdx<LEVELS.length-1)levelIdx++;
  else levelIdx=0;
  saveData.nextLevel=levelIdx;
  persistSave();
  loadLevel(levelIdx);
}

function showMenu(){
  document.getElementById('win-ov').classList.add('hidden');
  document.getElementById('lose-ov').classList.add('hidden');
  document.getElementById('menu-ov').classList.remove('hidden');
  updateMenuProgress();
  stopTimer();
  mode='menu';
  animRunning=false;
}

function onMenuTitleTap(){
  menuTapCount++;
  if(menuTapCount<5)return;
  menuTapCount=0;
  if(!secretUnlocked){
    const hint=document.getElementById('menu-secret-hint');
    hint.textContent='🌍 Beat End of the World first!';
    setTimeout(function(){updateMenuSecretHint();},2000);
    return;
  }
  document.getElementById('menu-ov').classList.add('hidden');
  mode='play';
  levelIdx=SECRET_IDX;
  loadLevel(SECRET_IDX);
}

function au(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx;}
function tone(f,d,type,v){try{const c=au(),o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type=type||'sine';o.frequency.setValueAtTime(f,c.currentTime);g.gain.setValueAtTime(v||.15,c.currentTime);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+d);o.start();o.stop(c.currentTime+d);}catch(e){}}
function playRotate(){tone(420,.06,'triangle',.12);}
function playHint(){tone(660,.1,'sine',.14);setTimeout(function(){tone(880,.1,'sine',.12);},90);}
function playWin(){[523,659,784,988].forEach(function(f,i){setTimeout(function(){tone(f,.18,'sine',.2);},i*90);});}
function playValve(){tone(520,.08,'square',.1);}
function playWilting(){tone(220,.25,'sawtooth',.12);}
function playLeak(){tone(280+Math.random()*80,.05,'triangle',.08);}
function playSiphon(){tone(180,.12,'sine',.14);setTimeout(function(){tone(240,.08,'sine',.1);},80);setTimeout(function(){tone(320,.06,'sine',.08);},160);}
function playCombo(n){const base=520+n*80;[0,1,2].forEach(function(i){setTimeout(function(){tone(base+i*90,.09,'sine',.13);},i*70);});}

window.render_game_to_text=function(){
  const cells=[];
  for(let r=0;r<rows;r++){
    for(let c=0;c<cols;c++){
      const cell=grid[r]&&grid[r][c];
      if(!cell)continue;
      cells.push({r,c,type:cell.type,rot:cell.rot,fixed:cell.fixed,water:filled.has(r+','+c)});
    }
  }
  return JSON.stringify({
    mode:mode,
    level:levelIdx+1,
    levelName:LEVELS[levelIdx]?LEVELS[levelIdx].name:'',
    moves:moves,
    won:won,
    grid:{rows,cols,origin:'top-left',xRight:true,yDown:true},
    cells:cells,
  });
};

window.advanceTime=function(ms){
  const steps=Math.max(1,Math.round(ms/(1000/60)));
  for(let i=0;i<steps;i++){
    animT+=1/60;
    if(flowPath.length>1&&flowPhase<flowPath.length)flowPhase=Math.min(flowPath.length,flowPhase+0.12);
  }
  renderFrame();
};

canvas=document.getElementById('game');
ctx=canvas.getContext('2d');
loadSave();
updateMenuProgress();
document.querySelectorAll('.pipe-pick').forEach(function(btn){
  btn.addEventListener('click',function(){
    if(touchHandled)return;
    setBuildPipe(btn.getAttribute('data-pipe'));
    playHint();
  });
  btn.addEventListener('touchend',function(e){
    e.preventDefault();
    touchHandled=true;
    setBuildPipe(btn.getAttribute('data-pipe'));
    playHint();
    setTimeout(function(){touchHandled=false;},400);
  },{passive:false});
});
bindTap(document.getElementById('start-btn'),startGame);
bindTap(document.getElementById('new-game-btn'),function(){
  resetCampaignSave();
  startGame();
});
bindTap(document.getElementById('menu-title'),onMenuTitleTap);
bindTap(document.getElementById('reset-btn'),resetLevel);
bindTap(document.getElementById('pour-back-btn'),onSiphonTap);
bindTap(document.getElementById('hint-btn'),showHint);
bindTap(document.getElementById('next-btn'),nextLevel);
bindTap(document.getElementById('menu-btn'),showMenu);
bindTap(document.getElementById('retry-btn'),resetLevel);
bindTap(document.getElementById('lose-menu-btn'),showMenu);
canvas.addEventListener('touchend',function(e){
  e.preventDefault();
  touchHandled=true;
  if(e.changedTouches[0])onPointer(e.changedTouches[0]);
  setTimeout(function(){touchHandled=false;},400);
},{passive:false});
canvas.addEventListener('click',function(e){
  if(touchHandled)return;
  onPointer(e);
});
window.addEventListener('resize',function(){if(mode==='play')resize();});
</script>
