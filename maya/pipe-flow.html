<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0618;--card:#16092e;--border:rgba(255,255,255,0.08);
  --pink:#ff6eb4;--yellow:#ffe14d;--green:#5dffb0;--blue:#5bc8ff;
  --purple:#c77dff;--orange:#ff9a3c;--text:#f0e6ff;--muted:rgba(240,230,255,0.38);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none}
html,body{width:100%;height:100%;height:100dvh;background:var(--bg);color:var(--text);font-family:'Nunito',sans-serif;overflow:hidden;touch-action:none}

#root{
  display:grid;
  grid-template-rows:auto 1fr auto;
  height:100%;
  height:100dvh;
  padding:env(safe-area-inset-top,0) env(safe-area-inset-right,0) env(safe-area-inset-bottom,0) env(safe-area-inset-left,0);
  gap:0;
}

#hud{
  flex-shrink:0;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:5px 8px;
  background:linear-gradient(180deg,rgba(22,9,46,.97),rgba(14,6,28,.92));
  border-bottom:1px solid var(--border);
  gap:6px;
  flex-wrap:nowrap;
  overflow-x:auto;
  -webkit-overflow-scrolling:touch;
  scrollbar-width:none;
}
#hud::-webkit-scrollbar{display:none}
#games-btn{font-family:'Fredoka One',cursive;font-size:11px;padding:5px 9px;border-radius:8px;border:1px solid var(--border);background:rgba(255,255,255,.08);color:var(--muted);cursor:pointer;flex-shrink:0;min-height:32px}
#games-btn:active{transform:scale(.96)}
.hpill{display:flex;align-items:center;gap:4px;font-size:11px;font-weight:900;color:var(--muted);flex-shrink:0}
.hval{font-family:'Fredoka One',cursive;font-size:16px;line-height:1;color:var(--text)}
#level-badge{font-family:'Fredoka One',cursive;font-size:11px;padding:4px 10px;border-radius:99px;color:#08041a;background:var(--blue);white-space:nowrap;flex-shrink:0}
.hpill.hidden{display:none}
#timer-pill{color:var(--yellow)}
#timer-pill.urgent{color:#ff7070;animation:tpulse .6s ease-in-out infinite alternate}
@keyframes tpulse{0%{opacity:1}100%{opacity:.55}}
#garden-pill{color:var(--green)}
#waste-pill{gap:4px;min-width:52px}
.waste-track{width:14px;height:28px;border-radius:4px;background:rgba(0,0,0,.25);border:1px solid rgba(91,200,255,.25);overflow:hidden;display:flex;flex-direction:column;justify-content:flex-end}
#waste-fill{width:100%;height:0%;background:linear-gradient(180deg,#5bc8ff,#3a8fd4);border-radius:2px;transition:height .15s}
#waste-pill.full #waste-fill{background:linear-gradient(180deg,#ff9a3c,#ff6eb4)}
#use-again-btn{background:rgba(91,200,255,.15);color:var(--blue);border:1px solid rgba(91,200,255,.35)}
#use-again-btn.ready{animation:hintpulse .7s ease-in-out infinite alternate}
#route-pill{color:var(--purple)}
#play-stack{min-height:0;min-width:0;width:100%;height:100%;display:flex;flex-direction:column}
#play-hint{
  position:absolute;
  left:50%;
  bottom:8px;
  transform:translateX(-50%);
  z-index:5;
  pointer-events:none;
  max-width:min(92%,340px);
  font-size:11px;
  font-weight:900;
  color:var(--text);
  text-align:center;
  line-height:1.25;
  padding:6px 12px;
  border-radius:99px;
  background:rgba(8,4,22,.72);
  border:1px solid rgba(255,255,255,.12);
  backdrop-filter:blur(8px);
  -webkit-backdrop-filter:blur(8px);
  box-shadow:0 4px 20px rgba(0,0,0,.35);
}
#play-hint.flow{color:#b8ecff;border-color:rgba(91,200,255,.35);box-shadow:0 0 16px rgba(91,200,255,.2)}
#play-hint.win{color:var(--green);border-color:rgba(93,255,176,.4);box-shadow:0 0 20px rgba(93,255,176,.25)}
#board-wrap{
  flex:1;
  position:relative;
  min-height:0;
  min-width:0;
  width:100%;
  height:100%;
  display:flex;
  flex-direction:column;
  align-items:stretch;
  justify-content:stretch;
  background:#0a0618;
  padding:0;
  overflow:hidden;
}
#board-wrap.flowing{box-shadow:inset 0 0 40px rgba(91,200,255,.08)}
#kit-bar{display:none;position:absolute;z-index:4;flex-direction:row;padding:0;margin:0;gap:0;background:linear-gradient(180deg,#221838,#1a1428);border:1px solid rgba(255,225,77,.2);border-bottom:none;pointer-events:auto;box-shadow:0 4px 16px rgba(0,0,0,.4)}
#kit-bar.show{display:flex}
#kit-heading,#kit-step{display:none}
#build-palette{display:flex;width:100%;height:100%;gap:0;margin:0;padding:0;align-items:stretch}
.pipe-pick{flex:1;height:100%;min-width:0;font-family:'Fredoka One',cursive;font-size:9px;padding:0;border-radius:0;border:none;border-right:1px solid var(--border);background:rgba(255,255,255,.07);color:var(--muted);cursor:grab;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;line-height:1;touch-action:none}
.pipe-pick:first-child{border-radius:0}
.pipe-pick:last-child{border-right:none}
.pipe-pick.sel{color:var(--yellow);background:rgba(255,225,77,.28);box-shadow:inset 0 0 0 2px var(--yellow),0 0 12px rgba(255,225,77,.35);animation:kitpulse 1s ease-in-out infinite alternate}
@keyframes kitpulse{0%{filter:brightness(1)}100%{filter:brightness(1.15)}}
.pipe-pick .kit-name{font-size:clamp(14px,4vw,20px);line-height:1}
.pipe-pick .cnt{font-size:11px;color:var(--blue);line-height:1}
.pipe-pick.sel .cnt{color:var(--yellow)}
.pipe-pick[data-pipe="erase"] .cnt{display:none}
.pipe-pick.hidden{display:none}
.pipe-pick.dragging{opacity:.7;transform:scale(.95)}
.pipe-pick[data-pipe="erase"]{cursor:pointer}
#canvas-wrap{flex:1;position:relative;width:100%;min-height:0;height:100%;display:block}
#game{width:100%;height:100%;display:block;touch-action:none;position:absolute;inset:0;z-index:1}

#toolbar{flex-shrink:0;display:flex;gap:5px;padding:5px 6px;background:linear-gradient(0deg,rgba(14,6,28,.95),rgba(22,9,46,.88));border-top:1px solid var(--border)}
.tool-btn{flex:1;font-family:'Fredoka One',cursive;font-size:13px;padding:8px 6px;border-radius:8px;border:none;cursor:pointer;min-height:40px;transition:transform .1s}
.tool-btn:active{transform:scale(.96)}
#reset-btn{background:rgba(255,255,255,.08);color:var(--muted);border:1px solid var(--border)}
#hint-btn{background:rgba(255,225,77,.12);color:var(--yellow);border:1px solid rgba(255,225,77,.25)}
#hint-btn.hint-urgent{animation:hintpulse .7s ease-in-out infinite alternate;border-color:rgba(255,110,180,.6);color:#ffb8d8}
@keyframes hintpulse{0%{box-shadow:0 0 0 rgba(255,110,180,0)}100%{box-shadow:0 0 14px rgba(255,110,180,.45)}}
#combo-wrap{position:absolute;top:42%;left:50%;transform:translate(-50%,-50%);text-align:center;pointer-events:none;z-index:10;opacity:0;transition:opacity .25s}
#combo-wrap.show{opacity:1}
#combo-text{font-family:'Fredoka One',cursive;font-size:clamp(22px,6vw,40px);color:var(--yellow);text-shadow:0 0 18px rgba(255,225,77,.55);animation:combopop .35s ease-out}
#combo-sub{font-size:11px;font-weight:900;color:var(--muted);letter-spacing:.06em;margin-top:4px}
@keyframes combopop{0%{transform:scale(1.25)}100%{transform:scale(1)}}
#menu-title{cursor:pointer;-webkit-tap-highlight-color:transparent}
#menu-progress-hint,#menu-secret-hint{font-size:11px;font-weight:900;min-height:16px}
#menu-progress-hint{color:var(--yellow)}
#menu-secret-hint{color:var(--purple)}

.ov{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:50;padding:20px;gap:10px;text-align:center}
.ov.hidden{display:none}
#menu-ov{background:linear-gradient(180deg,#07031a,#0d2840)}
#win-ov{background:rgba(7,3,26,.94)}
.big-title{font-family:'Fredoka One',cursive;font-size:clamp(44px,11vw,76px);line-height:1.05;background:linear-gradient(135deg,var(--blue),var(--green),var(--yellow));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.sub{font-size:13px;color:var(--muted);line-height:1.75;max-width:320px}
.big-btn{font-family:'Fredoka One',cursive;font-size:20px;color:#07031a;background:var(--yellow);border:none;padding:12px 38px;border-radius:10px;cursor:pointer;box-shadow:0 5px 0 rgba(140,110,0,1);transition:transform .1s;min-height:48px}
.big-btn:active{transform:translateY(2px)}
.sec-btn{font-family:'Fredoka One',cursive;font-size:15px;padding:9px 22px;border-radius:10px;border:none;cursor:pointer;background:rgba(255,255,255,.08);color:var(--muted);min-height:44px}
.btn-row{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
.win-emoji{font-size:56px;line-height:1}
.win-title{font-family:'Fredoka One',cursive;font-size:clamp(28px,7vw,44px);color:var(--green)}
</style>
</head>
<body>
<div id="root">
  <div id="hud">
    <button type="button" id="games-btn" title="Back to Maya's Game Lab">← Games</button>
    <div class="hpill">🔧 <span class="hval" id="moves">0</span></div>
    <div class="hpill" id="garden-pill">🌻 <span class="hval" id="garden-fill">0/1</span></div>
    <div class="hpill hidden" id="route-pill">🛤 <span class="hval" id="route-val">0</span></div>
    <div class="hpill" id="waste-pill" title="Spilled water in the bucket — tap Use Again when it fills up!">🪣<div class="waste-track"><div id="waste-fill"></div></div></div>
    <div class="hpill hidden" id="timer-pill">⏱ <span class="hval" id="timer-val">60</span></div>
    <div id="level-badge">Level 1</div>
  </div>
  <div id="play-stack">
    <div id="board-wrap">
      <div id="kit-step" aria-hidden="true"></div>
      <div id="canvas-wrap">
        <div id="play-hint">Drag a pipe from the kit onto the grid</div>
        <div id="kit-bar">
          <div id="build-palette">
            <button type="button" class="pipe-pick sel" data-pipe="I" title="Straight pipe"><span class="kit-name">━</span><span class="cnt" id="cnt-I">0</span></button>
            <button type="button" class="pipe-pick" data-pipe="L" title="Corner pipe"><span class="kit-name">└</span><span class="cnt" id="cnt-L">0</span></button>
            <button type="button" class="pipe-pick" data-pipe="T" title="3-way pipe"><span class="kit-name">┳</span><span class="cnt" id="cnt-T">0</span></button>
            <button type="button" class="pipe-pick" data-pipe="erase" title="Remove placed pipe"><span class="kit-name">🗑</span><span class="cnt"> </span></button>
          </div>
        </div>
        <canvas id="game"></canvas>
        <div id="combo-wrap"><div id="combo-text"></div><div id="combo-sub"></div></div>
      </div>
    </div>
  </div>
  <div id="toolbar">
    <button class="tool-btn" id="reset-btn">↺ Reset</button>
    <button class="tool-btn" id="use-again-btn" title="Send spilled water from the bucket back to the hose">🪣 Use Again</button>
    <button class="tool-btn" id="hint-btn">💡 Hint</button>
  </div>
</div>

<div class="ov" id="menu-ov">
  <div class="big-title" id="menu-title">Pipe Flow!</div>
  <div id="menu-progress-hint"></div>
  <div id="menu-secret-hint"></div>
  <div class="sub">Connect the shower to the flower!<br><strong style="color:var(--yellow)">Drag</strong> a pipe from the bar onto the grid — or tap to place on <strong style="color:var(--yellow)">+</strong> squares.</div>
  <button class="big-btn" id="start-btn">Let's Go! 🌱</button>
  <button class="sec-btn hidden" id="new-game-btn">Start from Level 1</button>
  <button class="sec-btn" id="menu-games-btn">← All Games</button>
</div>

<div class="ov hidden" id="win-ov">
  <div class="win-emoji" id="win-emoji">🌻</div>
  <div class="win-title" id="win-title">The field is watered!</div>
  <div class="sub" id="win-msg"></div>
  <div class="btn-row">
    <button class="big-btn" id="next-btn">Next Level ➡️</button>
    <button class="sec-btn" id="menu-btn">Level Menu 🏠</button>
    <button class="sec-btn" id="win-games-btn">← All Games</button>
  </div>
</div>

<div class="ov hidden" id="lose-ov">
  <div style="font-size:56px">🥀</div>
  <div class="win-title" style="color:var(--pink)">The plants wilted!</div>
  <div class="sub" id="lose-msg">Spin faster next time!</div>
  <div class="btn-row">
    <button class="big-btn" id="retry-btn">Try Again 🔄</button>
    <button class="sec-btn" id="lose-menu-btn">Level Menu 🏠</button>
    <button class="sec-btn" id="lose-games-btn">← All Games</button>
  </div>
</div>

<script>
const N=1,E=2,S=4,W=8;
const DR={N:[-1,0],E:[0,1],S:[1,0],W:[0,-1]};
const OPP={[N]:S,[E]:W,[S]:N,[W]:E};
const DIRS=[N,E,S,W];

const MASKS={
  I:[E|W,N|S,E|W,N|S],
  L:[E|S,S|W,W|N,N|E],
  T:[E|S|W,S|W|N,W|N|E,N|E|S],
  X:[N|E|S|W],
  B:[E|W,N|S,E|W,N|S],
  V:[E|W,N|S,E|W,N|S],
  S:[E,W,S,N],
  G:[W,N,E,S],
  K:[N,E,S,W],
};
const WATER_COLORS={b:'#5bc8ff',r:'#ff6eb4',y:'#ffe14d'};
const GOAL_EMOJI={b:['🌾','🌻'],r:['🌹','🌺'],y:['🌼','🌻'],null:['🌾','🌻']};
const HOSE_EMOJI={b:'🚿',r:'🚿',y:'🚿',null:'🚿'};
const ANIMAL_EMOJI=['🐰','🦔','🐿','🐢','🦆'];

function isBoulder(cell){return !!cell&&cell.type==='#';}
function isWall(cell){return !!cell&&cell.type==='W';}
function isAnimal(cell){return !!cell&&cell.type==='A';}
function isRock(cell){return !!cell&&cell.type==='K';}
function isSolidBlock(cell){return isBoulder(cell)||isWall(cell)||isAnimal(cell);}
function blocksPipePlacement(cell){
  if(!cell)return false;
  if(isSolidBlock(cell)||isRock(cell))return true;
  if(cell.type==='S'||(cell.type==='G'&&!cell.sprinkler))return true;
  return false;
}
function blocksWaterPass(type){return type==='#'||type==='W'||type==='A';}
function obstacleEmoji(cell){
  if(isBoulder(cell))return '🪨';
  if(isWall(cell))return (cell.variant===1)?'🌵':'🧱';
  if(isAnimal(cell))return ANIMAL_EMOJI[(cell.variant||0)%ANIMAL_EMOJI.length];
  return '🪨';
}

const MAIN_LAST_IDX=21;
const FINALE_IDX=23;
const LONGEST_IDX=24;
const SHORTEST_IDX=25;
const SECRET_IDX=26;

  'S0 .  .  .  .  .  .  .',

  '.  .  .  .  .  .  .  G0',
];

const THEMES={
  dawn:{page:'#0a0618',grass:['#142018','#101a14'],frame:'#0d1a12',badge:'#5bc8ff',badgeText:'#08041a'},
  meadow:{page:'#08120a',grass:['#1a2e14','#142410'],frame:'#0f1a0c',badge:'#5dffb0',badgeText:'#08041a'},
  garden:{page:'#0a1018',grass:['#1a2430','#141c28'],frame:'#101820',badge:'#c77dff',badgeText:'#08041a'},
  greenhouse:{page:'#061018',grass:['#102820','#0c2018'],frame:'#0a1814',badge:'#ffe14d',badgeText:'#08041a'},
  workshop:{page:'#120a18',grass:['#201428','#181020'],frame:'#160c1c',badge:'#ff9a3c',badgeText:'#08041a'},
  sunset:{page:'#180c08',grass:['#2a1810','#221410'],frame:'#1c100c',badge:'#ff6eb4',badgeText:'#08041a'},

};

function defaultTheme(idx){
  if(idx<=2)return 'dawn';
  if(idx<=5)return 'meadow';
  if(idx<=9)return 'garden';
  if(idx<=14)return 'greenhouse';
  if(idx<=19)return 'workshop';
  return 'sunset';
}

const LEVELS=[
  {name:'First Drop',par:3,tip:'Drag ━ straight pipes onto the + cells.',rows:['S0 .  .  G0'],budget:{I:2,L:0,T:0}},

  {name:'Down the Garden',par:4,tip:'🐰 The bunny blocks that square — go around!',rows:['S0 .  A0 .','.  W  .  G0'],budget:{I:2,L:1,T:0}},
  {name:'Long Hose',par:4,tip:'🪨 Boulders block pipes — wind around them.',rows:['S0 .  #  .','.  .  .  G0'],budget:{I:2,L:1,T:0}},
  {name:'T Junction',par:5,tip:'Drag a ┳ 3-way toward the rock. Fill the + cells.',rows:['.  .  K2 .  .','S0 .  .  .  .','.  .  .  .  G0'],budget:{I:2,L:0,T:1}},
  {name:'Garden Gate',par:4,tip:'🦔 Hedgehog in the way — drag pipes around it!',rows:['.  S0 .  A1 .','.  .  .  .  G0'],budget:{I:1,L:1,T:0}},

  {name:'Pipe Maze',par:4,rows:['.  .  S0 I1 T3 I1 .  .','.  .  .  I0 L2 I1 G0 .','.  .  .  .  .  .  .  .','.  .  .  .  .  .  .  .','.  .  .  .  .  .  .  .','.  .  .  .  .  .  .  .']},
  {name:'Master Plumber',par:4,rows:['.  .  .  S0 I3 L0 I2 L0 .','.  .  .  .  I0 L2 I3 G0 .','.  .  .  .  .  .  .  .  .','.  .  .  .  .  .  .  .  .','.  .  .  .  .  .  .  .  .','.  .  .  .  .  .  .  .  .']},

let canvas,ctx,levelIdx=0,grid=[],initialGrid=[],moves=0,levelPar=1;

let waterDrops=[],bubbles=[],leakDrips=[],flowParticles=[],leaks=[],puddles=new Map(),mode='menu',audioCtx=null;
let lastTap=0,touchHandled=false,animRunning=false,spinAnim=null;

let buildMode=false,routeMin=null,routeMax=null,buildInventory={I:0,L:0,T:0},selectedBuildPipe='I';
const SAVE_KEY='pipeflow_save';
let saveData={nextLevel:0,stars:{},maxBeaten:-1};
try{secretUnlocked=localStorage.getItem('pipeflow_secret')==='1';}catch(e){}

function loadSave(){
  saveData={nextLevel:0,stars:{},maxBeaten:-1};
  try{
    const raw=localStorage.getItem(SAVE_KEY);
    if(!raw)return;
    const p=JSON.parse(raw);
    if(typeof p.nextLevel==='number')saveData.nextLevel=Math.max(0,Math.min(p.nextLevel,SHORTEST_IDX));
    if(p.stars&&typeof p.stars==='object')saveData.stars=p.stars;
    if(typeof p.maxBeaten==='number')saveData.maxBeaten=p.maxBeaten;
  }catch(e){}
}

function persistSave(){
  try{localStorage.setItem(SAVE_KEY,JSON.stringify(saveData));}catch(e){}
}

function starGrade(moves,par){
  if(moves<=par)return 3;
  if(moves<=par+1)return 2;
  return 1;
}

function campaignNextIdx(idx){
  if(idx===SECRET_IDX||idx===SHORTEST_IDX)return null;
  if(idx===MAIN_LAST_IDX)return FINALE_IDX;
  if(idx===FINALE_IDX)return LONGEST_IDX;
  if(idx===LONGEST_IDX)return SHORTEST_IDX;
  if(idx<SHORTEST_IDX)return idx+1;
  return null;
}

function totalStars(){
  let s=0;
  for(const k in saveData.stars)if(saveData.stars.hasOwnProperty(k))s+=saveData.stars[k];
  return s;
}

function recordWin(){
  const k=String(levelIdx);
  const g=starGrade(moves,levelPar);
  if(!saveData.stars[k]||g>saveData.stars[k])saveData.stars[k]=g;
  saveData.maxBeaten=Math.max(saveData.maxBeaten,levelIdx);
  const nxt=campaignNextIdx(levelIdx);
  if(nxt!=null)saveData.nextLevel=Math.max(saveData.nextLevel,nxt);
  persistSave();
}

function updateMenuProgress(setPlayIdx){
  const prog=document.getElementById('menu-progress-hint');
  const newBtn=document.getElementById('new-game-btn');
  const startBtn=document.getElementById('start-btn');
  if(saveData.maxBeaten>=0){
    const playIdx=Math.min(saveData.nextLevel,SHORTEST_IDX);
    startBtn.textContent='Continue · Level '+(playIdx+1)+' 🌱';
    if(setPlayIdx)levelIdx=playIdx;
    const ts=totalStars();
    prog.textContent=ts?'⭐ '+ts+' stars earned':'';
    if(newBtn)newBtn.classList.remove('hidden');
  }else{
    startBtn.textContent="Let's Go! 🌱";
    if(setPlayIdx)levelIdx=0;
    prog.textContent='';
    if(newBtn)newBtn.classList.add('hidden');
  }
  updateMenuSecretHint();
}

function updateMenuSecretHint(){
  const el=document.getElementById('menu-secret-hint');
  if(secretUnlocked)el.textContent='🤫 Tap the title 5× for the secret level!';
  else el.textContent='';
}

function resetCampaignSave(){
  saveData={nextLevel:0,stars:{},maxBeaten:-1};
  persistSave();
  levelIdx=0;
  updateMenuProgress(true);
}

function applyTheme(idx,lv){

  try{localStorage.setItem('pipeflow_secret','1');}catch(e){}

}

function countRoutePipes(filledSet){
  let n=0;
  filledSet.forEach(function(k){
    const p=k.split(',');
    const cell=grid[+p[0]]&&grid[+p[0]][+p[1]];
    if(cell&&cell.type!=='S'&&cell.type!=='G')n++;
  });
  return n;
}

function routeConstraintOk(len){
  if(!buildMode)return true;
  if(routeMin!=null&&len<routeMin)return false;
  if(routeMax!=null&&len>routeMax)return false;
  return true;
}

function updateRouteHud(len){

  pill.classList.remove('hidden');
  if(routeMin!=null)val.textContent=len+' / '+routeMin+'+';
  else if(routeMax!=null)val.textContent=len+' / ≤'+routeMax;
  else val.textContent=String(len);
}

function kitTotal(){
  return (buildInventory.I||0)+(buildInventory.L||0)+(buildInventory.T||0);
}

function kitActive(){
  return buildMode||kitTotal()>0;
}

function countGridGaps(){
  let n=0;
  for(let r=0;r<rows;r++){
    for(let c=0;c<cols;c++){
      if(!grid[r]||!grid[r][c])n++;
    }
  }
  return n;
}

function gapTouchesHose(r,c){
  for(let i=0;i<4;i++){
    const dk=dirKey(DIRS[i]);
    const nr=r+DR[dk][0],nc=c+DR[dk][1];
    if(nr<0||nc<0||nr>=rows||nc>=cols)continue;
    const nb=grid[nr]&&grid[nr][nc];
    if(!nb||blocksWaterPass(nb.type))continue;
    if(nb.type==='S'||nb.type==='G'||nb.type==='K'||MASKS[nb.type])return true;
  }
  return false;
}

function countBridgingGaps(){
  let n=0;
  for(let r=0;r<rows;r++){
    for(let c=0;c<cols;c++){
      if(grid[r]&&grid[r][c])continue;
      if(gapTouchesHose(r,c))n++;
    }
  }
  return n;
}

function defaultBudgetForGaps(){
  const gaps=countBridgingGaps();
  if(gaps<1)return null;
  return {I:Math.max(1,gaps),L:Math.max(1,Math.ceil(gaps/2)),T:gaps>=4?1:0};
}

function countDryPipes(){
  let n=0;
  for(let r=0;r<rows;r++){
    for(let c=0;c<cols;c++){
      const cell=grid[r]&&grid[r][c];
      if(!cell||!MASKS[cell.type]||cell.type==='S'||cell.type==='G'||cell.type==='K')continue;
      if(!filled.has(r+','+c))n++;
    }
  }
  return n;
}

function stripPipesAndBuildKit(lv){
  const budget={I:0,L:0,T:0};
  const hasBudget=!!lv.budget;
  if(hasBudget){
    budget.I=lv.budget.I||0;
    budget.L=lv.budget.L||0;
    budget.T=lv.budget.T||0;
  }
  for(let r=0;r<rows;r++){
    for(let c=0;c<cols;c++){
      const cell=grid[r]&&grid[r][c];
      if(!cell)continue;
      if(cell.type!=='I'&&cell.type!=='L'&&cell.type!=='T')continue;
      if(!hasBudget)budget[cell.type]=(budget[cell.type]||0)+1;
      grid[r][c]=null;
    }
  }
  if(!hasBudget){
    const extra=defaultBudgetForGaps();
    if(extra){
      budget.I=Math.max(budget.I,extra.I||0);
      budget.L=Math.max(budget.L,extra.L||0);
      budget.T=Math.max(budget.T,extra.T||0);
    }
  }
  if((budget.I||0)+(budget.L||0)+(budget.T||0)<1){
    if(lv.build)return {I:10,L:8,T:4};
    const d=defaultBudgetForGaps();
    if(d)return d;
    return {I:2,L:1,T:0};
  }
  return budget;
}

function pickKitPipeWithStock(){
  if((buildInventory.I||0)>0)return 'I';
  if((buildInventory.L||0)>0)return 'L';
  if((buildInventory.T||0)>0)return 'T';
  return 'I';
}

function padGridToCols(){
  for(let r=0;r<rows;r++){
    if(!grid[r])grid[r]=[];
    while(grid[r].length<cols)grid[r].push(null);
  }
}

function ensureGridRow(r){
  if(!grid[r])grid[r]=[];
  while(grid[r].length<cols)grid[r].push(null);
}

function kitLabel(type){
  if(type==='I')return 'Straight';
  if(type==='L')return 'Corner';
  if(type==='T')return '3-way';
  return type;
}

function updateKitStep(){
  const el=document.getElementById('kit-step');
  const hint=document.getElementById('play-hint');
  let msg='';
  if(selectedBuildPipe==='erase')msg='🗑 Tap yellow pipe to remove';
  else{
    const n=kitStock(selectedBuildPipe);
    msg='Drag '+kitLabel(selectedBuildPipe).toLowerCase()+' ('+n+')';
  }
  if(el)el.textContent=msg;
  if(hint&&!hint.classList.contains('flow')&&!hint.classList.contains('win'))hint.textContent=msg;
}

function updateBuildPaletteHud(){
  document.getElementById('cnt-I').textContent=String(buildInventory.I||0);
  document.getElementById('cnt-L').textContent=String(buildInventory.L||0);
  document.getElementById('cnt-T').textContent=String(buildInventory.T||0);
  document.querySelectorAll('.pipe-pick').forEach(function(btn){
    const t=btn.getAttribute('data-pipe');
    btn.classList.toggle('sel',t===selectedBuildPipe);
    if(t==='erase'){
      btn.classList.remove('hidden');
      btn.disabled=false;
      btn.style.opacity='1';
      return;
    }
    const n=buildInventory[t]||0;
    btn.classList.toggle('hidden',n<1&&selectedBuildPipe!==t);
    btn.disabled=n<1;
    btn.style.opacity=n<1?'.35':'1';
  });
  updateKitStep();
  if(cellSize>0){
    const gw=cellSize*cols;
    layoutKitHeader(gw,kitHeaderHeight(gw),gridOffX,gridOffY);
  }
}

function kitBtnCount(){
  return Math.max(1,document.querySelectorAll('#build-palette .pipe-pick:not(.hidden)').length);
}

function kitHeaderHeight(gw){
  const nBtn=kitBtnCount();
  return Math.max(34,Math.min(48,Math.floor(gw/nBtn)));
}

function layoutKitHeader(gw,kh,gridX,gridY){
  const kit=document.getElementById('kit-bar');
  const board=document.getElementById('board-wrap');
  if(!kit||!board)return;
  const show=kit.classList.contains('show');
  board.classList.toggle('has-kit',show);
  if(!show){
    kit.style.width='';
    kit.style.height='';
    kit.style.left='';
    kit.style.top='';
    return;
  }
  const top=Math.max(0,gridY-kh);
  kit.style.width=gw+'px';
  kit.style.height=kh+'px';
  kit.style.left=gridX+'px';
  kit.style.top=top+'px';
}

function kitStock(type){
  return type==='erase'?0:(buildInventory[type]||0);
}

function setBuildPipe(type){
  if(type!=='erase'&&BUILD_TYPES.indexOf(type)>=0&&kitStock(type)<=0){
    setStatus('No '+kitLabel(type).toLowerCase()+' pipes left!','idle');
    return;
  }
  selectedBuildPipe=type;
  updateBuildPaletteHud();
  if(type==='erase')setStatus('Tap a yellow-outline pipe to remove it','idle');
  else setStatus('Drag '+kitLabel(type).toLowerCase()+' from the kit onto a + cell','idle');
}

function placeBuildPipe(r,c,type){
  if(BUILD_TYPES.indexOf(type)<0)return false;
  if(kitStock(type)<=0)return false;
  ensureGridRow(r);
  if(c<0||c>=cols)return false;
  if(grid[r][c])return false;
  grid[r][c]={type:type,rot:0,fixed:false,placed:true,color:null,sprinkler:false};
  buildInventory[type]--;
  if(kitStock(selectedBuildPipe)<=0)selectedBuildPipe=pickKitPipeWithStock();
  updateBuildPaletteHud();
  return true;
}

function swapPlacedPipeType(r,c,newType){
  const cell=grid[r]&&grid[r][c];
  if(!cell||!cell.placed||BUILD_TYPES.indexOf(newType)<0)return false;
  if(cell.type===newType)return interactBuildCell(r,c);
  if(kitStock(newType)<=0){
    setStatus('No '+kitLabel(newType).toLowerCase()+' left — use Remove or pick another type','idle');
    return false;
  }
  buildInventory[cell.type]=(buildInventory[cell.type]||0)+1;
  buildInventory[newType]--;
  cell.type=newType;
  cell.rot=0;
  moves++;
  document.getElementById('moves').textContent=String(moves);
  spinAnim={r:r,c:c,t:0};
  playRotate();
  updateBuildPaletteHud();
  updateFlow(true);
  setStatus('Changed to '+kitLabel(newType).toLowerCase()+' — tap again to spin it','flow');
  return true;
}

function placeKitAt(r,c){
  if(!kitActive()||selectedBuildPipe==='erase')return false;
  if(r<0||c<0||r>=rows||c>=cols)return false;
  ensureGridRow(r);
  const existing=grid[r]&&grid[r][c];
  if(existing&&existing.placed)return swapPlacedPipeType(r,c,selectedBuildPipe);
  if(existing)return false;
  if(BUILD_TYPES.indexOf(selectedBuildPipe)<0)return false;
  if(kitStock(selectedBuildPipe)<=0){
    setStatus('No '+selectedBuildPipe+' pipes left — pick another from the kit!','idle');
    return false;
  }
  if(!placeBuildPipe(r,c,selectedBuildPipe)){
    setStatus('Could not place pipe here','idle');
    return false;
  }
  playRotate();
  moves++;
  document.getElementById('moves').textContent=String(moves);
  spinAnim={r:r,c:c,t:0};
  updateFlow(true);
  setStatus('Pipe placed — connect the hose!','flow');
  return true;
}

function cloneCell(cell){
  if(!cell)return null;
  const n={type:cell.type,rot:cell.rot,color:cell.color,fixed:cell.fixed,sprinkler:cell.sprinkler,placed:!!cell.placed};
  if(cell.open!==undefined)n.open=cell.open;
  if(cell.touched!==undefined)n.touched=cell.touched;
  if(cell.variant!==undefined)n.variant=cell.variant;
  return n;
}

function pipeRotCount(cell){
  if(!cell||cell.fixed||isSolidBlock(cell))return 0;
  if(cell.type==='X')return 1;
  if(!MASKS[cell.type])return 0;
  return 4;
}

function randomizePipeRotations(){
  for(let r=0;r<rows;r++){
    for(let c=0;c<cols;c++){
      const cell=grid[r]&&grid[r][c];
      const n=pipeRotCount(cell);
      if(n<1)continue;
      cell.rot=Math.floor(Math.random()*n);
      if(cell.type==='V')cell.open=false;
      if(cell.type==='B')cell.touched=false;
    }
  }
}

function isMovable(cell){
  if(!cell||cell.fixed||isSolidBlock(cell))return false;
  if(cell.type==='S'||isRock(cell))return false;
  if(cell.type==='G'&&!cell.sprinkler)return false;
  return true;
}

function canDropAt(tr,tc,fr,fc){
  if(tr===fr&&tc===fc)return false;
  if(tr<0||tc<0||tr>=rows||tc>=cols)return false;
  const target=grid[tr]&&grid[tr][tc];
  if(target&&blocksPipePlacement(target))return false;
  if(target&&target.fixed&&!target.placed)return false;
  if(!target)return true;
  if(!isMovable(target))return false;
  return true;
}

function transferPipe(fr,fc,tr,tc,fromCell){
  const from=fromCell||grid[fr]&&grid[fr][fc];
  if(!from||!isMovable(from)||!canDropAt(tr,tc,fr,fc))return false;
  const to=grid[tr][tc];
  const placed=cloneCell(from);
  grid[tr][tc]=placed;
  if(tr!==fr||tc!==fc){
    if(to&&isMovable(to))grid[fr][fc]=to;
    else grid[fr][fc]=null;
  }
  moves++;
  document.getElementById('moves').textContent=String(moves);
  playRotate();
  updateFlow(true);
  return true;
}

function removeBuildPipe(r,c){
  const cell=grid[r]&&grid[r][c];
  if(!cell||BUILD_TYPES.indexOf(cell.type)<0)return false;
  if(!cell.placed&&!buildMode)return false;
  buildInventory[cell.type]=(buildInventory[cell.type]||0)+1;
  grid[r][c]=null;
  moves++;
  document.getElementById('moves').textContent=String(moves);
  playRotate();
  updateBuildPaletteHud();
  updateFlow(true);
  setStatus('Pipe removed — back in your kit!','flow');
  return true;
}

function tryEraseAt(r,c){
  ensureGridRow(r);
  const cell=grid[r]&&grid[r][c];
  if(!cell){
    setStatus('Tap a pipe with a yellow outline','idle');
    return false;
  }
  if(cell.placed)return removeBuildPipe(r,c);
  if(buildMode&&isMovable(cell)&&!cell.fixed){
    buildInventory[cell.type]=(buildInventory[cell.type]||0)+1;
    grid[r][c]=null;
    moves++;
    document.getElementById('moves').textContent=String(moves);
    playRotate();
    updateBuildPaletteHud();
    updateFlow(true);
    setStatus('Pipe removed!','flow');
    return true;
  }
  setStatus('That pipe is part of the level — only yellow-outline pipes can be removed','idle');
  return false;
}

function interactBuildCell(r,c){
  const cell=grid[r]&&grid[r][c];
  if(selectedBuildPipe==='erase'){
    if(cell&&cell.placed)return removeBuildPipe(r,c);
    return false;
  }
  if(!cell){
    if(!placeBuildPipe(r,c,selectedBuildPipe)){
      setStatus('No '+selectedBuildPipe+' pipes left!','idle');
      return false;
    }
    playRotate();
    moves++;
    document.getElementById('moves').textContent=String(moves);
    spinAnim={r:r,c:c,t:0};
    updateFlow(true);
    return true;
  }
  if(cell.placed){
    const max=4;
    cell.rot=(cell.rot+1)%max;
    spinAnim={r:r,c:c,t:0};
    moves++;
    document.getElementById('moves').textContent=String(moves);
    playRotate();
    updateFlow(true);
    return true;
  }
  return false;
}

function initGardenBuckets(){
  gardenBuckets=new Map();
  for(let r=0;r<rows;r++){
    for(let c=0;c<cols;c++){
      const cell=grid[r]&&grid[r][c];
      if(isGoal(cell))gardenBuckets.set(r+','+c,0);
    }
  }
}

function updateGardenBuckets(){
  let watered=0;
  gardenBuckets.forEach(function(fill,key){
    const parts=key.split(',');
    const r=+parts[0],c=+parts[1];
    const cell=grid[r]&&grid[r][c];
    if(cell&&goalWateredAt(r,c,cell,filled,flowColors)){
      watered++;
      const next=Math.min(1,fill+0.12);
      gardenBuckets.set(key,next);
    }else if(fill>0){
      gardenBuckets.set(key,Math.max(0,fill-0.008));
    }
  });
  return watered;
}

function gardensReadyForWin(){
  return allGardenBucketsFull();
}

function circuitComplete(filledSet){
  if(!filledSet||!filledSet.size)return false;
  return computeLeaks(filledSet).length===0;
}

function updateLeakBuckets(badLeakList){
  const active=new Set();
  for(let i=0;i<badLeakList.length;i++){
    const L=badLeakList[i];
    const key=L.r+','+L.c+','+L.dir;
    active.add(key);
    const prev=leakBuckets.get(key)||0;
    leakBuckets.set(key,Math.min(1,prev+0.04));
    wasteBucket=Math.min(100,wasteBucket+0.35);
  }
  leakBuckets.forEach(function(fill,key){
    if(!active.has(key))leakBuckets.set(key,Math.max(0,fill-0.02));
  });
}

function updateBucketHud(){
  const total=gardenBuckets.size;
  let full=0;
  gardenBuckets.forEach(function(f){if(f>=0.92)full++;});
  document.getElementById('garden-fill').textContent=full+'/'+total;
  document.getElementById('waste-fill').style.height=Math.round(wasteBucket)+'%';
  const wp=document.getElementById('waste-pill');
  const sb=document.getElementById('use-again-btn');
  if(wasteBucket>=55){
    wp.classList.add('full');
    sb.classList.add('ready');
  }else{
    wp.classList.remove('full');
    if(wasteBucket<8)sb.classList.remove('ready');
  }
}

function allGardenBucketsFull(){
  if(!gardenBuckets.size)return false;
  let ok=true;
  gardenBuckets.forEach(function(f){if(f<0.85)ok=false;});
  return ok;
}

function findSourceCenter(){
  for(let r=0;r<rows;r++){
    for(let c=0;c<cols;c++){
      if(isSource(grid[r]&&grid[r][c]))return cellCenter(r,c);
    }
  }
  return[gridOffX+cellSize,gridOffY+cellSize];
}

function doSiphon(fromX,fromY,amount){
  if(wasteBucket<2&&leakBuckets.size===0)return false;
  let drained=0;
  leakBuckets.forEach(function(fill,key){
    if(fill>0.05){
      const parts=key.split(',');
      const L={r:+parts[0],c:+parts[1],dir:+parts[2]};
      const xy=portXY(L.r,L.c,L.dir);
      leakBuckets.set(key,Math.max(0,fill-0.5));
      spawnSiphonStream(xy[0],xy[1],amount*0.3);
      drained+=12;
    }
  });
  const pull=Math.max(drained,amount);
  wasteBucket=Math.max(0,wasteBucket-pull);
  const sx=fromX!=null?fromX:gridOffX+cellSize*cols*0.5;
  const sy=fromY!=null?fromY:gridOffY+cellSize*rows;
  spawnSiphonStream(sx,sy,pull);
  siphonAnim=1;
  playSiphon();
  if(pull>12)showSiphonToast();
  updateBucketHud();
  return true;
}

function spawnSiphonStream(x,y,amt){
  const dest=findSourceCenter();
  const n=Math.min(14,4+Math.floor(amt/8));
  for(let i=0;i<n;i++){
    siphonStreams.push({
      x:x+(Math.random()-.5)*10,
      y:y+(Math.random()-.5)*6,
      tx:dest[0],ty:dest[1],
      t:0,
      speed:.02+Math.random()*.02,
    });
  }
}

function hitLeakBucket(clientX,clientY){
  const rad=cellSize*0.38;
  let best=null,bestD=rad*rad;
  leakBuckets.forEach(function(fill,key){
    if(fill<0.08)return;
    const parts=key.split(',');
    const xy=portXY(+parts[0],+parts[1],+parts[2]);
    const dx=clientX-xy[0],dy=clientY-xy[1];
    const d=dx*dx+dy*dy;
    if(d<bestD){bestD=d;best={key:key,x:xy[0],y:xy[1],fill:fill};}
  });
  return best;
}

function updateSiphonStreams(){
  for(let i=siphonStreams.length-1;i>=0;i--){
    const s=siphonStreams[i];
    s.t+=s.speed;
    if(s.t>=1)siphonStreams.splice(i,1);
    else{
      s.x+=(s.tx-s.x)*s.speed;
      s.y+=(s.ty-s.y)*s.speed;
    }
  }
  if(siphonAnim>0)siphonAnim=Math.max(0,siphonAnim-0.04);
}

function parseCell(code){
  if(!code||code==='.')return null;
  if(code==='#')return{type:'#',fixed:true};
  if(code[0]==='A'){
    const v=code.length>1?+code[1]:0;
    return{type:'A',fixed:true,variant:isNaN(v)?0:v};
  }
  if(code[0]==='W'){
    const v=code.length>1?+code[1]:0;
    return{type:'W',fixed:true,variant:isNaN(v)?0:v};
  }
  const sprinkler=code[0]==='g';
  const type=sprinkler?'G':code[0];
  let color=null,rotIdx=1;
  if(code.length>=3&&/[bry]/.test(code[1])){color=code[1];rotIdx=2;}
  const rot=+code[rotIdx];
  const cell={type:type,rot:isNaN(rot)?0:rot,color:color,fixed:type==='S'||(type==='G'&&!sprinkler)||type==='K',sprinkler:sprinkler,placed:false};
  if(type==='V')cell.open=false;
  if(type==='B')cell.touched=false;
  return cell;
}

function cloneGrid(g){
  return g.map(function(row){
    return row.map(function(c){
      if(!c)return null;
      const n={type:c.type,rot:c.rot,color:c.color,fixed:c.fixed,sprinkler:c.sprinkler,placed:!!c.placed};
      if(c.open!==undefined)n.open=c.open;
      if(c.touched!==undefined)n.touched=c.touched;
      if(c.variant!==undefined)n.variant=c.variant;
      return n;
    });
  });
}

function goalHasFlow(r,c,cell,filledSet,colorMap){
  const need=cell.color||'b';
  const k=r+','+c;
  function colorOk(cols){
    return cols&&(cols.has(need)||(!cell.color&&cols.size>0));
  }
  if(filledSet.has(k)){
    if(colorOk(colorMap.get(k)))return true;
  }
  const gm=maskFor(cell);
  for(let i=0;i<4;i++){
    const d=DIRS[i];
    if(!(gm&d))continue;
    const dk=dirKey(d);
    const pr=r-DR[dk][0],pc=c-DR[dk][1];
    if(pr<0||pc<0||pr>=rows||pc>=cols)continue;
    const nb=grid[pr]&&grid[pr][pc];
    if(!nb||blocksWaterPass(nb.type))continue;
    const nk=pr+','+pc;
    if(!filledSet.has(nk))continue;
    if(!(maskFor(nb)&d))continue;
    if(colorOk(colorMap.get(nk)))return true;
  }
  if(!cell.sprinkler)return false;
  for(let i=0;i<4;i++){
    const d=DIRS[i];
    const dk=dirKey(d);
    const nr=r+DR[dk][0],nc=c+DR[dk][1];
    const nb=grid[nr]&&grid[nr][nc];
    if(!nb||blocksWaterPass(nb.type))continue;
    if(nb.type==='G'&&!nb.sprinkler)continue;
    const nk=nr+','+nc;
    if(!filledSet.has(nk))continue;
    if(colorOk(colorMap.get(nk)))return true;
  }
  return false;
}

function goalWateredAt(r,c,cell,filledSet,colorMap){
  return goalHasFlow(r,c,cell,filledSet,colorMap);
}

function maskFor(cell){
  if(!cell||isSolidBlock(cell))return 0;
  if(cell.type==='B'&&!cell.touched)return 0;
  if(cell.type==='V'&&!cell.open)return 0;
  const m=MASKS[cell.type];
  if(!m)return 0;
  if(cell.type==='X')return m[0];
  return m[cell.rot%4];
}

function isGoal(cell){return cell&&cell.type==='G';}
function isSource(cell){return cell&&cell.type==='S';}

function dirKey(d){return d===N?'N':d===E?'E':d===S?'S':'W';}

function portXY(r,c,d){
  const cx=gridOffX+c*cellSize+cellSize/2;
  const cy=gridOffY+r*cellSize+cellSize/2;
  const half=cellSize*.4;
  if(d===N)return[cx,cy-half];
  if(d===E)return[cx+half,cy];
  if(d===S)return[cx,cy+half];
  return[cx-half,cy];
}

function portSealed(r,c,d,filledSet){
  const cell=grid[r][c];
  const m=maskFor(cell);
  if(!(m&d))return true;
  const nr=r+DR[dirKey(d)][0],nc=c+DR[dirKey(d)][1];
  if(nr<0||nc<0||nr>=rows||nc>=cols){
    if(cell.type==='S'||cell.type==='G'||cell.type==='K')return true;
    return false;
  }
  const nb=grid[nr]&&grid[nr][nc];
  if(!nb)return false;
  if(blocksWaterPass(nb.type))return false;
  if(nb.type==='B'&&!nb.touched)return false;
  if(!(maskFor(nb)&OPP[d]))return false;
  if(isGoal(nb))return true;
  if(nb.type==='K')return true;
  if(!filledSet.has(nr+','+nc))return false;
  return true;
}

function computeLeaks(filledSet){
  const out=[];
  for(let r=0;r<rows;r++){
    for(let c=0;c<cols;c++){
      const cell=grid[r]&&grid[r][c];
      if(!cell)continue;
      const col=cellColorsAt(r,c);

      if(cell.type==='B'&&!cell.touched){
        for(let i=0;i<4;i++){
          const d=DIRS[i];
          const nr=r+DR[dirKey(d)][0],nc=c+DR[dirKey(d)][1];
          const nk=nr+','+nc;
          if(nr<0||nc<0||nr>=rows||nc>=cols)continue;
          const nb=grid[nr]&&grid[nr][nc];
          if(!nb||!filledSet.has(nk))continue;
          if(maskFor(nb)&OPP[d])out.push({r:r,c:c,dir:d,type:'crack',color:col});
        }
        if(out.length===0){
          for(let i=0;i<4;i++){
            const d=DIRS[i];
            const nr=r+DR[dirKey(d)][0],nc=c+DR[dirKey(d)][1];
            if(nr>=0&&nc>=0&&nr<rows&&nc<cols&&filledSet.has(nr+','+nc))out.push({r:r,c:c,dir:d,type:'crack',color:col});
          }
        }
        continue;
      }

      const k=r+','+c;
      if(!filledSet.has(k))continue;
      const m=maskFor(cell);
      for(let i=0;i<4;i++){
        const d=DIRS[i];
        if(!(m&d))continue;
        if(portSealed(r,c,d,filledSet))continue;
        const nr=r+DR[dirKey(d)][0],nc=c+DR[dirKey(d)][1];
        const nb=grid[nr]&&grid[nr][nc];
        let type='soak';
        if(nr<0||nc<0||nr>=rows||nc>=cols)type='edge';
        else if(!nb)type='soak';
        else if(nb.type==='B'&&!nb.touched)type='crack';
        else if(!(maskFor(nb)&OPP[d]))type='gap';
        out.push({r:r,c:c,dir:d,type:type,color:col});
      }

    }
  }
  return out;
}

function leakBlocksWin(){return true;}

function leakCountBad(leakList){
  return leakList.length;

function isLoopClosed(filledSet){
  return circuitComplete(filledSet);
