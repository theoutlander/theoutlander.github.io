<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0618;--card:#16092e;--border:rgba(255,255,255,0.08);
  --pink:#ff6eb4;--yellow:#ffe14d;--green:#5dffb0;--blue:#5bc8ff;
  --purple:#c77dff;--orange:#ff9a3c;--text:#f0e6ff;--muted:rgba(240,230,255,0.38);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none}
html,body{width:100%;height:100%;background:var(--bg);color:var(--text);font-family:'Nunito',sans-serif;overflow:hidden;touch-action:none}

#root{display:flex;flex-direction:column;height:100%;padding:8px;gap:6px}

#hud{flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:var(--card);border:1px solid var(--border);border-radius:12px;gap:8px}
.hpill{display:flex;align-items:center;gap:5px;font-size:12px;font-weight:900;color:var(--muted)}
.hval{font-family:'Fredoka One',cursive;font-size:18px;line-height:1;color:var(--text)}
#level-badge{font-family:'Fredoka One',cursive;font-size:13px;padding:5px 14px;border-radius:99px;color:#08041a;background:var(--blue);white-space:nowrap}
#status-pill{font-size:11px;font-weight:900;padding:4px 10px;border-radius:99px;background:rgba(91,200,255,.12);color:var(--blue);border:1px solid rgba(91,200,255,.25)}
.hpill.hidden{display:none}
#timer-pill{color:var(--yellow)}
#timer-pill.urgent{color:#ff7070;animation:tpulse .6s ease-in-out infinite alternate}
@keyframes tpulse{0%{opacity:1}100%{opacity:.55}}
#mechanic-tip{font-size:10px;font-weight:900;color:var(--muted);letter-spacing:.04em;text-align:center;padding:0 4px 2px;line-height:1.35}

#board-wrap{flex:1;position:relative;min-height:0;display:flex;align-items:center;justify-content:center}
#game{width:100%;height:100%;display:block;touch-action:none}

#toolbar{flex-shrink:0;display:flex;gap:8px;padding:0 2px}
.tool-btn{flex:1;font-family:'Fredoka One',cursive;font-size:15px;padding:12px;border-radius:10px;border:none;cursor:pointer;min-height:48px;transition:transform .1s}
.tool-btn:active{transform:scale(.96)}
#reset-btn{background:rgba(255,255,255,.08);color:var(--muted);border:1px solid var(--border)}
#hint-btn{background:rgba(255,225,77,.12);color:var(--yellow);border:1px solid rgba(255,225,77,.25)}
#hint-btn.hint-urgent{animation:hintpulse .7s ease-in-out infinite alternate;border-color:rgba(255,110,180,.6);color:#ffb8d8}
@keyframes hintpulse{0%{box-shadow:0 0 0 rgba(255,110,180,0)}100%{box-shadow:0 0 14px rgba(255,110,180,.45)}}
#combo-wrap{position:absolute;top:42%;left:50%;transform:translate(-50%,-50%);text-align:center;pointer-events:none;z-index:10;opacity:0;transition:opacity .25s}
#combo-wrap.show{opacity:1}
#combo-text{font-family:'Fredoka One',cursive;font-size:clamp(22px,6vw,40px);color:var(--yellow);text-shadow:0 0 18px rgba(255,225,77,.55);animation:combopop .35s ease-out}
#combo-sub{font-size:11px;font-weight:900;color:var(--muted);letter-spacing:.06em;margin-top:4px}
@keyframes combopop{0%{transform:scale(1.25)}100%{transform:scale(1)}}
#menu-title{cursor:pointer;-webkit-tap-highlight-color:transparent}
#menu-secret-hint{font-size:11px;color:var(--purple);font-weight:900;min-height:16px}

.ov{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:50;padding:20px;gap:10px;text-align:center}
.ov.hidden{display:none}
#menu-ov{background:linear-gradient(180deg,#07031a,#0d2840)}
#win-ov{background:rgba(7,3,26,.94)}
.big-title{font-family:'Fredoka One',cursive;font-size:clamp(44px,11vw,76px);line-height:1.05;background:linear-gradient(135deg,var(--blue),var(--green),var(--yellow));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.sub{font-size:13px;color:var(--muted);line-height:1.75;max-width:320px}
.big-btn{font-family:'Fredoka One',cursive;font-size:20px;color:#07031a;background:var(--yellow);border:none;padding:12px 38px;border-radius:10px;cursor:pointer;box-shadow:0 5px 0 rgba(140,110,0,1);transition:transform .1s;min-height:48px}
.big-btn:active{transform:translateY(2px)}
.sec-btn{font-family:'Fredoka One',cursive;font-size:15px;padding:9px 22px;border-radius:10px;border:none;cursor:pointer;background:rgba(255,255,255,.08);color:var(--muted);min-height:44px}
.btn-row{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
.win-emoji{font-size:56px;line-height:1}
.win-title{font-family:'Fredoka One',cursive;font-size:clamp(28px,7vw,44px);color:var(--green)}
</style>
</head>
<body>
<div id="root">
  <div id="hud">
    <div class="hpill">🔧 <span class="hval" id="moves">0</span></div>
    <div class="hpill hidden" id="timer-pill">⏱ <span class="hval" id="timer-val">60</span></div>
    <div id="level-badge">Level 1</div>
    <div id="status-pill">Tap pipes to spin!</div>
  </div>
  <div id="mechanic-tip"></div>
  <div id="board-wrap">
    <canvas id="game"></canvas>
    <div id="combo-wrap"><div id="combo-text"></div><div id="combo-sub"></div></div>
  </div>
  <div id="toolbar">
    <button class="tool-btn" id="reset-btn">↺ Reset</button>
    <button class="tool-btn" id="hint-btn">💡 Hint</button>
  </div>
</div>

<div class="ov" id="menu-ov">
  <div class="big-title" id="menu-title">Pipe Flow!</div>
  <div id="menu-secret-hint"></div>
  <div class="sub">💧 Connect the hose to every garden!<br>Tap pipes to <strong style="color:var(--yellow)">rotate</strong> them. Later levels add rocks, valves, colors &amp; more!</div>
  <button class="big-btn" id="start-btn">Let's Go! 🌱</button>
</div>

<div class="ov hidden" id="win-ov">
  <div class="win-emoji" id="win-emoji">🌻</div>
  <div class="win-title" id="win-title">The field is watered!</div>
  <div class="sub" id="win-msg"></div>
  <div class="btn-row">
    <button class="big-btn" id="next-btn">Next Level ➡️</button>
    <button class="sec-btn" id="menu-btn">Menu 🏠</button>
  </div>
</div>

<div class="ov hidden" id="lose-ov">
  <div style="font-size:56px">🥀</div>
  <div class="win-title" style="color:var(--pink)">The plants wilted!</div>
  <div class="sub" id="lose-msg">Spin faster next time!</div>
  <div class="btn-row">
    <button class="big-btn" id="retry-btn">Try Again 🔄</button>
    <button class="sec-btn" id="lose-menu-btn">Menu 🏠</button>
  </div>
</div>

<script>
const N=1,E=2,S=4,W=8;
const DR={N:[-1,0],E:[0,1],S:[1,0],W:[0,-1]};
const OPP={[N]:S,[E]:W,[S]:N,[W]:E};
const DIRS=[N,E,S,W];

const MASKS={
  I:[E|W,N|S,E|W,N|S],
  L:[E|S,S|W,W|N,N|E],
  T:[E|S|W,S|W|N,W|N|E,N|E|S],
  X:[N|E|S|W],
  B:[E|W,N|S,E|W,N|S],
  V:[E|W,N|S,E|W,N|S],
  S:[E,S,W,N],
  G:[W,N,E,S],
};
const WATER_COLORS={b:'#5bc8ff',r:'#ff6eb4',y:'#ffe14d'};
const GOAL_EMOJI={b:['🌾','🌻'],r:['🌹','🌺'],y:['🌼','🌻'],null:['🌾','🌻']};
const HOSE_EMOJI={b:'🚿',r:'🚿',y:'🚿',null:'🚿'};

const MAIN_LAST_IDX=20;
const FINALE_IDX=21;
const SECRET_IDX=22;

const THEMES={
  dawn:{page:'#0a0618',grass:['#142018','#101a14'],frame:'#0d1a12',badge:'#5bc8ff',badgeText:'#08041a'},
  meadow:{page:'#08120a',grass:['#1a2e14','#142410'],frame:'#0f1a0c',badge:'#5dffb0',badgeText:'#08041a'},
  garden:{page:'#0a1018',grass:['#1a2430','#141c28'],frame:'#101820',badge:'#c77dff',badgeText:'#08041a'},
  greenhouse:{page:'#061018',grass:['#102820','#0c2018'],frame:'#0a1814',badge:'#ffe14d',badgeText:'#08041a'},
  workshop:{page:'#120a18',grass:['#201428','#181020'],frame:'#160c1c',badge:'#ff9a3c',badgeText:'#08041a'},
  sunset:{page:'#180c08',grass:['#2a1810','#221410'],frame:'#1c100c',badge:'#ff6eb4',badgeText:'#08041a'},
  apocalypse:{page:'#1a0808',grass:['#2a1410','#1e0c08'],frame:'#220808',badge:'#ff4444',badgeText:'#fff'},
  secret:{page:'#0a0820',grass:['#1a1040','#140c30'],frame:'#120830',badge:'#c77dff',badgeText:'#08041a'},
};

function defaultTheme(idx){
  if(idx<=2)return 'dawn';
  if(idx<=5)return 'meadow';
  if(idx<=9)return 'garden';
  if(idx<=14)return 'greenhouse';
  if(idx<=19)return 'workshop';
  return 'sunset';
}

const LEVELS=[
  {name:'First Drop',par:1,rows:['S0 I2 I1 G0']},
  {name:'Quick Turn',par:1,rows:['S0 I0 L2 .','.  .  L3 G0']},
  {name:'Down the Garden',par:2,rows:['S0 I1 L0 .','.  I2 L3 G0']},
  {name:'Long Hose',par:2,rows:['S0 I1 I0 L0','.  .  .  G1']},
  {name:'T Junction',par:2,rows:['S0 I1 T1 I0 G0']},
  {name:'Garden Gate',par:2,rows:['.  S0 I0 L0 .','.  .  .  L1 G0']},
  {name:'Double Bend',par:3,rows:['S0 L2 I1 .','.  L1 I1 G0']},
  {name:'Fork in the Path',par:3,rows:['.  S0 I1 T3 I1 .','.  .  .  L2 G0']},
  {name:'Plumber Puzzle',par:3,rows:['.  S0 I3 T2 .','.  .  I0 L0 G0']},
  {name:'Snake Path',par:3,rows:['S0 I3 L2 I0 L3','.  .  L1 G0']},
  {name:'Twisty Turn',par:3,rows:['S0 I2 L0 I1 L0','.  I0 L2 I1 G0']},
  {name:'Greenhouse',par:4,rows:['.  S0 I1 T3 I1 .','.  .  I0 L2 I1 G0']},
  {name:'Long Detour',par:4,rows:['S0 I3 L0 I2 L0','.  I0 L2 I3 G0']},
  {name:'Pipe Maze',par:4,rows:['.  S0 I1 T3 I1 .','.  .  I0 L2 I1 G0']},
  {name:'Master Plumber',par:4,rows:['S0 I3 L0 I2 L0','.  I0 L2 I3 G0']},
  {name:'Two Gardens',par:2,tip:'🌾🌾 Hose + side garden both need water!',rows:['S0 I1 I0 G0','.  .  g0 .']},
  {name:'Rocky Path',par:2,tip:'🪨 Pipes cannot go through rocks!',rows:['S0 I1 L0','#  .  G1']},
  {name:'Fix the Leaks',par:2,tip:'💦 Spin cracked pipes so water can pass!',rows:['S0 B1 I0 B1 G0']},
  {name:'Valve Control',par:3,tip:'🚰 Tap valve twice: spin, then open!',rows:['S0 I1 V0 I1 G0']},
  {name:'Rainbow Hose',par:2,tip:'💙❤️ Match hose color to each flower!',rows:['Sb0 I1 Gb0','Sr0 I1 Gr0']},
  {name:'Rush Hour',par:3,tip:'⏱ Beat the clock!',timer:75,rows:['S0 I1 L0 .','.  I1 L3 G0']},
  {name:'End of the World',par:4,theme:'apocalypse',tip:'🌍 The last gardens on Earth — use everything you learned!',timer:90,rows:['S0 I1 T1 I1 G0','#  I0 B1 g0','.  V0 L1 .']},
  {name:'Secret Garden',par:2,theme:'secret',secret:true,tip:'🤫 You found the hidden level!',rows:['S0 I1 I0 G0','.  .  g0  .']},
];

let canvas,ctx,levelIdx=0,grid=[],initialGrid=[],moves=0,levelPar=1;
let cellSize=0,gridOffX=0,gridOffY=0,rows=0,cols=0;
let filled=new Set(),flowColors=new Map(),flowPath=[],flowDist=new Map(),goalsLeft=0;
let won=false,animT=0,flowPhase=0;
let waterDrops=[],bubbles=[],leakDrips=[],flowParticles=[],leaks=[],puddles=new Map(),mode='menu',audioCtx=null;
let lastTap=0,touchHandled=false,animRunning=false,spinAnim=null;
let lastValveTap=0,lastValveCell=null;
let timeLeft=0,timerId=null,levelTip='';
let boardTheme=THEMES.dawn,prevWatered=0,comboHideTimer=null,menuTapCount=0,secretUnlocked=false;
try{secretUnlocked=localStorage.getItem('pipeflow_secret')==='1';}catch(e){}

function updateMenuSecretHint(){
  const el=document.getElementById('menu-secret-hint');
  if(secretUnlocked)el.textContent='🤫 Tap the title 5× for the secret level!';
  else if(LEVELS[FINALE_IDX])el.textContent='';
  else el.textContent='';
}

function applyTheme(idx,lv){
  const th=THEMES[lv.theme||defaultTheme(idx)]||THEMES.meadow;
  boardTheme=th;
  document.body.style.background=th.page;
  const badge=document.getElementById('level-badge');
  badge.style.background=th.badge;
  badge.style.color=th.badgeText;
}

function showComboReaction(kind,n){
  const wrap=document.getElementById('combo-wrap');
  const txt=document.getElementById('combo-text');
  const sub=document.getElementById('combo-sub');
  const multi={2:['DOUBLE SOAK!','💧 Two gardens at once!'],3:['TRIPLE RAIN!','🌧️ Unbelievable!']};
  if(kind==='perfect'){
    txt.textContent='PERFECT FLOW!';
    sub.textContent='⭐ At or under par!';
    playCombo(4);
  }else if(kind==='bloom'){
    txt.textContent='FIRST BLOOM!';
    sub.textContent='🌱 Keep the water going!';
    playCombo(1);
  }else{
    const m=multi[n]||['MEGA SOAK!','💧 Combo x'+n+'!'];
    txt.textContent=m[0];
    sub.textContent=m[1];
    playCombo(n);
  }
  wrap.classList.add('show');
  if(comboHideTimer)clearTimeout(comboHideTimer);
  comboHideTimer=setTimeout(function(){wrap.classList.remove('show');},1100);
}

function unlockSecret(){
  secretUnlocked=true;
  try{localStorage.setItem('pipeflow_secret','1');}catch(e){}
  updateMenuSecretHint();
}

function parseCell(code){
  if(!code||code==='.')return null;
  if(code==='#')return{type:'#',fixed:true};
  const sprinkler=code[0]==='g';
  const type=sprinkler?'G':code[0];
  let color=null,rotIdx=1;
  if(code.length>=3&&/[bry]/.test(code[1])){color=code[1];rotIdx=2;}
  const rot=+code[rotIdx];
  const cell={type:type,rot:isNaN(rot)?0:rot,color:color,fixed:type==='S'||(type==='G'&&!sprinkler),sprinkler:sprinkler};
  if(type==='V')cell.open=false;
  if(type==='B')cell.touched=false;
  return cell;
}

function cloneGrid(g){
  return g.map(function(row){
    return row.map(function(c){
      if(!c)return null;
      const n={type:c.type,rot:c.rot,color:c.color,fixed:c.fixed,sprinkler:c.sprinkler};
      if(c.open!==undefined)n.open=c.open;
      if(c.touched!==undefined)n.touched=c.touched;
      return n;
    });
  });
}

function goalWateredAt(r,c,cell,filledSet,colorMap){
  const need=cell.color||'b';
  const k=r+','+c;
  if(filledSet.has(k)){
    const cols=colorMap.get(k);
    if(cols&&(cols.has(need)||(!cell.color&&cols.size>0)))return true;
  }
  if(!cell.sprinkler)return false;
  for(let i=0;i<4;i++){
    const d=DIRS[i];
    const dk=dirKey(d);
    const nr=r+DR[dk][0],nc=c+DR[dk][1];
    const nb=grid[nr]&&grid[nr][nc];
    if(!nb||nb.type==='#'||(nb.type==='G'&&!nb.sprinkler))continue;
    const nk=nr+','+nc;
    if(!filledSet.has(nk))continue;
    const cols=colorMap.get(nk);
    if(cols&&(cols.has(need)||(!cell.color&&cols.size>0)))return true;
  }
  return false;
}

function stopTimer(){
  if(timerId){clearInterval(timerId);timerId=null;}
  document.getElementById('timer-pill').classList.add('hidden');
  document.getElementById('timer-pill').classList.remove('urgent');
}

function startTimer(sec){
  stopTimer();
  if(!sec)return;
  timeLeft=sec;
  const pill=document.getElementById('timer-pill');
  pill.classList.remove('hidden');
  document.getElementById('timer-val').textContent=String(timeLeft);
  timerId=setInterval(function(){
    if(mode!=='play'||won)return;
    timeLeft--;
    document.getElementById('timer-val').textContent=String(timeLeft);
    if(timeLeft<=10)pill.classList.add('urgent');
    if(timeLeft<=15&&!won){
      document.getElementById('hint-btn').classList.add('hint-urgent');
      setStatus('🥀 Wilting! Tap 💡 Hint if stuck!','idle');
    }
    if(timeLeft<=0){
      stopTimer();
      mode='lose';
      document.getElementById('hint-btn').classList.remove('hint-urgent');
      document.getElementById('lose-msg').textContent='The plants wilted! Try 💡 Hint on your next run — spin faster!';
      document.getElementById('lose-ov').classList.remove('hidden');
      playWilting();
    }
  },1000);
}

function loadLevel(idx){
  const lv=LEVELS[idx];
  if(!lv)return;
  document.getElementById('lose-ov').classList.add('hidden');
  document.getElementById('hint-btn').classList.remove('hint-urgent');
  prevWatered=0;
  grid=lv.rows.map(function(row){return row.trim().split(/\s+/).map(parseCell);});
  initialGrid=cloneGrid(grid);
  rows=grid.length;
  cols=Math.max.apply(null,grid.map(function(r){return r.length;}));
  moves=0;
  won=false;
  flowPhase=0;
  waterDrops=[];
  bubbles=[];
  leakDrips=[];
  flowParticles=[];
  leaks=[];
  puddles=new Map();
  spinAnim=null;
  lastValveCell=null;
  lastValveTap=0;
  levelPar=lv.par||1;
  levelTip=lv.tip||'';
  const label=lv.secret?'🤫 Secret':('Level '+(idx+1));
  document.getElementById('level-badge').textContent=label+' · Par '+levelPar;
  document.getElementById('mechanic-tip').textContent=levelTip;
  applyTheme(idx,lv);
  document.getElementById('moves').textContent='0';
  setStatus(levelTip||'Tap pipes to spin!','idle');
  updateFlow(false);
  resize();
  ensureAnimLoop();
  stopTimer();
  startTimer(lv.timer||0);
}

function setStatus(text,kind){
  const pill=document.getElementById('status-pill');
  pill.textContent=text;
  if(kind==='win'){
    pill.style.color='#08041a';
    pill.style.background='var(--green)';
    pill.style.borderColor='rgba(93,255,176,.5)';
  }else if(kind==='flow'){
    pill.style.color='var(--blue)';
    pill.style.background='rgba(91,200,255,.18)';
    pill.style.borderColor='rgba(91,200,255,.35)';
  }else{
    pill.style.color='var(--blue)';
    pill.style.background='rgba(91,200,255,.12)';
    pill.style.borderColor='rgba(91,200,255,.25)';
  }
}

function maskFor(cell){
  if(!cell||cell.type==='#')return 0;
  if(cell.type==='B'&&!cell.touched)return 0;
  if(cell.type==='V'&&!cell.open)return 0;
  const m=MASKS[cell.type];
  if(!m)return 0;
  if(cell.type==='X')return m[0];
  return m[cell.rot%4];
}

function isGoal(cell){return cell&&cell.type==='G';}
function isSource(cell){return cell&&cell.type==='S';}

function dirKey(d){return d===N?'N':d===E?'E':d===S?'S':'W';}

function portXY(r,c,d){
  const cx=gridOffX+c*cellSize+cellSize/2;
  const cy=gridOffY+r*cellSize+cellSize/2;
  const half=cellSize*.4;
  if(d===N)return[cx,cy-half];
  if(d===E)return[cx+half,cy];
  if(d===S)return[cx,cy+half];
  return[cx-half,cy];
}

function neighborAt(r,c,d){
  const dk=dirKey(d);
  return[r+DR[dk][0],c+DR[dk][1]];
}

function portSealed(r,c,d,filledSet){
  const m=maskFor(grid[r][c]);
  if(!(m&d))return true;
  const nr=r+DR[dirKey(d)][0],nc=c+DR[dirKey(d)][1];
  if(nr<0||nc<0||nr>=rows||nc>=cols)return false;
  const nb=grid[nr]&&grid[nr][nc];
  if(!nb)return false;
  if(nb.type==='#')return false;
  if(nb.type==='B'&&!nb.touched)return false;
  if(!(maskFor(nb)&OPP[d]))return false;
  if(!filledSet.has(nr+','+nc))return false;
  return true;
}

function computeLeaks(filledSet){
  const out=[];
  for(let r=0;r<rows;r++){
    for(let c=0;c<cols;c++){
      const cell=grid[r]&&grid[r][c];
      if(!cell)continue;
      const col=cellColorsAt(r,c);

      if(cell.type==='B'&&!cell.touched){
        for(let i=0;i<4;i++){
          const d=DIRS[i];
          const nr=r+DR[dirKey(d)][0],nc=c+DR[dirKey(d)][1];
          const nk=nr+','+nc;
          if(nr<0||nc<0||nr>=rows||nc>=cols)continue;
          const nb=grid[nr]&&grid[nr][nc];
          if(!nb||!filledSet.has(nk))continue;
          if(maskFor(nb)&OPP[d])out.push({r:r,c:c,dir:d,type:'crack',color:col});
        }
        if(out.length===0){
          for(let i=0;i<4;i++){
            const d=DIRS[i];
            const nr=r+DR[dirKey(d)][0],nc=c+DR[dirKey(d)][1];
            if(nr>=0&&nc>=0&&nr<rows&&nc<cols&&filledSet.has(nr+','+nc))out.push({r:r,c:c,dir:d,type:'crack',color:col});
          }
        }
        continue;
      }

      const k=r+','+c;
      if(!filledSet.has(k))continue;
      const m=maskFor(cell);
      for(let i=0;i<4;i++){
        const d=DIRS[i];
        if(!(m&d))continue;
        if(portSealed(r,c,d,filledSet))continue;
        const nr=r+DR[dirKey(d)][0],nc=c+DR[dirKey(d)][1];
        const nb=grid[nr]&&grid[nr][nc];
        let type='jet';
        if(!nb)type='soak';
        else if(nb.type==='B'&&!nb.touched)type='crack';
        else if(nr<0||nc<0||nr>=rows||nc>=cols)type='edge';
        out.push({r:r,c:c,dir:d,type:type,color:col});
      }

    }
  }
  return out;
}

function leakCountBad(leakList){
  let n=0;
  for(let i=0;i<leakList.length;i++)if(leakList[i].type!=='overflow')n++;
  return n;
}

function computeFlow(){
  const nextFilled=new Set();
  const nextDist=new Map();
  const nextColors=new Map();
  const parent=new Map();
  const sources=[];
  const goals=[];
  for(let r=0;r<rows;r++){
    for(let c=0;c<cols;c++){
      const cell=grid[r]&&grid[r][c];
      if(isSource(cell))sources.push({r:r,c:c,color:cell.color||'b'});
      if(isGoal(cell))goals.push({r:r,c:c,color:cell.color});
    }
  }
  if(!sources.length)return {filled:nextFilled,dist:nextDist,colors:nextColors,path:[],goalReached:false,goalsLeft:goals.length};
  const q=[];
  sources.forEach(function(src){
    const sk=src.r+','+src.c;
    nextFilled.add(sk);
    nextDist.set(sk,0);
    const cs=new Set([src.color||'b']);
    nextColors.set(sk,cs);
    parent.set(sk,null);
    q.push([src.r,src.c]);
  });
  while(q.length){
    const cur=q.shift();
    const ck=cur[0]+','+cur[1];
    const cell=grid[cur[0]][cur[1]];
    const m=maskFor(cell);
    const curColors=nextColors.get(ck);
    for(let i=0;i<4;i++){
      const d=DIRS[i];
      if(!(m&d))continue;
      const dk=dirKey(d);
      const nr=cur[0]+DR[dk][0],nc=cur[1]+DR[dk][1];
      if(nr<0||nc<0||nr>=rows||nc>=cols)continue;
      const nb=grid[nr]&&grid[nr][nc];
      if(!nb||nb.type==='#')continue;
      if(!(maskFor(nb)&OPP[d]))continue;
      const nk=nr+','+nc;
      if(!nextFilled.has(nk)){
        nextFilled.add(nk);
        nextDist.set(nk,nextDist.get(ck)+1);
        nextColors.set(nk,new Set(curColors));
        parent.set(nk,ck);
        q.push([nr,nc]);
      }else{
        const existing=nextColors.get(nk);
        curColors.forEach(function(cl){existing.add(cl);});
      }
    }
  }
  let watered=0;
  goals.forEach(function(g){
    const cell=grid[g.r][g.c];
    if(goalWateredAt(g.r,g.c,cell,nextFilled,nextColors))watered++;
  });
  const goalReached=goals.length>0&&watered===goals.length;
  let path=[];
  if(goalReached&&goals.length===1){
    const gk=goals[0].r+','+goals[0].c;
    let cur=gk;
    while(cur){
      const parts=cur.split(',');
      path.unshift([+parts[0],+parts[1]]);
      cur=parent.get(cur);
    }
  }else if(goalReached&&sources.length===1){
    const gk=goals[0].r+','+goals[0].c;
    let cur=gk;
    while(cur){
      const parts=cur.split(',');
      path.unshift([+parts[0],+parts[1]]);
      cur=parent.get(cur);
    }
  }else if(goalReached){
    const gk=goals[0].r+','+goals[0].c;
    let cur=gk;
    while(cur){
      const parts=cur.split(',');
      path.unshift([+parts[0],+parts[1]]);
      cur=parent.get(cur);
    }
  }
  return {filled:nextFilled,dist:nextDist,colors:nextColors,path:path,goalReached:goalReached,goalsLeft:goals.length-watered};
}

function updateFlow(triggerWin){
  const result=computeFlow();
  filled=result.filled;
  flowDist=result.dist;
  flowColors=result.colors;
  flowPath=result.path;
  goalsLeft=result.goalsLeft;
  leaks=computeLeaks(filled);
  const badLeaks=leakCountBad(leaks);
  rebuildFlowParticles();
  const gTotal=countGoals();
  const wateredNow=gTotal-goalsLeft;
  if(wateredNow>prevWatered&&!won){
    const delta=wateredNow-prevWatered;
    if(delta>=2)showComboReaction('multi',delta);
    else if(wateredNow===1&&gTotal>1)showComboReaction('bloom',1);
  }
  prevWatered=wateredNow;

  if(result.goalReached&&badLeaks===0){
    flowPhase=Math.max(flowPhase,0.05);
    if(triggerWin&&!won){
      won=true;
      stopTimer();
      document.getElementById('hint-btn').classList.remove('hint-urgent');
      if(moves<=levelPar)showComboReaction('perfect');
      playWin();
      setStatus('All gardens watered!','win');
      spawnCelebration();
      setTimeout(showWin,900);
    }else if(!won){
      setStatus('All gardens watered!','flow');
    }
  }else if(result.goalReached&&badLeaks>0){
    flowPhase=Math.max(flowPhase,0.04);
    setStatus('💦 Seal '+badLeaks+' leak'+(badLeaks>1?'s':'')+' to win!','flow');
  }else if(!won){
    flowPhase=filled.size>1?Math.max(flowPhase,0.02):Math.max(0,flowPhase-0.04);
    let msg='Tap pipes to spin!';
    let gCount=0;
    for(let r=0;r<rows;r++)for(let c=0;c<cols;c++)if(isGoal(grid[r]&&grid[r][c]))gCount++;
    if(badLeaks>0&&filled.size>1)msg='💦 '+badLeaks+' leak'+(badLeaks>1?'s':'')+' — spin pipes to seal!';
    else if(gCount>1&&result.filled.size>1)msg='Watered '+(gCount-goalsLeft)+' / '+gCount+' gardens';
    else if(filled.size>1)msg='Water is flowing…';
    setStatus(msg,filled.size>1||badLeaks>0?'flow':'idle');
  }
}

function countGoals(){
  let n=0;
  for(let r=0;r<rows;r++)for(let c=0;c<cols;c++)if(isGoal(grid[r]&&grid[r][c]))n++;
  return n;
}

function interactCell(r,c){
  const cell=grid[r]&&grid[r][c];
  if(!cell||cell.fixed||won||cell.type==='#')return false;
  if(cell.type==='V'){
    const now=Date.now();
    if(lastValveCell&&lastValveCell.r===r&&lastValveCell.c===c&&now-lastValveTap<450){
      cell.open=!cell.open;
      lastValveTap=0;
      lastValveCell=null;
      playValve();
      moves++;
      document.getElementById('moves').textContent=String(moves);
      updateFlow(true);
      return true;
    }
    lastValveCell={r:r,c:c};
    lastValveTap=now;
  }
  const max=cell.type==='X'?1:4;
  cell.rot=(cell.rot+1)%max;
  if(cell.type==='B')cell.touched=true;
  spinAnim={r:r,c:c,t:0};
  moves++;
  document.getElementById('moves').textContent=String(moves);
  playRotate();
  updateFlow(true);
  return true;
}

function resetLevel(){
  document.getElementById('lose-ov').classList.add('hidden');
  mode='play';
  loadLevel(levelIdx);
}

function showHint(){
  if(won)return;
  const base=cloneGrid(grid);
  for(let r=0;r<rows;r++){
    for(let c=0;c<cols;c++){
      const start=base[r]&&base[r][c];
      if(!start||start.fixed||start.type==='#')continue;
      const max=start.type==='X'?1:4;
      for(let rot=0;rot<max;rot++){
        if(rot===start.rot)continue;
        grid=cloneGrid(base);
        grid[r][c].rot=rot;
        if(grid[r][c].type==='B')grid[r][c].touched=true;
        if(grid[r][c].type==='V'){grid[r][c].open=true;grid[r][c].touched=true;}
        const test=computeFlow();
        if(test.goalReached&&leakCountBad(computeLeaks(test.filled))===0){
          moves++;
          document.getElementById('moves').textContent=String(moves);
          spinAnim={r:r,c:c,t:0};
          playHint();
          updateFlow(true);
          setStatus('Hint applied! ✨','flow');
          return;
        }
      }
    }
  }
  playHint();
  setStatus('Try the corner pipes!','idle');
}

function resize(){
  if(!canvas)return;
  const wrap=document.getElementById('board-wrap');
  const w=wrap.clientWidth,h=wrap.clientHeight;
  const dpr=Math.min(window.devicePixelRatio||1,2);
  canvas.width=Math.floor(w*dpr);
  canvas.height=Math.floor(h*dpr);
  canvas.style.width=w+'px';
  canvas.style.height=h+'px';
  ctx.setTransform(dpr,0,0,dpr,0,0);
  const pad=16;
  cellSize=Math.floor(Math.min((w-pad*2)/cols,(h-pad*2)/rows));
  cellSize=Math.max(44,Math.min(cellSize,96));
  const gw=cellSize*cols,gh=cellSize*rows;
  gridOffX=(w-gw)/2;
  gridOffY=(h-gh)/2;
  renderFrame();
}

function cellCenter(r,c){
  return[gridOffX+c*cellSize+cellSize/2,gridOffY+r*cellSize+cellSize/2];
}

function ensureAnimLoop(){
  if(animRunning)return;
  animRunning=true;
  requestAnimationFrame(tick);
}

function tick(){
  if(mode!=='play'){animRunning=false;return;}
  animT+=0.016;
  if(spinAnim){
    spinAnim.t+=0.12;
    if(spinAnim.t>=1)spinAnim=null;
  }
  if(flowPath.length>1){
    const target=flowPath.length-1+0.5;
    if(flowPhase<target)flowPhase=Math.min(target,flowPhase+0.08);
  }
  spawnFlowBubbles();
  spawnLeakParticles();
  updateWaterPhysics();
  updateAndDrawDrops();
  renderFrame();
  requestAnimationFrame(tick);
}

function renderFrame(){
  if(!ctx)return;
  const w=canvas.width/(window.devicePixelRatio||1);
  const h=canvas.height/(window.devicePixelRatio||1);
  ctx.clearRect(0,0,w,h);

  const gw=cellSize*cols,gh=cellSize*rows;
  ctx.fillStyle=boardTheme.frame||'#0d1a12';
  ctx.fillRect(gridOffX-8,gridOffY-8,gw+16,gh+16);

  for(let r=0;r<rows;r++){
    for(let c=0;c<cols;c++){
      const x=gridOffX+c*cellSize,y=gridOffY+r*cellSize;
      const cell=grid[r]&&grid[r][c];
      if(cell&&cell.type==='#'){
        ctx.fillStyle=levelIdx===FINALE_IDX?'#3a1818':'#2a2218';
        ctx.fillRect(x,y,cellSize,cellSize);
        ctx.font=(cellSize*.38)+'px serif';
        ctx.textAlign='center';
        ctx.textBaseline='middle';
        ctx.fillText('🪨',x+cellSize/2,y+cellSize/2);
        continue;
      }
      ctx.fillStyle=(r+c)%2===0?boardTheme.grass[0]:boardTheme.grass[1];
      ctx.fillRect(x,y,cellSize,cellSize);
      ctx.strokeStyle='rgba(255,255,255,.04)';
      ctx.strokeRect(x+.5,y+.5,cellSize-1,cellSize-1);
    }
  }

  drawPuddles();
  drawNetworkFlow();
  drawFlowUnderlay();
  for(let r=0;r<rows;r++){
    for(let c=0;c<cols;c++){
      const cell=grid[r]&&grid[r][c];
      if(cell)drawPipe(r,c,cell);
    }
  }
  drawDecorations();
  drawLeakParticles();
  drawBubbles();
}

function drawFlowUnderlay(){
  if(flowPath.length<2)return;
  for(let i=1;i<flowPath.length;i++){
    if(flowPhase<i-0.15)continue;
    const a=flowPath[i-1],b=flowPath[i];
    const ax=gridOffX+a[1]*cellSize+cellSize/2;
    const ay=gridOffY+a[0]*cellSize+cellSize/2;
    const bx=gridOffX+b[1]*cellSize+cellSize/2;
    const by=gridOffY+b[0]*cellSize+cellSize/2;
    const segProg=Math.min(1,Math.max(0,flowPhase-(i-1)));
    const px=ax+(bx-ax)*segProg;
    const py=ay+(by-ay)*segProg;
    const cols=flowColors.get(a[0]+','+a[1]);
    const hex=(cols&&cols.size===1)?(WATER_COLORS[[...cols][0]]||'#5bc8ff'):'#5bc8ff';
    const rr=parseInt(hex.slice(1,3),16),gg=parseInt(hex.slice(3,5),16),bb=parseInt(hex.slice(5,7),16);
    const grad=ctx.createLinearGradient(ax,ay,px,py);
    grad.addColorStop(0,'rgba('+rr+','+gg+','+bb+',0.55)');
    grad.addColorStop(1,'rgba('+rr+','+gg+','+bb+',0.95)');
    ctx.strokeStyle=grad;
    ctx.lineWidth=cellSize*.14;
    ctx.lineCap='round';
    ctx.beginPath();
    ctx.moveTo(ax,ay);
    ctx.lineTo(px,py);
    ctx.stroke();
  }
}

function spawnFlowBubbles(){
  if(flowPath.length<2||flowPhase<0.5)return;
  if(Math.random()>0.35)return;
  const seg=Math.min(flowPath.length-2,Math.floor(flowPhase));
  const a=flowPath[seg],b=flowPath[seg+1];
  const t=flowPhase-seg;
  const ax=gridOffX+a[1]*cellSize+cellSize/2;
  const ay=gridOffY+a[0]*cellSize+cellSize/2;
  const bx=gridOffX+b[1]*cellSize+cellSize/2;
  const by=gridOffY+b[0]*cellSize+cellSize/2;
  bubbles.push({
    x:ax+(bx-ax)*t+(Math.random()-.5)*8,
    y:ay+(by-ay)*t+(Math.random()-.5)*8,
    r:2+Math.random()*3,
    life:1,
  });
}

function drawBubbles(){
  for(let i=bubbles.length-1;i>=0;i--){
    const b=bubbles[i];
    b.y-=0.6;
    b.life-=0.025;
    if(b.life<=0){bubbles.splice(i,1);continue;}
    ctx.globalAlpha=b.life*.7;
    ctx.fillStyle='#b8ecff';
    ctx.beginPath();
    ctx.arc(b.x,b.y,b.r,0,Math.PI*2);
    ctx.fill();
    ctx.globalAlpha=1;
  }
}

function drawDecorations(){
  for(let r=0;r<rows;r++){
    for(let c=0;c<cols;c++){
      const cell=grid[r]&&grid[r][c];
      if(!cell)continue;
      const cx=gridOffX+c*cellSize+cellSize/2;
      const cy=gridOffY+r*cellSize+cellSize/2;
      const k=r+','+c;
      const goalWet=cell.type==='G'&&goalWateredAt(r,c,cell,filled,flowColors);
      if(cell.type==='S'){
        ctx.font=(cellSize*.42)+'px serif';
        ctx.textAlign='center';
        ctx.textBaseline='middle';
        const em=cell.color==='r'?'🔴':cell.color==='y'?'🟡':'🚿';
        ctx.fillText(em,cx,cy-cellSize*.08);
      }
      if(cell.type==='G'){
        const emSet=GOAL_EMOJI[cell.color]||GOAL_EMOJI.b;
        if(goalWet){
          ctx.save();
          ctx.globalAlpha=.35+.2*Math.sin(animT*5);
          ctx.fillStyle=cell.color==='r'?'rgba(255,110,180,.25)':'rgba(93,255,176,.25)';
          ctx.beginPath();
          ctx.arc(cx,cy,cellSize*.42,0,Math.PI*2);
          ctx.fill();
          ctx.restore();
        }
        ctx.font=(cellSize*.42)+'px serif';
        ctx.textAlign='center';
        ctx.textBaseline='middle';
        const dryEm=cell.sprinkler?'🪴':emSet[0];
        ctx.fillText(goalWet?emSet[1]:dryEm,cx,cy+cellSize*.05);
      }
    }
  }
}

function drawPipe(r,c,cell){
  const cx=gridOffX+c*cellSize+cellSize/2;
  const cy=gridOffY+r*cellSize+cellSize/2;
  const half=cellSize*.34;
  const w=cellSize*.18;
  const k=r+','+c;
  const dist=flowDist.get(k);
  const hasWater=dist!==undefined&&flowPhase>=dist;
  const m=maskFor(cell);
  let spin=0;
  if(spinAnim&&spinAnim.r===r&&spinAnim.c===c)spin=spinAnim.t*Math.PI/2;

  ctx.save();
  ctx.translate(cx,cy);
  ctx.rotate(spin);
  ctx.translate(-cx,-cy);

  if(cell.type==='S'||cell.type==='G'){
    if(hasWater){
      ctx.save();
      ctx.globalAlpha=.35+.15*Math.sin(animT*4+k.length);
      drawConnections(cx,cy,half,w,m,true,dist||0,cellColorsAt(r,c));
      ctx.restore();
    }
    ctx.restore();
    return;
  }

  if(cell.type==='B'&&!cell.touched){
    ctx.fillStyle='rgba(80,60,50,.25)';
    ctx.fillRect(cx-cellSize*.36,cy-cellSize*.36,cellSize*.72,cellSize*.72);
    ctx.font=(cellSize*.22)+'px serif';
    ctx.textAlign='center';
    ctx.textBaseline='middle';
    ctx.fillText('💦',cx,cy);
  }else{
    ctx.fillStyle='rgba(255,255,255,.06)';
    ctx.beginPath();
    ctx.arc(cx,cy,cellSize*.38,0,Math.PI*2);
    ctx.fill();
  }

  drawConnections(cx,cy,half,w,m,hasWater,dist||0,cellColorsAt(r,c));

  if(cell.type==='V'){
    ctx.font=(cellSize*.2)+'px serif';
    ctx.textAlign='center';
    ctx.textBaseline='middle';
    ctx.fillText(cell.open?'🟢':'🔴',cx,cy+cellSize*.28);
  }

  if(!cell.fixed){
    ctx.fillStyle='rgba(255,255,255,.25)';
    ctx.beginPath();
    ctx.arc(cx,cy,cellSize*.08,0,Math.PI*2);
    ctx.fill();
  }
  ctx.restore();
}

function cellColorsAt(r,c){
  const k=r+','+c;
  const cols=flowColors.get(k);
  if(!cols||!cols.size)return 'b';
  return [...cols][0];
}

function drawConnections(cx,cy,half,w,m,water,dist,flowCol){
  const wc=WATER_COLORS[flowCol]||'#5bc8ff';
  const pipeCol=water?'#3a8fd4':'#6a7a72';
  const innerCol=water?wc:'#8a9a92';
  ctx.lineCap='round';
  ctx.lineJoin='round';
  if(m&N)drawSeg(cx,cy,cx,cy-half,w,pipeCol,innerCol,water,dist);
  if(m&E)drawSeg(cx,cy,cx+half,cy,w,pipeCol,innerCol,water,dist);
  if(m&S)drawSeg(cx,cy,cx,cy+half,w,pipeCol,innerCol,water,dist);
  if(m&W)drawSeg(cx,cy,cx-half,cy,w,pipeCol,innerCol,water,dist);
  ctx.fillStyle=innerCol;
  ctx.beginPath();
  ctx.arc(cx,cy,w*.55,0,Math.PI*2);
  ctx.fill();
}

function drawSeg(x1,y1,x2,y2,w,outer,inner,water,dist){
  ctx.strokeStyle=outer;
  ctx.lineWidth=w*1.35;
  ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();
  ctx.strokeStyle=inner;
  ctx.lineWidth=w*.75;
  ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();
  if(water){
    const pulse=.5+.5*Math.sin(animT*6-dist);
    ctx.strokeStyle='rgba(120,220,255,'+(0.35+pulse*.45)+')';
    ctx.lineWidth=w*.4;
    ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();
    ctx.strokeStyle='rgba(255,255,255,'+(0.15+pulse*.25)+')';
    ctx.lineWidth=w*.15;
    ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();
  }
}

function spawnCelebration(){
  let gx=gridOffX+cellSize,gy=gridOffY+cellSize;
  for(let r=0;r<rows;r++){
    for(let c=0;c<cols;c++){
      const cell=grid[r]&&grid[r][c];
      if(cell&&cell.type==='G'){
        gx=gridOffX+c*cellSize+cellSize/2;
        gy=gridOffY+r*cellSize+cellSize/2;
      }
    }
  }
  for(let i=0;i<28;i++){
    waterDrops.push({
      x:gx+(Math.random()-.5)*cellSize*.8,
      y:gy+(Math.random()-.5)*cellSize*.4,
      vx:(Math.random()-.5)*4,
      vy:-2-Math.random()*4,
      life:1,
      em:['💧','✨','🌱','💦','🌻'][Math.floor(Math.random()*5)],
    });
  }
}

function updateAndDrawDrops(){
  for(let i=waterDrops.length-1;i>=0;i--){
    const d=waterDrops[i];
    d.x+=d.vx;d.y+=d.vy;d.vy+=.08;d.life-=.015;
    if(d.life<=0){waterDrops.splice(i,1);continue;}
    ctx.globalAlpha=d.life;
    ctx.font='18px serif';
    ctx.textAlign='center';
    ctx.fillText(d.em,d.x,d.y);
    ctx.globalAlpha=1;
  }
}

function pointerToCell(clientX,clientY){
  const rect=canvas.getBoundingClientRect();
  const x=clientX-rect.left,y=clientY-rect.top;
  const c=Math.floor((x-gridOffX)/cellSize);
  const r=Math.floor((y-gridOffY)/cellSize);
  if(r<0||c<0||r>=rows||c>=cols)return null;
  return{r,c};
}

function onPointer(e){
  if(mode!=='play'||won)return;
  const now=Date.now();
  if(now-lastTap<180)return;
  lastTap=now;
  const pt=pointerToCell(e.clientX,e.clientY);
  if(!pt)return;
  const cell=grid[pt.r]&&grid[pt.r][pt.c];
  if(!cell||cell.fixed||cell.type==='#')return;
  interactCell(pt.r,pt.c);
}

function bindTap(el,fn){
  el.addEventListener('touchend',function(e){
    e.preventDefault();
    touchHandled=true;
    fn(e);
    setTimeout(function(){touchHandled=false;},400);
  },{passive:false});
  el.addEventListener('click',function(e){
    if(touchHandled)return;
    fn(e);
  });
}

function startGame(){
  document.getElementById('menu-ov').classList.add('hidden');
  mode='play';
  loadLevel(levelIdx);
}

function showWin(){
  const lv=LEVELS[levelIdx];
  const isSecret=levelIdx===SECRET_IDX;
  const isFinale=levelIdx===FINALE_IDX;
  const isLastMain=levelIdx===MAIN_LAST_IDX;
  if(isSecret){
    document.getElementById('win-emoji').textContent='✨';
    document.getElementById('win-title').textContent='Secret garden saved!';
  }else if(isFinale){
    document.getElementById('win-emoji').textContent='🌍';
    document.getElementById('win-title').textContent='The world is watered!';
    unlockSecret();
  }else if(isLastMain){
    document.getElementById('win-emoji').textContent='⏱️';
    document.getElementById('win-title').textContent='Rush complete!';
  }else{
    document.getElementById('win-emoji').textContent='🌻';
    document.getElementById('win-title').textContent='The field is watered!';
  }
  let grade='';
  if(moves<=levelPar)grade=' ⭐ Perfect!';
  else if(moves<=levelPar+1)grade=' ⭐⭐ Nice!';
  else grade=' ⭐ Good job!';
  let msg=(lv?lv.name:'')+' — '+moves+' moves (par '+levelPar+')'+grade;
  if(isSecret)msg='Nobody else knows this garden exists. You are a legend! 💧';
  else if(isFinale)msg='You saved the last gardens on Earth! 🤫 Tap the menu title 5× for a secret level…';
  else if(isLastMain)msg='One more challenge awaits… End of the World! 🌍';
  document.getElementById('win-msg').textContent=msg;
  if(isFinale||isSecret){
    document.getElementById('next-btn').textContent='Menu 🏠';
  }else if(isLastMain){
    document.getElementById('next-btn').textContent='End of the World 🌍';
  }else{
    document.getElementById('next-btn').textContent='Next Level ➡️';
  }
  document.getElementById('win-ov').classList.remove('hidden');
}

function nextLevel(){
  document.getElementById('win-ov').classList.add('hidden');
  if(levelIdx===SECRET_IDX||levelIdx===FINALE_IDX){
    showMenu();
    return;
  }
  if(levelIdx===MAIN_LAST_IDX)levelIdx=FINALE_IDX;
  else if(levelIdx<LEVELS.length-1)levelIdx++;
  else levelIdx=0;
  loadLevel(levelIdx);
}

function showMenu(){
  document.getElementById('win-ov').classList.add('hidden');
  document.getElementById('lose-ov').classList.add('hidden');
  document.getElementById('menu-ov').classList.remove('hidden');
  updateMenuSecretHint();
  stopTimer();
  mode='menu';
  animRunning=false;
}

function onMenuTitleTap(){
  menuTapCount++;
  if(menuTapCount<5)return;
  menuTapCount=0;
  if(!secretUnlocked){
    const hint=document.getElementById('menu-secret-hint');
    hint.textContent='🌍 Beat End of the World first!';
    setTimeout(function(){updateMenuSecretHint();},2000);
    return;
  }
  document.getElementById('menu-ov').classList.add('hidden');
  mode='play';
  levelIdx=SECRET_IDX;
  loadLevel(SECRET_IDX);
}

function au(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx;}
function tone(f,d,type,v){try{const c=au(),o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type=type||'sine';o.frequency.setValueAtTime(f,c.currentTime);g.gain.setValueAtTime(v||.15,c.currentTime);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+d);o.start();o.stop(c.currentTime+d);}catch(e){}}
function playRotate(){tone(420,.06,'triangle',.12);}
function playHint(){tone(660,.1,'sine',.14);setTimeout(function(){tone(880,.1,'sine',.12);},90);}
function playWin(){[523,659,784,988].forEach(function(f,i){setTimeout(function(){tone(f,.18,'sine',.2);},i*90);});}
function playValve(){tone(520,.08,'square',.1);}
function playWilting(){tone(220,.25,'sawtooth',.12);}
function playCombo(n){const base=520+n*80;[0,1,2].forEach(function(i){setTimeout(function(){tone(base+i*90,.09,'sine',.13);},i*70);});}

window.render_game_to_text=function(){
  const cells=[];
  for(let r=0;r<rows;r++){
    for(let c=0;c<cols;c++){
      const cell=grid[r]&&grid[r][c];
      if(!cell)continue;
      cells.push({r,c,type:cell.type,rot:cell.rot,fixed:cell.fixed,water:filled.has(r+','+c)});
    }
  }
  return JSON.stringify({
    mode:mode,
    level:levelIdx+1,
    levelName:LEVELS[levelIdx]?LEVELS[levelIdx].name:'',
    moves:moves,
    won:won,
    grid:{rows,cols,origin:'top-left',xRight:true,yDown:true},
    cells:cells,
  });
};

window.advanceTime=function(ms){
  const steps=Math.max(1,Math.round(ms/(1000/60)));
  for(let i=0;i<steps;i++){
    animT+=1/60;
    if(flowPath.length>1&&flowPhase<flowPath.length)flowPhase=Math.min(flowPath.length,flowPhase+0.12);
  }
  renderFrame();
};

canvas=document.getElementById('game');
ctx=canvas.getContext('2d');
updateMenuSecretHint();
bindTap(document.getElementById('start-btn'),startGame);
bindTap(document.getElementById('menu-title'),onMenuTitleTap);
bindTap(document.getElementById('reset-btn'),resetLevel);
bindTap(document.getElementById('hint-btn'),showHint);
bindTap(document.getElementById('next-btn'),nextLevel);
bindTap(document.getElementById('menu-btn'),showMenu);
bindTap(document.getElementById('retry-btn'),resetLevel);
bindTap(document.getElementById('lose-menu-btn'),showMenu);
canvas.addEventListener('touchend',function(e){
  e.preventDefault();
  touchHandled=true;
  if(e.changedTouches[0])onPointer(e.changedTouches[0]);
  setTimeout(function(){touchHandled=false;},400);
},{passive:false});
canvas.addEventListener('click',function(e){
  if(touchHandled)return;
  onPointer(e);
});
window.addEventListener('resize',function(){if(mode==='play')resize();});
</script>
