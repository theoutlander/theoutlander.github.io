<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Castle Defenders 🏰</title>
<script src="portal-bridge.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0618;touch-action:none}
#game-container canvas{display:block}
</style>
</head>
<body>
<div id="game-container"></div>
<script src="https://cdn.jsdelivr.net/npm/phaser@4.1.0/dist/phaser.min.js"></script>
<script>
const GW = Math.max(320, window.innerWidth || 0);
const GH = Math.max(240, window.innerHeight || 0);
const GROUND_Y = GH * 0.72;
const CASTLE_X  = GW * 0.13;

// ── shared state ──────────────────────────────────────────
const G = {
  day:1, wood:0, score:0, castleHp:100, totalKilled:0,
  weapons:{ bow:0, sword:0, axe:0 },
  activeWeapon:'bow',
  plants:[],       // [{type, x, y, hp, lastShot}]
  actionsLeft:2,
  reset(){
    Object.assign(this,{day:1,wood:0,score:0,castleHp:100,totalKilled:0,
      weapons:{bow:0,sword:0,axe:0},activeWeapon:'bow',
      plants:[],actionsLeft:2});
  }
};

// ── audio helper ──────────────────────────────────────────
let _actx;
function AC(){ return _actx||(_actx=new(window.AudioContext||window.webkitAudioContext)()); }
function beep(freq,dur,type='sine',vol=0.18){
  try{const c=AC(),o=c.createOscillator(),g=c.createGain();
  o.connect(g);g.connect(c.destination);o.type=type;
  o.frequency.value=freq;g.gain.setValueAtTime(vol,c.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+dur);
  o.start();o.stop(c.currentTime+dur);}catch(e){}
}
function chord(freqs){ freqs.forEach((f,i)=>setTimeout(()=>beep(f,.15,'sine',.2),i*70)); }

// ── colour palette ────────────────────────────────────────
const C={
  sky1:0x87ceeb,sky2:0x5bb8e8,skyNight:0x0a0618,
  ground:0x4a7c3f,groundD:0x2d4a25,
  castle:0x9b8365,castleD:0x6b5a3e,
  ui:0x1a0a3c,uiB:0x3a2a5c,
  yellow:0xffe14d,green:0x5dffb0,red:0xff5a5a,
  orange:0xff9a3c,purple:0xc77dff,blue:0x5bc8ff,
  white:0xffffff,black:0x000000,
};

// ═══════════════════════════════════════════════════════════
// SCENE: MENU
// ═══════════════════════════════════════════════════════════
class MenuScene extends Phaser.Scene {
  constructor(){ super('Menu'); }
  create(){
    G.reset();
    const cx=GW/2, cy=GH/2;
    this.add.rectangle(cx,cy,GW,GH,C.skyNight);
    // stars
    for(let i=0;i<80;i++) this.add.circle(
      Phaser.Math.Between(10,GW-10), Phaser.Math.Between(10,GH*.65),
      Phaser.Math.FloatBetween(.4,2), C.white, Phaser.Math.FloatBetween(.2,1));
    // ground
    this.add.rectangle(cx,GH*.86,GW,GH*.3,C.groundD);
    // castle silhouette
    drawCastleGraphic(this,CASTLE_X,GROUND_Y,true);
    // title
    this.add.text(cx,GH*.15,'🏰',{fontSize:fz(0.12)}).setOrigin(.5);
    this.add.text(cx,GH*.30,'Castle Defenders!',
      {fontFamily:'Fredoka One',fontSize:fz(.065),fill:'#ffe14d',stroke:'#000',strokeThickness:4})
      .setOrigin(.5);
    // instructions
    const pw=Math.min(GW*.88,420), ph=GH*.26;
    const panel=this.add.rectangle(cx,GH*.52,pw,ph,C.ui,.92);
    panel.setStrokeStyle(2,C.uiB);
    [
      '🌅  Day — chop wood, forge weapons, plant defenders',
      '🌙  Night — tap screen to shoot zombies',
      '🌱  Plants auto-shoot — drag to place them!',
    ].forEach((s,i)=>this.add.text(cx,GH*.42+i*GH*.075,s,
      {fontFamily:'Nunito',fontSize:fz(.030),fill:'#f0e6ff',align:'center',wordWrap:{width:pw-30}})
      .setOrigin(.5));
    // play button
    makeBtn(this,cx,GH*.79,'Defend the Castle! ⚔️',C.yellow,'#0a0618',fz(.04),()=>{
      this.scene.start('Day');
    });
  }
}

// ═══════════════════════════════════════════════════════════
// SCENE: DAY
// ═══════════════════════════════════════════════════════════
class DayScene extends Phaser.Scene {
  constructor(){ super('Day'); }

  create(){
    G.actionsLeft = 2 + Math.floor(G.day/3);
    G.plants = [];
    G.weapons = {bow:0,sword:0,axe:0};
    G.wood = 0;
    G.activeWeapon = 'bow';

    this.cameras.main.setBackgroundColor(C.sky1);
    this.add.rectangle(GW/2,GH*.86,GW,GH*.3,C.ground);
    this.add.rectangle(GW/2,GROUND_Y,GW,8,C.groundD);

    // Castle
    drawCastleGraphic(this,CASTLE_X,GROUND_Y,false);

    // Castle HP bar
    this.add.rectangle(CASTLE_X,GROUND_Y+14,110,10,0x330000);
    this.hpFill=this.add.rectangle(CASTLE_X-55,GROUND_Y+14,110*(G.castleHp/100),10,C.green);
    this.hpFill.setOrigin(0,.5);

    // HUD
    this.dayTxt = this.add.text(10,8,'Day '+G.day,
      {fontFamily:'Fredoka One',fontSize:fz(.038),fill:'#ffe14d'});
    this.woodTxt = this.add.text(GW/2,8,'🪵 '+G.wood,
      {fontFamily:'Fredoka One',fontSize:fz(.042),fill:'#8b5e3c',stroke:'#000',strokeThickness:2})
      .setOrigin(.5,0);
    this.actionTxt = this.add.text(GW/2,GH*.09,'Chops left: ●●',
      {fontFamily:'Nunito',fontSize:fz(.028),fill:'#2a6a2a',fontStyle:'bold'}).setOrigin(.5,0);

    // Phase banner
    this.banner=this.add.text(GW/2,GH*.15,
      '🌅 Chop wood · Plant defenders · Forge weapons',
      {fontFamily:'Nunito',fontSize:fz(.026),fill:'#1a4a1a',fontStyle:'bold',
       align:'center',wordWrap:{width:GW*.9}}).setOrigin(.5);

    // Trees
    this.trees=[];
    [{x:GW*.60,em:'🌲'},{x:GW*.80,em:'🌳'}].forEach(({x,em},i)=>{
      const logs=[3,3];
      const t=this.add.text(x,GROUND_Y-70,em,{fontSize:fz(.13)})
        .setOrigin(.5,1).setInteractive({useHandCursor:true});
      const lbl=this.add.text(x+30,GROUND_Y-115,'🪵×3',
        {fontFamily:'Fredoka One',fontSize:fz(.030),fill:'#ffe14d',
         stroke:'#000',strokeThickness:2}).setOrigin(.5);
      t.on('pointerdown',()=>this.chop(i,t,lbl));
      t.on('pointerover',()=>t.setScale(1.08));
      t.on('pointerout', ()=>t.setScale(1));
      this.trees.push({txt:t,lbl,logs:3});
    });

    // Forge
    this.drawForge(GW*.38,GROUND_Y-55);

    // Plant panel (bottom bar)
    this.buildPlantPanel();

    // Weapon crafting buttons
    this.buildForgeButtons();

    // To Battle button
    this.battleBtn=makeBtn(this,GW/2,GH*.91,'🌙 To Battle! →',C.purple,'#fff',fz(.038),()=>{
      if(G.weapons.bow===0&&G.weapons.sword===0&&G.weapons.axe===0){
        this.flashBanner('⚠️ Craft at least one weapon first!','#ff5a5a'); return;
      }
      this.showTransition('🌙 Night Falls!','Zombies incoming — tap to shoot!',
        ()=>this.scene.start('Night'));
    });

    // Drag state for plants
    this.dragPlant=null;
    this.dragSprite=null;

    this.updateUI();
  }

  chop(idx,tree,lbl){
    if(G.actionsLeft<=0||this.trees[idx].logs<=0) return;
    this.trees[idx].logs--;
    G.wood++;
    G.actionsLeft--;
    beep(200,.12,'sawtooth',.2);
    this.floatText(tree.x,tree.y-20,'+1 🪵','#8b5e3c');
    this.tweens.add({targets:tree,angle:[-12,8,0],duration:220});
    lbl.setText('🪵×'+this.trees[idx].logs);
    if(this.trees[idx].logs===0) tree.setAlpha(.35);
    this.updateUI();
    if(G.actionsLeft<=0) this.flashBanner('No chops left — forge and plant now!','#b86000');
  }

  buildPlantPanel(){
    const plants=[
      {key:'sunflower',em:'🌻',cost:1,desc:'Slow shots, long range'},
      {key:'cactus',   em:'🌵',cost:2,desc:'Medium shots'},
      {key:'fire',     em:'🔥',cost:3,desc:'Short range, heavy'},
    ];
    const panelY=GH*.82;
    this.add.rectangle(GW*.32,panelY,GW*.58,GH*.09,C.ui,.9)
      .setStrokeStyle(1,C.uiB);
    this.add.text(GW*.05,panelY,'🌱\nPlants',
      {fontFamily:'Fredoka One',fontSize:fz(.024),fill:'#5dffb0',align:'center'}).setOrigin(.5);

    plants.forEach(({key,em,cost},i)=>{
      const px=GW*.18+i*(GW*.16);
      const bg=this.add.rectangle(px,panelY,GW*.13,GH*.07,C.uiB).setStrokeStyle(1,0x5a4a8a);
      const icon=this.add.text(px,panelY-8,em,{fontSize:fz(.055)}).setOrigin(.5);
      this.add.text(px,panelY+14,cost+'🪵',
        {fontFamily:'Fredoka One',fontSize:fz(.022),fill:'#ff9a3c'}).setOrigin(.5);

      icon.setInteractive({useHandCursor:true,draggable:true});
      icon.on('dragstart',(_,x,y)=>{
        if(G.wood<cost){ this.flashBanner('Not enough wood!','#ff5a5a'); return; }
        this.dragPlant={key,em,cost};
        this.dragSprite=this.add.text(x,y,em,{fontSize:fz(.07)}).setOrigin(.5).setDepth(10);
      });
      icon.on('drag',(_,x,y)=>{ if(this.dragSprite)this.dragSprite.setPosition(x,y); });
      icon.on('dragend',(_,x,y)=>this.placePlant(x,y));
    });
  }

  placePlant(x,y){
    if(!this.dragSprite) return;
    this.dragSprite.destroy(); this.dragSprite=null;
    const dp=this.dragPlant; if(!dp) return;
    // Must be near ground
    if(y<GROUND_Y-100||y>GROUND_Y+30||x<GW*.22){
      this.flashBanner('Drop on the ground path!','#ff9a3c');
      this.dragPlant=null; return;
    }
    if(G.plants.length>=5){ this.flashBanner('Max 5 plants!','#ff9a3c'); this.dragPlant=null; return; }
    G.wood-=dp.cost;
    G.plants.push({key:dp.key,em:dp.em,x,y:GROUND_Y-18,hp:3,lastShot:0});
    // Show placed plant
    this.add.text(x,GROUND_Y-18,dp.em,{fontSize:fz(.055)}).setOrigin(.5).setDepth(3);
    beep(500,.1,'sine',.2); beep(700,.1,'sine',.15);
    this.dragPlant=null;
    this.updateUI();
  }

  buildForgeButtons(){
    const WEAPONS=[
      {key:'bow',  em:'🏹',cost:2},
      {key:'sword',em:'⚔️', cost:3},
      {key:'axe',  em:'🪓',cost:4},
    ];
    const startX=GW*.52, gap=GW*.15;
    WEAPONS.forEach(({key,em,cost},i)=>{
      const bx=startX+i*gap, by=GROUND_Y-105;
      const bg=this.add.rectangle(bx,by,GW*.12,GH*.1,C.ui).setStrokeStyle(2,C.uiB);
      this.add.text(bx,by-15,em,{fontSize:fz(.055)}).setOrigin(.5);
      const cTxt=this.add.text(bx,by+12,cost+'🪵',
        {fontFamily:'Fredoka One',fontSize:fz(.024),fill:'#ff9a3c'}).setOrigin(.5);
      bg.setInteractive({useHandCursor:true});
      bg.on('pointerdown',()=>{
        if(G.wood<cost){ this.flashBanner('Not enough wood!','#ff5a5a'); return; }
        G.wood-=cost; G.weapons[key]+=10;
        chord([400,500,600]);
        this.floatText(bx,by-40,'⚔️ +10 charges','#5dffb0');
        this.updateUI();
      });
      bg.on('pointerover',()=>bg.setFillStyle(0x2a1a50));
      bg.on('pointerout', ()=>bg.setFillStyle(C.ui));
    });
  }

  drawForge(x,y){
    const g=this.add.graphics();
    g.fillStyle(0x4a3520,1); g.fillRect(x-35,y-40,70,42);
    g.fillStyle(0x3a2510,1); g.fillRect(x-10,y-68,20,30);
    g.fillStyle(0xff6600,.7); g.fillCircle(x,y-18,16);
    g.fillStyle(0xff9900,.5); g.fillCircle(x,y-18,9);
    this.add.text(x,y-55,'🔥',{fontSize:fz(.05)}).setOrigin(.5);
    this.add.text(x,y+8,'Forge',{fontFamily:'Fredoka One',fontSize:fz(.024),fill:'#ff9a3c'}).setOrigin(.5);
  }

  updateUI(){
    this.woodTxt.setText('🪵 '+G.wood);
    const pips='●'.repeat(G.actionsLeft)+'○'.repeat(Math.max(0,G.actionsLeft===0?0:2+Math.floor(G.day/3)-G.actionsLeft));
    this.actionTxt.setText('Chops: '+pips);
    this.hpFill.setSize(110*(G.castleHp/100),10);
  }

  flashBanner(txt,color='#1a4a1a'){
    this.banner.setText(txt).setStyle({fill:color});
    this.time.delayedCall(2000,()=>this.banner.setText(
      '🌅 Chop wood · Plant defenders · Forge weapons').setStyle({fill:'#1a4a1a'}));
  }

  showTransition(title,sub,cb){
    const ov=this.add.rectangle(GW/2,GH/2,GW,GH,0x000000,.8).setDepth(20);
    this.add.text(GW/2,GH/2-30,title,
      {fontFamily:'Fredoka One',fontSize:fz(.06),fill:'#ffe14d',align:'center'}).setOrigin(.5).setDepth(21);
    this.add.text(GW/2,GH/2+30,sub,
      {fontFamily:'Nunito',fontSize:fz(.030),fill:'rgba(255,255,255,0.7)',align:'center'}).setOrigin(.5).setDepth(21);
    this.time.delayedCall(1600,cb);
  }

  floatText(x,y,txt,color='#ffe14d'){
    const t=this.add.text(x,y,txt,
      {fontFamily:'Fredoka One',fontSize:fz(.030),fill:color,stroke:'#000',strokeThickness:2})
      .setOrigin(.5).setDepth(15);
    this.tweens.add({targets:t,y:y-60,alpha:0,duration:900,onComplete:()=>t.destroy()});
  }
}

// ═══════════════════════════════════════════════════════════
// SCENE: NIGHT
// ═══════════════════════════════════════════════════════════
class NightScene extends Phaser.Scene {
  constructor(){ super('Night'); }

  create(){
    this.nightOver=false;
    this.zombies=[];
    this.projectiles=[];
    this.spawnCount=0;
    this.zombiesTotal = 20+G.day*15;
    this.spawnDelay = Math.max(300, 1000-G.day*30);
    this.plantTimers={};

    // Sky + ground
    this.cameras.main.setBackgroundColor(C.skyNight);
    for(let i=0;i<70;i++) this.add.circle(
      Phaser.Math.Between(10,GW-10),Phaser.Math.Between(10,GH*.6),
      Phaser.Math.FloatBetween(.4,2),C.white,Phaser.Math.FloatBetween(.2,.9));
    this.add.circle(GW*.82,GH*.1,30,0xe8e8d0,.9);
    this.add.rectangle(GW/2,GH*.86,GW,GH*.3,C.groundD);
    this.add.rectangle(GW/2,GROUND_Y,GW,8,0x1a3010);

    // Castle
    drawCastleGraphic(this,CASTLE_X,GROUND_Y,false,true);

    // Castle HP bar
    this.hpBg=this.add.rectangle(CASTLE_X,GROUND_Y+18,120,12,0x330000);
    this.hpFill=this.add.rectangle(CASTLE_X-60,GROUND_Y+18,120*(G.castleHp/100),12,C.green);
    this.hpFill.setOrigin(0,.5);

    // HUD
    this.add.text(10,8,'Day '+G.day,{fontFamily:'Fredoka One',fontSize:fz(.036),fill:'#ffe14d'});
    this.scoreTxt=this.add.text(GW-10,8,'⭐ '+G.score,
      {fontFamily:'Fredoka One',fontSize:fz(.036),fill:'#ffe14d'}).setOrigin(1,0);
    this.zombieTxt=this.add.text(GW/2,8,'🧟 '+this.zombiesTotal,
      {fontFamily:'Fredoka One',fontSize:fz(.034),fill:'#ff5a5a'}).setOrigin(.5,0);

    // Weapon bar
    this.buildWeaponBar();

    // Plants
    G.plants.forEach(p=>{
      const pe=this.add.text(p.x,p.y,p.em,{fontSize:fz(.055)}).setOrigin(.5).setDepth(3);
      p.sprite=pe;
    });

    // Input — tap to shoot
    this.input.on('pointerdown',(ptr)=>{
      if(this.nightOver) return;
      // Check if tapping weapon bar
      if(ptr.y>GH*.84) return;
      this.fireWeapon(ptr.x,ptr.y);
    });

    // Start spawning
    this.time.delayedCall(800,()=>this.spawnZombie());

    // Plant auto-fire loop
    this.time.addEvent({delay:600,callback:this.plantFire,callbackScope:this,loop:true});
  }

  buildWeaponBar(){
    const owned=Object.entries(G.weapons).filter(([,v])=>v>0);
    if(!owned.length) return;
    const barY=GH*.9, bw=GW*.18, bh=GH*.09;
    const startX=GW/2-(owned.length-1)*bw/2;
    this.weaponBtns={};
    owned.forEach(([key,charges],i)=>{
      const bx=startX+i*bw;
      const em={bow:'🏹',sword:'⚔️',axe:'🪓'}[key];
      const isActive=G.activeWeapon===key;
      const bg=this.add.rectangle(bx,barY,bw*.9,bh,isActive?0x2a3a1a:C.ui,.95)
        .setStrokeStyle(2,isActive?C.green:C.uiB).setDepth(10);
      const icon=this.add.text(bx,barY-8,em,{fontSize:fz(.052)}).setOrigin(.5).setDepth(11);
      const chargeTxt=this.add.text(bx,barY+14,charges+'x',
        {fontFamily:'Fredoka One',fontSize:fz(.024),fill:isActive?'#5dffb0':'#aaa'})
        .setOrigin(.5).setDepth(11);
      this.weaponBtns[key]={bg,icon,chargeTxt};
      bg.setInteractive({useHandCursor:true});
      bg.on('pointerdown',()=>this.switchWeapon(key));
    });
  }

  switchWeapon(key){
    if(G.weapons[key]<=0) return;
    G.activeWeapon=key;
    Object.entries(this.weaponBtns).forEach(([k,{bg,chargeTxt}])=>{
      const active=k===key;
      bg.setFillStyle(active?0x2a3a1a:C.ui,.95);
      bg.setStrokeStyle(2,active?C.green:C.uiB);
      chargeTxt.setStyle({fill:active?'#5dffb0':'#aaa'});
    });
    beep(500,.06,'sine',.15);
  }

  fireWeapon(tx,ty){
    const key=G.activeWeapon;
    if(!G.weapons[key]||G.weapons[key]<=0){
      // Auto-switch to next available
      const next=Object.entries(G.weapons).find(([k,v])=>v>0&&k!==key);
      if(next){ this.switchWeapon(next[0]); return; }
      return;
    }
    G.weapons[key]--;
    if(this.weaponBtns[key]) this.weaponBtns[key].chargeTxt.setText(G.weapons[key]+'x');
    if(G.weapons[key]<=0&&this.weaponBtns[key]){
      this.weaponBtns[key].bg.setFillStyle(0x333,.5);
      this.weaponBtns[key].icon.setAlpha(.4);
    }

    const PROPS={
      bow:  {em:'→',speed:14,dmg:1,splash:false},
      sword:{em:'⚔️',speed:999,dmg:2,splash:true, range:GW*.12},
      axe:  {em:'🪓',speed:9, dmg:3,splash:false,bounce:true},
    };
    const prop=PROPS[key];
    const angle=Math.atan2(ty-GROUND_Y+30,tx-CASTLE_X);

    if(key==='sword'){
      // Instant arc — hit all zombies in range
      beep(300,.1,'sawtooth',.25);
      this.zombies.forEach(z=>{
        if(!z.alive) return;
        const dist=Phaser.Math.Distance.Between(CASTLE_X,GROUND_Y,z.x,z.y);
        if(dist<prop.range) this.damageZombie(z,prop.dmg);
      });
      const slash=this.add.text(CASTLE_X+60,GROUND_Y-40,'⚔️✨',{fontSize:fz(.08)})
        .setOrigin(.5).setDepth(8);
      this.tweens.add({targets:slash,x:CASTLE_X+140,alpha:0,duration:350,
        onComplete:()=>slash.destroy()});
      return;
    }

    // Projectile
    beep(key==='bow'?600:250,.08,'sine',.18);
    const proj={
      txt:this.add.text(CASTLE_X+50,GROUND_Y-30,prop.em,{fontSize:fz(.048)})
        .setOrigin(.5).setDepth(8),
      vx:Math.cos(angle)*prop.speed, vy:Math.sin(angle)*prop.speed,
      dmg:prop.dmg, alive:true,
      bounce:prop.bounce||false, bounced:false,
    };
    this.projectiles.push(proj);
  }

  plantFire(){
    if(this.nightOver) return;
    const now=this.time.now;
    G.plants.forEach(plant=>{
      if(!plant.sprite) return;
      const fireRate={sunflower:2000,cactus:1400,fire:800}[plant.key]||2000;
      if(now-plant.lastShot<fireRate) return;
      // Find nearest zombie in range
      const range={sunflower:GW*.7,cactus:GW*.45,fire:GW*.18}[plant.key]||GW*.4;
      const nearest=this.zombies.filter(z=>z.alive&&z.x>plant.x-20)
        .sort((a,b)=>a.x-b.x)[0];
      if(!nearest) return;
      if(Math.abs(nearest.x-plant.x)>range) return;
      plant.lastShot=now;
      // Fire a plant projectile
      const em={sunflower:'🌱',cactus:'🔸',fire:'🔥'}[plant.key]||'•';
      const dmg={sunflower:1,cactus:1,fire:2}[plant.key]||1;
      const spd={sunflower:6,cactus:8,fire:10}[plant.key]||6;
      const proj={
        txt:this.add.text(plant.x,plant.y-20,em,{fontSize:fz(.036)}).setOrigin(.5).setDepth(7),
        vx:-spd, vy:0, dmg, alive:true, bounce:false, bounced:false,
      };
      this.projectiles.push(proj);
      beep({sunflower:400,cactus:300,fire:500}[plant.key]||400,.06,'sine',.12);
    });
  }

  spawnZombie(){
    if(this.nightOver||this.spawnCount>=this.zombiesTotal) return;
    this.spawnCount++;
    const remaining=this.zombiesTotal-this.spawnCount;
    this.zombieTxt.setText('🧟 '+Math.max(0,remaining+this.zombies.filter(z=>z.alive).length));

    // Pick type
    const r=Math.random();
    const type=r<.6?'normal':r<.8?'fast':'tank';
    const props={
      normal:{em:'🧟',spd:0.65+G.day*.1,  hp:1+Math.floor(G.day/2),scale:1},
      fast:  {em:'🧟‍♀️',spd:1.4+G.day*.15, hp:1,                    scale:.85},
      tank:  {em:'🧟‍♂️',spd:0.35+G.day*.06,hp:3+G.day,             scale:1.3},
    }[type];

    // Multiple lanes
    const laneY=GROUND_Y-Phaser.Math.Between(10,45);
    const z={
      txt:this.add.text(GW+40,laneY,props.em,{fontSize:fz(.09*props.scale)})
        .setOrigin(.5,1).setDepth(5).setInteractive({useHandCursor:true}),
      hpBg:this.add.rectangle(GW+40,laneY-fz(.09*props.scale)*.6,36,6,0x220000).setDepth(6),
      hpFill:this.add.rectangle(GW+22,laneY-fz(.09*props.scale)*.6,36,6,C.red).setOrigin(0,.5).setDepth(6),
      x:GW+40, y:laneY, spd:props.spd, hp:props.hp, maxHp:props.hp,
      alive:true, type,
    };
    z.txt.on('pointerdown',()=>this.damageZombie(z,this.getWeaponDmg()));
    this.zombies.push(z);

    // Schedule next
    if(this.spawnCount<this.zombiesTotal){
      this.time.delayedCall(this.spawnDelay,()=>this.spawnZombie());
    }
  }

  getWeaponDmg(){
    return {bow:1,sword:2,axe:3}[G.activeWeapon]||1;
  }

  damageZombie(z,dmg){
    if(!z.alive) return;
    z.hp-=dmg;
    beep(180,.08,'sawtooth',.2);
    this.tweens.add({targets:z.txt,alpha:.3,duration:60,yoyo:true});
    // Update HP bar
    const pct=Math.max(0,z.hp/z.maxHp);
    z.hpFill.setSize(36*pct,6);
    z.hpFill.setFillStyle(pct>.5?C.green:pct>.25?C.orange:C.red);
    if(z.hp<=0) this.killZombie(z);
  }

  killZombie(z){
    z.alive=false;
    G.score+=10*(1+Math.floor(G.day/2));
    G.totalKilled++;
    this.scoreTxt.setText('⭐ '+G.score);
    beep(600,.07,'sine',.2); beep(800,.1,'sine',.18);
    this.spawnHitFX(z.x,z.y);
    this.tweens.add({targets:[z.txt,z.hpBg,z.hpFill],
      scaleX:0,scaleY:0,alpha:0,duration:300,ease:'Power2',
      onComplete:()=>{z.txt.destroy();z.hpBg.destroy();z.hpFill.destroy();}});
    this.zombies=this.zombies.filter(zz=>zz!==z);
    this.checkNightOver();
  }

  checkNightOver(){
    if(this.nightOver) return;
    const alive=this.zombies.filter(z=>z.alive).length;
    if(alive===0&&this.spawnCount>=this.zombiesTotal) this.endNight();
  }

  endNight(dead=false){
    if(this.nightOver) return;
    this.nightOver=true;
    if(dead){ this.time.delayedCall(600,()=>this.scene.start('GameOver')); return; }
    G.day++;
    const ov=this.add.rectangle(GW/2,GH/2,GW,GH,0x000000,.82).setDepth(20);
    this.add.text(GW/2,GH/2-40,'☀️ You Survived!',
      {fontFamily:'Fredoka One',fontSize:fz(.06),fill:'#ffe14d'}).setOrigin(.5).setDepth(21);
    this.add.text(GW/2,GH/2+10,'Day '+G.day+' begins...',
      {fontFamily:'Nunito',fontSize:fz(.032),fill:'rgba(255,255,255,.7)'}).setOrigin(.5).setDepth(21);
    this.add.text(GW/2,GH/2+50,'⭐ Score: '+G.score,
      {fontFamily:'Fredoka One',fontSize:fz(.038),fill:'#5dffb0'}).setOrigin(.5).setDepth(21);
    this.time.delayedCall(2200,()=>this.scene.start('Day'));
  }

  update(){
    if(this.nightOver) return;

    // Move zombies
    this.zombies.forEach(z=>{
      if(!z.alive) return;
      z.x-=z.spd;
      z.txt.setX(z.x); z.hpBg.setX(z.x); z.hpFill.setX(z.x-18);
      // Check plant collision
      G.plants.forEach(p=>{
        if(!p.sprite) return;
        if(Math.abs(z.x-p.x)<30&&Math.abs(z.y-p.y)<40){
          p.hp--;
          if(p.hp<=0&&p.sprite){
            p.sprite.destroy();p.sprite=null;
            beep(200,.15,'sawtooth',.2);
          }
        }
      });
      // Reached castle
      if(z.x<CASTLE_X+60){
        z.alive=false;
        G.castleHp=Math.max(0,G.castleHp-8);
        this.hpFill.setSize(120*(G.castleHp/100),12);
        const pct=G.castleHp/100;
        this.hpFill.setFillStyle(pct>.5?C.green:pct>.25?C.orange:C.red);
        this.cameras.main.shake(220,.014);
        beep(80,.25,'sawtooth',.3);
        z.txt.destroy();z.hpBg.destroy();z.hpFill.destroy();
        this.zombies=this.zombies.filter(zz=>zz!==z);
        if(G.castleHp<=0){this.endNight(true);return;}
        this.checkNightOver();
      }
    });

    // Move projectiles
    this.projectiles=this.projectiles.filter(p=>{
      if(!p.alive) return false;
      p.txt.x+=p.vx; p.txt.y+=p.vy;
      // Off screen
      if(p.txt.x<-30||p.txt.x>GW+30||p.txt.y>GH){
        p.alive=false; p.txt.destroy(); return false;
      }
      // Hit zombie
      let hit=false;
      this.zombies.forEach(z=>{
        if(!z.alive||hit) return;
        if(Phaser.Math.Distance.Between(p.txt.x,p.txt.y,z.x,z.y)<32){
          this.damageZombie(z,p.dmg);
          if(p.bounce&&!p.bounced){
            p.bounced=true;
            p.vx*=-0.7; p.vy*=-0.3;
          } else {
            p.alive=false; p.txt.destroy(); hit=true;
          }
        }
      });
      return p.alive;
    });
  }

  spawnHitFX(x,y){
    const em=['💥','⚡','✨'][Phaser.Math.Between(0,2)];
    const t=this.add.text(x,y-20,em,{fontSize:fz(.06)}).setOrigin(.5).setDepth(10);
    this.tweens.add({targets:t,y:y-70,alpha:0,duration:500,onComplete:()=>t.destroy()});
  }
}

// ═══════════════════════════════════════════════════════════
// SCENE: GAME OVER
// ═══════════════════════════════════════════════════════════
class GameOverScene extends Phaser.Scene {
  constructor(){ super('GameOver'); }
  create(){
    this.cameras.main.setBackgroundColor(C.skyNight);
    const cx=GW/2,cy=GH/2;
    this.add.text(cx,cy-GH*.26,'💀',{fontSize:fz(.14)}).setOrigin(.5);
    this.add.text(cx,cy-GH*.1,'Castle Fallen!',
      {fontFamily:'Fredoka One',fontSize:fz(.07),fill:'#ff5a5a',stroke:'#000',strokeThickness:4})
      .setOrigin(.5);
    this.add.text(cx,cy,'The zombies broke through on Day '+G.day+'!',
      {fontFamily:'Nunito',fontSize:fz(.030),fill:'rgba(255,255,255,.6)',align:'center',
       wordWrap:{width:GW*.8}}).setOrigin(.5);
    // Stats
    [['Days',G.day],['Killed',G.totalKilled],['Score',G.score]].forEach(([l,v],i)=>{
      const sx=GW*(0.2+i*.3), sy=cy+GH*.18;
      const bg=this.add.rectangle(sx,sy,GW*.22,GH*.1,C.ui,.9).setStrokeStyle(1,C.uiB);
      this.add.text(sx,sy-GH*.025,l,{fontFamily:'Nunito',fontSize:fz(.022),fill:'rgba(255,255,255,.5)'}).setOrigin(.5);
      this.add.text(sx,sy+GH*.01,''+v,{fontFamily:'Fredoka One',fontSize:fz(.046),fill:'#ffe14d'}).setOrigin(.5);
    });
    const bw=Math.min(GW*.4,170);
    makeBtn(this,cx-bw*.6,cy+GH*.32,'Try Again ⚔️',C.yellow,'#0a0618',fz(.033),()=>{G.reset();this.scene.start('Day');});
    makeBtn(this,cx+bw*.6,cy+GH*.32,'Menu 🏠',C.ui,'#f0e6ff',fz(.033),()=>this.scene.start('Menu'),C.uiB);
  }
}

// ── helpers ───────────────────────────────────────────────
function fz(r){ return Math.floor(Math.min(GW,GH)*r)+'px'; }

function makeBtn(scene,x,y,label,fill,textCol,fontSize,cb,stroke){
  const fsNum = typeof fontSize === 'number' ? fontSize : parseFloat(String(fontSize)) || 24;
  const tw=Math.max(label.length*fsNum*.55+20,140), th=54;
  const btn=scene.add.rectangle(x,y,tw,th,fill).setStrokeStyle(3,stroke||0x000000,.5)
    .setInteractive({useHandCursor:true});
  scene.add.text(x,y,label,{fontFamily:'Fredoka One',fontSize,fill:textCol}).setOrigin(.5);
  btn.on('pointerdown',cb);
  btn.on('pointerover',()=>btn.setAlpha(.85));
  btn.on('pointerout', ()=>btn.setAlpha(1));
  return btn;
}

function drawCastleGraphic(scene,x,groundY,silhouette=false,night=false){
  const g=scene.add.graphics().setDepth(2);
  const wall=silhouette?0x3a2a1a:(night?0x4a3520:0x9b8365);
  const dark=silhouette?0x2a1a0a:(night?0x3a2510:0x6b5a3e);
  // Main wall
  g.fillStyle(wall,1); g.fillRect(x-55,groundY-130,110,130);
  // Battlements
  [-40,-20,0,20,40].forEach(bx=>{
    g.fillStyle(dark,1); g.fillRect(x+bx-8,groundY-152,16,24);
  });
  // Gate
  g.fillStyle(silhouette?0x0a0618:0x3d2b1a,1); g.fillRect(x-20,groundY-60,40,60);
  // Windows
  g.fillRect(x-42,groundY-110,24,28); g.fillRect(x+18,groundY-110,24,28);
  // Flag
  g.lineStyle(3,dark,1); g.lineBetween(x,groundY-158,x,groundY-128);
  g.fillStyle(0xff5a5a,1); g.fillTriangle(x,groundY-158,x+26,groundY-146,x,groundY-132);
  // Night torches
  if(night){
    g.fillStyle(0xff6600,.35); g.fillCircle(x-18,groundY-35,16); g.fillCircle(x+18,groundY-35,16);
    scene.add.text(x-18,groundY-42,'🕯️',{fontSize:fz(.033)}).setOrigin(.5).setDepth(3);
    scene.add.text(x+18,groundY-42,'🕯️',{fontSize:fz(.033)}).setOrigin(.5).setDepth(3);
  }
}

// ── launch ─────────────────────────────────────────────────
new Phaser.Game({
  type: Phaser.AUTO,
  width: GW, height: GH,
  backgroundColor: '#0a0618',
  parent: 'game-container',
  scene: [MenuScene, DayScene, NightScene, GameOverScene],
  scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH },
  input: { touch: true, activePointers: 3 },
});
</script>
