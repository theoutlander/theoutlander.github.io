<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Spell It! 🌈</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0618;--card:#16092e;--border:rgba(255,255,255,0.08);
  --pink:#ff6eb4;--yellow:#ffe14d;--green:#5dffb0;--blue:#5bc8ff;
  --purple:#c77dff;--orange:#ff9a3c;--text:#f0e6ff;--muted:rgba(240,230,255,0.38);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none}
html,body{width:100%;height:100%;background:var(--bg);color:var(--text);font-family:'Nunito',sans-serif;overflow:hidden;touch-action:none}

#root{display:flex;flex-direction:column;height:100%;padding:8px;gap:6px}

/* HUD */
#hud{flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:var(--card);border:1px solid var(--border);border-radius:12px}
.hpill{display:flex;align-items:center;gap:5px;font-size:13px;font-weight:900}
.hval{font-family:'Fredoka One',cursive;font-size:20px;line-height:1}
#level-badge{font-family:'Fredoka One',cursive;font-size:14px;padding:5px 14px;border-radius:99px;color:#08041a;background:#ff6eb4}
#timer-pill{display:none}

/* FALL ZONE */
#fall-zone{flex:1;position:relative;overflow:hidden;border-radius:12px;background:linear-gradient(180deg,#07031a 0%,#0f062a 100%);min-height:0}
#fall-zone::before{content:'';position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.025) 1px,transparent 1px);background-size:54px 54px;pointer-events:none;z-index:0}
#timer-bar-wrap{position:absolute;top:0;left:0;right:0;height:5px;background:rgba(255,255,255,.06);display:none;z-index:2}
#timer-bar{height:100%;background:linear-gradient(90deg,var(--green),var(--yellow));transition:width .5s linear,background .3s;width:100%}

/* LETTER BLOCK */
.lb{position:absolute;width:54px;height:54px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-family:'Fredoka One',cursive;font-size:25px;cursor:pointer;border:2px solid rgba(255,255,255,.2);z-index:5;touch-action:none}
.lb:active{transform:scale(.88)}
.lb.correct-tap{animation:ca .35s ease-out forwards;pointer-events:none}
@keyframes ca{0%{transform:scale(1.4);filter:brightness(2.5)}100%{transform:scale(0);opacity:0}}
.lb.wrong-tap{animation:wa .35s ease-out forwards;pointer-events:none}
@keyframes wa{0%{transform:scale(1.3);filter:brightness(2) hue-rotate(-30deg)}50%{transform:scale(1.5) rotate(15deg)}100%{transform:scale(0);opacity:0}}
.lb.neutral-tap{animation:na .25s ease-out forwards;pointer-events:none}
@keyframes na{0%{transform:scale(1.1);opacity:1}100%{transform:scale(0);opacity:0}}
.lb.is-next{border-color:var(--yellow);animation:np .7s ease-in-out infinite alternate}
@keyframes np{0%{box-shadow:0 0 8px 2px rgba(255,225,77,.5)}100%{box-shadow:0 0 20px 8px rgba(255,225,77,.8)}}

/* WORD DISPLAY */
#word-display{flex-shrink:0;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:10px 14px}
#word-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
#word-label{font-size:10px;letter-spacing:.15em;color:var(--muted);text-transform:uppercase}
#hint-btn{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);border-radius:99px;color:var(--muted);font-size:10px;font-weight:900;padding:3px 10px;cursor:pointer;font-family:'Nunito',sans-serif;letter-spacing:.04em}
#word-slots{display:flex;gap:6px;justify-content:center;flex-wrap:nowrap;margin-bottom:8px}
.wslot{min-width:48px;height:52px;border-radius:10px;border:2px solid rgba(255,255,255,.12);display:flex;align-items:center;justify-content:center;font-family:'Fredoka One',cursive;font-size:24px;color:var(--text);flex-shrink:0;position:relative;transition:border-color .2s,background .2s}
.wslot .underscore{position:absolute;font-size:20px;color:rgba(255,255,255,.2);font-family:'Fredoka One',cursive}
.wslot.filled .underscore{display:none}
.wslot.filled{border-color:rgba(255,255,255,.3)}
.wslot.lit{border-color:var(--green);background:rgba(93,255,176,.12);animation:sl .4s ease-out}
@keyframes sl{0%{transform:scale(1.15);filter:brightness(1.8)}100%{transform:scale(1);filter:brightness(1)}}
.wslot.next-slot{border-color:var(--yellow);border-style:dashed}
#clue-row{display:flex;align-items:center;justify-content:center;gap:8px}
#clue-emoji{font-size:22px}
#clue-text{font-size:12px;color:var(--muted);line-height:1.4}

/* OVERLAYS */
.ov{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:50;padding:20px;gap:10px;text-align:center}
.ov.hidden{display:none}
#menu-ov{background:linear-gradient(180deg,#07031a,#130840)}
#setup-ov,#over-ov{background:rgba(7,3,26,.96)}
.big-title{font-family:'Fredoka One',cursive;font-size:clamp(50px,12vw,88px);line-height:1;background:linear-gradient(135deg,var(--pink),var(--yellow),var(--green),var(--blue));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.sub{font-size:13px;color:var(--muted);line-height:1.75;max-width:300px}
.big-btn{font-family:'Fredoka One',cursive;font-size:20px;color:#07031a;background:var(--yellow);border:none;padding:12px 38px;border-radius:10px;cursor:pointer;box-shadow:0 5px 0 rgba(140,110,0,1);transition:transform .1s}
.big-btn:hover{transform:translateY(-2px)}.big-btn:active{transform:translateY(2px)}
.sec-btn{font-family:'Fredoka One',cursive;font-size:15px;padding:9px 22px;border-radius:10px;border:none;cursor:pointer;background:rgba(255,255,255,.08);color:var(--muted)}
.btn-row{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
.grade-grid{display:flex;gap:8px;flex-wrap:wrap;justify-content:center}
.gbtn{width:54px;height:54px;border-radius:12px;border:2px solid transparent;font-family:'Fredoka One',cursive;font-size:12px;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;box-shadow:0 3px 0 rgba(0,0,0,.4);transition:transform .1s}
.gbtn:active{transform:translateY(2px)}.gbtn.sel{border-color:#fff;transform:scale(1.08)}
.gbtn .gn{font-size:22px}.gbtn .gl{font-size:9px;opacity:.75}
.mode-cards{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;max-width:320px}
.mcard{flex:1;min-width:86px;border-radius:12px;border:2px solid transparent;padding:10px 6px;cursor:pointer;text-align:center;background:rgba(255,255,255,.05);transition:all .12s}
.mcard:active{transform:scale(.94)}.mcard.sel{border-color:#fff;background:rgba(255,255,255,.1)}
.mcard .mic{font-size:26px;margin-bottom:3px}
.mcard .mtt{font-family:'Fredoka One',cursive;font-size:13px;color:var(--text)}
.mcard .mds{font-size:9px;color:var(--muted);margin-top:2px;line-height:1.4}

/* EFFECTS */
.burst{position:fixed;pointer-events:none;z-index:60;animation:bst var(--d,.65s) ease-out forwards}
@keyframes bst{0%{transform:translate(0,0) rotate(0) scale(1);opacity:1}100%{transform:translate(var(--tx),var(--ty)) rotate(var(--r)) scale(.15);opacity:0}}
.spop{position:fixed;font-family:'Fredoka One',cursive;pointer-events:none;z-index:62;animation:spop .75s ease-out forwards;white-space:nowrap}
@keyframes spop{0%{opacity:1;transform:translateX(-50%) scale(1.2)}100%{opacity:0;transform:translateX(-50%) scale(.9) translateY(-55px)}}
.rb{position:fixed;left:0;right:0;height:9px;border-radius:4px;pointer-events:none;z-index:58;animation:rba .55s ease-out forwards;transform-origin:left}
@keyframes rba{0%{transform:scaleX(0);opacity:1}65%{transform:scaleX(1);opacity:1}100%{opacity:0}}
.rdrop{position:fixed;pointer-events:none;z-index:60;animation:rdrop linear forwards}
@keyframes rdrop{0%{opacity:1;transform:translateY(-20px)}100%{opacity:.3;transform:translateY(110vh)}}
.wflash{position:fixed;inset:0;background:rgba(255,60,60,.12);pointer-events:none;z-index:55;animation:wfl .3s ease-out forwards}
@keyframes wfl{0%{opacity:1}100%{opacity:0}}
</style>
</head>
<body>
<div id="root">
  <div id="hud">
    <div class="hpill">⭐ <span class="hval" id="sc">0</span></div>
    <div id="level-badge">Level 1</div>
    <div class="hpill" id="lives-pill">❤️ <span class="hval" id="lv">3</span></div>
    <div class="hpill" id="timer-pill">⏱ <span class="hval" id="tv">60</span></div>
  </div>

  <div id="fall-zone">
    <div id="timer-bar-wrap"><div id="timer-bar"></div></div>
  </div>

  <div id="word-display">
    <div id="word-top">
      <div style="display:flex;flex-direction:column;gap:2px"><div id="word-label">SPELL THIS WORD 👇</div><div id="next-label" style="font-size:11px;color:var(--yellow);font-weight:900;letter-spacing:.05em;display:none"></div></div>
      <button id="hint-btn" onclick="toggleHint()">HINT ✨</button>
    </div>
    <div id="word-slots"></div>
    <div id="clue-row">
      <div id="clue-emoji"></div>
      <div id="clue-text"></div>
    </div>
  </div>
</div>

<!-- MENU -->
<div class="ov" id="menu-ov">
  <div class="big-title">Spell It!</div>
  <div class="sub">Letters rain down 🌧️<br>Tap them <strong style="color:var(--yellow)">in order</strong> to spell the word!<br>Miss a letter? It comes back around!</div>
  <button class="big-btn" onclick="showSetup()">Play! 🚀</button>
</div>

<!-- SETUP -->
<div class="ov hidden" id="setup-ov">
  <div id="setup-inner"></div>
</div>

<!-- GAME OVER -->
<div class="ov hidden" id="over-ov">
  <div style="font-size:56px" id="ov-emoji">🌟</div>
  <div style="font-family:'Fredoka One',cursive;font-size:clamp(32px,8vw,54px);color:var(--yellow)" id="ov-title"></div>
  <div style="font-size:13px;color:var(--muted);text-align:center" id="ov-msg"></div>
  <div style="font-family:'Fredoka One',cursive;font-size:26px;color:var(--green)" id="ov-score"></div>
  <div class="btn-row">
    <button class="big-btn" onclick="restartGame()">Again! 🎮</button>
    <button class="sec-btn" onclick="showMenu()">Menu 🏠</button>
  </div>
</div>

<script>
const WORDS={
  1:[{w:'cat',e:'🐱',c:'Meows and purrs'},{w:'dog',e:'🐶',c:'Wags its tail'},{w:'sun',e:'☀️',c:'Lights up the day'},{w:'hat',e:'🎩',c:'Wear it on your head'},{w:'run',e:'🏃',c:'Move fast!'},{w:'bed',e:'🛏️',c:'Sleep here'},{w:'cup',e:'☕',c:'Drink from it'},{w:'map',e:'🗺️',c:'Shows where to go'},{w:'bug',e:'🐛',c:'Tiny crawly thing'},{w:'fox',e:'🦊',c:'Clever orange animal'},{w:'pig',e:'🐷',c:'Oink oink!'},{w:'bus',e:'🚌',c:'Big yellow vehicle'},{w:'fan',e:'🌀',c:'Keeps you cool'},{w:'hop',e:'🐰',c:'Jump on one foot'},{w:'mud',e:'🌧️',c:'Wet and messy ground'}],
  2:[{w:'cake',e:'🎂',c:'Sweet birthday treat'},{w:'frog',e:'🐸',c:'Jumps into the pond'},{w:'star',e:'⭐',c:'Shines at night'},{w:'fish',e:'🐟',c:'Swims in water'},{w:'rain',e:'🌧️',c:'Falls from clouds'},{w:'bird',e:'🐦',c:'Has wings'},{w:'moon',e:'🌙',c:'Glows at night'},{w:'snow',e:'❄️',c:'Cold and white'},{w:'drum',e:'🥁',c:'Bang it for music'},{w:'ship',e:'🚢',c:'Sails the ocean'},{w:'tree',e:'🌳',c:'Has leaves and branches'},{w:'jump',e:'🦘',c:'Leap into the air'},{w:'wolf',e:'🐺',c:'Howls at the moon'},{w:'duck',e:'🦆',c:'Quack quack!'},{w:'glow',e:'✨',c:'Soft shining light'}],
  3:[{w:'magic',e:'🪄',c:'Wizards use this'},{w:'brave',e:'🦁',c:'Not scared of anything'},{w:'tiger',e:'🐯',c:'Big stripy cat'},{w:'piano',e:'🎹',c:'Musical keys'},{w:'storm',e:'⛈️',c:'Thunder and lightning'},{w:'dream',e:'💭',c:'Happens when you sleep'},{w:'ghost',e:'👻',c:'Spooky and invisible'},{w:'shark',e:'🦈',c:'Big fish, sharp teeth'},{w:'flame',e:'🔥',c:'Hot and bright'},{w:'cloud',e:'☁️',c:'Fluffy sky thing'},{w:'stone',e:'🪨',c:'Hard rock'},{w:'globe',e:'🌍',c:'Round map of the world'},{w:'frost',e:'🧊',c:'Ice on a cold morning'},{w:'bloom',e:'🌸',c:'When a flower opens'},{w:'crane',e:'🏗️',c:'Tall construction machine'}],
  4:[{w:'planet',e:'🪐',c:'Orbits around a star'},{w:'bridge',e:'🌉',c:'Crosses over water'},{w:'castle',e:'🏰',c:'Where kings live'},{w:'rocket',e:'🚀',c:'Flies to space'},{w:'jungle',e:'🌴',c:'Dense tropical forest'},{w:'spider',e:'🕷️',c:'Eight legs, spins webs'},{w:'parrot',e:'🦜',c:'Colorful talking bird'},{w:'winter',e:'⛄',c:'Coldest season'},{w:'butter',e:'🧈',c:'Spread on toast'},{w:'pillow',e:'🛏️',c:'Soft for your head'},{w:'frozen',e:'🧊',c:'Turned to ice'},{w:'silver',e:'🥈',c:'Shiny grey metal'},{w:'garden',e:'🌻',c:'Where flowers grow'},{w:'magnet',e:'🧲',c:'Pulls metal to it'},{w:'mirror',e:'🪞',c:'You see yourself in it'}],
  5:[{w:'captain',e:'⚓',c:'Leader of a ship'},{w:'diamond',e:'💎',c:'Sparkling gem'},{w:'lantern',e:'🏮',c:'Light you carry'},{w:'penguin',e:'🐧',c:'Black and white bird'},{w:'crystal',e:'🔮',c:'Clear and sparkling'},{w:'thunder',e:'⚡',c:'Loud storm sound'},{w:'journey',e:'🗺️',c:'A long adventure'},{w:'chimney',e:'🏠',c:'Smoke goes out here'},{w:'dolphin',e:'🐬',c:'Smart ocean mammal'},{w:'popcorn',e:'🍿',c:'Movie snack'},{w:'rainbow',e:'🌈',c:'Colorful arc after rain'},{w:'blanket',e:'🛏️',c:'Keeps you warm'},{w:'balance',e:'⚖️',c:'Equal on both sides'},{w:'eclipse',e:'🌑',c:'Moon covers the sun'},{w:'whisper',e:'🤫',c:'Talking very quietly'}],
};
const GRADE_COLORS=['#ff6eb4','#ff9a3c','#ffe14d','#5dffb0','#5bc8ff'];
const GRADE_EMOJI=['🌱','🌿','🌳','🌲','🏔️'];
const GRADE_DESC=['Short and simple words','Easy 4-letter words','Medium length words','Longer words','Challenging words'];
const LC=['#ff6eb4','#ff9a3c','#ffe14d','#5dffb0','#5bc8ff','#c77dff','#ff6eb4','#ff9a3c','#ffe14d'];
const CONFETTI=['🌈','⭐','🎉','✨','💫','🎊','🍭','💎','🌟','🎀','🦄'];
const RAIN=['💧','😢','☔','🌧️'];

let score=0,lives=3,level=1,grade=1,gameMode='lives';
let timeLeft=60,timerInterval=null,hintOn=true;
let currentWord='',currentEntry=null,nextLetterIdx=0;
let blocks=[],spawnTimers=[],fallRafs=[];
let gameRunning=false,wordComplete=false,usedWords=[];
let audioCtx;

// Audio
function au(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx;}
function tone(f,d,type='sine',v=0.18){try{const c=au(),o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type=type;o.frequency.setValueAtTime(f,c.currentTime);g.gain.setValueAtTime(v,c.currentTime);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+d);o.start();o.stop(c.currentTime+d);}catch(e){}}
function playCorrect(){tone(660,.15,'sine',.22);setTimeout(()=>tone(880,.12,'sine',.18),100);}
function playWrong(){[320,240].forEach((f,i)=>setTimeout(()=>tone(f,.12,'sawtooth',.2),i*90));}
function playWin(){[523,659,784,1047,1319].forEach((f,i)=>setTimeout(()=>tone(f,.2,'sine',.24),i*80));}
function playNeutral(){tone(300,.06,'sine',.08);}
function playOver(){[400,320,250,180].forEach((f,i)=>setTimeout(()=>tone(f,.15,'sawtooth',.18),i*90));}

function lc(l){return LC[l.toUpperCase().charCodeAt(0)%LC.length];}

// Hint toggle
function toggleHint(){
  hintOn=!hintOn;
  document.getElementById('hint-btn').textContent=hintOn?'HINT ✨':'HINT OFF';
  refreshNext();
}

// Menu / Setup
function showMenu(){
  stopAll();
  document.getElementById('menu-ov').classList.remove('hidden');
  document.getElementById('setup-ov').classList.add('hidden');
  document.getElementById('over-ov').classList.add('hidden');
}

function showSetup(){
  document.getElementById('menu-ov').classList.add('hidden');
  document.getElementById('setup-ov').classList.remove('hidden');
  let selGrade=1;
  document.getElementById('setup-inner').innerHTML=`
    <div style="font-family:'Fredoka One',cursive;font-size:22px;color:var(--yellow);margin-bottom:6px">Pick your grade 📚</div>
    <div class="grade-grid" id="gg" style="margin-bottom:4px"></div>
    <div style="font-size:11px;color:var(--muted);text-align:center;margin-bottom:10px" id="gd"></div>
    <div style="font-size:11px;color:var(--muted);margin-bottom:5px">Pick a mode:</div>
    <div style="display:flex;gap:8px;width:100%;max-width:320px">
      <div class="mcard sel" id="mc-lives" onclick="pickMode(this,'lives')" style="padding:8px 4px"><div class="mic" style="font-size:20px">❤️</div><div class="mtt" style="font-size:12px">Lives</div><div class="mds">Wrong order loses a heart</div></div>
      <div class="mcard" id="mc-time" onclick="pickMode(this,'time')" style="padding:8px 4px"><div class="mic" style="font-size:20px">⏱️</div><div class="mtt" style="font-size:12px">Time</div><div class="mds">60s, spell as many as you can!</div></div>
      <div class="mcard" id="mc-zen" onclick="pickMode(this,'zen')" style="padding:8px 4px"><div class="mic" style="font-size:20px">🌈</div><div class="mtt" style="font-size:12px">Zen</div><div class="mds">No penalties, just have fun!</div></div>
    </div>
    <div class="btn-row" style="margin-top:12px">
      <button class="big-btn" onclick="startGame()" style="font-size:18px;padding:11px 32px">Let's Go! 🌈</button>
      <button class="sec-btn" onclick="showMenu()">Back</button>
    </div>`;
  const gg=document.getElementById('gg');
  function pg(g){
    selGrade=g;grade=g;
    gg.querySelectorAll('.gbtn').forEach(b=>b.classList.remove('sel'));
    gg.children[g-1].classList.add('sel');
    document.getElementById('gd').textContent=GRADE_DESC[g-1];
  }
  for(let g=1;g<=5;g++){
    const b=document.createElement('button');b.className='gbtn';
    b.style.background=GRADE_COLORS[g-1];b.style.color='#07031a';
    b.innerHTML=`<div class="gn">${GRADE_EMOJI[g-1]}</div><div class="gl">Grade ${g}</div>`;
    b.onclick=()=>pg(g);gg.appendChild(b);
  }
  pg(1);
}

function pickMode(el,m){
  gameMode=m;
  document.querySelectorAll('.mcard').forEach(c=>c.classList.remove('sel'));
  el.classList.add('sel');
}

function startGame(){
  usedWords=[];level=1;score=0;
  lives=gameMode==='zen'?99:3;
  timeLeft=60;
  document.getElementById('setup-ov').classList.add('hidden');
  loadNextWord();
}

function restartGame(){
  document.getElementById('over-ov').classList.add('hidden');
  startGame();
}

// Load word
function loadNextWord(){
  const pool=WORDS[grade].filter(e=>!usedWords.includes(e.w));
  const all=pool.length?pool:[...WORDS[grade]];
  if(pool.length===0)usedWords=[];
  currentEntry=all[Math.floor(Math.random()*all.length)];
  usedWords.push(currentEntry.w);
  currentWord=currentEntry.w.toUpperCase();
  startRound();
}

// Round
function startRound(){
  stopAll();
  gameRunning=true;wordComplete=false;nextLetterIdx=0;blocks=[];
  buildWordDisplay();
  updateHUD();
  document.getElementById('over-ov').classList.add('hidden');

  clearInterval(timerInterval);
  const tw=document.getElementById('timer-bar-wrap');
  const tp=document.getElementById('timer-pill');
  const lp=document.getElementById('lives-pill');
  if(gameMode==='time'){
    if(timeLeft<=0)timeLeft=60;
    tw.style.display='block';tp.style.display='flex';lp.style.display='none';
    document.getElementById('tv').textContent=timeLeft;
    document.getElementById('timer-bar').style.width='100%';
    timerInterval=setInterval(()=>{
      if(!gameRunning){clearInterval(timerInterval);return;}
      timeLeft=Math.max(0,timeLeft-1);
      document.getElementById('tv').textContent=timeLeft;
      document.getElementById('timer-bar').style.width=(timeLeft/60*100)+'%';
      document.getElementById('timer-bar').style.background=timeLeft<15?'linear-gradient(90deg,var(--pink),var(--orange))':'linear-gradient(90deg,var(--green),var(--yellow))';
      if(timeLeft<=0){clearInterval(timerInterval);endGame();}
    },1000);
  } else {
    tw.style.display='none';tp.style.display='none';lp.style.display='flex';
  }
  scheduleSpawns();
}

function stopAll(){
  gameRunning=false;
  spawnTimers.forEach(clearTimeout);spawnTimers=[];
  fallRafs.forEach(cancelAnimationFrame);fallRafs=[];
  blocks.forEach(b=>{try{b.el.remove();}catch(e){}});
  blocks=[];
}

// Word display
function buildWordDisplay(){
  const wrap=document.getElementById('word-slots');wrap.innerHTML='';
  document.getElementById('clue-emoji').textContent=currentEntry.e;
  document.getElementById('clue-text').textContent=currentEntry.c;
  for(let i=0;i<currentWord.length;i++){
    const s=document.createElement('div');
    s.className='wslot'+(i===0&&hintOn?' next-slot':'');
    s.id='ws'+i;
    const u=document.createElement('span');u.className='underscore';u.textContent='_';
    s.appendChild(u);
    wrap.appendChild(s);
  }
  // Show next letter hint
  setTimeout(refreshNext,50);
}

function fillSlot(idx,letter){
  const s=document.getElementById('ws'+idx);if(!s)return;
  s.className='wslot filled lit';
  s.style.color=lc(letter);
  s.style.borderColor=lc(letter);
  s.style.background=lc(letter)+'22';
  // add letter text node
  const t=document.createTextNode(letter);
  s.appendChild(t);
  // next slot pulse
  if(hintOn){
    const ns=document.getElementById('ws'+(idx+1));
    if(ns)ns.classList.add('next-slot');
  }
}

// Spawn
function maxFallers(){return Math.min(2+Math.floor(level/3),6);}
function fallSpeed(){return 0.45+level*0.1;}
function spawnInterval(){return Math.max(700,1800-level*80);}

function scheduleSpawns(){
  if(!gameRunning)return;
  // Spawn one letter, then schedule the next check
  spawnOneLetter();
  // If still under max, schedule another spawn soon
  const active=blocks.filter(b=>!b.done).length;
  if(active<maxFallers()){
    const t=setTimeout(()=>{if(gameRunning)scheduleSpawns();},600);
    spawnTimers.push(t);
  } else {
    const t=setTimeout(()=>{if(gameRunning)scheduleSpawns();},spawnInterval());
    spawnTimers.push(t);
  }
}

function spawnOneLetter(){
  if(!gameRunning||wordComplete)return;
  const fz=document.getElementById('fall-zone');
  if(!fz||fz.offsetHeight<10)return;
  const W=fz.offsetWidth,bw=54;
  const needed=currentWord[nextLetterIdx];
  // Only spawn the needed letter if none already falling
  const neededAlreadyFalling=blocks.filter(b=>!b.done&&b.letter===needed).length>0;
  const useNeeded=!neededAlreadyFalling&&Math.random()<0.55;
  const letter=useNeeded?needed:randomDecoy(needed);
  const isNext=letter===needed;

  // Spread blocks evenly — pick x position that doesn't overlap any active block
  const activeBlocks=blocks.filter(b=>!b.done);
  let x=-1;
  for(let attempt=0;attempt<20;attempt++){
    const cx=Math.random()*(W-bw-8)+4;
    const overlaps=activeBlocks.some(b=>Math.abs(b.x-cx)<bw+10);
    if(!overlaps){x=cx;break;}
  }
  if(x===-1)return; // no room, skip
  const el=document.createElement('div');
  el.className='lb'+(isNext&&hintOn?' is-next':'');
  el.textContent=letter;
  const col=lc(letter);
  el.style.cssText=`left:${x}px;top:-58px;background:linear-gradient(135deg,${col},${col}99);color:#07031a;box-shadow:0 4px 14px ${col}55,inset 0 1px 0 rgba(255,255,255,.25)`;
  fz.appendChild(el);

  const bd={el,letter,isNext,x,y:-58,vy:fallSpeed(),done:false,id:Date.now()+Math.random()};
  blocks.push(bd);

  el.addEventListener('click',e=>{e.stopPropagation();tapBlock(bd);});
  el.addEventListener('touchend',e=>{e.preventDefault();e.stopPropagation();tapBlock(bd);});

  function fall(){
    if(bd.done||!gameRunning)return;
    bd.y+=bd.vy;
    const maxY=fz.offsetHeight-bw-2;
    if(bd.y>=maxY){
      bd.done=true;el.remove();
      blocks=blocks.filter(b=>b.id!==bd.id);
      refreshNext();
      return;
    }
    el.style.top=bd.y+'px';
    const r=requestAnimationFrame(fall);
    fallRafs.push(r);
  }
  requestAnimationFrame(fall);
}

function randomDecoy(avoid){
  // Pick a letter that is NOT the current needed letter
  // Occasionally use other letters from the word to keep it interesting
  const wordLetters=currentWord.split('').filter(l=>l!==avoid);
  let letter;
  let attempts=0;
  do {
    if(wordLetters.length>0&&Math.random()<0.25){
      letter=wordLetters[Math.floor(Math.random()*wordLetters.length)];
    } else {
      // Pick a common letter that's not the needed one
      const common='ABCDEFGHIJKLMNOPRSTW';
      letter=common[Math.floor(Math.random()*common.length)];
    }
    attempts++;
  } while(letter===avoid&&attempts<10);
  return letter;
}

function refreshNext(){
  const needed=currentWord[nextLetterIdx];
  blocks.forEach(b=>{
    if(b.done)return;
    const isNext=b.letter===needed;
    b.isNext=isNext;
    if(isNext&&hintOn)b.el.classList.add('is-next');
    else b.el.classList.remove('is-next');
  });
  // Update next letter label
  const nl=document.getElementById('next-label');
  if(nl){
    if(hintOn&&needed){
      nl.style.display='block';
      nl.textContent='👉 Find the letter: '+needed;
    } else {
      nl.style.display='none';
    }
  }
}

// Tap
function tapBlock(bd){
  if(bd.done||!gameRunning||wordComplete)return;
  bd.done=true;
  const needed=currentWord[nextLetterIdx];

  if(bd.letter===needed){
    playCorrect();
    bd.el.classList.add('correct-tap');
    fillSlot(nextLetterIdx,bd.letter);
    spawnBurst(bd,true);
    scorePop(bd.x+27,bd.y,'+'+((nextLetterIdx+1)*10),'#5dffb0');
    score+=(nextLetterIdx+1)*10;
    nextLetterIdx++;
    setTimeout(()=>{try{bd.el.remove();}catch(e){}},380);
    blocks=blocks.filter(b=>b.id!==bd.id);
    refreshNext();
    updateHUD();
    if(nextLetterIdx>=currentWord.length){wordComplete=true;setTimeout(onWordComplete,300);}
  } else if(currentWord.includes(bd.letter)){
    // Right letter wrong order — penalty in lives mode
    playWrong();
    bd.el.classList.add('wrong-tap');
    spawnBurst(bd,false);
    if(gameMode!=='zen'){
      lives--;updateHUD();
      spawnFlash();
      if(lives<=0){setTimeout(endGame,500);return;}
    }
    setTimeout(()=>{try{bd.el.remove();}catch(e){}},380);
    blocks=blocks.filter(b=>b.id!==bd.id);
  } else {
    // Not in word — neutral
    playNeutral();
    bd.el.classList.add('neutral-tap');
    setTimeout(()=>{try{bd.el.remove();}catch(e){}},280);
    blocks=blocks.filter(b=>b.id!==bd.id);
  }
}

function onWordComplete(){
  playWin();
  const bonus=lives*20+level*10;
  score+=bonus;level++;
  updateHUD();
  rainbowBurst();confettiBurst();
  stopAll();
  setTimeout(()=>{if(gameMode==='time'||gameMode==='zen'||lives>0)loadNextWord();else endGame();},1500);
}

function endGame(){
  stopAll();clearInterval(timerInterval);playOver();
  document.getElementById('ov-emoji').textContent=score>300?'🌟':score>100?'🎉':'😢';
  document.getElementById('ov-title').textContent=score>300?'Amazing!':score>100?'Great job!':'Nice try!';
  document.getElementById('ov-msg').textContent=`You reached level ${level}!`;
  document.getElementById('ov-score').textContent=`Score: ${score} ⭐`;
  document.getElementById('over-ov').classList.remove('hidden');
}

function updateHUD(){
  document.getElementById('sc').textContent=score;
  document.getElementById('lv').textContent=gameMode==='zen'?'🌈':'❤️'.repeat(Math.max(0,Math.min(lives,3)));
  document.getElementById('level-badge').textContent='Level '+level;
  document.getElementById('level-badge').style.background=GRADE_COLORS[Math.min(level-1,4)];
}

// Effects
function spawnBurst(bd,correct){
  const fz=document.getElementById('fall-zone');
  const r=fz.getBoundingClientRect();
  const cx=r.left+bd.x+27,cy=r.top+bd.y+27;
  const emojis=correct?['✨','⭐','💫','🌟']:['💥','❌','🌧️'];
  for(let i=0;i<8;i++){
    const el=document.createElement('div');el.className='burst';
    el.textContent=emojis[Math.floor(Math.random()*emojis.length)];
    const ang=Math.random()*Math.PI*2,d=30+Math.random()*60;
    el.style.cssText=`left:${cx}px;top:${cy}px;--tx:${Math.cos(ang)*d}px;--ty:${Math.sin(ang)*d}px;--r:${Math.random()*360}deg;--d:${.35+Math.random()*.25}s;font-size:${14+Math.random()*10}px`;
    document.body.appendChild(el);setTimeout(()=>el.remove(),700);
  }
}
function scorePop(x,y,txt,col){
  const fz=document.getElementById('fall-zone');
  const r=fz.getBoundingClientRect();
  const el=document.createElement('div');el.className='spop';
  el.style.cssText=`left:${r.left+x}px;top:${r.top+y-10}px;color:${col};font-size:18px`;
  el.textContent=txt;document.body.appendChild(el);setTimeout(()=>el.remove(),850);
}
function spawnFlash(){
  const el=document.createElement('div');el.className='wflash';
  document.body.appendChild(el);setTimeout(()=>el.remove(),400);
}
function rainbowBurst(){
  const cols=['#ff6eb4','#ff9a3c','#ffe14d','#5dffb0','#5bc8ff','#c77dff'];
  cols.forEach((c,i)=>{
    const b=document.createElement('div');b.className='rb';
    b.style.cssText=`background:${c};top:${window.innerHeight*.45+i*10}px;animation-delay:${i*.05}s`;
    document.body.appendChild(b);setTimeout(()=>b.remove(),800);
  });
}
function confettiBurst(){
  for(let i=0;i<22;i++){setTimeout(()=>{
    const el=document.createElement('div');el.className='burst';
    el.textContent=CONFETTI[Math.floor(Math.random()*CONFETTI.length)];
    const ang=Math.random()*Math.PI*2,d=80+Math.random()*150;
    el.style.cssText=`left:${window.innerWidth/2}px;top:${window.innerHeight*.45}px;--tx:${Math.cos(ang)*d}px;--ty:${Math.sin(ang)*d}px;--r:${Math.random()*720}deg;--d:${.55+Math.random()*.45}s;font-size:${16+Math.random()*16}px`;
    document.body.appendChild(el);setTimeout(()=>el.remove(),1100);
  },i*45);}
}
</script>
