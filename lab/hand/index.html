  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

T\n    <\u002Fbutton>\n  <\u002Fdiv>\n\n  <div style=\"position:relative;z-index:1;max-width:1240px;margin:0 auto;padding:clamp(16px,3vw,26px) clamp(16px,4vw,40px) 0\">\n\n    <!-- ============ HAND TAB ============ -->\n    <div style=\"display:{{ tabHandDisp }}\">\n\n    <!-- LAB -->\n    <section data-screen-label=\"3D Hand Lab\" style=\"padding:0\">\n      <div style=\"height:2px\"><\u002Fdiv>\n\n      <div style=\"display:grid;grid-template-columns:1fr;gap:16px;align-items:start\" data-lab-grid=\"\">\n\n        <!-- CANVAS -->\n        <div data-canvas=\"{{ canvasMode }}\" style=\"{{ canvasWrap }}\">\n\n          <div ref=\"{{ mount }}\" style=\"position:absolute;inset:0;z-index:1;cursor:grab\"><\u002Fdiv>\n\n          <sc-if value=\"{{ loading }}\" hint-placeholder-val=\"{{ true }}\">\n            <div style=\"position:absolute;inset:0;z-index:2;display:grid;place-items:center;pointer-events:none\">\n              <div style=\"text-align:center\">\n                <div style=\"width:34px;height:34px;border:3px solid var(--line2);border-top-color:var(--accent,#FFB020);border-radius:50%;margin:0 auto 14px;animation:spin .9s linear infinite\"><\u002Fdiv>\n                <div style=\"font-family:'Hanken Grotesk',system-ui,sans-serif;font-size:11px;letter-spacing:.14em;color:var(--faint)\">ASSEMBLING MODEL…<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n\n          <div data-ov=\"status\" style=\"position:absolute;top:14px;left:14px;z-index:2;display:flex;align-items:center;gap:8px;background:rgba(11,13,16,.6);backdrop-filter:blur(8px);border:1px solid var(--line);border-radius:999px;padding:7px 13px;pointer-events:none\">\n            <div style=\"width:6px;height:6px;border-radius:50%;background:#39D7C8\"><\u002Fdiv>\n            <span style=\"font-family:'Hanken Grotesk',system-ui,sans-serif;font-size:11px;letter-spacing:.05em;color:var(--dim);text-transform:capitalize\">{{ modeLabel }} · {{ activeGestureLabel }}<\u002Fspan>\n          <\u002Fdiv>\n\n          <sc-if value=\"{{ selected }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"position:absolute;left:14px;bottom:14px;right:14px;max-width:400px;z-index:3;background:rgba(15,18,23,.92);backdrop-filter:blur(14px);border:1px solid var(--line2);border-radius:14px;padding:16px 16px 15px;box-shadow:0 20px 50px -20px #000\">\n              <div style=\"display:flex;align-items:flex-start;justify-content:space-between;gap:12px\">\n                <div style=\"display:flex;align-items:center;gap:9px\">\n                  <div style=\"width:11px;height:11px;border-radius:3px;background:{{ selected.layerColor }}\"><\u002Fdiv>\n                  <div style=\"font-weight:700;font-size:16px;letter-spacing:-.01em\">{{ selected.name }}<\u002Fdiv>\n                <\u002Fdiv>\n                <button onclick=\"{{ selected.onClose }}\" style=\"flex:none;width:26px;height:26px;border-radius:7px;border:1px solid var(--line2);background:var(--bg2);color:var(--dim);cursor:pointer;font-size:14px;line-height:1\">✕<\u002Fbutton>\n              <\u002Fdiv>\n              <div style=\"font-family:'Hanken Grotesk',system-ui,sans-serif;font-size:10.5px;letter-spacing:.1em;color:var(--faint);margin:9px 0 8px;text-transform:uppercase\">{{ selected.layerLabel }} layer<\u002Fdiv>\n              <p style=\"margin:0;font-size:13.5px;line-height:1.55;color:var(--dim)\">{{ selected.desc }}<\u002Fp>\n              <sc-if value=\"{{ selected.hasRobo }}\" hint-placeholder-val=\"{{ false }}\">\n                <div style=\"margin-top:11px;display:flex;gap:9px;align-items:flex-start;background:rgba(255,176,32,.08);border:1px solid rgba(255,176,32,.28);border-radius:9px;padding:9px 11px\">\n                  <span style=\"font-family:'Hanken Grotesk',system-ui,sans-serif;font-size:9px;letter-spacing:.08em;color:var(--accent,#FFB020);margin-top:1px;flex:none;font-weight:700;line-height:1.3\">IN&nbsp;OUR<br>ROBOT<\u002Fspan>\n                  <span style=\"font-size:12.5px;line-height:1.5;color:var(--dim)\">{{ selected.robo }}<\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fsc-if>\n              <div style=\"display:flex;flex-wrap:wrap;gap:6px;margin-top:12px\">\n                <sc-for list=\"{{ selected.teaches }}\" as=\"c\" hint-placeholder-count=\"2\">\n                  <span style=\"font-family:'Hanken Grotesk',system-ui,sans-serif;font-size:10px;letter-spacing:.06em;padding:4px 8px;border-radius:6px;background:{{ c.bg }};color:{{ c.color }};border:1px solid {{ c.bd }}\">{{ c.label }}<\u002Fspan>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n              <button onclick=\"{{ selected.onDig }}\" style=\"margin-top:14px;width:100%;display:inline-flex;align-items:center;justify-content:center;gap:8px;font-family:'Hanken Grotesk',system-ui,sans-serif;font-size:11px;letter-spacing:.06em;padding:11px;border-radius:9px;cursor:pointer;background:var(--accent,#FFB020);border:none;color:#0B0D10;font-weight:700;transition:.15s\" style-hover=\"filter:brightness(1.08)\">\n                <svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.3\" stroke-linecap=\"round\"><circle cx=\"11\" cy=\"11\" r=\"7\"><\u002Fcircle><line x1=\"21\" y1=\"21\" x2=\"16.5\" y2=\"16.5\"><\u002Fline><line x1=\"11\" y1=\"8\" x2=\"11\" y2=\"14\"><\u002Fline><line x1=\"8\" y1=\"11\" x2=\"14\" y2=\"11\"><\u002Fline><\u002Fsvg>\n                GO DEEP ON THIS\n              <\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n\n          <!-- COMPARE (top-center) -->\n          <div data-ov=\"compare\" style=\"position:absolute;top:14px;left:50%;transform:translateX(-50%);z-index:5;display:flex;gap:4px;background:rgba(14,17,21,.82);backdrop-filter:blur(10px);border:1px solid var(--line2);border-radius:11px;padding:4px;box-shadow:0 8px 24px -8px rgba(0,0,0,.6)\">\n            <button onclick=\"{{ onModeHuman }}\" style=\"font-family:'Hanken Grotesk',system-ui,sans-serif;font-size:10.5px;letter-spacing:.05em;font-weight:700;padding:8px 15px;border-radius:8px;border:none;cursor:pointer;background:{{ humanBg }};color:{{ humanFg }};transition:.15s\">HUMAN<\u002Fbutton>\n            <button onclick=\"{{ onModeRobot }}\" style=\"font-family:'Hanken Grotesk',system-ui,sans-serif;font-size:10.5px;letter-spacing:.05em;font-weight:700;padding:8px 15px;border-radius:8px;border:none;cursor:pointer;background:{{ robotBg }};color:{{ robotFg }};transition:.15s\">ROBOT<\u002Fbutton>\n          <\u002Fdiv>\n\n          <!-- TOOLS (top-left) -->\n          <div data-ov=\"tools\" style=\"position:absolute;top:58px;left:14px;z-index:5;display:flex;flex-direction:column;background:rgba(14,17,21,.82);backdrop-filter:blur(10px);border:1px solid var(--line2);border-radius:13px;overflow:hidden;box-shadow:0 8px 24px -8px rgba(0,0,0,.6)\">\n            <button onclick=\"{{ onTogglePose }}\" title=\"Poses\" style=\"width:60px;padding:10px 4px 8px;border:none;background:{{ poseBtnBg }};color:{{ poseBtnFg }};cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px;transition:.15s\">\n              <svg width=\"19\" height=\"19\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.9\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M8 11V5.6a1.4 1.4 0 0 1 2.8 0V11\"><\u002Fpath><path d=\"M10.8 11V4.4a1.4 1.4 0 0 1 2.8 0V11\"><\u002Fpath><path d=\"M13.6 11V5.6a1.4 1.4 0 0 1 2.8 0V12\"><\u002Fpath><path d=\"M16.4 12v-1a1.4 1.4 0 0 1 2.8 0v3.8a6 6 0 0 1-6 6h-1.4a6.6 6.6 0 0 1-6.5-5.5l-.6-3a1.4 1.4 0 0 1 2.6-.9L8.4 13\"><\u002Fpath><\u002Fsvg>\n              <span style=\"font-family:'Hanken Grotesk',system-ui,sans-serif;font-size:7.5px;letter-spacing:.07em\">POSE<\u002Fspan>\n            <\u002Fbutton>\n            <button onclick=\"{{ onToggleLayers }}\" title=\"Layers\" style=\"width:60px;padding:10px 4px 8px;border:none;border-top:1px solid var(--line);background:{{ layersBtnBg }};color:{{ layersBtnFg }};cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px;transition:.15s\">\n              <svg width=\"19\" height=\"19\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.9\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><polygon points=\"12 2 2 7 12 12 22 7 12 2\"><\u002Fpolygon><polyline points=\"2 17 12 22 22 17\"><\u002Fpolyline><polyline points=\"2 12 12 17 22 12\"><\u002Fpolyline><\u002Fsvg>\n              <span style=\"font-family:'Hanken Grotesk',system-ui,sans-serif;font-size:7.5px;letter-spacing:.07em\">LAYERS<\u002Fspan>\n            <\u002Fbutton>\n            <button onclick=\"{{ onToggleSplit }}\" title=\"{{ splitTitle }}\" style=\"width:60px;padding:10px 4px 8px;border:none;border-top:1px solid var(--line);background:{{ splitBtnBg }};color:{{ splitBtnFg }};cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px;transition:.15s\">\n              <svg width=\"19\" height=\"19\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.9\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><polyline points=\"8 7 12 3 16 7\"><\u002Fpolyline><polyline points=\"8 17 12 21 16 17\"><\u002Fpolyline><line x1=\"12\" y1=\"3.5\" x2=\"12\" y2=\"9\"><\u002Fline><line x1=\"12\" y1=\"15\" x2=\"12\" y2=\"20.5\"><\u002Fline><\u002Fsvg>\n              <span style=\"font-family:'Hanken Grotesk',system-ui,sans-serif;font-size:7.5px;letter-spacing:.07em\">SPLIT<\u002Fspan>\n            <\u002Fbutton>\n          <\u002Fdiv>\n\n          <!-- POSE PANEL -->\n          <sc-if value=\"{{ poseOpen }}\" hint-placeholder-val=\"{{ false }}\">\n            <div data-ov=\"panel\" style=\"position:absolute;top:58px;left:84px;z-index:6;width:212px;max-height:calc(100% - 150px);overflow:auto;background:rgba(15,18,23,.95);backdrop-filter:blur(14px);border:1px solid var(--line2);border-radius:14px;padding:13px;box-shadow:0 20px 50px -20px #000\">\n              <div style=\"font-family:'Hanken Grotesk',system-ui,sans-serif;font-size:10px;letter-spacing:.1em;color:var(--faint);margin-bottom:10px\">POSE THE HAND<\u002Fdiv>\n              <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:6px\">\n                <sc-for list=\"{{ gestures }}\" as=\"g\" hint-placeholder-count=\"6\">\n                  <button onclick=\"{{ g.onClick }}\" style=\"font-family:'Hanken Grotesk',system-ui,sans-serif;font-size:11px;letter-spacing:.03em;padding:10px 6px;border-radius:9px;cursor:pointer;transition:.15s;background:{{ g.bg }};border:1px solid {{ g.bc }};color:{{ g.fg }}\">{{ g.label }}<\u002Fbutton>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n              <div style=\"margin-top:13px;display:flex;flex-direction:column;gap:11px\">\n                <div>\n                  <div style=\"display:flex;justify-content:space-between;font-family:'Hanken Grotesk',system-ui,sans-serif;font-size:9px;letter-spacing:.06em;color:var(--faint);margin-bottom:5px\"><span>SPREAD<\u002Fspan><span style=\"color:var(--accent,#FFB020)\">{{ spreadPct }}%<\u002Fspan><\u002Fdiv>\n                  <input type=\"range\" min=\"0\" max=\"100\" value=\"{{ spreadPct }}\" oninput=\"{{ onSpread }}\" style=\"width:100%\">\n                <\u002Fdiv>\n                <div>\n                  <div style=\"display:flex;justify-content:space-between;font-family:'Hanken Grotesk',system-ui,sans-serif;font-size:9px;letter-spacing:.06em;color:var(--faint);margin-bottom:5px\"><span>THUMB SWEEP<\u002Fspan><span style=\"color:var(--accent,#FFB020)\">{{ oppPct }}%<\u002Fspan><\u002Fdiv>\n                  <input type=\"range\" min=\"0\" max=\"100\" value=\"{{ oppPct }}\" oninput=\"{{ onOpp }}\" style=\"width:100%\">\n                <\u002Fdiv>\n                <div>\n                  <div style=\"font-family:'Hanken Grotesk',system-ui,sans-serif;font-size:9px;letter-spacing:.06em;color:var(--faint);margin-bottom:5px\">WRIST BEND<\u002Fdiv>\n                  <input type=\"range\" min=\"0\" max=\"100\" value=\"{{ wristFlexPct }}\" oninput=\"{{ onWristFlex }}\" style=\"width:100%\">\n                <\u002Fdiv>\n                <div>\n                  <div style=\"font-family:'Hanken Grotesk',system-ui,sans-serif;font-size:9px;letter-spacing:.06em;color:var(--faint);margin-bottom:5px\">WRIST TILT<\u002Fdiv>\n                  <input type=\"range\" min=\"0\" max=\"100\" value=\"{{ wristDevPct }}\" oninput=\"{{ onWristDev }}\" style=\"width:100%\">\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n\n          <!-- LAYERS PANEL -->\n          <sc-if value=\"{{ layersOpen }}\" hint-placeholder-val=\"{{ false }}\">\n            <div data-ov=\"panel\" style=\"position:absolute;top:58px;left:84px;z-index:6;width:226px;max-height:calc(100% - 150px);overflow:auto;background:rgba(15,18,23,.95);backdrop-filter:blur(14px);border:1px solid var(--line2);border-radius:14px;padding:13px;box-shadow:0 20px 50px -20px #000\">\n              <div style=\"font-family:'Hanken Grotesk',system-ui,sans-serif;font-size:10px;letter-spacing:.1em;color:var(--faint);margin-bottom:7px\">DETAIL LEVEL<\u002Fdiv>\n              <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:4px;background:var(--bg0);border:1px solid var(--line);border-radius:9px;padding:3px;margin-bottom:12px\">\n                <button onclick=\"{{ onDetailSimple }}\" style=\"font-family:'Hanken Grotesk',system-ui,sans-serif;font-size:10px;letter-spacing:.04em;font-weight:700;padding:7px;border-radius:6px;border:none;cursor:pointer;background:{{ dsBg }};color:{{ dsFg }}\">SIMPLE<\u002Fbutton>\n                <button onclick=\"{{ onDetailFull }}\" style=\"font-family:'Hanken Grotesk',system-ui,sans-serif;font-size:10px;letter-spacing:.04em;font-weight:700;padding:7px;border-radius:6px;border:none;cursor:pointer;background:{{ dfBg }};color:{{ dfFg }}\">FULL<\u002Fbutton>\n              <\u002Fdiv>\n              <div style=\"font-size:10.5px;color:var(--faint);line-height:1.4;margin-bottom:12px\">Simple shows the 5 main systems. Full adds ligaments, nerves, vessels &amp; the fine detail.<\u002Fdiv>\n              <div style=\"font-family:'Hanken Grotesk',system-ui,sans-serif;font-size:10px;letter-spacing:.1em;color:var(--faint);margin-bottom:6px\">SHOW / HIDE LAYERS<\u002Fdiv>\n              <div style=\"display:flex;flex-direction:column;gap:2px\">\n                <sc-for list=\"{{ layers }}\" as=\"l\" hint-placeholder-count=\"6\">\n                  <button onclick=\"{{ l.onToggle }}\" style=\"display:flex;align-items:center;gap:10px;padding:8px 6px;border-radius:8px;border:none;background:transparent;cursor:pointer;text-align:left;width:100%;opacity:{{ l.rowOpacity }};transition:.15s\">\n                    <span style=\"flex:none;width:18px;height:18px;border-radius:5px;border:1.5px solid {{ l.color }};background:{{ l.swFill }};display:grid;place-items:center;color:#0B0D10;font-size:12px;font-weight:800;line-height:1;transition:.15s\">\n                      <sc-if value=\"{{ l.on }}\" hint-placeholder-val=\"{{ true }}\">✓<\u002Fsc-if>\n                    <\u002Fspan>\n                    <span style=\"flex:1;min-width:0\">\n                      <span style=\"display:block;font-size:12.5px;font-weight:500;color:var(--text)\">{{ l.label }}<\u002Fspan>\n                      <span style=\"display:block;font-size:10.5px;color:var(--faint)\">{{ l.desc }}<\u002Fspan>\n                    <\u002Fspan>\n                  <\u002Fbutton>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n\n          <!-- CAMERA CLUSTER (top-right) -->\n          <div style=\"position:absolute;top:14px;right:14px;z-index:5;display:flex;flex-direction:column;gap:10px\">\n            <div style=\"background:rgba(14,17,21,.82);backdrop-filter:blur(10px);border:1px solid var(--line2);border-radius:13px;overflow:hidden;box-shadow:0 8px 24px -8px rgba(0,0,0,.6)\">\n              <button onclick=\"{{ onToggleFull }}\" title=\"{{ fullTitle }}\" style=\"width:44px;height:44px;border:none;background:transparent;color:var(--text);cursor:pointer;display:grid;place-items:center;transition:.15s\" style-hover=\"background:rgba(255,255,255,.08)\">\n                <sc-if value=\"{{ fullscreen }}\" hint-placeholder-val=\"{{ false }}\"><svg width=\"17\" height=\"17\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M9 4v5H4M15 4v5h5M9 20v-5H4M15 20v-5h5\"><\u002Fpath><\u002Fsvg><\u002Fsc-if>\n                <sc-if value=\"{{ notFull }}\" hint-placeholder-val=\"{{ true }}\"><svg width=\"17\" height=\"17\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M4 9V4h5M20 9V4h-5M4 15v5h5M20 15v5h-5\"><\u002Fpath><\u002Fsvg><\u002Fsc-if>\n              <\u002Fbutton>\n            <\u002Fdiv>\n            <div data-ov=\"zoom\" style=\"background:rgba(14,17,21,.82);backdrop-filter:blur(10px);border:1px solid var(--line2);border-radius:13px;overflow:hidden;box-shadow:0 8px 24px -8px rgba(0,0,0,.6);display:flex;flex-direction:column\">\n              <button onclick=\"{{ onZoomIn }}\" title=\"Zoom in\" style=\"width:44px;height:44px;border:none;background:transparent;color:var(--text);cursor:pointer;font-size:22px;line-height:1;font-weight:300\" style-hover=\"background:rgba(255,255,255,.08)\">+<\u002Fbutton>\n              <button onclick=\"{{ onZoomOut }}\" title=\"Zoom out\" style=\"width:44px;height:44px;border:none;border-top:1px solid var(--line);background:transparent;color:var(--text);cursor:pointer;font-size:25px;line-height:1;font-weight:300\" style-hover=\"background:rgba(255,255,255,.08)\">−<\u002Fbutton>\n              <button onclick=\"{{ onPanUp }}\" title=\"Slide view up (shift+scroll · two-finger drag)\" style=\"width:44px;height:44px;border:none;border-top:1px solid var(--line);background:transparent;color:var(--text);cursor:pointer;display:grid;place-items:center\" style-hover=\"background:rgba(255,255,255,.08)\"><svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><line x1=\"12\" y1=\"19\" x2=\"12\" y2=\"5\"><\u002Fline><path d=\"M5 12l7-7 7 7\"><\u002Fpath><\u002Fsvg><\u002Fbutton>\n              <button onclick=\"{{ onPanDown }}\" title=\"Slide view down (shift+scroll · two-finger drag)\" style=\"width:44px;height:44px;border:none;border-top:1px solid var(--line);background:transparent;color:var(--text);cursor:pointer;display:grid;place-items:center\" style-hover=\"background:rgba(255,255,255,.08)\"><svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><line x1=\"12\" y1=\"5\" x2=\"12\" y2=\"19\"><\u002Fline><path d=\"M5 12l7 7 7-7\"><\u002Fpath><\u002Fsvg><\u002Fbutton>\n            <\u002Fdiv>\n            <div style=\"background:rgba(14,17,21,.82);backdrop-filter:blur(10px);border:1px solid var(--line2);border-radius:13px;overflow:hidden;box-shadow:0 8px 24px -8px rgba(0,0,0,.6);display:flex;flex-direction:column\">\n              <button onclick=\"{{ onAutoRotate }}\" title=\"{{ spinTitle }}\" style=\"width:44px;height:44px;border:none;background:transparent;color:var(--text);cursor:pointer;display:grid;place-items:center;transition:.15s\" style-hover=\"background:rgba(255,255,255,.08)\">\n                <sc-if value=\"{{ moving }}\" hint-placeholder-val=\"{{ true }}\"><svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"currentColor\"><rect x=\"6\" y=\"5\" width=\"4\" height=\"14\" rx=\"1\"><\u002Frect><rect x=\"14\" y=\"5\" width=\"4\" height=\"14\" rx=\"1\"><\u002Frect><\u002Fsvg><\u002Fsc-if>\n                <sc-if value=\"{{ notMoving }}\" hint-placeholder-val=\"{{ false }}\"><svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"currentColor\"><path d=\"M7 5.2v13.6a1 1 0 0 0 1.5.87l11-6.8a1 1 0 0 0 0-1.74l-11-6.8A1 1 0 0 0 7 5.2Z\"><\u002Fpath><\u002Fsvg><\u002Fsc-if>\n              <\u002Fbutton>\n              <button onclick=\"{{ onResetView }}\" title=\"Reset view\" style=\"width:44px;height:44px;border:none;border-top:1px solid var(--line);background:transparent;color:var(--dim);cursor:pointer;font-size:16px\" style-hover=\"background:rgba(255,255,255,.08);color:var(--text)\">↺<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <\u002Fdiv>\n      <\u002Fsection><\u002Fdiv>\n    \n    <\u002Fdiv>\n\n    <!-- ============ BUILD TAB ============ -->\n    <div style=\"display:{{ tabBuildDisp }}\">\n    <section data-screen-label=\"How we build it\" style=\"padding:clamp(18px,3vw,30px) 0 10px;max-width:900px;margin:0 auto\">\n\n      <div style=\"max-width:66ch;margin-bottom:22px\">\n        <div style=\"font-family:'Hanken Grotesk',system-ui,sans-serif;font-size:10.5px;letter-spacing:.14em;color:var(--faint);margin-bottom:8px\">HOW WE BUILD IT · v0 PLAN<\u002Fdiv>\n        <h2 style=\"margin:0;font-size:clamp(22px,3.6vw,34px);font-weight:900;letter-spacing:-.02em;line-height:1.05\">Our own hand, designed to actually get built.<\u002Fh2>\n        <p style=\"margin:10px 0 0;font-size:14.5px;color:var(--dim);line-height:1.6\">This is our design, worked out together and written to be built for real. We start with the hand only — one self-contained, cable-driven module that can bolt onto any robot later. Nail this, and the same recipe climbs the arm: forearm, elbow, shoulder.<\u002Fp>\n      <\u002Fdiv>\n\n      <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:10px;margin-bottom:16px\">\n        <div style=\"background:var(--bg1);border:1px solid var(--line);border-radius:12px;padding:14px\"><div style=\"font-family:'Hanken Grotesk',system-ui,sans-serif;font-size:10px;letter-spacing:.1em;color:var(--accent,#FFB020);margin-bottom:6px\">01 · HAND-FIRST<\u002Fdiv><div style=\"font-size:13px;color:var(--dim);line-height:1.5\">Get one great hand working end to end before anything else.<\u002Fdiv><\u002Fdiv>\n        <div style=\"background:var(--bg1);border:1px solid var(--line);border-radius:12px;padding:14px\"><div style=\"font-family:'Hanken Grotesk',system-ui,sans-serif;font-size:10px;letter-spacing:.1em;color:var(--accent,#FFB020);margin-bottom:6px\">02 · REUSABLE<\u002Fdiv><div style=\"font-size:13px;color:var(--dim);line-height:1.5\">Power and control live in the forearm, so the module drops onto any robot.<\u002Fdiv><\u002Fdiv>\n        <div style=\"background:var(--bg1);border:1px solid var(--line);border-radius:12px;padding:14px\"><div style=\"font-family:'Hanken Grotesk',system-ui,sans-serif;font-size:10px;letter-spacing:.1em;color:var(--accent,#FFB020);margin-bottom:6px\">03 · THEN THE ARM<\u002Fdiv><div style=\"font-size:13px;color:var(--dim);line-height:1.5\">The same loop repeats up the body when we’re ready — no rewrites.<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- SYSTEM BLOCK DIAGRAM -->\n      <div style=\"background:var(--bg1);border:1px solid var(--line);border-radius:14px;padding:clamp(14px,2.5vw,20px);margin-bottom:16px\">\n        <div style=\"font-family:'Hanken Grotesk',system-ui,sans-serif;font-size:10.5px;letter-spacing:.1em;color:var(--faint);margin-bottom:14px\">SYSTEM AT A GLANCE<\u002Fdiv>\n        <div style=\"display:flex;align-items:stretch;gap:7px;flex-wrap:wrap\">\n          <div style=\"flex:1;min-width:92px;background:var(--bg2);border:1px solid var(--line2);border-radius:10px;padding:11px 9px;text-align:center\"><div style=\"font-family:'Hanken Grotesk',system-ui,sans-serif;font-size:8.5px;letter-spacing:.06em;color:var(--faint);margin-bottom:3px\">CONTROL<\u002Fdiv><div style=\"font-size:12px;font-weight:600\">Laptop<\u002Fdiv><\u002Fdiv>\n          <span style=\"align-self:center;color:var(--accent,#FFB020);font-size:15px;flex:none\">→<\u002Fspan>\n          <div style=\"flex:1;min-width:92px;background:var(--bg2);border:1px solid var(--line2);border-radius:10px;padding:11px 9px;text-align:center\"><div style=\"font-family:'Hanken Grotesk',system-ui,sans-serif;font-size:8.5px;letter-spacing:.06em;color:#B6E24A;margin-bottom:3px\">BRAIN<\u002Fdiv><div style=\"font-size:12px;font-weight:600\">ESP32<\u002Fdiv><\u002Fdiv>\n          <span style=\"align-self:center;color:var(--accent,#FFB020);font-size:15px;flex:none\">→<\u002Fspan>\n          <div style=\"flex:1;min-width:92px;background:var(--bg2);border:1px solid var(--line2);border-radius:10px;padding:11px 9px;text-align:center\"><div style=\"font-family:'Hanken Grotesk',system-ui,sans-serif;font-size:8.5px;letter-spacing:.06em;color:#FF7A66;margin-bottom:3px\">DRIVER<\u002Fdiv><div style=\"font-size:12px;font-weight:600\">PCA9685<\u002Fdiv><\u002Fdiv>\n          <span style=\"align-self:center;color:var(--accent,#FFB020);font-size:15px;flex:none\">→<\u002Fspan>\n          <div style=\"flex:1;min-width:92px;background:var(--bg2);border:1px solid var(--line2);border-radius:10px;padding:11px 9px;text-align:center\"><div style=\"font-family:'Hanken Grotesk',system-ui,sans-serif;font-size:8.5px;letter-spacing:.06em;color:var(--accent,#FFB020);margin-bottom:3px\">MUSCLE<\u002Fdiv><div style=\"font-size:12px;font-weight:600\">Servos ×8<\u002Fdiv><\u002Fdiv>\n          <span style=\"align-self:center;color:var(--accent,#FFB020);font-size:15px;flex:none\">→<\u002Fspan>\n          <div style=\"flex:1;min-width:92px;background:var(--bg2);border:1px solid var(--line2);border-radius:10px;padding:11px 9px;text-align:center\"><div style=\"font-family:'Hanken Grotesk',system-ui,sans-serif;font-size:8.5px;letter-spacing:.06em;color:#C63A2D;margin-bottom:3px\">TENDONS<\u002Fdiv><div style=\"font-size:12px;font-weight:600\">Cables<\u002Fdiv><\u002Fdiv>\n          <span style=\"align-self:center;color:var(--accent,#FFB020);font-size:15px;flex:none\">→<\u002Fspan>\n          <div style=\"flex:1;min-width:92px;background:var(--bg2);border:1px solid var(--line2);border-radius:10px;padding:11px 9px;text-align:center\"><div style=\"font-family:'Hanken Grotesk',system-ui,sans-serif;font-size:8.5px;letter-spacing:.06em;color:var(--faint);margin-bottom:3px\">MOTION<\u002Fdiv><div style=\"font-size:12px;font-weight:600\">Fingers<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"margin-top:12px;padding-top:12px;border-top:1px dashed var(--line2);display:flex;align-items:center;gap:9px;flex-wrap:wrap;font-size:12px;color:var(--dim)\">\n          <span style=\"width:9px;height:9px;border-radius:50%;background:#39D7C8;flex:none\"><\u002Fspan>\n          <span style=\"font-weight:600;color:var(--text)\">Fingertip &amp; palm sensors<\u002Fspan>\n          <span style=\"color:#39D7C8;font-family:'Hanken Grotesk',system-ui,sans-serif\">···→<\u002Fspan>\n          <span>feed touch &amp; force back to the ESP32 — that feedback is the whole game.<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- BOM -->\n      <div style=\"background:var(--bg1);border:1px solid var(--line);border-radius:14px;padding:clamp(14px,2.5vw,20px);margin-bottom:16px\">\n        <div style=\"display:flex;align-items:baseline;justify-content:space-between;gap:12px;margin-bottom:12px\">\n          <div style=\"font-family:'Hanken Grotesk',system-ui,sans-serif;font-size:10.5px;letter-spacing:.1em;color:var(--faint)\">BILL OF MATERIALS<\u002Fdiv>\n          <div style=\"font-family:'Hanken Grotesk',system-ui,sans-serif;font-size:10.5px;color:var(--faint)\">what to buy &amp; print<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:1px\">\n          <sc-for list=\"{{ bom }}\" as=\"b\" hint-placeholder-count=\"14\">\n            <div style=\"display:flex;align-items:center;gap:12px;padding:10px 4px;border-bottom:1px solid var(--line)\">\n              <span style=\"flex:none;width:8px;height:8px;border-radius:50%;background:{{ b.color }}\"><\u002Fspan>\n              <div style=\"flex:1;min-width:0\">\n                <div style=\"font-size:13.5px;font-weight:600;line-height:1.3\">{{ b.part }}<\u002Fdiv>\n                <div style=\"font-size:11.5px;color:var(--faint);line-height:1.35\">{{ b.note }}<\u002Fdiv>\n              <\u002Fdiv>\n              <span style=\"flex:none;font-family:'Hanken Grotesk',system-ui,sans-serif;font-size:11px;color:var(--dim)\">{{ b.label }}<\u002Fspan>\n              <span style=\"flex:none;font-family:'Hanken Grotesk',system-ui,sans-serif;font-size:12.5px;font-weight:700;color:var(--text);min-width:52px;text-align:right\">{{ b.qty }}<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- ACTUATION + PINOUT -->\n      <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:16px;margin-bottom:16px\">\n        <div style=\"background:var(--bg1);border:1px solid var(--line);border-radius:14px;padding:clamp(14px,2.5vw,20px)\">\n          <div style=\"font-family:'Hanken Grotesk',system-ui,sans-serif;font-size:10.5px;letter-spacing:.1em;color:var(--faint);margin-bottom:12px\">ACTUATION MAP<\u002Fdiv>\n          <sc-for list=\"{{ actuation }}\" as=\"a\" hint-placeholder-count=\"9\">\n            <div style=\"display:flex;align-items:center;gap:11px;padding:9px 0;border-bottom:1px solid var(--line)\">\n              <span style=\"flex:none;font-family:'Hanken Grotesk',system-ui,sans-serif;font-size:10.5px;font-weight:700;color:var(--accent,#FFB020);background:rgba(255,176,32,.1);border:1px solid rgba(255,176,32,.3);border-radius:6px;padding:4px 7px;min-width:44px;text-align:center\">{{ a.ch }}<\u002Fspan>\n              <div style=\"flex:1;min-width:0\">\n                <div style=\"font-size:13px;font-weight:600\">{{ a.drives }}<\u002Fdiv>\n                <div style=\"font-size:11.5px;color:var(--faint)\">{{ a.via }}<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <div style=\"background:var(--bg1);border:1px solid var(--line);border-radius:14px;padding:clamp(14px,2.5vw,20px)\">\n          <div style=\"font-family:'Hanken Grotesk',system-ui,sans-serif;font-size:10.5px;letter-spacing:.1em;color:var(--faint);margin-bottom:12px\">WIRING &amp; PINOUT<\u002Fdiv>\n          <sc-for list=\"{{ pinout }}\" as=\"p\" hint-placeholder-count=\"7\">\n            <div style=\"display:flex;align-items:center;gap:11px;padding:9px 0;border-bottom:1px solid var(--line)\">\n              <span style=\"flex:none;font-family:'Hanken Grotesk',system-ui,sans-serif;font-size:10.5px;font-weight:700;color:#6EA8FF;background:rgba(110,168,255,.1);border:1px solid rgba(110,168,255,.3);border-radius:6px;padding:4px 7px;min-width:96px;text-align:center\">{{ p.pin }}<\u002Fspan>\n              <div style=\"flex:1;min-width:0;font-size:12.5px;color:var(--dim);line-height:1.4\">{{ p.to }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- ASSEMBLY -->\n      <div style=\"background:var(--bg1);border:1px solid var(--line);border-radius:14px;padding:clamp(14px,2.5vw,20px);margin-bottom:16px\">\n        <div style=\"font-family:'Hanken Grotesk',system-ui,sans-serif;font-size:10.5px;letter-spacing:.1em;color:var(--faint);margin-bottom:14px\">ASSEMBLY, STEP BY STEP<\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:10px\">\n          <sc-for list=\"{{ buildSteps }}\" as=\"s\" hint-placeholder-count=\"10\">\n            <div style=\"display:flex;gap:13px;align-items:flex-start\">\n              <span style=\"flex:none;width:26px;height:26px;border-radius:8px;background:var(--bg2);border:1px solid var(--line2);display:grid;place-items:center;font-family:'Hanken Grotesk',system-ui,sans-serif;font-size:12px;font-weight:700;color:var(--accent,#FFB020)\">{{ s.n }}<\u002Fspan>\n              <div style=\"flex:1;font-size:13.5px;line-height:1.55;color:var(--dim);padding-top:3px\">{{ s.t }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- TOOLS + COST -->\n      <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:16px;margin-bottom:16px\">\n        <div style=\"background:var(--bg1);border:1px solid var(--line);border-radius:14px;padding:clamp(14px,2.5vw,20px)\">\n          <div style=\"font-family:'Hanken Grotesk',system-ui,sans-serif;font-size:10.5px;letter-spacing:.1em;color:var(--faint);margin-bottom:12px\">TOOLS ON THE BENCH<\u002Fdiv>\n          <div style=\"display:flex;flex-wrap:wrap;gap:7px\">\n            <sc-for list=\"{{ tools }}\" as=\"tool\" hint-placeholder-count=\"9\">\n              <span style=\"font-size:12.5px;padding:7px 11px;border-radius:8px;background:var(--bg2);border:1px solid var(--line2);color:var(--dim)\">{{ tool }}<\u002Fspan>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:var(--bg1);border:1px solid var(--line);border-radius:14px;padding:clamp(14px,2.5vw,20px);display:flex;flex-direction:column;justify-content:center\">\n          <div style=\"font-family:'Hanken Grotesk',system-ui,sans-serif;font-size:10.5px;letter-spacing:.1em;color:var(--faint);margin-bottom:10px\">ROUGH COST · v0 HAND<\u002Fdiv>\n          <div style=\"font-size:clamp(30px,5vw,42px);font-weight:900;letter-spacing:-.02em;line-height:1\">$180–$320<\u002Fdiv>\n          <div style=\"font-size:12.5px;color:var(--faint);line-height:1.5;margin-top:8px\">Ballpark for one hand: servos and the electronics are most of it; filament and hardware are cheap. Prices swing with what’s in the parts bin.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- TIMELINE -->\n      <div style=\"background:var(--bg1);border:1px solid var(--line);border-radius:14px;padding:clamp(14px,2.5vw,20px);margin-bottom:16px\">\n        <div style=\"font-family:'Hanken Grotesk',system-ui,sans-serif;font-size:10.5px;letter-spacing:.1em;color:var(--faint);margin-bottom:14px\">BUILD TIMELINE · MAPPED TO THE SIX PHASES<\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:10px\">\n          <sc-for list=\"{{ buildPhases }}\" as=\"ph\" hint-placeholder-count=\"6\">\n            <div style=\"position:relative;background:var(--bg2);border:1px solid var(--line);border-radius:12px;padding:14px 13px;overflow:hidden\">\n              <div style=\"position:absolute;left:0;top:0;bottom:0;width:3px;background:{{ ph.accent }}\"><\u002Fdiv>\n              <div style=\"font-family:'Hanken Grotesk',system-ui,sans-serif;font-size:11px;font-weight:700;color:{{ ph.accent }};margin-bottom:5px\">{{ ph.tag }}<\u002Fdiv>\n              <div style=\"font-size:13.5px;font-weight:700;letter-spacing:-.01em;margin-bottom:6px\">{{ ph.title }}<\u002Fdiv>\n              <div style=\"font-size:12px;line-height:1.5;color:var(--faint)\">{{ ph.focus }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- HONESTY + CTA -->\n      <div style=\"border:1px dashed var(--line2);border-radius:12px;padding:16px 18px;display:flex;flex-wrap:wrap;gap:14px;align-items:center;justify-content:space-between\">\n        <p style=\"margin:0;font-size:13px;line-height:1.55;color:var(--dim);max-width:60ch\">This is a starting design, not final gospel — part numbers, pin choices and cable routing will change the first time we print and pull. That’s the fun part. It becomes a real schematic as we lock each phase down.<\u002Fp>\n        <button onclick=\"{{ onOpenAsk }}\" style=\"flex:none;display:inline-flex;align-items:center;gap:8px;font-family:'Hanken Grotesk',system-ui,sans-serif;font-size:11px;letter-spacing:.04em;padding:11px 16px;border-radius:10px;cursor:pointer;background:var(--accent,#FFB020);border:none;color:#0B0D10;font-weight:700\">\n          <svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.3\" stroke-linecap=\"round\"><circle cx=\"11\" cy=\"11\" r=\"7\"><\u002Fcircle><line x1=\"21\" y1=\"21\" x2=\"16.5\" y2=\"16.5\"><\u002Fline><\u002Fsvg>\n          ASK ABOUT A PART\n        <\u002Fbutton>\n      <\u002Fdiv>\n\n    <\u002Fsection>\n    <\u002Fdiv>\n\n  <\u002Fdiv>\n\n  <!-- DEEP DIVE DRAWER -->\n  <sc-if value=\"{{ deep }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"position:fixed;inset:0;z-index:100\">\n      <div onclick=\"{{ deep.onClose }}\" style=\"position:absolute;inset:0;background:rgba(7,8,10,.975);backdrop-filter:blur(6px)\"><\u002Fdiv>\n      <div style=\"position:absolute;top:0;right:0;bottom:0;width:min(760px,100vw);background:var(--bg0);border-left:1px solid var(--line2);box-shadow:-30px 0 80px -20px #000;display:flex;flex-direction:column\">\n\n        <div style=\"flex:none;padding:15px clamp(16px,3vw,26px);border-bottom:1px solid var(--line);display:flex;flex-direction:column;gap:13px\">\n          <div style=\"display:flex;align-items:center;justify-content:space-between;gap:12px\">\n            <div style=\"display:flex;align-items:center;gap:10px;min-width:0\">\n              <div style=\"flex:none;width:26px;height:26px;border-radius:7px;background:var(--accent,#FFB020);display:grid;place-items:center;color:#0B0D10\">\n                <svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.4\" stroke-linecap=\"round\"><circle cx=\"11\" cy=\"11\" r=\"7\"><\u002Fcircle><line x1=\"21\" y1=\"21\" x2=\"16.5\" y2=\"16.5\"><\u002Fline><\u002Fsvg>\n              <\u002Fdiv>\n              <div style=\"font-family:'Hanken Grotesk',system-ui,sans-serif;font-size:12px;letter-spacing:.14em;color:var(--dim)\">DEEP DIVE<\u002Fdiv>\n            <\u002Fdiv>\n            <button onclick=\"{{ deep.onClose }}\" style=\"flex:none;width:32px;height:32px;border-radius:9px;border:1px solid var(--line2);background:var(--bg2);color:var(--dim);cursor:pointer;font-size:15px;transition:.15s\" style-hover=\"color:var(--text)\">✕<\u002Fbutton>\n          <\u002Fdiv>\n\n          <sc-if value=\"{{ deep.canBack }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"display:flex;align-items:center;gap:8px;min-width:0\">\n              <button onclick=\"{{ deep.onBack }}\" style=\"flex:none;max-width:100%;display:inline-flex;align-items:center;gap:7px;overflow:hidden;font-family:'Hanken Grotesk',system-ui,sans-serif;font-size:11px;letter-spacing:.03em;font-weight:700;padding:7px 12px;border-radius:8px;border:1px solid var(--line2);background:var(--bg1);color:var(--dim);cursor:pointer;transition:.15s\" style-hover=\"border-color:var(--accent);color:var(--text)\"><span style=\"flex:none\">←<\u002Fspan><span style=\"overflow:hidden;text-overflow:ellipsis;white-space:nowrap\">{{ deep.backLabel }}<\u002Fspan><\u002Fbutton>\n              <sc-if value=\"{{ deep.showHome }}\" hint-placeholder-val=\"{{ false }}\">\n                <button onclick=\"{{ deep.onHome }}\" style=\"flex:none;font-family:'Hanken Grotesk',system-ui,sans-serif;font-size:11px;letter-spacing:.03em;padding:7px 11px;border-radius:8px;border:1px solid transparent;background:transparent;color:var(--faint);cursor:pointer;transition:.15s\" style-hover=\"color:var(--text)\">ALL TOPICS<\u002Fbutton>\n              <\u002Fsc-if>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n\n        <div style=\"flex:1;min-height:0;overflow-y:auto;padding:clamp(18px,3vw,28px)\">\n        <div style=\"max-width:620px;margin:0 auto;width:100%\">\n\n          <sc-if value=\"{{ deep.home }}\" hint-placeholder-val=\"{{ false }}\">\n            <div>\n              <div style=\"display:flex;align-items:baseline;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:6px\">\n                <h2 style=\"margin:0;font-size:24px;font-weight:700;letter-spacing:-.01em\">Explore the ideas<\u002Fh2>\n                <span style=\"font-size:12px;color:var(--faint)\">{{ deep.exploredLabel }}<\u002Fspan>\n              <\u002Fdiv>\n              <p style=\"margin:0 0 22px;font-size:14px;color:var(--dim);line-height:1.6;max-width:52ch\">Short reads, grouped by part of the hand. A check means you've read it.<\u002Fp>\n              <div style=\"display:flex;flex-direction:column;gap:22px\">\n                <sc-for list=\"{{ deep.groups }}\" as=\"g\" hint-placeholder-count=\"3\">\n                  <div>\n                    <div style=\"font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--faint);margin-bottom:9px\">{{ g.label }}<\u002Fdiv>\n                    <div style=\"display:flex;flex-direction:column;gap:8px\">\n                      <sc-for list=\"{{ g.items }}\" as=\"ar\" hint-placeholder-count=\"3\">\n                        <button onclick=\"{{ ar.onClick }}\" style=\"text-align:left;padding:13px 15px;border-radius:12px;border:1px solid var(--line);background:var(--bg1);color:var(--text);cursor:pointer;transition:.15s;display:flex;align-items:center;gap:13px\" style-hover=\"border-color:var(--accent);background:var(--bg2)\">\n                          <span style=\"flex:none;display:grid;place-items:center;width:18px;height:18px\">\n                            <sc-if value=\"{{ ar.read }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"width:18px;height:18px;border-radius:50%;display:grid;place-items:center;background:var(--accent,#FFB020);color:#0C0C0E;font-size:11px;font-weight:800;line-height:1\">✓<\u002Fspan><\u002Fsc-if>\n                            <sc-if value=\"{{ ar.unread }}\" hint-placeholder-val=\"{{ true }}\"><span style=\"width:16px;height:16px;border-radius:50%;border:1.5px solid var(--line2)\"><\u002Fspan><\u002Fsc-if>\n                          <\u002Fspan>\n                          <div style=\"flex:1;min-width:0\">\n                            <div style=\"font-size:14.5px;font-weight:700;letter-spacing:-.01em;margin-bottom:3px\">{{ ar.title }}<\u002Fdiv>\n                            <div style=\"font-size:12.5px;color:var(--faint);line-height:1.45\">{{ ar.blurb }}<\u002Fdiv>\n                          <\u002Fdiv>\n                          <span style=\"flex:none;color:var(--accent,#FFB020);font-size:16px\">→<\u002Fspan>\n                        <\u002Fbutton>\n                      <\u002Fsc-for>\n                    <\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n\n          <sc-if value=\"{{ deep.loading }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"display:flex;flex-direction:column;gap:15px\">\n              <div style=\"display:flex;align-items:center;gap:12px;color:var(--faint)\">\n                <div style=\"width:22px;height:22px;border:2.5px solid var(--line2);border-top-color:var(--accent,#FFB020);border-radius:50%;animation:spin .9s linear infinite\"><\u002Fdiv>\n                <span style=\"font-family:'Hanken Grotesk',system-ui,sans-serif;font-size:11.5px;letter-spacing:.08em\">THINKING IT THROUGH…<\u002Fspan>\n              <\u002Fdiv>\n              <div style=\"height:24px;width:72%;border-radius:6px;background:var(--bg2)\"><\u002Fdiv>\n              <div style=\"height:13px;width:100%;border-radius:5px;background:var(--bg1)\"><\u002Fdiv>\n              <div style=\"height:13px;width:92%;border-radius:5px;background:var(--bg1)\"><\u002Fdiv>\n              <div style=\"height:13px;width:80%;border-radius:5px;background:var(--bg1)\"><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n\n          <sc-if value=\"{{ deep.error }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"padding:18px;border:1px solid var(--line2);border-radius:12px;background:var(--bg1)\">\n              <div style=\"font-size:14px;color:var(--text);margin-bottom:13px;line-height:1.5\">{{ deep.error }}<\u002Fdiv>\n              <button onclick=\"{{ deep.onRetry }}\" style=\"font-family:'Hanken Grotesk',system-ui,sans-serif;font-size:11px;letter-spacing:.06em;padding:9px 14px;border-radius:9px;cursor:pointer;background:var(--accent,#FFB020);border:none;color:#0B0D10;font-weight:700\">↻ TRY AGAIN<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n\n          <sc-if value=\"{{ deep.data }}\" hint-placeholder-val=\"{{ false }}\">\n            <div>\n              <div style=\"font-family:'Hanken Grotesk',system-ui,sans-serif;font-size:10.5px;letter-spacing:.08em;color:var(--accent,#FFB020);margin-bottom:10px;text-transform:uppercase\">{{ deep.title }}<\u002Fdiv>\n              <h2 style=\"margin:0 0 14px;font-size:clamp(21px,3.2vw,27px);font-weight:800;letter-spacing:-.015em;line-height:1.15;text-wrap:pretty\">{{ deep.data.headline }}<\u002Fh2>\n              <p style=\"margin:0 0 22px;font-size:15.5px;line-height:1.62;color:var(--text)\">{{ deep.data.intuition }}<\u002Fp>\n\n              <sc-if value=\"{{ deep.data.hasHow }}\" hint-placeholder-val=\"{{ true }}\">\n                <div style=\"font-family:'Hanken Grotesk',system-ui,sans-serif;font-size:10px;letter-spacing:.12em;color:var(--faint);margin-bottom:11px\">HOW IT WORKS<\u002Fdiv>\n                <div style=\"display:flex;flex-direction:column;gap:9px;margin-bottom:24px\">\n                  <sc-for list=\"{{ deep.data.howItWorks }}\" as=\"hw\" hint-placeholder-count=\"4\">\n                    <div style=\"display:flex;gap:11px;align-items:flex-start\">\n                      <div style=\"flex:none;width:6px;height:6px;border-radius:50%;background:var(--accent,#FFB020);margin-top:8px\"><\u002Fdiv>\n                      <div style=\"font-size:14px;line-height:1.55;color:var(--dim)\">{{ hw.t }}<\u002Fdiv>\n                    <\u002Fdiv>\n                  <\u002Fsc-for>\n                <\u002Fdiv>\n              <\u002Fsc-if>\n\n              <div style=\"background:var(--bg1);border:1px solid var(--line);border-left:3px solid var(--accent,#FFB020);border-radius:10px;padding:15px 17px;margin-bottom:20px\">\n                <div style=\"font-family:'Hanken Grotesk',system-ui,sans-serif;font-size:9.5px;letter-spacing:.1em;color:var(--accent,#FFB020);margin-bottom:7px\">FOR OUR HAND<\u002Fdiv>\n                <div style=\"font-size:14px;line-height:1.58;color:var(--text)\">{{ deep.data.forHand }}<\u002Fdiv>\n              <\u002Fdiv>\n\n              <sc-if value=\"{{ deep.data.hasTry }}\" hint-placeholder-val=\"{{ false }}\">\n                <div style=\"background:var(--bg1);border:1px dashed var(--line2);border-radius:10px;padding:15px 17px;margin-bottom:24px\">\n                  <div style=\"font-family:'Hanken Grotesk',system-ui,sans-serif;font-size:9.5px;letter-spacing:.1em;color:#39D7C8;margin-bottom:7px\">TRY IT TOGETHER<\u002Fdiv>\n                  <div style=\"font-size:14px;line-height:1.58;color:var(--dim)\">{{ deep.data.tryIt }}<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-if>\n\n              <div style=\"border-top:1px solid var(--line);margin-top:6px;padding-top:18px\">\n                <div style=\"display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:14px\">\n                  <span style=\"font-size:12px;color:var(--faint)\">{{ deep.data.progressLabel }}<\u002Fspan>\n                  <div style=\"display:flex;gap:6px;align-items:center\">\n                    <sc-for list=\"{{ deep.data.dots }}\" as=\"d\" hint-placeholder-count=\"9\">\n                      <button onclick=\"{{ d.onClick }}\" title=\"{{ d.title }}\" style=\"width:9px;height:9px;padding:0;border-radius:50%;cursor:pointer;background:{{ d.bg }};border:1.5px solid {{ d.bd }};transition:.15s\"><\u002Fbutton>\n                    <\u002Fsc-for>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n\n                <sc-if value=\"{{ deep.data.hasNext }}\" hint-placeholder-val=\"{{ true }}\">\n                  <button onclick=\"{{ deep.data.next.onClick }}\" style=\"width:100%;text-align:left;padding:15px 16px;border-radius:12px;border:1px solid var(--line2);background:var(--bg1);color:var(--text);cursor:pointer;transition:.15s;display:flex;align-items:center;gap:14px\" style-hover=\"border-color:var(--accent);background:var(--bg2)\">\n                    <div style=\"flex:1;min-width:0\">\n                      <div style=\"font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--faint);margin-bottom:4px\">Next up<\u002Fdiv>\n                      <div style=\"font-size:15px;font-weight:700;letter-spacing:-.01em;margin-bottom:2px\">{{ deep.data.next.title }}<\u002Fdiv>\n                      <div style=\"font-size:12.5px;color:var(--faint);line-height:1.45\">{{ deep.data.next.blurb }}<\u002Fdiv>\n                    <\u002Fdiv>\n                    <span style=\"flex:none;color:var(--accent,#FFB020);font-size:18px\">→<\u002Fspan>\n                  <\u002Fbutton>\n                <\u002Fsc-if>\n\n                <sc-if value=\"{{ deep.data.allRead }}\" hint-placeholder-val=\"{{ false }}\">\n                  <div style=\"display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;padding:15px 16px;border-radius:12px;border:1px solid var(--line);background:var(--bg1)\">\n                    <span style=\"font-size:13.5px;color:var(--text)\">You've explored all nine. Nice.<\u002Fspan>\n                    <button onclick=\"{{ deep.data.onAllTopics }}\" style=\"flex:none;font-size:12px;font-weight:700;padding:8px 13px;border-radius:8px;border:1px solid var(--line2);background:var(--bg2);color:var(--dim);cursor:pointer;transition:.15s\" style-hover=\"border-color:var(--accent);color:var(--text)\">Back to all topics<\u002Fbutton>\n                  <\u002Fdiv>\n                <\u002Fsc-if>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n\n        <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"flex:none;padding:13px clamp(16px,3vw,26px);border-top:1px solid var(--line);background:var(--bg0);display:flex;align-items:center;justify-content:space-between;gap:10px\">\n          <span style=\"font-size:12px;color:var(--faint);line-height:1.4\">Tip: tap any part of the 3D hand to jump straight to what it does.<\u002Fspan>\n          <button onclick=\"{{ deep.onClose }}\" style=\"flex:none;padding:10px 15px;border-radius:9px;border:1px solid var(--line2);background:var(--bg1);color:var(--dim);font-weight:700;cursor:pointer;font-family:'Hanken Grotesk',system-ui,sans-serif;font-size:11px;letter-spacing:.04em\">CLOSE<\u002Fbutton>\n        <\u002Fdiv>\n\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:&quot;100%&quot;,&quot;height&quot;:900},&quot;accent&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#FFB020&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;options&quot;:[&quot;#FFB020&quot;,&quot;#39D7C8&quot;,&quot;#FF6FB0&quot;,&quot;#B6E24A&quot;],&quot;section&quot;:&quot;Theme&quot;},&quot;xray&quot;:{&quot;editor&quot;:&quot;range&quot;,&quot;default&quot;:0.3,&quot;min&quot;:0.1,&quot;max&quot;:0.62,&quot;step&quot;:0.02,&quot;tsType&quot;:&quot;number&quot;,&quot;section&quot;:&quot;Model&quot;,&quot;unit&quot;:&quot;&quot;},&quot;idle&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Model&quot;}}\">\nclass Component extends DCLogic {\n  constructor(props){\n    super(props);\n    this.DISC = {\n      MECH:{label:'Mechanical',color:'#6EA8FF'}, CAD:{label:'CAD / design',color:'#B08CFF'},\n      PRINT:{label:'3D printing',color:'#2FD3B6'}, ACTUATE:{label:'Actuators',color:'#FFB020'},\n      ELEC:{label:'Electronics',color:'#FF7A66'}, FIRMWARE:{label:'Firmware',color:'#B6E24A'},\n      KIN:{label:'Kinematics',color:'#57C8FF'}, SENSE:{label:'Sensors',color:'#39D7C8'},\n      AI:{label:'AI / learning',color:'#FF6FB0'},\n      ANAT:{label:'Anatomy',color:'#7FD1A8'}\n    };\n    this.GESTURES = {\n      open:[0.06,0.08,0.06,0.08,0.12], fist:[0.55,0.95,0.96,0.95,0.95],\n      point:[0.5,0.03,0.95,0.96,0.96], pinch:[0.15,0.8,0.5,0.55,0.6],\n      peace:[0.5,0.04,0.05,0.95,0.96], oppose:[0.65,0.06,0.08,0.1,0.12], wave:[0.05,0.07,0.05,0.07,0.1]\n    };\n    this.GLIST = [['open','Rest'],['fist','Fist'],['point','Point'],['pinch','Pinch'],['peace','Peace'],['oppose','Palm touch']];\n    this.POSE = {\n      open:{spread:0.6,opp:0.0,wf:0,wd:0}, fist:{spread:0.0,opp:0.7,wf:0.06,wd:0},\n      point:{spread:0.12,opp:0.6,wf:0,wd:0}, pinch:{spread:0.16,opp:0.45,wf:0.03,wd:0},\n      peace:{spread:0.75,opp:0.45,wf:0,wd:0}, oppose:{spread:0.55,opp:1.0,wf:0,wd:0}, wave:{spread:0.4,opp:0.0,wf:0,wd:0}\n    };\n    this.FINGER_LABELS = ['Thumb','Index','Middle','Ring','Pinky'];\n    this.LAYERDEF = [\n      ['skin','Skin','flexible outer shell','#E7B197'],\n      ['skeleton','Skeleton','bones & joints','#EDE7D6'],\n      ['ligaments','Ligaments','the joint straps','#C9BD9C'],\n      ['tendons','Tendons','the pull-cables','#C63A2D'],\n      ['servos','Muscles','the motors','#FFB020'],\n      ['wiring','Nerves','signal & control','#6EA8FF'],\n      ['vessels','Vessels','blood & power','#E5484D'],\n      ['sensors','Sensors','touch & force','#39D7C8']\n    ];\n    this.LAYER_VIEW = {\n      robot: { skin:['Shell','flexible cover','#E7B197'], skeleton:['Frame','printed bones','#EDE7D6'], ligaments:['Joints','pins, stops & guides','#C9BD9C'], tendons:['Cables','the drive lines','#C63A2D'], servos:['Motors','the servos','#FFB020'], wiring:['Wiring','signal & control','#6EA8FF'], vessels:['Power','the power bus','#E5484D'], sensors:['Sensors','touch & force','#39D7C8'] },\n      human: { skin:['Skin','skin & fat pads','#E7B197'], skeleton:['Skeleton','bones & joints','#EDE7D6'], ligaments:['Ligaments','joint straps & pulleys','#C9BD9C'], tendons:['Tendons','flexors & extensors','#C8483B'], servos:['Muscles','forearm & intrinsics','#A6382A'], wiring:['Nerves','signals in & out','#E8CF86'], vessels:['Vessels','arteries & arches','#E5484D'], sensors:['Receptors','touch & force','#39D7C8'] }\n    };\n    this.LAYER_EXPLODE = {skin:2.7, skeleton:0, ligaments:0.5, tendons:1.25, servos:-2.3, wiring:-3.0, vessels:1.95, sensors:1.65};\n    this.INFO = {\n      bone_prox:{name:'Proximal phalanx',teaches:['MECH','CAD'],desc:'The first finger bone, hinged at the knuckle. Its length sets how far the fingertip swings — one of the first numbers we choose in CAD.'},\n      bone_mid:{name:'Middle phalanx',teaches:['MECH','CAD'],desc:'The middle link. Together the three bones give a finger both its reach and its curl.'},\n      bone_dist:{name:'Distal phalanx',teaches:['MECH','CAD'],desc:'The fingertip bone. It carries the touch pad and does the actual gripping.'},\n      knuckle:{name:'Joint (knuckle)',teaches:['MECH','KIN'],desc:'Where two bones pivot. Count all of these and you have the hand\\u2019s degrees of freedom — every one needs a way to be moved.'},\n      skin:{name:'Skin / shell',teaches:['CAD','PRINT'],desc:'The soft outer cover. It protects the mechanism and adds grip — we can print it in flexible material.'},\n      tendon:{name:'Tendon (cable)',teaches:['ACTUATE','MECH'],desc:'A cable that pulls the finger closed, exactly like the flexor tendons in your own hand. A motor in the wrist reels it in.'},\n      sensor_tip:{name:'Fingertip sensor',teaches:['SENSE','AI'],desc:'A pressure pad that feels contact and force, so the hand knows when — and how hard — it is touching something.'},\n      palm_bone:{name:'Metacarpal',teaches:['MECH','CAD'],desc:'A palm bone. These five form the frame that every finger and motor mounts to.'},\n      palm_skin:{name:'Palm',teaches:['CAD','PRINT'],desc:'The palm shell. Its shape decides what the hand can wrap around and hold.'},\n      palm_sensor:{name:'Palm sensor',teaches:['SENSE'],desc:'Feels objects pressed into the palm — the key to a firm, confident power grip.'},\n      forearm:{name:'Forearm / wrist',teaches:['MECH'],desc:'Houses the motors and electronics. Real hands hide most of their muscles up here too, keeping the fingers light.'},\n      servo:{name:'Actuator (servo)',teaches:['ACTUATE','FIRMWARE'],desc:'A small geared motor — our \\u201Cmuscle.\\u201D It turns a command like \\u201Ccurl to 40\\u00B0\\u201D into a real pull on a tendon.'},\n      board:{name:'Controller board',teaches:['FIRMWARE','ELEC'],desc:'The brain-stem: a microcontroller that reads the sensors and tells every motor what to do, many times a second.'},\n      wire:{name:'Wiring',teaches:['ELEC'],desc:'Power and signal. Every motor and sensor needs both — planning this early saves a world of pain later.'},\n      tendon_route:{name:'Tendon routing',teaches:['MECH','ACTUATE'],desc:'The path a cable takes from motor to finger. Smart routing means smooth, strong motion with no snags.'},\n      fdp:{name:'Flexor digitorum profundus (FDP)',teaches:['ANAT','MECH'],desc:'A deep flexor tendon. It runs down the palm side and inserts on the fingertip bone, so it bends the whole finger — including the last joint (DIP).'},\n      fds:{name:'Flexor digitorum superficialis (FDS)',teaches:['ANAT','KIN'],desc:'A superficial flexor. Near the base it splits in two and the FDP passes through the gap (Camper\\u2019s chiasm); the two slips insert on the middle bone and bend the PIP joint.'},\n      ext_central:{name:'Central slip (extensor)',teaches:['ANAT','KIN'],desc:'Part of the extensor mechanism on the back of the finger. It inserts on the middle bone and straightens the PIP joint.'},\n      ext_lateral:{name:'Lateral band & terminal tendon',teaches:['ANAT','KIN'],desc:'Two lateral bands run along the back-sides of the finger and merge into the terminal tendon at the tip, straightening the DIP joint.'},\n      hood:{name:'Dorsal hood (extensor expansion)',teaches:['ANAT'],desc:'A sheet of tendon fibres wrapping the knuckle. It ties the extensor tendon and the intrinsic muscles together over the proximal bone.'},\n      pulley:{name:'Annular pulley (A1\\u2013A5)',teaches:['ANAT','MECH'],desc:'Fibrous straps that hold the flexor tendons tight against the bone so they don\\u2019t bow-string away when you curl. A2 and A4 matter most.'},\n      lumbrical:{name:'Lumbrical muscle',teaches:['ANAT','KIN'],desc:'A small muscle that starts on the FDP tendon and joins the extensor mechanism — it bends the knuckle while straightening the fingertip, a uniquely clever linkage.'},\n      interosseous:{name:'Interosseous muscle',teaches:['ANAT'],desc:'Muscles between the palm bones that spread and close the fingers and help bend the knuckles.'},\n      flexor_belly:{name:'Forearm flexor muscles',teaches:['ANAT','ACTUATE'],desc:'The real \\u201Cmotors\\u201D for closing the hand. They sit in the forearm and pull the flexor tendons — exactly why our robot puts its motors in the wrist, not the fingers.'},\n      extensor_belly:{name:'Forearm extensor muscles',teaches:['ANAT','ACTUATE'],desc:'The forearm muscles that open the hand by pulling the extensor tendons.'},\n      nerve:{name:'Nerve (median / ulnar / radial)',teaches:['ANAT','SENSE'],desc:'Nerves carry commands out to the muscles and touch signals back to the brain — the biological version of our wiring and controller board.'},\n      fpl:{name:'Flexor pollicis longus (FPL)',teaches:['ANAT'],desc:'The thumb\\u2019s long flexor: it runs up the palm side of the thumb and bends its tip.'},\n      epl:{name:'Extensor pollicis longus (EPL)',teaches:['ANAT'],desc:'Straightens the thumb tip; runs along the back of the thumb.'},\n      epb:{name:'Extensor pollicis brevis (EPB)',teaches:['ANAT'],desc:'Straightens the thumb\\u2019s main knuckle (the proximal bone).'},\n      apl:{name:'Abductor pollicis longus (APL)',teaches:['ANAT'],desc:'Pulls the thumb out and away from the palm; anchors near the base of the thumb.'},\n      radius:{name:'Radius',teaches:['ANAT','MECH'],desc:'The forearm bone on the thumb side. The wrist joint mostly rides on its lower end.',robo:'The fixed forearm rail our whole hand pivots from.'},\n      ulna:{name:'Ulna',teaches:['ANAT','MECH'],desc:'The forearm bone on the pinky side; the elbow hinges on it. It pairs with the radius so the forearm can rotate.',robo:'The second forearm rail — with the radius it carries the wrist gimbal.'},\n      scaphoid:{name:'Scaphoid (carpal)',teaches:['ANAT'],desc:'Boat-shaped wrist bone under the thumb, and the most commonly broken one. It bridges the two rows of the wrist.',robo:'One facet of the compound wrist joint.'},\n      lunate:{name:'Lunate (carpal)',teaches:['ANAT'],desc:'Moon-shaped bone in the middle of the proximal row, sitting right under the big forearm bone.',robo:'Centre of the wrist’s pitch axis.'},\n      triquetrum:{name:'Triquetrum (carpal)',teaches:['ANAT'],desc:'Pyramid-shaped bone on the pinky side of the proximal row.',robo:'Edge of the wrist joint block.'},\n      pisiform:{name:'Pisiform (carpal)',teaches:['ANAT'],desc:'A pea-sized bone riding on the triquetrum — really a sesamoid inside a tendon, used as a muscle anchor.',robo:'A cable anchor point at the wrist.'},\n      trapezium:{name:'Trapezium (carpal)',teaches:['ANAT','KIN'],desc:'Saddle-shaped bone at the thumb base. Its saddle joint is what lets the thumb swing across the palm — opposition.',robo:'Where the thumb-opposition servo mounts.'},\n      trapezoid:{name:'Trapezoid (carpal)',teaches:['ANAT'],desc:'A small wedge in the distal row, behind the index finger.',robo:'A fixed mount face in the palm frame.'},\n      capitate:{name:'Capitate (carpal)',teaches:['ANAT'],desc:'The biggest carpal, dead centre — the keystone the whole wrist rotates around.',robo:'The hub the wrist gimbal centres on.'},\n      hamate:{name:'Hamate (carpal)',teaches:['ANAT'],desc:'Has a hook, the hamulus, that the pinky side of the carpal-tunnel roof anchors to.',robo:'Anchor for the cable-guide bracket.'},\n      thenar:{name:'Thenar muscles',teaches:['ANAT','ACTUATE'],desc:'The fleshy mound at the thumb base — abductor, flexor and opponens pollicis brevis. They power the thumb’s swing and pinch.',robo:'A dedicated servo that rotates the thumb into opposition.'},\n      hypothenar:{name:'Hypothenar muscles',teaches:['ANAT'],desc:'The mound at the pinky base that cups the palm and moves the little finger.',robo:'A passive palm-arch spring on the pinky side.'},\n      adductor_pollicis:{name:'Adductor pollicis',teaches:['ANAT','MECH'],desc:'A fan-shaped muscle between thumb and index that squeezes the thumb toward the palm — the muscle behind a strong pinch.',robo:'The thumb pinch cable and its servo.'},\n      retinaculum_flexor:{name:'Flexor retinaculum',teaches:['ANAT','MECH'],desc:'A tough strap across the front of the wrist. With the carpal bones it forms the carpal tunnel that the flexor tendons and median nerve run through.',robo:'The cable-guide plate that stops the drive cables bow-stringing at the wrist.'},\n      retinaculum_extensor:{name:'Extensor retinaculum',teaches:['ANAT','MECH'],desc:'The strap across the back of the wrist that holds the extensor tendons down as they cross to the fingers.',robo:'The rear guide for the return lines.'},\n      collateral:{name:'Collateral ligament',teaches:['ANAT','MECH'],desc:'Ligaments on each side of a joint that stop it bending sideways, so the finger only folds one way.',robo:'The pin-and-slot that keeps each joint on one clean axis.'},\n      palmar_plate:{name:'Palmar plate',teaches:['ANAT','MECH'],desc:'A thick pad on the palm side of a joint that stops the finger bending backwards past straight.',robo:'A hard stop moulded into the joint so it can’t hyper-extend.'},\n      artery_arch:{name:'Palmar arch (artery)',teaches:['ANAT'],desc:'Two arches, superficial and deep, loop across the palm so blood reaches every finger even if one route is pinched.',robo:'The power bus: a ring that feeds current to every servo.'},\n      artery_digital:{name:'Digital artery',teaches:['ANAT'],desc:'The vessels running up each side of a finger, carrying blood and warmth to the tip.',robo:'The power lead running out to a fingertip sensor.'},\n      nerve_median:{name:'Median nerve',teaches:['ANAT','SENSE'],desc:'Runs through the carpal tunnel to most of the palm side of the hand; squeeze it and you get carpal-tunnel tingling. It carries commands out and touch back.',robo:'The signal bundle for the front-of-hand sensors and thumb servo.'},\n      nerve_ulnar:{name:'Ulnar nerve',teaches:['ANAT','SENSE'],desc:'The “funny bone” nerve. It serves the pinky side and drives most of the small intrinsic muscles.',robo:'The signal line for the pinky-side actuators.'},\n      nerve_radial:{name:'Radial nerve',teaches:['ANAT','SENSE'],desc:'Runs down the back of the arm and hand; it mostly straightens things — opening the hand and wrist.',robo:'The control line for the return/extend side.'},\n      wrist_gimbal:{name:'Wrist gimbal',teaches:['MECH','ACTUATE'],desc:'Two servos stacked at right angles let the whole hand pitch up and down and tilt side to side.',robo:'Does the job of the 8 carpal bones with just two motors.'},\n      opp_servo:{name:'Thumb-opposition servo',teaches:['MECH','KIN'],desc:'A motor that rotates the thumb across the palm so it can meet each fingertip — the one move that makes a hand a hand.',robo:'Replaces the thenar muscles and the thumb saddle joint.'},\n      pivot_pin:{name:'Joint pin',teaches:['MECH','CAD'],desc:'A steel pin through each printed knuckle makes a low-friction hinge.',robo:'Bone joint and its collateral ligament, in one pin.'},\n      return_spring:{name:'Return spring',teaches:['MECH','ACTUATE'],desc:'An elastic on the back of each finger pulls it open again when the drive cable relaxes.',robo:'The passive antagonist that does the extensor tendon’s job.'}\n    };\n    this.ROADMAP = [\n      {tag:'00',label:'PHASE 00 · FOUNDATIONS',accent:'#6EA8FF',title:'Meet the hand',\n        goal:'Before touching a printer, understand how a real hand actually moves. This is the map for everything after.',\n        milestone:'Bend your own finger slowly and draw where a cable would have to run to close it.',\n        doneWhen:'You can each explain, out loud, how one finger closes.',\n        items:[\n          {t:'How fingers bend — and why the muscles are in the palm & forearm, not the fingers',c:['MECH','KIN']},\n          {t:'Tendons are just cables: pull one end, the finger curls',c:['MECH','ACTUATE']},\n          {t:'Degrees of freedom — count every independent move a hand can make',c:['KIN']},\n          {t:'Our toolkit: what a servo, a microcontroller and a 3D printer each do',c:['ACTUATE','FIRMWARE','PRINT']}\n        ]},\n      {tag:'01',label:'PHASE 01 · FIRST MOTION',accent:'#FFB020',title:'One living finger',\n        goal:'Make a single 3D-printed finger open and close on command. The whole project in miniature.',\n        milestone:'Type a command on the laptop, watch one printed finger curl and release.',\n        doneWhen:'The finger opens and closes 100 times in a row without jamming.',\n        items:[\n          {t:'Design a finger link with hinge joints and printable tolerances in CAD',c:['CAD','MECH']},\n          {t:'Print parts that flex without snapping — PLA vs PETG vs TPU',c:['PRINT']},\n          {t:'Route a tendon and add an elastic return so the finger springs back open',c:['MECH','ACTUATE']},\n          {t:'Drive one servo from a microcontroller — what PWM actually is',c:['FIRMWARE','ACTUATE']},\n          {t:'Power it safely: volts, amps, and why motors want their own supply',c:['ELEC']}\n        ]},\n      {tag:'02',label:'PHASE 02 · A WHOLE HAND',accent:'#2FD3B6',title:'Five fingers and a palm',\n        goal:'Scale one finger up to a full hand: five fingers, an opposable thumb, one palm holding it all together.',\n        milestone:'The hand makes a clean fist, then a single pointing finger.',\n        doneWhen:'All five fingers move independently and the thumb can touch each fingertip.',\n        items:[\n          {t:'Design the palm and knuckles; pack five actuators into a human-sized space',c:['CAD','MECH']},\n          {t:'Print orientation, supports and clean-up when parts get bigger',c:['PRINT']},\n          {t:'Thumb opposition — the one move that makes a hand a hand',c:['KIN','MECH']},\n          {t:'Drive many servos at once with a driver board',c:['FIRMWARE','ELEC']}\n        ]},\n      {tag:'03',label:'PHASE 03 · A SENSE OF TOUCH',accent:'#39D7C8',title:'A hand that feels',\n        goal:'Give the hand senses, so it knows what it is doing instead of moving blind.',\n        milestone:'The hand stops squeezing the moment it feels it has gripped enough.',\n        doneWhen:'It can hold an egg and a rock and treat them differently.',\n        items:[\n          {t:'Position feedback: where is each finger right now?',c:['SENSE','KIN']},\n          {t:'Touch & force — pressure pads at the fingertips',c:['SENSE','ELEC']},\n          {t:'Current sensing: feel a motor\\u2019s effort so it won\\u2019t crush things',c:['SENSE','ELEC']},\n          {t:'Read many sensors at once without overwhelming the microcontroller',c:['FIRMWARE']}\n        ]},\n      {tag:'04',label:'PHASE 04 · SMOOTH MOVES',accent:'#57C8FF',title:'Control & kinematics',\n        goal:'Turn raw motor commands into coordinated, human-looking motion and real grips.',\n        milestone:'Tell the hand \\u201Cpinch here\\u201D and it places its fingers correctly.',\n        doneWhen:'It picks up three different objects reliably, in a row.',\n        items:[\n          {t:'Forward kinematics: given the joint angles, where is the fingertip?',c:['KIN']},\n          {t:'Inverse kinematics: given a target, what angles get us there?',c:['KIN']},\n          {t:'Grip families — pinch, tripod, and the power grip',c:['KIN','MECH']},\n          {t:'Smoothing motion with easing and speed limits',c:['FIRMWARE','KIN']}\n        ]},\n      {tag:'05',label:'PHASE 05 · IT LEARNS',accent:'#FF6FB0',title:'A hand that learns',\n        goal:'Let the hand learn skills from examples instead of hand-coding every single move.',\n        milestone:'The hand grasps an object it was never explicitly programmed for.',\n        doneWhen:'It succeeds at something you never directly taught it.',\n        items:[\n          {t:'Teleoperation: mirror your own hand to record demonstrations',c:['AI','SENSE']},\n          {t:'Collect a dataset of good grasps',c:['AI']},\n          {t:'Imitation learning — train a small policy from your demos',c:['AI']},\n          {t:'Simulation: practice thousands of grabs safely before real life',c:['AI','KIN']},\n          {t:'Close the loop: sensors → policy → motors, live',c:['AI','FIRMWARE']}\n        ]}\n    ];\n    this.LEVELS=['Age 8','Age 12','Age 16','Engineer'];\n    this.LEVEL_GUIDE={\n      'Age 8':'a bright 8-year-old. Use very simple words, short sentences and playful real-world analogies. Introduce at most one new term and explain it right away. Keep it simple but never wrong.',\n      'Age 12':'a curious 12-year-old. Clear language, a little real vocabulary, concrete analogies and examples.',\n      'Age 16':'a sharp 16-year-old. Be precise, use the real terminology, and bring in simple math or relationships where they illuminate.',\n      'Engineer':'an adult engineer. Be technically precise and correct, use proper terminology, equations, units and real trade-offs.'\n    };\n    this.DEEP_STARTERS=['How a tendon pulls a finger closed','What a servo motor really is','Pulse-width modulation (PWM)','Degrees of freedom','Inverse kinematics','How a pressure sensor feels touch','Why the thumb makes a hand a hand','How the hand will lea
