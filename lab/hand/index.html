rn to grip'];\n    this.DEEP_ORDER=['bones','wrist','thumb','tendons','muscles','sensing','control','materials','learning'];\n    this.CONCEPT_GROUPS=[{label:'The frame',slugs:['bones','wrist','thumb','materials']},{label:'How it moves',slugs:['tendons','muscles','control']},{label:'Senses & learning',slugs:['sensing','learning']}];\n    this.LAYER_DEEP={skin:'materials',skeleton:'bones',ligaments:'bones',tendons:'tendons',servos:'muscles',wiring:'control',vessels:'control',sensors:'sensing'};\n    this.ARTICLES={\n      bones:{title:\"Bones, joints & how a hand moves\", short:\"27 bones \\u2014 and every joint is one move the hand can make.\",\n        intuition:\"A hand is a chain of little bones linked by joints. Each joint is one degree of freedom: one independent way the hand can move. Count them and you know how capable the hand really is.\",\n        how:[\"Each finger has three bones; the thumb has two. They meet at joints we call knuckles.\",\"A joint that bends one way, like a door hinge, is one degree of freedom.\",\"A whole hand has about 27 of them, which is why it can do so much.\",\"To copy a joint in a robot you need a hinge and a way to move it.\"],\n        forHand:\"Our robot keeps the same bone chain, printed in plastic, with a steel pin at each knuckle for a smooth hinge. We drive the big joints and let the small ones follow.\",\n        tryIt:\"Slowly close one finger and watch each knuckle bend in turn. Now count every joint on your whole hand.\",\n        related:['wrist','tendons','thumb']},\n      wrist:{title:\"The wrist: 8 bones, 2 motions\", short:\"Eight small bones let the hand bend and tilt.\",\n        intuition:\"The wrist is a cluster of eight little bones, the carpals, sitting between your forearm and hand. Together they let the hand bend up and down and tilt side to side.\",\n        how:[\"The eight carpals sit in two rows and glide against each other.\",\"That lets the hand flex and extend, bending up and down.\",\"It also lets the hand tilt toward the thumb or the pinky.\",\"The two forearm bones, the radius and ulna, carry it all.\"],\n        forHand:\"We do not copy eight bones. A two-servo gimbal does the same two jobs: one motor bends the wrist, one tilts it.\",\n        tryIt:\"Hold your forearm still and wave your hand up and down, then tilt it side to side. Those are the two motions our gimbal recreates.\",\n        related:['bones','muscles','materials']},\n      thumb:{title:\"Why the thumb makes a hand a hand\", short:\"Opposition \\u2014 the thumb meeting each fingertip \\u2014 is the superpower.\",\n        intuition:\"The thumb can swing across the palm to touch every other fingertip. That one move, called opposition, is what lets you pinch, grip and hold.\",\n        how:[\"The thumb sits on a saddle-shaped joint that swivels two ways.\",\"Muscles at its base, the thenar group, rotate it across the palm.\",\"Meeting a fingertip forms a tight, precise pinch.\",\"Without it, a hand is really just a hook.\"],\n        forHand:\"We give the thumb its own extra servo just to rotate it into opposition, the single most important motor in the whole hand.\",\n        tryIt:\"Touch your thumb to each fingertip in turn. Now try it with the thumb held flat, and feel how useless the hand gets.\",\n        related:['bones','tendons','muscles']},\n      tendons:{title:\"Tendons: cables that pull\", short:\"Muscles far away pull cables to bend the fingers.\",\n        intuition:\"Fingers have almost no muscle in them. Instead, cables called tendons run down each finger, and muscles up in the forearm pull the cables to curl it.\",\n        how:[\"A flexor tendon runs down the palm side of each finger to the tip.\",\"Pull it, and the whole finger curls.\",\"On the back, extensor tendons pull the finger straight again.\",\"Rings called pulleys hold the cables against the bone so they do not bow out.\"],\n        forHand:\"We copy this exactly: a fishing-line cable up each finger, pulled by a servo in the forearm, with an elastic to spring it back open.\",\n        tryIt:\"Wiggle your fingers and watch the tendons move on the back of your hand and wrist.\",\n        related:['muscles','bones','thumb']},\n      muscles:{title:\"Muscles & motors: where power comes from\", short:\"The real motors sit in the forearm, not the fingers.\",\n        intuition:\"Most of the muscle that moves your fingers is not in your hand at all; it is in your forearm, pulling the tendons from a distance. That keeps the fingers slim and quick.\",\n        how:[\"Big forearm muscles pull the finger tendons.\",\"Small intrinsic muscles in the palm fine-tune spreading and the thumb.\",\"A muscle can only pull, never push, so they come in opposing pairs.\",\"A motor that spins can pull a cable just like a muscle does.\"],\n        forHand:\"Our muscles are servo motors in the forearm. Each one pulls a tendon; an elastic is its opposing partner that opens the finger.\",\n        tryIt:\"Squeeze your forearm while opening and closing your hand, and feel the muscles working far from the fingers.\",\n        related:['tendons','control','wrist']},\n      sensing:{title:\"Touch: how the hand feels\", short:\"Pressure pads let the hand feel contact and force.\",\n        intuition:\"Skin is full of tiny sensors that report touch and pressure. That feedback is how you hold an egg without crushing it: you feel how hard you press and stop in time.\",\n        how:[\"Sensors in the fingertips and palm detect contact and force.\",\"The signal travels up nerves to the brain.\",\"The brain adjusts the grip in a fraction of a second.\",\"No feeling means gripping blind, and crushing things.\"],\n        forHand:\"We put force-sensing pads at the fingertips and palm. The controller reads them and eases off the moment the grip is firm enough.\",\n        tryIt:\"Close your eyes and pick up something soft. Notice how touch alone tells you when you have got it.\",\n        related:['control','learning','tendons']},\n      control:{title:\"The brain: controller, signals & PWM\", short:\"A tiny computer reads sensors and commands every motor.\",\n        intuition:\"A small computer, the microcontroller, is the brain. It reads the touch sensors and tells each motor exactly how far to move, many times a second.\",\n        how:[\"A servo is told where to go by a timed pulse: that is PWM, pulse-width modulation.\",\"A longer pulse means turn further, and the servo holds that spot.\",\"One driver chip fans the signal out to all the motors.\",\"Sensors to controller to motors, looping constantly, is closed-loop control.\"],\n        forHand:\"An ESP32 is our brain; a PCA9685 driver turns its commands into pulses for eight servos. Nerves and wiring do the very same job: carry signals.\",\n        tryIt:\"Think of PWM like blinking a flashlight: longer flashes mean go further. The servo listens to the length of each flash.\",\n        related:['muscles','sensing','learning']},\n      materials:{title:\"Skin, shells & 3D printing\", short:\"Rigid frame, soft cover \\u2014 printed to shape.\",\n        intuition:\"A hand needs hard parts (bones) and soft parts (skin and pads). A 3D printer can make both, in different plastics, in almost any shape we design.\",\n        how:[\"Rigid plastic (PLA) prints the frame and bones.\",\"Flexible plastic (TPU) prints the skin and grip pads.\",\"We design each part on a computer first, in CAD.\",\"Print, test, tweak, reprint, cheaply and often.\"],\n        forHand:\"We print our whole hand: a PLA skeleton for strength and a TPU skin for grip and protection, just like real bone and skin.\",\n        tryIt:\"Look at a fingertip: hard nail side, soft pad side. Our print copies that split.\",\n        related:['bones','wrist','sensing']},\n      learning:{title:\"How the hand learns to grip\", short:\"Show it examples instead of coding every move.\",\n        intuition:\"Hand-coding every possible grip is hopeless. Instead we show the hand examples of good grips and let it learn the pattern, the way you learned to catch a ball by practising.\",\n        how:[\"We record good grasps by guiding the hand, called teleoperation.\",\"That builds a dataset of what good looks like.\",\"A small AI model learns to copy it: imitation learning.\",\"It can then handle objects it was never directly programmed for.\"],\n        forHand:\"This is the last phase. Once the hand can move and feel, we teach it grips by demonstration instead of writing code for each one.\",\n        tryIt:\"Pick up five different objects. Notice you do not think about it; you have learned the patterns. That is the goal.\",\n        related:['sensing','control','muscles']}\n    };\n    this.mountRef = this.handleMount.bind(this);\n    let done = {};\n    try{ const raw = localStorage.getItem('rhl_progress_v1'); if(raw) done = JSON.parse(raw)||{}; }catch(e){}\n    let deepLevel='Age 12';\n    try{ const dl=localStorage.getItem('rhl_level_v1'); if(dl) deepLevel=dl; }catch(e){}\n    this._deepCache={};\n    try{ const dc=localStorage.getItem('rhl_deep_cache_v1'); if(dc) this._deepCache=JSON.parse(dc)||{}; }catch(e){}\n    this.state = {\n      layers:{skin:true,skeleton:true,ligaments:true,tendons:true,servos:true,wiring:true,vessels:true,sensors:true},\n      explode:0, gesture:'open', curl:this.GESTURES.open.slice(),\n      autoRotate:true, selected:null, done,\n      deepOpen:false, trail:[], deepLevel, askText:'', readSlugs:(()=>{try{return JSON.parse(localStorage.getItem('rhl_read_v1'))||{};}catch(e){return {};}})(),\n      anatomyMode:'human',\n      detail:'simple', spread:0.5, thumbOpp:0.0, wristFlex:0, wristDev:0, tab:'hand',\n      view:'model', showAdv:false, openPhase:0, fullscreen:false, panel:null\n    };\n    this.three=null; this._inited=false;\n  }\n\n  // ---------- lifecycle ----------\n  handleMount(el){ if(!el){return;} this._mountEl=el; if(this._inited) return; this._inited=true; this.waitThree(); }\n  waitThree()
