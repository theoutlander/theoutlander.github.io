<script type="text/x-dc" data-dc-script data-props="{&quot;tone&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;steel&quot;,&quot;nylon&quot;],&quot;default&quot;:&quot;steel&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Sound&quot;},&quot;showFingerNumbers&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Chords&quot;},&quot;noteNaming&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;sharps&quot;,&quot;flats&quot;],&quot;default&quot;:&quot;sharps&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Notes&quot;},&quot;startWithAllNotes&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:false,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Fretboard&quot;}}">
class Component extends DCLogic {
  constructor(props){
    super(props);
    this.ACCENT='#b3582f'; this.INK='#2a2520'; this.SOFT='#6f665a';
    this.LINE='#e8e4db'; this.GREEN='#3f7d54'; this.WRONG='#b3402f';
    this.SHARP=['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
    this.FLAT =['C','Db','D','Eb','E','F','Gb','G','Ab','A','Bb','B'];
    this.openMidi=[40,45,50,55,59,64];          // low E .. high e
    this.openNames=['E','A','D','G','B','e'];
    this.CHORDS=[
      {name:'C',  full:'C major', shape:['x',3,2,0,1,0], fingers:['','',3,2,'',1,''] },
      {name:'A',  full:'A major', shape:['x',0,2,2,2,0], fingers:['','','',1,2,3,''] },
      {name:'G',  full:'G major', shape:[3,2,0,0,0,3],   fingers:[2,1,'','','',3] },
      {name:'E',  full:'E major', shape:[0,2,2,1,0,0],   fingers:['',2,3,1,'',''] },
      {name:'D',  full:'D major', shape:['x','x',0,2,3,2],fingers:['','','',1,3,2] },
      {name:'Am', full:'A minor', shape:['x',0,2,2,1,0], fingers:['','',2,3,1,''] },
      {name:'Em', full:'E minor', shape:[0,2,2,0,0,0],   fingers:['',2,3,'','',''] },
      {name:'Dm', full:'D minor', shape:['x','x',0,2,3,1],fingers:['','','',2,3,1] },
    ];
    this.RHYTHM={ labels:['1','&','2','&','3','&','4','&'], dirs:['D','','D','U','','U','D','U'] };
    this.SONG=['Em','C','G','D'];
    this.INTERVALS=['R','♭2','2','♭3','3','4','♭5','5','♭6','6','♭7','7'];
    this.INTERVAL_FULL=['Unison','Minor 2nd','Major 2nd','Minor 3rd','Major 3rd','Perfect 4th','Tritone','Perfect 5th','Minor 6th','Major 6th','Minor 7th','Major 7th'];
    this.QUALITIES=[
      {id:'maj', name:'Major',         sym:'',     iv:[0,4,7]},
      {id:'min', name:'Minor',         sym:'m',    iv:[0,3,7]},
      {id:'7',   name:'Dominant 7th',  sym:'7',    iv:[0,4,7,10]},
      {id:'maj7',name:'Major 7th',     sym:'maj7', iv:[0,4,7,11]},
      {id:'m7',  name:'Minor 7th',     sym:'m7',   iv:[0,3,7,10]},
      {id:'sus2',name:'Suspended 2nd', sym:'sus2', iv:[0,2,7]},
      {id:'sus4',name:'Suspended 4th', sym:'sus4', iv:[0,5,7]},
      {id:'6',   name:'Sixth',         sym:'6',    iv:[0,4,7,9]},
      {id:'dim', name:'Diminished',    sym:'dim',  iv:[0,3,6]},
      {id:'aug', name:'Augmented',     sym:'aug',  iv:[0,4,8]},
    ];
    this.SCALES=[
      {id:'major', name:'Major (Ionian)',    iv:[0,2,4,5,7,9,11], steps:['W','W','H','W','W','W','H']},
      {id:'minor', name:'Natural minor',     iv:[0,2,3,5,7,8,10], steps:['W','H','W','W','H','W','W']},
      {id:'majpent',name:'Major pentatonic', iv:[0,2,4,7,9],      steps:['W','W','3','W','3']},
      {id:'minpent',name:'Minor pentatonic', iv:[0,3,5,7,10],     steps:['3','W','W','3','W']},
      {id:'blues', name:'Blues',             iv:[0,3,5,6,7,10],   steps:['3','W','H','H','3','W']},
    ];
    this.TRIAD_PATTERN=[[0,4,7],[0,3,7],[0,3,7],[0,4,7],[0,4,7],[0,3,7],[0,3,6]];
    this.ROMANS=['I','ii','iii','IV','V','vi','vii°'];
    // movable voicings: offsets from the barre fret on the anchor string (0=low E, 1=A); -1 = muted
    this.SHAPES={
      maj:  {anchor:0, frets:[0,2,2,1,0,0],  fingers:['',3,4,2,'','']},
      min:  {anchor:0, frets:[0,2,2,0,0,0],  fingers:['',3,4,'','','']},
      '7':  {anchor:0, frets:[0,2,0,1,0,0],  fingers:['',3,'',2,'','']},
      maj7: {anchor:0, frets:[0,2,1,1,0,0],  fingers:['',3,1,2,'','']},
      m7:   {anchor:0, frets:[0,2,0,0,0,0],  fingers:['',3,'','','','']},
      sus4: {anchor:0, frets:[0,2,2,2,0,0],  fingers:['',2,3,4,'','']},
      aug:  {anchor:0, frets:[0,3,2,1,1,0],  fingers:['',4,3,2,2,'']},
      sus2: {anchor:1, frets:[-1,0,2,2,0,0], fingers:['','',2,3,'','']},
      '6':  {anchor:1, frets:[-1,0,2,2,2,2], fingers:['','',1,1,1,1]},
      dim:  {anchor:1, frets:[-1,0,1,2,1,-1],fingers:['','',1,3,2,'']},
    };
    this.SECTIONS=[
      {id:'tuner',label:'Tune up'},{id:'fretboard',label:'The fretboard'},{id:'theory',label:'How music works'},
      {id:'chords',label:'Open chords'},{id:'chordlab',label:'The chord lab'},{id:'scales',label:'Scales'},
      {id:'notation',label:'Reading the staff'},{id:'tab',label:'Tablature'},{id:'rhythm',label:'Rhythm'},
      {id:'song',label:'Your first song'},{id:'practice',label:'Switching chords'},
    ];
    this.PKEY='fc_progress_v1';
    this.TAB=[ // {string index 0-5 (low E..high e), fret}
      {s:1,f:0},{s:1,f:2},{s:1,f:3},{s:2,f:2},{s:2,f:0},{s:1,f:3},{s:1,f:2},{s:1,f:0}
    ];
    // guided path: the six core steps, shown one at a time
    this.STEPS=[
      {id:'tuner',    name:'Tune up',            view:'tuner',    why:'An out-of-tune guitar sounds wrong no matter what you play — so this is always step one. Tap each string\u2019s target pitch, low to high, and turn its peg to match.'},
      {id:'fretboard',name:'Find the notes',     view:'fretboard',why:'Press behind a fret, pluck, and you get one exact note every time. Get a feel for how the neck is laid out before you shape anything.', tip:'Say each note out loud as you click it. Two minutes a day on just the low E and A strings goes a long way — those are the strings most chords get their name from.'},
      {id:'chords',   name:'Your first chords',  view:'chords',   why:'A chord is a few notes played together. These open shapes are the backbone of thousands of songs — flip through and strum each one.', tip:'Press just behind the fret, not on top of it, and arch your fingers so the tips land on the strings. That\u2019s what stops the buzzing.'},
      {id:'trainer',  name:'Switch between them',view:'trainer',  why:'Holding one chord is easy; changing between two in time is the wall every beginner hits. Pick two and drill the change at a slow tempo.', tip:'Switching clean beats switching fast. Keep the tempo slow until every change lands, then nudge it up.'},
      {id:'rhythm',   name:'Keep time',          view:'rhythm',   why:'Chords are what you play; rhythm is when. Your strumming hand swings down-up the whole time — it just doesn\u2019t hit on every move.', tip:'Keep your hand swinging even on the strums you skip — it\u2019s a pendulum that never stops.'},
      {id:'song',     name:'Play a song',        view:'song',     why:'Four chords you now know, looped in time — and suddenly it\u2019s music. Slow the tempo and strum along until the changes feel easy.'},
    ];
    // optional deeper material, tucked into an accordion
    this.DEEPER=[
      {id:'theory',   name:'How music works',     view:'theory',   blurb:'The math behind everything: how notes are counted, the one scale pattern, and where chords come from.'},
      {id:'chordlab', name:'The chord lab',       view:'chordlab', blurb:'Build any chord from its formula and get a movable shape you can play in any key.'},
      {id:'scales',   name:'Scales',              view:'scales',   blurb:'The step patterns that melodies and solos are built on — including the minor pentatonic.'},
      {id:'notation', name:'Reading the staff',   view:'notation', blurb:'Standard notation: pitch on five lines. Optional — tab covers most of what you\u2019ll play.'},
      {id:'tabtools', name:'Tab & paste-your-own',view:'tabtools', blurb:'Read tablature, then paste your own tab or note letters and hear the page play it back.'},
    ];
    // one flat, fully-visible outline: intro + basics + extras
    this.WELCOME={id:'welcome', kind:'intro', short:'Meet your guitar', name:'Start with six strings.', view:'welcome', why:'Go from an untuned guitar to playing a real song in six clear steps \u2014 and you can hear all of it. No app, no account. Pluck the strings below to meet your guitar, then head to step one.'};
    this.ITEMS=[this.WELCOME]
      .concat(this.STEPS.map(function(s){ return Object.assign({kind:'basic'},s); }))
      .concat(this.DEEPER.map(function(d){ return Object.assign({kind:'extra'},d); }));
    this.state={
      fbSel:null, fbAll: !!props.startWithAllNotes,
      chordIdx:0,
      staffSel:null,
      strumPos:-1, strumPlaying:false,
      tabPos:-1,
      bpm:80,
      songPlaying:false, songBar:-1, songBeat:-1,
      trainerPlaying:false, trainerActive:0, trainerBeat:-1, trainerA:'Em', trainerB:'C',
      tunerString:-1,
      thRoot:0,
      clRoot:0, clQual:'maj',
      scRoot:9, scType:'minpent', scaleStep:-1,
      neckNotes:false, clView:'shape', heroString:-1,
      tabInput:'', tabUserPos:-1, tabUserPlaying:false, tabError:'',
      step: this.loadStep(), deepOpen:null, item: this.loadItem(), done: this.loadDone(),
      progress: this.loadProgress(),
    };
  }
  componentDidMount(){
    // preload real guitar samples so the first click already sounds natural
    try{ this.initAudio(); }catch(e){}
    if(!this.inst){ let n=0; const iv=setInterval(()=>{ this.loadInstrument(); if(this.inst||++n>40) clearInterval(iv); },300); }
    this.startScope();
  }
  componentWillUnmount(){ clearInterval(this._strumTimer); clearInterval(this._tabTimer); clearInterval(this._songTimer); clearInterval(this._trnTimer); clearInterval(this._scaleTimer); clearInterval(this._userTimer); cancelAnimationFrame(this._scopeRAF); }

  // ---------- audio ----------
  freq(m){ return 440*Math.pow(2,(m-69)/12); }
  noteName(m){ const a=this.props.noteNaming==='flats'?this.FLAT:this.SHARP; return a[((m%12)+12)%12]; }
  initAudio(){
    if(this.ac) return this.ac;
    const C=window.AudioContext||window.webkitAudioContext; const ac=new C(); this.ac=ac;
    this.master=ac.createGain(); this.master.gain.value=0.92;
    this.analyser=ac.createAnalyser(); this.analyser.fftSize=2048; this.analyser.smoothingTimeConstant=0.55;
    this.master.connect(this.analyser); this.analyser.connect(ac.destination);
    this.loadInstrument();
    return ac;
  }
  loadInstrument(){
    if(this.inst || this._instLoading || !window.Soundfont || !this.ac) return;
    this._instLoading=true;
    const name = this.props.tone==='nylon' ? 'acoustic_guitar_nylon' : 'acoustic_guitar_steel';
    window.Soundfont.instrument(this.ac, name, {soundfont:'MusyngKite', destination:this.master})
      .then(inst=>{ this.inst=inst; this._instLoading=false; })
      .catch(()=>{ this._instLoading=false; });
  }
  ensureAudio(){
    const ac=this.initAudio();
    if(ac.state==='suspended') ac.resume();
    if(!this.inst) this.loadInstrument();
    this.startScope();
    return ac;
  }
  // public note: real sampled guitar when ready, warm synth as fallback
  pluck(midi, when, gain){
    when=when||0; gain=(gain==null?0.85:gain);
    const ac=this.ensureAudio();
    if(this.inst){ this.inst.play(midi, ac.currentTime+when, {gain:Math.min(1.4,gain*1.5), destination:this.master}); return; }
    this.synthPluck(midi, when, gain);
  }
  synthPluck(midi, when, gain){
    when=when||0; gain=(gain==null?0.8:gain);
    const ac=this.ensureAudio(); const f=this.freq(midi); const sr=ac.sampleRate;
    const dur=Math.min(3.4, 1.9+200/f); const len=Math.floor(sr*dur);
    const buf=ac.createBuffer(1,len,sr); const data=buf.getChannelData(0);
    const N=Math.max(2,Math.round(sr/f));
    // warm, band-limited pluck excitation (one-pole lowpassed noise)
    const exc=new Float32Array(N); let prev=0; const lpB=0.5;
    for(let i=0;i<N;i++){ const w=Math.random()*2-1; prev=prev*lpB+w*(1-lpB); exc[i]=prev; }
    // pick-position comb — adds body and tames the buzz
    const pp=Math.max(1,Math.round(N*0.12)); const cur=new Float32Array(N);
    for(let i=0;i<N;i++) cur[i]=exc[i]-0.85*exc[(i-pp+N)%N];
    // frequency-dependent damping: high strings decay faster, like a real string
    const damp=0.996-(f>300?Math.min(0.005,(f-300)/300*0.005):0);
    let idx=0;
    for(let i=0;i<len;i++){ const a=cur[idx], b=cur[(idx+1)%N]; const v=damp*(0.5*a+0.5*b); cur[idx]=v; data[i]=a; idx=(idx+1)%N; }
    const fa=Math.min(90,len); for(let i=0;i<fa;i++) data[i]*=i/fa; // de-click attack
    const src=ac.createBufferSource(); src.buffer=buf;
    const hp=ac.createBiquadFilter(); hp.type='highpass'; hp.frequency.value=70;
    const lp=ac.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=4600; lp.Q.value=0.4;
    const g=ac.createGain(); const t0=ac.currentTime+when;
    g.gain.setValueAtTime(gain,t0); g.gain.exponentialRampToValueAtTime(0.0005,t0+dur);
    src.connect(hp); hp.connect(lp); lp.connect(g); g.connect(this.master);
    src.start(t0); src.stop(t0+dur);
  }
  strumShape(shape, dir, vel){
    vel = vel==null?1:vel;
    const order=[0,1,2,3,4,5];
    let seq = dir==='up'? order.slice().reverse() : order;
    // upstrokes naturally catch only the higher strings, and lighter
    if(dir==='up') seq = seq.filter(s=> s>=2);
    const playable = seq.filter(s=> shape[s]!=='x' && shape[s]!=null);
    let t=0; const base = dir==='up'? 0.020 : 0.027;
    playable.forEach((s,i)=>{
      const fr=shape[s];
      const jitter=(Math.random()-0.5)*0.011;            // human timing wobble
      const frac=i/Math.max(1,playable.length-1);
      // downstroke leans on the bass strings, upstroke on the treble
      const accent = dir==='up' ? (0.82+0.2*frac) : (1.08-0.18*frac);
      const level = (dir==='up'?0.4:0.62) * vel * accent * (0.85+Math.random()*0.3);
      this.pluck(this.openMidi[s]+fr, Math.max(0,t+jitter), Math.max(0.1,level));
      t += base*(0.8+Math.random()*0.45);
    });
  }
  ord(n){ if(n===0) return 'open'; const s=['th','st','nd','rd'], v=n%100; return n+(s[(v-20)%10]||s[v]||s[0]); }

  // ---------- fretboard ----------
  fbClick(s,f){ this.pluck(this.openMidi[s]+f); this.setState({fbSel:{s,f}}); }
  renderFretboard(){
    const h=React.createElement; const frets=12;
    const ml=58, mt=36, fw=54, sg=30;
    const W=ml+frets*fw+34, H=mt+5*sg+44;
    const sel=this.state.fbSel, all=this.state.fbAll;
    const fx=f=> f===0? ml-30 : ml+(f-0.5)*fw;
    const lx=f=> ml+f*fw;
    const sy=s=> mt+s*sg;
    const k=[];
    k.push(h('rect',{key:'bg',x:ml,y:mt-3,width:frets*fw,height:5*sg+6,rx:5,fill:'#f3f0e9'}));
    [3,5,7,9].forEach(f=> k.push(h('circle',{key:'mk'+f,cx:ml+(f-0.5)*fw,cy:mt+2.5*sg,r:5,fill:'#cdbfa4'})));
    k.push(h('circle',{key:'m12a',cx:ml+11.5*fw,cy:mt+1.5*sg,r:5,fill:'#cdbfa4'}));
    k.push(h('circle',{key:'m12b',cx:ml+11.5*fw,cy:mt+3.5*sg,r:5,fill:'#cdbfa4'}));
    for(let s=0;s<6;s++){ k.push(h('line',{key:'s'+s,x1:ml,y1:sy(s),x2:ml+frets*fw,y2:sy(s),stroke:'#a99d89',strokeWidth:1.1+(5-s)*0.34})); }
    for(let f=0;f<=frets;f++){ k.push(h('line',{key:'f'+f,x1:lx(f),y1:mt,x2:lx(f),y2:mt+5*sg,stroke:f===0?'#2a2520':'#c5b89f',strokeWidth:f===0?5:1.6})); }
    for(let s=0;s<6;s++){
      for(let f=0;f<=frets;f++){
        const isSel=sel&&sel.s===s&&sel.f===f; const show=all||isSel;
        k.push(h('rect',{key:'h'+s+'-'+f,x:f===0?0:lx(f-1),y:sy(s)-sg/2,width:f===0?ml:fw,height:sg,fill:'transparent',style:{cursor:'pointer'},onClick:()=>this.fbClick(s,f)}));
        if(show){
          const cx=fx(f), cy=sy(s), nm=this.noteName(this.openMidi[s]+f);
          k.push(h('circle',{key:'d'+s+'-'+f,cx,cy,r:12.5,fill:isSel?this.ACCENT:'#fff',stroke:this.ACCENT,strokeWidth:1.6,style:{pointerEvents:'none'}}));
          k.push(h('text',{key:'tx'+s+'-'+f,x:cx,y:cy+0.5,fontSize:11,fontFamily:'JetBrains Mono,monospace',fontWeight:600,fill:isSel?'#fff':'#2a2520',textAnchor:'middle',dominantBaseline:'middle',style:{pointerEvents:'none'}},nm));
        }
      }
    }
    for(let s=0;s<6;s++) k.push(h('text',{key:'sl'+s,x:20,y:sy(s)+0.5,fontSize:13,fontFamily:'JetBrains Mono,monospace',fontWeight:600,fill:'#6f665a',textAnchor:'middle',dominantBaseline:'middle'},this.openNames[s]));
    for(let f=1;f<=frets;f++) k.push(h('text',{key:'fn'+f,x:ml+(f-0.5)*fw,y:mt+5*sg+24,fontSize:11.5,fontFamily:'JetBrains Mono,monospace',fill:[3,5,7,9,12].includes(f)?'#2a2520':'#a99d89',fontWeight:[3,5,7,9,12].includes(f)?600:400,textAnchor:'middle'},f));
    const svg=h('svg',{viewBox:'0 0 '+W+' '+H,width:'100%',style:{maxWidth:W,display:'block'}},k);

    const readout = sel
      ? h('div',{style:{display:'flex',alignItems:'baseline',gap:10}},

  // ---------- rhythm ----------
  toggleStrum(){

  noteToMidi(tok){
    const m=tok.match(/^([A-Ga-g])([#b]?)(\d?)$/); if(!m) return null;
    const base={C:0,D:2,E:4,F:5,G:7,A:9,B:11}[m[1].toUpperCase()];

  looksLikeTab(lines){ let t=0; lines.forEach(l=>{ const d=(l.match(/-/g)||[]).length; if(d>=2) t++; }); return t>=4; }
  parsePlayable(text){

  parseMelody(text){
    const toks=text.replace(/[|,]/g,' ').split(/\s+/).filter(Boolean); const events=[]; let bad=0;
    toks.forEach(t=>{ if(t==='-'||t.toLowerCase()==='r'){ events.push([]); return; } const mi=this.noteToMidi(t); if(mi==null){ bad++; return; } events.push([mi]); });

    return {type:'melody',events:events,note:bad?('skipped '+bad+' unrecognised token'+(bad>1?'s':'')):''};
  }
  parseTab(lines){
    const tabLines=lines.filter(l=>(l.match(/-/g)||[]).length>=2);
    const labMap={E:0,A:1,D:2,G:3,B:4,e:5}; const events=[];
    for(let base=0;base+6<=tabLines.length;base+=6){
      const sys=tabLines.slice(base,base+6);
      const labels=sys.map(l=>{ const m=l.match(/^\s*([eEBGDAbgda])\s*[\|\-]/); return m?m[1]:null; });
      let order;
      if(labels.every(x=>x!=null)) order=labels.map(x=> labMap[x]!=null?labMap[x]:labMap[x.toUpperCase()]);
      else order=[5,4,3,2,1,0];
      const strip=sys.map(l=> l.replace(/^\s*[eEBGDAbgda]?\s*\|?/,''));
      const W=Math.max.apply(null,strip.map(s=>s.length));

        for(let li=0;li<6;li++){ const s=strip[li]||''; const ch=s[c];

    }

    return {type:'tab',events:events};
  }

        ? h('span',{style:{width:20,height:20,flex:'0 0 auto',borderRadius:'50%',display:'inline-flex',alignItems:'center',justifyContent:'center',fontFamily:'JetBrains Mono,monospace',fontSize:10.5,fontWeight:600,border:'1px solid '+(active?'rgba(255,255,255,.55)':'#c9bda7'),background:'transparent',color:active?'#fff':this.SOFT}}, num)
        : h('span',{style:{width:20,height:20,flex:'0 0 auto',display:'inline-flex',alignItems:'center',justifyContent:'center',fontSize:12,color:active?'#fff':'#b9ad97'}}, it.kind==='intro'?'\u266A':'\u25CB');
      return h('button',{key:it.id,onClick:()=>this.goItem(it.id),style:{display:'flex',alignItems:'center',gap:10,width:'100%',textAlign:'left',font:'inherit',cursor:'pointer',border:'none',borderRadius:10,padding:'8px 10px',background:active?this.ACCENT:'transparent',color:active?'#fff':this.INK,transition:'background .12s'}},
        badge,
        h('span',{style:{fontFamily:"'Newsreader',serif",fontSize:15,fontWeight:600,lineHeight:1.25}}, it.short||it.name));
    };
    const label=(t)=>h('div',{key:t,style:{fontFamily:'JetBrains Mono,monospace',fontSize:10.5,letterSpacing:'.16em',textTransform:'uppercase',color:this.SOFT,fontWeight:600,margin:'18px 0 6px 10px'}},t);
    const kids=[];
    kids.push(row(this.WELCOME,0));
    kids.push(label('The basics'));
    this.STEPS.forEach((s,i)=>kids.push(row(this.itemById(s.id), i+1)));
    kids.push(label('Go deeper \u00b7 optional'));
    this.DEEPER.forEach(dd=>kids.push(row(this.itemById(dd.id),0)));
    return h('div',{style:{background:'#fff',border:'1px solid '+this.LINE,borderRadius:16,padding:'14px 12px 16px'}}, kids);
  }
  renderLesson(){
    const h=React.createElement; const it=this.itemById(this.state.item);
    const idx=this.ITEMS.findIndex(x=>x.id===it.id);
    const prev=this.ITEMS[idx-1]||null, next=this.ITEMS[idx+1]||null;
    const stepNo=it.kind==='basic' ? (this.STEPS.findIndex(s=>s.id===it.id)+1) : 0;
    const kicker= it.kind==='basic' ? ('Step '+stepNo+' of '+this.STEPS.length) : (it.kind==='extra' ? 'Optional \u00b7 go deeper' : 'Start here');
    const body=it.why||it.blurb||'';
    const tip = it.tip? h('div',{style:{marginTop:22,borderLeft:'2px solid '+this.ACCENT,paddingLeft:16}},
      h('div',{style:{fontFamily:'JetBrains Mono,monospace',fontSize:11,letterSpacing:'.14em',textTransform:'uppercase',color:this.ACCENT,fontWeight:600,marginBottom:5}},'How to practice'),
      h('p',{style:{fontSize:15,lineHeight:1.6,color:'#4f483f',margin:0,maxWidth:'60ch'}}, it.tip)) : null;
    const nextLabel = next ? ((next.kind==='extra'&&it.kind!=='extra') ? ('Go deeper \u00b7 '+(next.short||next.name)+'  \u2192') : ('Next \u00b7 '+(next.short||next.name)+'  \u2192')) : null;
    const nav=h('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between',gap:14,flexWrap:'wrap',marginTop:28,paddingTop:20,borderTop:'1px solid '+this.LINE}},
      prev? this.btn('\u2190  '+(prev.short||prev.name),()=>this.goItem(prev.id),'ghost') : h('span',{style:{fontFamily:'JetBrains Mono,monospace',fontSize:12,letterSpacing:'.08em',textTransform:'uppercase',color:this.SOFT,fontWeight:600}},'Start here'),
      next? this.btn(nextLabel,()=>this.goItem(next.id),'solid')
          : this.btn('Back to the start  \u2191',()=>this.goItem('welcome'),'ghost'));
    return h('div',{style:{background:'#fff',border:'1px solid '+this.LINE,borderRadius:18,padding:'28px 30px',boxShadow:'0 1px 0 rgba(0,0,0,.02)'}},
      h('div',{style:{fontFamily:'JetBrains Mono,monospace',fontSize:12.5,letterSpacing:'.16em',textTransform:'uppercase',color:this.ACCENT,fontWeight:600}}, kicker),
      h('h2',{style:{fontFamily:'Newsreader,serif',fontWeight:600,fontSize:'clamp(28px,4vw,42px)',lineHeight:1.05,letterSpacing:'-.015em',margin:'12px 0 0'}}, it.name),
      h('p',{style:{fontSize:17,lineHeight:1.6,color:'#4f483f',maxWidth:'62ch',margin:'14px 0 0'}}, body),
      h('div',{style:{marginTop:26}}, this.widgetFor(it.view)),
      tip,
      nav);
  }

  renderVals(){
    return {
      sideNav: this.renderSideNav(),
      lessonView: this.renderLesson(),
    };
  }
}
</script>
</body>
</html>
